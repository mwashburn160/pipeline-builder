<div class="header">
  <h1 style="margin: 0;">You're Invited!</h1>
</div>
<div class="content">
  <p>Hello,</p>
  <p><strong>{{inviterName}}</strong> has invited you to join <strong>{{organizationName}}</strong>.</p>
  <p>Your role: <span class="role-badge">{{role}}</span></p>
  <p style="text-align: center;">
    <a href="{{inviteUrl}}" class="button">Accept Invitation</a>
  </p>
  {{oauthHtml}}
  <p style="font-size: 14px; color: #6b7280;">
    This invitation will expire on <strong>{{expiresFormatted}}</strong>.
  </p>
  <p style="font-size: 14px; color: #6b7280;">
    If you didn't expect this invitation, you can safely ignore this email.
  </p>
</div>
<div class="footer">
  <p>Sent by {{fromName}}</p>
</div>
