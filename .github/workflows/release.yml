name: release
on:
  workflow_dispatch: {}
jobs:
  init:
    name: init
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: read
    outputs:
      NX_BASE: ${{ steps.nx_base.outputs.NX_BASE }}
      NX_HEAD: ${{ steps.nx_head.outputs.NX_HEAD }}
      AFFECTED_IMAGES: ${{ steps.affected.outputs.AFFECTED_IMAGES }}
      AFFECTED_PROJECTS: ${{ steps.affected.outputs.AFFECTED_PROJECTS }}
      PUBLISH_IMAGE: ${{ steps.publish.outputs.PUBLISH_IMAGE }}
    steps:
      - name: Clear cache
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GHRC_TOKEN }}
          script: |2-
            
                                    const caches = await github.rest.actions.getActionsCacheList({repo: context.repo.repo,owner: context.repo.owner})
                                    for (const cache of caches.data.actions_caches) {
                                    try {
                                        await github.rest.actions.deleteActionsCacheById({repo: context.repo.repo,owner: context.repo.owner,cache_id: cache.id})
                                        console.log('Successfully deleted cache with ID: ',cache.id);
                                    } catch (error) { 
                                        console.log('Error deleting cache with ID: ',cache.id, error);
                                    }
                                }
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.25.0
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24.14.0
          package-manager-cache: pnpm
      - name: Configure npm registry
        run: export NPM_TOKEN=$(echo ${{ secrets.NPM_TOKEN_ENCODED }} | base64 -d) && npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN && npm config set @pipeline-builder:registry=https://registry.npmjs.org/
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Set git user
        run: git config user.name "ci" && git config user.email "mwashburn160@gmail.com"
      - name: Prune tags older than 15 days
        run: CUTOFF_DATE=$(date -d "15 days ago" +%s) && git for-each-ref --format="%(refname:short) %(creatordate:unix)" refs/tags | while read TAG DATE; do if [ $DATE -lt $CUTOFF_DATE ]; then echo "Deleting tag $TAG created on $(date -d @$DATE)"; git tag -d $TAG; fi; done && git push origin --tags --prune
      - name: Set NX_BASE
        id: nx_base
        run: if [ -f .nx_base ] && [ -s .nx_base ]; then echo NX_BASE=$(cat .nx_base) >> $GITHUB_OUTPUT; else echo NX_BASE=$(git rev-parse HEAD~1) >> $GITHUB_OUTPUT; fi
      - name: Set NX_HEAD
        id: nx_head
        run: echo NX_HEAD=$(git rev-parse HEAD) >> $GITHUB_OUTPUT
      - name: Affected projects and images
        id: affected
        env:
          IMAGE_PROJECTS: '["frontend","platform","billing","reporting","compliance","quota","message","pipeline","plugin"]'
        run: |-
          echo AFFECTED_PROJECTS=$(pnpm nx show projects --affected --json --base ${{ steps.nx_base.outputs.NX_BASE }} --head ${{ steps.nx_head.outputs.NX_HEAD }}) >> $GITHUB_OUTPUT && echo AFFECTED_IMAGES=$(jq -n --arg LIST "$(comm -12 <(pnpm nx show projects --affected --base ${{ steps.nx_base.outputs.NX_BASE }} --head ${{ steps.nx_head.outputs.NX_HEAD }}| sort) <(echo $IMAGE_PROJECTS | jq -r '.[]' | sort))" '$LIST | split("
          ") | map(select(length>0))') >> $GITHUB_OUTPUT
      - name: Affected details
        run: echo AFFECTED_PROJECTS=${{ steps.affected.outputs.AFFECTED_PROJECTS }} && echo AFFECTED_IMAGES=${{ steps.affected.outputs.AFFECTED_IMAGES }}
      - name: Check publish images
        id: publish
        run: echo PUBLISH_IMAGE=$(pnpm nx show projects --affected --json --base ${{ steps.nx_base.outputs.NX_BASE }} --head ${{ steps.nx_head.outputs.NX_HEAD }} | jq 'any(contains("frontend","platform","billing","reporting","compliance","quota","message","pipeline","plugin"))') >> $GITHUB_OUTPUT
      - name: Publish details
        run: "echo PUBLISH_IMAGE: ${{ steps.publish.outputs.PUBLISH_IMAGE }}"
  build:
    name: build
    needs: init
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: read
    if: ${{ needs.init.outputs.AFFECTED_PROJECTS != '[]' || needs.init.outputs.AFFECTED_IMAGES != '[]' }}
    steps:
      - name: Clear cache
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GHRC_TOKEN }}
          script: |2-
            
                                    const caches = await github.rest.actions.getActionsCacheList({repo: context.repo.repo,owner: context.repo.owner})
                                    for (const cache of caches.data.actions_caches) {
                                    try {
                                        await github.rest.actions.deleteActionsCacheById({repo: context.repo.repo,owner: context.repo.owner,cache_id: cache.id})
                                        console.log('Successfully deleted cache with ID: ',cache.id);
                                    } catch (error) { 
                                        console.log('Error deleting cache with ID: ',cache.id, error);
                                    }
                                }
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.25.0
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24.14.0
          package-manager-cache: pnpm
      - name: Configure npm registry
        run: export NPM_TOKEN=$(echo ${{ secrets.NPM_TOKEN_ENCODED }} | base64 -d) && npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN && npm config set @pipeline-builder:registry=https://registry.npmjs.org/
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Set git user
        run: git config user.name "ci" && git config user.email "mwashburn160@gmail.com"
      - name: Prune tags older than 15 days
        run: CUTOFF_DATE=$(date -d "15 days ago" +%s) && git for-each-ref --format="%(refname:short) %(creatordate:unix)" refs/tags | while read TAG DATE; do if [ $DATE -lt $CUTOFF_DATE ]; then echo "Deleting tag $TAG created on $(date -d @$DATE)"; git tag -d $TAG; fi; done && git push origin --tags --prune
      - name: Set NX:BASE, NX:HEAD
        run: echo NX_BASE=${{ needs.init.outputs.NX_BASE }} >> $GITHUB_ENV && echo NX_HEAD=${{ needs.init.outputs.NX_HEAD }}  >> $GITHUB_ENV
      - name: Details NX_BASE, NX_HEAD
        run: 'echo "NX_BASE: ${{ env.NX_BASE }}, NX_HEAD: ${{ env.NX_HEAD }}"'
      - name: Run build target
        env:
          GITHUB_TOKEN: ${{ secrets.GHRC_TOKEN }}
        run: pnpm nx affected --target build --base ${{ env.NX_BASE }} --head ${{ env.NX_HEAD }} --verbose
      - name: Semantic version
        env:
          GITHUB_TOKEN: ${{ secrets.GHRC_TOKEN }}
        run: pnpm nx release --first-release --skip-publish --verbose
      - name: Check publish library
        id: check
        run: echo PUBLISH_LIB=$(pnpm nx show projects --affected --json | jq 'any(contains("ai-core","api-core","api-server","pipeline-core","pipeline-data","event-ingestion","pipeline-manager"))')  >> $GITHUB_OUTPUT
      - name: Publish npm packages
        if: ${{ steps.check.outputs.PUBLISH_LIB == 'true' }}
        run: npm config set @pipeline-builder:registry=https://registry.npmjs.org/ && pnpm publish --access public --filter @pipeline-builder/* --no-git-checks --verbose
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifacts
          path: |-
            ./**/lib/
            ./**/dist/
            !./**/node_modules/
      - name: Push new tag to the repository
        run: git push --follow-tags
      - name: Build complete
        if: ${{ success() }}
        run: 'echo $(git rev-parse HEAD) > .nx_base && git add .nx_base && git commit -m "chore: updated last successfully built commit" && git push'
  publish:
    name: publish image
    needs:
      - init
      - build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
      packages: read
    if: ${{ needs.init.outputs.PUBLISH_IMAGE == 'true' }}
    steps:
      - name: Clear cache
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GHRC_TOKEN }}
          script: |2-
            
                                    const caches = await github.rest.actions.getActionsCacheList({repo: context.repo.repo,owner: context.repo.owner})
                                    for (const cache of caches.data.actions_caches) {
                                    try {
                                        await github.rest.actions.deleteActionsCacheById({repo: context.repo.repo,owner: context.repo.owner,cache_id: cache.id})
                                        console.log('Successfully deleted cache with ID: ',cache.id);
                                    } catch (error) { 
                                        console.log('Error deleting cache with ID: ',cache.id, error);
                                    }
                                }
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.25.0
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 24.14.0
          package-manager-cache: pnpm
      - name: Configure npm registry
        run: export NPM_TOKEN=$(echo ${{ secrets.NPM_TOKEN_ENCODED }} | base64 -d) && npm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN && npm config set @pipeline-builder:registry=https://registry.npmjs.org/
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Set git user
        run: git config user.name "ci" && git config user.email "mwashburn160@gmail.com"
      - name: Prune tags older than 15 days
        run: CUTOFF_DATE=$(date -d "15 days ago" +%s) && git for-each-ref --format="%(refname:short) %(creatordate:unix)" refs/tags | while read TAG DATE; do if [ $DATE -lt $CUTOFF_DATE ]; then echo "Deleting tag $TAG created on $(date -d @$DATE)"; git tag -d $TAG; fi; done && git push origin --tags --prune
      - name: Download artifact
        id: dnload_artifact
        uses: actions/download-artifact@v8
        with:
          name: artifacts
          path: dnload
      - name: Copy artifacts to destination
        run: cp -rv dnload/* ./
      - name: Login into container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_TOKEN }}
      - name: Setup buildx
        uses: docker/setup-buildx-action@v4
        with:
          cleanup: true
          cache-binary: false
      - name: Build docker image
        env:
          PROJECT_NAME: ${{ matrix.project_name }}
        run: pnpm nx run ${PROJECT_NAME}:docker:build --verbose
      - name: Tag docker image
        env:
          REGISTRY: ghcr.io/mwashburn160
          PROJECT_NAME: ${{ matrix.project_name }}
        run: pnpm nx run ${PROJECT_NAME}:docker:tag --verbose
      - name: Push docker image
        env:
          REGISTRY: ghcr.io/mwashburn160
          PROJECT_NAME: ${{ matrix.project_name }}
        run: pnpm nx run ${PROJECT_NAME}:docker:push --verbose
    strategy:
      max-parallel: 4
      fail-fast: false
      matrix:
        project_name: ${{ fromJson(needs.init.outputs.AFFECTED_IMAGES) }}
