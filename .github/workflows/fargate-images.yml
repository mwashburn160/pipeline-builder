# Build the Fargate auto-init PREREQUISITE images (deploy/aws/fargate/stacks/07-init.yaml):
#   - pipeline-init     : the init image (deploy scripts + tools baked) the init task runs
#   - pipeline-bootstrap: the CodeBuild runtime image (init runs with BUILD_BOOTSTRAP=n)
# (The plugin `FROM` bases are NOT published here — the init task's buildkitd sidecar
#  builds them from deploy/plugins/_base/ source and pushes them into the in-cluster registry.)
#
# Manual dispatch — these are deploy artifacts, not built per package-release. amd64 only
# (Fargate + CodeBuild are x86_64). NOTE: hand-authored (not projen-managed); to fold it
# into the projen release workflow, move these steps into projenrc/workflow.ts.
name: fargate-images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Tag for pipeline-init and pipeline-bootstrap
        required: false
        default: latest

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io/mwashburn160
  PLATFORM: linux/amd64

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_TOKEN }}

      - name: Setup buildx
        uses: docker/setup-buildx-action@v4

      # The init image — built from the REPO ROOT so `COPY deploy` resolves.
      - name: Build + push pipeline-init
        run: >
          docker buildx build --push --platform "$PLATFORM"
          -t "$REGISTRY/pipeline-init:${{ inputs.version }}"
          -f deploy/aws/fargate/init/Dockerfile .

      # CodeBuild runtime image (init runs with BUILD_BOOTSTRAP=n and pulls this).
      - name: Build + push pipeline-bootstrap
        run: >
          docker buildx build --push --platform "$PLATFORM"
          -t "$REGISTRY/pipeline-bootstrap:${{ inputs.version }}"
          deploy/codebuild/bootstrap
