<!-- Mermaid.js (ESM build — the only one reliably published for v10/11; the UMD
     dist/mermaid.min.js no longer exists, which silently breaks diagram rendering).
     kramdown/rouge wraps ```mermaid as <div class="language-mermaid">…<code>…</code>…</div>
     — the class is on the WRAPPER, not the <code> — so target the wrapper, convert each
     to <div class="mermaid">, then render. -->
<script type="module">
  import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";
  function renderMermaid() {
    var blocks = document.querySelectorAll('div.language-mermaid, pre > code.language-mermaid');
    blocks.forEach(function (el) {
      var container = el.tagName === 'CODE' ? (el.closest('pre') || el) : el;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent.trim();
      container.replaceWith(div);
    });
    if (blocks.length) {
      mermaid.initialize({ startOnLoad: false, theme: 'default' });
      mermaid.run();
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', renderMermaid);
  else renderMermaid();
</script>
