<!-- Mermaid.js — render ```mermaid fenced blocks. kramdown/rouge wraps them as
     <div class="language-mermaid">…<code>…</code>…</div> — the class is on the WRAPPER,
     not the <code> — so target the wrapper (with a bare-<code> fallback), then init. -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var blocks = document.querySelectorAll('div.language-mermaid, pre > code.language-mermaid');
    blocks.forEach(function (el) {
      var container = el.tagName === 'CODE' ? (el.closest('pre') || el) : el;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = el.textContent.trim();
      container.replaceWith(div);
    });
    if (blocks.length) {
      mermaid.initialize({ startOnLoad: false, theme: 'default' });
      mermaid.run();
    }
  });
</script>
