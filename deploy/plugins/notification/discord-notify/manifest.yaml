name: discord-notify
description: Discord notification plugin for sending pipeline status alerts and build results to Discord channels via webhook using AWS CDK CodeBuildStep
keywords:
  - discord
  - notification
  - alert
  - webhook
  - chat
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 5
failureBehavior: warn
secrets:
  - name: DISCORD_WEBHOOK_URL
    required: true
    description: "Discord webhook URL"
primaryOutputDirectory: notify-output
dockerfile: Dockerfile
installCommands:
  - curl --version | head -1
  - jq --version
  - |
    if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
      echo "WARNING: DISCORD_WEBHOOK_URL not set. Inject via CodeBuild secrets at runtime."
    fi
commands:
  - mkdir -p notify-output
  - |
    if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
      echo "ERROR: DISCORD_WEBHOOK_URL must be set (injected via CodeBuild secrets)"
      exit 1
    fi
    TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
    case "${NOTIFICATION_TYPE}" in
      pipeline-status)
        STATUS="${PIPELINE_STATUS:-unknown}"
        NAME="${PIPELINE_NAME:-Pipeline}"
        # Discord embed colors are decimal integers
        case "${STATUS}" in
          success|succeeded)
            COLOR=3066993
            TITLE="Build Succeeded"
            ;;
          failure|failed)
            COLOR=15158332
            TITLE="Build Failed"
            ;;
          *)
            COLOR=16776960
            TITLE="Status: ${STATUS}"
            ;;
        esac
        PAYLOAD=$(jq -n \
          --arg title "${NAME} — ${TITLE}" \
          --argjson color "${COLOR}" \
          --arg name "${NAME}" \
          --arg status "${STATUS}" \
          --arg ts "${TIMESTAMP}" \
          '{
            "embeds": [{
              "title": $title,
              "color": $color,
              "fields": [
                { "name": "Pipeline", "value": $name, "inline": true },
                { "name": "Status", "value": $status, "inline": true }
              ],
              "footer": { "text": "Pipeline Notification" },
              "timestamp": $ts
            }]
          }')
        ;;
      custom)
        if [ -z "${CUSTOM_MESSAGE}" ]; then
          echo "ERROR: CUSTOM_MESSAGE must be set for custom notification type"
          exit 1
        fi
        PAYLOAD=$(jq -n --arg content "${CUSTOM_MESSAGE}" '{"content": $content}')
        ;;
      *)
        echo "ERROR: Unknown NOTIFICATION_TYPE '${NOTIFICATION_TYPE}'. Supported: pipeline-status, custom"
        exit 1
        ;;
    esac
    echo "Sending Discord notification..."
    echo "${PAYLOAD}" | jq '.' | tee notify-output/payload.json
    HTTP_STATUS=$(curl -s -o notify-output/response.txt -w "%{http_code}" \
      -X POST \
      -H "Content-Type: application/json" \
      -d "${PAYLOAD}" \
      "${DISCORD_WEBHOOK_URL}") || true
    if [ "${HTTP_STATUS}" = "200" ] || [ "${HTTP_STATUS}" = "204" ]; then
      echo "Notification sent successfully"
    else
      echo "WARNING: Discord returned HTTP ${HTTP_STATUS}"
      cat notify-output/response.txt
    fi
  - "echo \"Discord notification complete. Payload saved in notify-output/\""
env:
  NOTIFICATION_TYPE: pipeline-status
  PIPELINE_NAME: ""
  PIPELINE_STATUS: ""
  CUSTOM_MESSAGE: ""
