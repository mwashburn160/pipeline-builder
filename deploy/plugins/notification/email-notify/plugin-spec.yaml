name: email-notify
description: Email notification plugin for sending pipeline status alerts via AWS SES or SMTP with configurable templates and recipients using AWS CDK CodeBuildStep
keywords:
  - email
  - ses
  - smtp
  - notification
category: notification
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 5
failureBehavior: warn
secrets:
  - name: SMTP_PASSWORD
    required: false
    description: "SMTP password (not needed for SES with IAM roles)"
primaryOutputDirectory: notify-output
dockerfile: Dockerfile
installCommands:
  - test -d notify-output || mkdir -p notify-output
  - aws --version
commands:
  - |
    set -e
    if [ -z "${EMAIL_TO}" ]; then
      echo "ERROR: EMAIL_TO must be set"
      exit 1
    fi
    SUBJECT="${EMAIL_SUBJECT}"
    if [ -n "${PIPELINE_NAME}" ]; then
      SUBJECT="${PIPELINE_NAME} — ${PIPELINE_STATUS:-unknown}"
    fi
    BODY="Pipeline: ${PIPELINE_NAME:-N/A}\nStatus: ${PIPELINE_STATUS:-N/A}\nTimestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
    case "${EMAIL_PROVIDER}" in
      ses)
        echo "Sending email via AWS SES..."
        aws ses send-email \
          --region ${AWS_REGION} \
          --from "${EMAIL_FROM}" \
          --destination "ToAddresses=[${EMAIL_TO}]" \
          --message "Subject={Data=\"${SUBJECT}\"},Body={Text={Data=\"${BODY}\"}}" \
          > notify-output/ses-response.json || true
        ;;
      smtp)
        echo "Sending email via SMTP..."
        python3 -c "import smtplib, os; from email.mime.text import MIMEText; body=os.environ.get('BODY','Pipeline notification'); msg=MIMEText(body); msg['Subject']=os.environ.get('SUBJECT','Pipeline Notification'); msg['From']=os.environ.get('EMAIL_FROM',''); msg['To']=os.environ.get('EMAIL_TO',''); s=smtplib.SMTP(os.environ.get('SMTP_HOST','localhost'),int(os.environ.get('SMTP_PORT','587'))); s.starttls(); pwd=os.environ.get('SMTP_PASSWORD',''); pwd and s.login(msg['From'],pwd); s.send_message(msg); s.quit(); print('Email sent')" || true
        ;;
      *)
        echo "ERROR: Unknown EMAIL_PROVIDER '${EMAIL_PROVIDER}'. Supported: ses, smtp"
        exit 1
        ;;
    esac
  - "echo \"Email notification complete.\""
env:
  EMAIL_PROVIDER: ses
  EMAIL_TO: ""
  EMAIL_FROM: ""
  EMAIL_SUBJECT: "Pipeline Notification"
  PIPELINE_NAME: ""
  PIPELINE_STATUS: ""
  AWS_REGION: us-east-1
  SMTP_HOST: ""
  SMTP_PORT: "587"
