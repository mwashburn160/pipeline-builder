name: dotnet-security-scan
description: dotnet security scan plugin for detecting security vulnerabilities in .NET project dependencies and code using AWS CDK CodeBuildStep
keywords:
  - dotnet
  - dependency-scan
  - vulnerability
  - cve
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: security-reports
dockerfile: Dockerfile
installCommands:
  # .NET SDK + the pinned security-scan tool are baked into the image
  # (pipeline-dotnet-base + this plugin's Dockerfile).
  - test -d security-reports || mkdir -p security-reports
  - dotnet --version
commands:
  - |
    set -e
    echo "Running .NET security scan..."
    run-logged security-reports/security-scan.log -- \
      security-scan . --excl-proj=*test*
  - "echo \"Security scan complete. Reports available in security-reports/\""
