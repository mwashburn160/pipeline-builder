name: bundler-audit
description: Bundler Audit plugin for scanning Ruby gem dependencies for known security vulnerabilities using AWS CDK CodeBuildStep
keywords:
  - ruby
  - gem
  - dependency-scan
  - cve
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: audit-reports
dockerfile: Dockerfile
installCommands:
  # Ruby + bundler-audit are baked into pipeline-ruby-base (single pinned version).
  - test -d audit-reports || mkdir -p audit-reports
  - ruby --version && bundle-audit version
  - if [ -f Gemfile ]; then bundle install; fi
commands:
  - |
    set -e
    echo "Running bundler-audit..."
    # run-logged streams to console + log AND surfaces bundle-audit's real exit
    # (POSIX sh has no pipefail, so a `| tee` would mask the gate's status).
    run-logged audit-reports/bundler-audit.log -- bundle audit check --update
  - "echo \"Bundler audit complete. Reports available in audit-reports/\""
