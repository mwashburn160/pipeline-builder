name: brakeman
description: Brakeman static security analysis plugin for detecting vulnerabilities in Ruby on Rails applications using AWS CDK CodeBuildStep
keywords:
  - ruby
  - rails
  - sast
  - vulnerability
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: security-reports
dockerfile: Dockerfile
installCommands:
  # Ruby + brakeman are baked into pipeline-ruby-base (single pinned version).
  - test -d security-reports || mkdir -p security-reports
  - ruby --version && brakeman --version
commands:
  - |
    set -e
    echo "Running Brakeman security scan..."
    # Report-only JSON (always written; never gates).
    brakeman --no-pager -w${BRAKEMAN_CONFIDENCE} \
      -f json -o security-reports/brakeman-results.json \
      2>&1 || true
    run-logged security-reports/brakeman.log -- brakeman --no-pager -w${BRAKEMAN_CONFIDENCE}
  - "echo \"Brakeman scan complete. Reports available in security-reports/\""
env:
  # RUBY_VERSION is baked into pipeline-ruby-base (single-version model).
  BRAKEMAN_CONFIDENCE: "2"
