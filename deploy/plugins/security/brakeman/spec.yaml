name: brakeman
description: Brakeman static security analysis plugin for detecting vulnerabilities in Ruby on Rails applications using AWS CDK CodeBuildStep
keywords:
  - ruby
  - rails
  - sast
  - vulnerability
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: security-reports
dockerfile: Dockerfile
installCommands:
  - test -d security-reports || mkdir -p security-reports
  - rbenv global ${RUBY_VERSION} && ruby --version
  - gem install brakeman
commands:
  - |
    echo "Running Brakeman security scan..."
    brakeman --no-pager -w${BRAKEMAN_CONFIDENCE} \
      -f json -o security-reports/brakeman-results.json \
      2>&1 || true
    brakeman --no-pager -w${BRAKEMAN_CONFIDENCE} \
      2>&1 | tee security-reports/brakeman.log || true
  - "echo \"Brakeman scan complete. Reports available in security-reports/\""
env:
  RUBY_VERSION: "4.0.1"
  BRAKEMAN_CONFIDENCE: "2"
