name: bandit
description: Bandit security linter plugin for finding common security vulnerabilities in Python code using AWS CDK CodeBuildStep
keywords:
  - python
  - sast
  - vulnerability
  - security-linter
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: security-reports
dockerfile: Dockerfile
installCommands:
  # Python + bandit are baked into pipeline-python-base (single pinned version).
  - test -d security-reports || mkdir -p security-reports
  - python3 --version && bandit --version
commands:
  - |
    set -e
    echo "Running Bandit security scan..."
    # Map severity/confidence knobs to bandit's -l/-ll/-lll and -i/-ii/-iii flags.
    case "${BANDIT_SEVERITY}" in
      low) _SEV="-l" ;;
      high) _SEV="-lll" ;;
      *) _SEV="-ll" ;;
    esac
    case "${BANDIT_CONFIDENCE}" in
      low) _CONF="-i" ;;
      high) _CONF="-iii" ;;
      *) _CONF="-ii" ;;
    esac
    # Report-only JSON (always written; never gates).
    bandit -r . ${_SEV} ${_CONF} -f json -o security-reports/bandit-results.json 2>&1 || true
    run-logged security-reports/bandit.log -- bandit -r . ${_SEV} ${_CONF}
  - "echo \"Bandit scan complete. Reports available in security-reports/\""
env:
  # PYTHON_VERSION is baked into pipeline-python-base (single-version model).
  BANDIT_SEVERITY: medium
  BANDIT_CONFIDENCE: medium
