name: trivy-nodejs
description: Trivy security scanning for Node.js projects using AWS CDK with CodeBuildStep. For other languages use trivy-python, trivy-java, trivy-go, trivy-dotnet, trivy-ruby, or trivy-rust.
keywords:
  - nodejs
  - container
  - vulnerability
  - dependency-scan
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: trivy-reports
dockerfile: Dockerfile
installCommands:
  - |
    if [ -f /opt/trivy/versions/trivy-${TRIVY_VERSION} ]; then
      ln -sf /opt/trivy/versions/trivy-${TRIVY_VERSION} /usr/local/bin/trivy
    else
      echo "Trivy ${TRIVY_VERSION} not pre-installed, downloading..."
      curl -fsSL https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz \
        | tar -xz -C /tmp && mv /tmp/trivy /usr/local/bin/trivy
    fi
  - trivy --version
  - |
    if [ -f package-lock.json ]; then npm ci
    elif [ -f package.json ]; then npm install
    fi
    if [ -f yarn.lock ]; then npm install -g yarn && yarn install --frozen-lockfile; fi
    if [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile; fi
commands:
  - mkdir -p trivy-reports
  - trivy fs --severity ${TRIVY_SEVERITY} --format ${TRIVY_FORMAT} --output trivy-reports/trivy-fs-results.json .
  - trivy config --severity ${TRIVY_SEVERITY} --format ${TRIVY_FORMAT} --output trivy-reports/trivy-config-results.json . || true
  - "echo \"Trivy scan complete. Reports available in trivy-reports/\""
env:
  TRIVY_VERSION: "0.69.3"
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_FORMAT: json
