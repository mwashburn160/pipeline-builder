name: cargo-audit
description: Cargo audit plugin for scanning Rust crate dependencies for known security vulnerabilities using AWS CDK CodeBuildStep
keywords:
  - rust
  - crate
  - dependency-scan
  - cve
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: audit-reports
dockerfile: Dockerfile
installCommands:
  # Rust + cargo-audit are baked into the image (single pinned version).
  - test -d audit-reports || mkdir -p audit-reports
  - cargo --version
commands:
  - |
    set -e
    echo "Running cargo audit..."
    cargo audit --json > audit-reports/cargo-audit.json 2>&1 || true
    run-logged audit-reports/cargo-audit.log -- cargo audit || true
  - "echo \"Cargo audit complete. Reports available in audit-reports/\""
