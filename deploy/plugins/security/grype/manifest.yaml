name: grype
description: Anchore Grype vulnerability scanner plugin for detecting CVEs in container images, filesystems, and SBOMs using AWS CDK CodeBuildStep
keywords:
  - grype
  - anchore
  - vulnerability
  - cve
  - sbom
  - syft
  - container
  - security
  - open-source
  - ci
  - pipeline
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: grype-reports
dockerfile: Dockerfile
installCommands:
  - grype version
  - syft version
  # Update vulnerability database
  - grype db check || grype db update
commands:
  - mkdir -p grype-reports
  # Generate SBOM with Syft
  - |
    echo "Generating SBOM..."
    syft ${GRYPE_SCOPE} -o json > grype-reports/sbom.json 2>/dev/null || true
    syft ${GRYPE_SCOPE} -o table > grype-reports/sbom-summary.txt 2>/dev/null || true
  # Scan with Grype
  - |
    echo "Running Grype vulnerability scan..."
    grype ${GRYPE_SCOPE} \
      --fail-on ${GRYPE_FAIL_ON} \
      -o ${GRYPE_FORMAT} > grype-reports/grype-results.json 2>/dev/null || true
    grype ${GRYPE_SCOPE} \
      -o table 2>&1 | tee grype-reports/grype-summary.txt || true
  - "echo \"Grype scan complete. Reports available in grype-reports/\""
env:
  GRYPE_SEVERITY: high
  GRYPE_SCOPE: "dir:."
  GRYPE_FORMAT: json
  GRYPE_FAIL_ON: high
