name: owasp-zap
description: OWASP ZAP dynamic application security testing (DAST) plugin for scanning web applications and APIs for runtime vulnerabilities using AWS CDK CodeBuildStep
keywords:
  - owasp
  - zap
  - dast
  - security
  - vulnerability
  - web
  - api
  - penetration-testing
  - ci
  - pipeline
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: zap-reports
dockerfile: Dockerfile
installCommands:
  # ZAP version selection
  - |
    if [ -d /opt/zap/versions/zap-${ZAP_VERSION} ]; then
      ln -sf /opt/zap/versions/zap-${ZAP_VERSION} /opt/zap/current
    else
      echo "ZAP ${ZAP_VERSION} not pre-installed, downloading..."
      curl -fsSL https://github.com/zaproxy/zaproxy/releases/download/v${ZAP_VERSION}/ZAP_${ZAP_VERSION}_Linux.tar.gz \
        | tar -xz -C /opt/zap/versions && mv /opt/zap/versions/ZAP_${ZAP_VERSION} /opt/zap/versions/zap-${ZAP_VERSION}
      ln -sf /opt/zap/versions/zap-${ZAP_VERSION} /opt/zap/current
    fi
  - |
    echo "OWASP ZAP version:"
    /opt/zap/current/zap.sh -version 2>/dev/null || echo "ZAP ${ZAP_VERSION} ready"
  # Validate target URL is set
  - |
    if [ -z "${ZAP_TARGET_URL}" ]; then
      echo "WARNING: ZAP_TARGET_URL is not set. Set it to the URL of the application to scan."
      echo "Example: ZAP_TARGET_URL=https://staging.example.com"
    fi
commands:
  - mkdir -p zap-reports
  - |
    if [ -z "${ZAP_TARGET_URL}" ]; then
      echo "ERROR: ZAP_TARGET_URL must be set to scan a target"
      exit 1
    fi
    RULES_ARG=""
    if [ -n "${ZAP_RULES_CONFIG}" ] && [ -f "${ZAP_RULES_CONFIG}" ]; then
      RULES_ARG="-c ${ZAP_RULES_CONFIG}"
    fi
    case "${ZAP_SCAN_TYPE}" in
      baseline)
        echo "Running ZAP baseline scan against ${ZAP_TARGET_URL}..."
        /opt/zap/current/zap-baseline.py -t "${ZAP_TARGET_URL}" \
          -J zap-reports/zap-baseline.json \
          -r zap-reports/zap-baseline.html \
          ${RULES_ARG} \
          -I || true
        ;;
      full)
        echo "Running ZAP full scan against ${ZAP_TARGET_URL}..."
        /opt/zap/current/zap-full-scan.py -t "${ZAP_TARGET_URL}" \
          -J zap-reports/zap-full.json \
          -r zap-reports/zap-full.html \
          ${RULES_ARG} \
          -I || true
        ;;
      api)
        echo "Running ZAP API scan against ${ZAP_TARGET_URL}..."
        /opt/zap/current/zap-api-scan.py -t "${ZAP_TARGET_URL}" \
          -f openapi \
          -J zap-reports/zap-api.json \
          -r zap-reports/zap-api.html \
          ${RULES_ARG} \
          -I || true
        ;;
      *)
        echo "ERROR: Unknown ZAP_SCAN_TYPE '${ZAP_SCAN_TYPE}'. Supported: baseline, full, api"
        exit 1
        ;;
    esac
  - "echo \"ZAP ${ZAP_SCAN_TYPE} scan complete. Reports available in zap-reports/\""
env:
  ZAP_VERSION: "2.16.0"
  ZAP_SCAN_TYPE: baseline
  ZAP_TARGET_URL: ""
  ZAP_RULES_CONFIG: ""
  ZAP_FORMAT: json
