name: tfsec
description: tfsec standalone IaC security scanner plugin for detecting misconfigurations in Terraform, CloudFormation, and Kubernetes manifests using AWS CDK CodeBuildStep
keywords:
  - tfsec
  - terraform
  - iac
  - security
  - misconfiguration
  - cloudformation
  - kubernetes
  - ci
  - pipeline
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: tfsec-reports
dockerfile: Dockerfile
installCommands:
  - tfsec --version
commands:
  - mkdir -p tfsec-reports
  - |
    echo "Running tfsec on ${TFSEC_WORKING_DIR}..."
    tfsec ${TFSEC_WORKING_DIR} \
      --format ${TFSEC_FORMAT} \
      --minimum-severity ${TFSEC_SEVERITY} \
      > tfsec-reports/tfsec-results.json 2>/dev/null || true
    tfsec ${TFSEC_WORKING_DIR} \
      --minimum-severity ${TFSEC_SEVERITY} \
      2>&1 | tee tfsec-reports/tfsec-summary.txt || true
  - "echo \"tfsec scan complete. Reports available in tfsec-reports/\""
env:
  TFSEC_FORMAT: json
  TFSEC_SEVERITY: HIGH
  TFSEC_WORKING_DIR: "."
