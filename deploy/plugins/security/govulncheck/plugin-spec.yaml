name: govulncheck
description: govulncheck plugin for scanning Go modules for known vulnerabilities in dependencies using AWS CDK CodeBuildStep
keywords:
  - go
  - dependency-scan
  - vulnerability
  - cve
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: vuln-reports
dockerfile: Dockerfile
installCommands:
  # Go + govulncheck are baked into pipeline-go-base / this plugin's image.
  - test -d vuln-reports || mkdir -p vuln-reports
  - go version && govulncheck -version
  # Download project dependencies (not tool setup).
  - if [ -f go.mod ]; then go mod download; fi
commands:
  - |
    set -e
    echo "Running govulncheck..."
    # Report-only JSON (always exits 0; never gates).
    govulncheck -json ./... > vuln-reports/govulncheck.json 2>&1 || true
    # Plain-text run gates: run-logged streams to console + log and preserves
    # govulncheck's real exit code (non-zero on findings).
    run-logged vuln-reports/govulncheck.log -- govulncheck ./...
  - "echo \"govulncheck complete. Reports available in vuln-reports/\""
# env: GO_VERSION is baked into pipeline-go-base (single-version model); nothing
# reads it at runtime, so it is intentionally omitted.
