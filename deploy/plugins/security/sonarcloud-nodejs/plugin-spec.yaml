name: sonarcloud-nodejs
description: SonarCloud code quality and security analysis for Node.js projects using AWS CDK with CodeBuildStep. For other languages use sonarcloud-python, sonarcloud-java, sonarcloud-go, sonarcloud-dotnet, sonarcloud-ruby, or sonarcloud-rust.
keywords:
  - nodejs
  - code-quality
  - security-analysis
  - coverage
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets:
  - name: SONAR_TOKEN
    required: true
    description: "SonarCloud authentication token"
primaryOutputDirectory: .scannerwork
dockerfile: Dockerfile
installCommands:
  # Node.js runtime + sonar-scanner are baked into the image (base + COPY).
  - test -d .scannerwork || mkdir -p .scannerwork
  - node --version && sonar-scanner --version
  - |
    set -e
    if [ -f package-lock.json ]; then npm ci
    elif [ -f package.json ]; then npm install
    fi
    if [ -f yarn.lock ]; then npm install -g yarn && yarn install --frozen-lockfile; fi
    if [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile; fi
commands:
  - |
    set -e
    run-logged .scannerwork/sonar-scanner.log -- sonar-scanner \
      -Dsonar.host.url=https://sonarcloud.io \
      -Dsonar.organization=${SONAR_ORGANIZATION} \
      -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
      -Dsonar.sources=. \
      -Dsonar.qualitygate.wait=true \
      -Dsonar.sourceEncoding=UTF-8
  - "echo \"SonarCloud analysis complete. Results available at https://sonarcloud.io/project/overview?id=${SONAR_PROJECT_KEY}\""
env:
  SONAR_ORGANIZATION: ""
  SONAR_PROJECT_KEY: ""
