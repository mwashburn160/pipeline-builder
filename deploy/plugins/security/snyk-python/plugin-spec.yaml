name: snyk-python
description: Snyk security scanning for Python projects using AWS CDK with CodeBuildStep
keywords:
  - python
  - sca
  - vulnerability
  - dependency-scan
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets:
  - name: SNYK_TOKEN
    required: true
    description: "Snyk authentication token"
primaryOutputDirectory: snyk-reports
dockerfile: Dockerfile
installCommands:
  # Python + pip are baked into pipeline-python-base (single pinned version).
  - test -d snyk-reports || mkdir -p snyk-reports
  - snyk --version
  - |
    set -e
    python3 -m pip install --upgrade pip setuptools wheel
    if [ -f requirements.txt ]; then pip3 install -r requirements.txt; fi
    if [ -f Pipfile.lock ]; then pip3 install pipenv && pipenv install --system; fi
    if [ -f poetry.lock ]; then pip3 install poetry && poetry install --no-interaction; fi
commands:
  - run-logged snyk-reports/snyk-test.log -- snyk test --severity-threshold=${SNYK_SEVERITY_THRESHOLD} --json-file-output=snyk-reports/snyk-test-results.json
  - run-logged snyk-reports/snyk-code.log -- snyk code test --severity-threshold=${SNYK_SEVERITY_THRESHOLD} --json-file-output=snyk-reports/snyk-code-results.json
  - "echo \"Snyk scan complete. Reports available in snyk-reports/\""
env:
  # PYTHON_VERSION is baked into pipeline-python-base (single-version model).
  SNYK_SEVERITY_THRESHOLD: high
