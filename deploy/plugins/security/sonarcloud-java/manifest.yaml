name: sonarcloud-java
description: SonarCloud code quality and security analysis for Java/Kotlin projects using AWS CDK with CodeBuildStep
keywords:
  - sonarcloud
  - sonar
  - security
  - code-quality
  - sast
  - java
  - kotlin
  - ci
  - pipeline
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets:
  - name: SONAR_TOKEN
    required: true
    description: "SonarCloud authentication token"
primaryOutputDirectory: .scannerwork
dockerfile: Dockerfile
installCommands:
  - |
    SCANNER_DIR=$(find /opt/sonar-scanner/versions -maxdepth 1 -name "scanner-${SONAR_SCANNER_VERSION}*" -type d | head -1)
    if [ -n "${SCANNER_DIR}" ]; then
      ln -sf ${SCANNER_DIR}/bin/sonar-scanner /usr/local/bin/sonar-scanner
    else
      echo "SonarScanner ${SONAR_SCANNER_VERSION} not pre-installed."
      exit 1
    fi
  - sonar-scanner --version
  - |
    source ${SDKMAN_DIR}/bin/sdkman-init.sh
    sdk use java ${JAVA_VERSION}
    if [ -f pom.xml ]; then mvn dependency:resolve -q; fi
    if [ -f build.gradle ] || [ -f build.gradle.kts ]; then gradle dependencies --quiet; fi
commands:
  - |
    sonar-scanner \
      -Dsonar.host.url=https://sonarcloud.io \
      -Dsonar.token=${SONAR_TOKEN} \
      -Dsonar.organization=${SONAR_ORGANIZATION} \
      -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
      -Dsonar.sources=. \
      -Dsonar.sourceEncoding=UTF-8
  - "echo \"SonarCloud analysis complete.\""
env:
  SONAR_SCANNER_VERSION: "12.0"
  SONAR_ORGANIZATION: ""
  SONAR_PROJECT_KEY: ""
  JAVA_VERSION: 21.0.10-tem
