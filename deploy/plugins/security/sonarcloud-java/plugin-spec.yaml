name: sonarcloud-java
description: SonarCloud code quality and security analysis for Java/Kotlin projects using AWS CDK with CodeBuildStep
keywords:
  - java
  - code-quality
  - security-analysis
  - coverage
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets:
  - name: SONAR_TOKEN
    required: true
    description: "SonarCloud authentication token"
primaryOutputDirectory: .scannerwork
dockerfile: Dockerfile
installCommands:
  - test -d .scannerwork || mkdir -p .scannerwork
  - |
    set -e
    SCANNER_DIR=$(find /opt/sonar-scanner/versions -maxdepth 1 -name "scanner-${SONAR_SCANNER_VERSION}*" -type d | head -1)
    if [ -n "${SCANNER_DIR}" ]; then
      ln -sf ${SCANNER_DIR}/bin/sonar-scanner /usr/local/bin/sonar-scanner
    else
      echo "SonarScanner ${SONAR_SCANNER_VERSION} not pre-installed."
      exit 1
    fi
  - sonar-scanner --version
  - |
    set -e
    # CodeBuild runs under /bin/sh (dash); SDKMAN's bash-only `sdk`/`source` fail
    # there (exit 127). Put the requested java on PATH directly — the image installs
    # each version under ${SDKMAN_DIR}/candidates/java/<version>/bin and has the
    # default's `current` on PATH, so an unknown override falls back.
    export PATH="${SDKMAN_DIR}/candidates/java/${JAVA_VERSION}/bin:${PATH}"
    if [ -f pom.xml ]; then mvn dependency:resolve -q; fi
    if [ -f build.gradle ] || [ -f build.gradle.kts ]; then gradle dependencies --quiet; fi
commands:
  - |
    set -e
    sonar-scanner \
      -Dsonar.host.url=https://sonarcloud.io \
      -Dsonar.token=${SONAR_TOKEN} \
      -Dsonar.organization=${SONAR_ORGANIZATION} \
      -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
      -Dsonar.sources=. \
      -Dsonar.sourceEncoding=UTF-8
  - "echo \"SonarCloud analysis complete.\""
env:
  SONAR_SCANNER_VERSION: "12.0"
  SONAR_ORGANIZATION: ""
  SONAR_PROJECT_KEY: ""
  JAVA_VERSION: 21.0.10-tem
