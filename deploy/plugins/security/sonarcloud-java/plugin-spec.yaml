name: sonarcloud-java
description: SonarCloud code quality and security analysis for Java/Kotlin projects using AWS CDK with CodeBuildStep
keywords:
  - java
  - code-quality
  - security-analysis
  - coverage
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets:
  - name: SONAR_TOKEN
    required: true
    description: "SonarCloud authentication token"
primaryOutputDirectory: .scannerwork
dockerfile: Dockerfile
installCommands:
  # JVM runtime (Corretto + Maven/Gradle) + sonar-scanner are baked into the
  # image (pipeline-jvm-base + COPY).
  - test -d .scannerwork || mkdir -p .scannerwork
  - java -version && sonar-scanner --version
  - |
    set -e
    if [ -f pom.xml ]; then mvn dependency:resolve -q; fi
    if [ -f build.gradle ] || [ -f build.gradle.kts ]; then gradle dependencies --quiet; fi
commands:
  - |
    set -e
    run-logged .scannerwork/sonar-scanner.log -- sonar-scanner \
      -Dsonar.host.url=https://sonarcloud.io \
      -Dsonar.organization=${SONAR_ORGANIZATION} \
      -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
      -Dsonar.sources=. \
      -Dsonar.qualitygate.wait=true \
      -Dsonar.sourceEncoding=UTF-8
  - "echo \"SonarCloud analysis complete.\""
env:
  SONAR_ORGANIZATION: ""
  SONAR_PROJECT_KEY: ""
