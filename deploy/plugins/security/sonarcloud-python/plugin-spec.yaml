name: sonarcloud-python
description: SonarCloud code quality and security analysis for Python projects using AWS CDK with CodeBuildStep
keywords:
  - python
  - code-quality
  - security-analysis
  - coverage
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets:
  - name: SONAR_TOKEN
    required: true
    description: "SonarCloud authentication token"
primaryOutputDirectory: .scannerwork
dockerfile: Dockerfile
installCommands:
  # Python runtime + sonar-scanner are baked into the image (base + COPY).
  - test -d .scannerwork || mkdir -p .scannerwork
  - python3 --version && sonar-scanner --version
  - |
    set -e
    python -m pip install --upgrade pip setuptools wheel
    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    if [ -f Pipfile.lock ]; then pip install pipenv && pipenv install --system; fi
    if [ -f poetry.lock ]; then pip install poetry && poetry install --no-interaction; fi
commands:
  - |
    set -e
    run-logged .scannerwork/sonar-scanner.log -- sonar-scanner \
      -Dsonar.host.url=https://sonarcloud.io \
      -Dsonar.organization=${SONAR_ORGANIZATION} \
      -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
      -Dsonar.sources=. \
      -Dsonar.qualitygate.wait=true \
      -Dsonar.sourceEncoding=UTF-8
  - "echo \"SonarCloud analysis complete.\""
env:
  SONAR_ORGANIZATION: ""
  SONAR_PROJECT_KEY: ""
