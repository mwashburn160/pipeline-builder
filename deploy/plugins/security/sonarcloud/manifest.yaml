name: sonarcloud
description: SonarCloud code quality and security analysis for Node.js and C++ projects using AWS CDK with CodeBuildStep. For other languages use sonarcloud-python, sonarcloud-java, sonarcloud-go, sonarcloud-dotnet, sonarcloud-ruby, or sonarcloud-rust.
keywords:
  - sonarcloud
  - sonar
  - security
  - code-quality
  - sast
  - static-analysis
  - nodejs
  - cpp
  - ci
  - pipeline
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets:
  - name: SONAR_TOKEN
    required: true
    description: "SonarCloud authentication token"
primaryOutputDirectory: .scannerwork
dockerfile: Dockerfile
installCommands:
  - |
    SCANNER_DIR=$(find /opt/sonar-scanner/versions -maxdepth 1 -name "scanner-${SONAR_SCANNER_VERSION}*" -type d | head -1)
    if [ -n "${SCANNER_DIR}" ]; then
      ln -sf ${SCANNER_DIR}/bin/sonar-scanner /usr/local/bin/sonar-scanner
    else
      echo "SonarScanner ${SONAR_SCANNER_VERSION} not pre-installed."
      ls /opt/sonar-scanner/versions/ 2>/dev/null || echo "  (none)"
      exit 1
    fi
  - sonar-scanner --version
  - |
    if [ -f package-lock.json ]; then npm ci
    elif [ -f package.json ]; then npm install
    fi
    if [ -f yarn.lock ]; then npm install -g yarn && yarn install --frozen-lockfile; fi
    if [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile; fi
commands:
  - |
    sonar-scanner \
      -Dsonar.host.url=https://sonarcloud.io \
      -Dsonar.token=${SONAR_TOKEN} \
      -Dsonar.organization=${SONAR_ORGANIZATION} \
      -Dsonar.projectKey=${SONAR_PROJECT_KEY} \
      -Dsonar.sources=. \
      -Dsonar.sourceEncoding=UTF-8
  - "echo \"SonarCloud analysis complete. Results available at https://sonarcloud.io/project/overview?id=${SONAR_PROJECT_KEY}\""
env:
  SONAR_SCANNER_VERSION: "12.0"
  SONAR_ORGANIZATION: ""
  SONAR_PROJECT_KEY: ""
