name: snyk-java
description: Snyk security scanning for Java/Kotlin projects using AWS CDK with CodeBuildStep
keywords:
  - java
  - sca
  - vulnerability
  - dependency-scan
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets:
  - name: SNYK_TOKEN
    required: true
    description: "Snyk authentication token"
primaryOutputDirectory: snyk-reports
dockerfile: Dockerfile
installCommands:
  # JDK + Maven/Gradle are baked into pipeline-jvm-base (single pinned version).
  - test -d snyk-reports || mkdir -p snyk-reports
  - snyk --version
  - |
    set -e
    if [ -f pom.xml ]; then mvn dependency:resolve -q; fi
    if [ -f build.gradle ] || [ -f build.gradle.kts ]; then gradle dependencies --quiet; fi
commands:
  - run-logged snyk-reports/snyk-test.log -- snyk test --severity-threshold=${SNYK_SEVERITY_THRESHOLD} --json-file-output=snyk-reports/snyk-test-results.json
  - run-logged snyk-reports/snyk-code.log -- snyk code test --severity-threshold=${SNYK_SEVERITY_THRESHOLD} --json-file-output=snyk-reports/snyk-code-results.json
  - "echo \"Snyk scan complete. Reports available in snyk-reports/\""
env:
  # JAVA_VERSION is baked into pipeline-jvm-base (single-version model).
  SNYK_SEVERITY_THRESHOLD: high
