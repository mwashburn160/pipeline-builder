name: snyk-java
description: Snyk security scanning for Java/Kotlin projects using AWS CDK with CodeBuildStep
keywords:
  - java
  - sca
  - vulnerability
  - dependency-scan
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets:
  - name: SNYK_TOKEN
    required: true
    description: "Snyk authentication token"
primaryOutputDirectory: snyk-reports
dockerfile: Dockerfile
installCommands:
  - test -d snyk-reports || mkdir -p snyk-reports
  - snyk --version
  - |
    set -e
    # CodeBuild runs under /bin/sh (dash); SDKMAN's bash-only `sdk`/`source` fail
    # there (exit 127). Put the requested java on PATH directly — the image installs
    # each version under ${SDKMAN_DIR}/candidates/java/<version>/bin and has the
    # default's `current` on PATH, so an unknown override falls back.
    export PATH="${SDKMAN_DIR}/candidates/java/${JAVA_VERSION}/bin:${PATH}"
    if [ -f pom.xml ]; then mvn dependency:resolve -q; fi
    if [ -f build.gradle ] || [ -f build.gradle.kts ]; then gradle dependencies --quiet; fi
commands:
  - snyk auth ${SNYK_TOKEN}
  - snyk test --severity-threshold=${SNYK_SEVERITY_THRESHOLD} --json-file-output=snyk-reports/snyk-test-results.json || true
  - snyk code test --severity-threshold=${SNYK_SEVERITY_THRESHOLD} --json-file-output=snyk-reports/snyk-code-results.json || true
  - "echo \"Snyk scan complete. Reports available in snyk-reports/\""
env:
  SNYK_SEVERITY_THRESHOLD: high
  # Major-version knob (consistent with the Corretto plugins). The image installs
  # Temurin 25.0.3 via SDKMAN, exposed as `candidates/java/25` by a Dockerfile symlink.
  JAVA_VERSION: "25"
