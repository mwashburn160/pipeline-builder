name: gosec
description: gosec security checker plugin for scanning Go source code for security vulnerabilities and coding issues using AWS CDK CodeBuildStep
keywords:
  - go
  - sast
  - vulnerability
  - security-linter
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: security-reports
dockerfile: Dockerfile
installCommands:
  # Go + gosec are baked into pipeline-go-base / this plugin's image.
  - test -d security-reports || mkdir -p security-reports
  - go version && gosec --version
  # Download project dependencies (not tool setup).
  - if [ -f go.mod ]; then go mod download; fi
commands:
  - |
    set -e
    echo "Running gosec security scan..."
    # Report-only JSON (always written; never gates).
    gosec -fmt json -out security-reports/gosec-results.json ./... 2>/dev/null || true
    run-logged security-reports/gosec.log -- gosec ./...
  - "echo \"gosec scan complete. Reports available in security-reports/\""
# env: GO_VERSION is baked into pipeline-go-base (single-version model); nothing
# reads it at runtime, so it is intentionally omitted.
