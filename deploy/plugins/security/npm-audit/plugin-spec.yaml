name: npm-audit
description: npm and yarn dependency audit plugin for detecting known vulnerabilities in JavaScript project dependencies using AWS CDK CodeBuildStep
keywords:
  - nodejs
  - npm
  - dependency-scan
  - cve
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: audit-reports
dockerfile: Dockerfile
installCommands:
  # Node + npm are baked into pipeline-node-base (single pinned version).
  - test -d audit-reports || mkdir -p audit-reports
  - node --version && npm --version
commands:
  - |
    set -e
    echo "Running dependency audit..."
    if [ -f yarn.lock ]; then
      yarn audit --level ${AUDIT_LEVEL} --json > audit-reports/audit-results.json 2>&1 || true
      run-logged audit-reports/audit.log -- yarn audit --level ${AUDIT_LEVEL}
    elif [ -f pnpm-lock.yaml ]; then
      pnpm audit --severity ${AUDIT_LEVEL} --json > audit-reports/audit-results.json 2>&1 || true
      run-logged audit-reports/audit.log -- pnpm audit --severity ${AUDIT_LEVEL}
    else
      npm audit --audit-level=${AUDIT_LEVEL} --json > audit-reports/audit-results.json 2>&1 || true
      run-logged audit-reports/audit.log -- npm audit --audit-level=${AUDIT_LEVEL}
    fi
  - "echo \"Dependency audit complete. Reports available in audit-reports/\""
env:
  AUDIT_LEVEL: high
