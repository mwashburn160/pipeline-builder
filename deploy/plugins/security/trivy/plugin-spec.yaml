name: trivy
description: Trivy filesystem + config vulnerability scanner for any project. Scans dependencies (lockfiles) and IaC/config statically; no language runtime required.
keywords:
  - container
  - vulnerability
  - dependency-scan
  - iac
  - config-scan
category: security
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: trivy-reports
dockerfile: Dockerfile
installCommands:
  - test -d trivy-reports || mkdir -p trivy-reports
  - |
    set -e
    if [ -f /opt/trivy/versions/trivy-${TRIVY_VERSION} ]; then
      ln -sf /opt/trivy/versions/trivy-${TRIVY_VERSION} /usr/local/bin/trivy
    else
      echo "Trivy ${TRIVY_VERSION} not pre-installed, downloading..."
      curl -fsSL https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz \
        | tar -xz -C /tmp && mv /tmp/trivy /usr/local/bin/trivy
    fi
  - trivy --version
commands:
  - trivy fs --exit-code 1 --severity ${TRIVY_SEVERITY} --format ${TRIVY_FORMAT} --output trivy-reports/trivy-fs-results.json .
  - trivy config --severity ${TRIVY_SEVERITY} --format ${TRIVY_FORMAT} --output trivy-reports/trivy-config-results.json .
  - "echo \"Trivy scan complete. Reports available in trivy-reports/\""
env:
  TRIVY_VERSION: "0.69.3"
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_FORMAT: json
