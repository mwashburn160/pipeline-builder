name: trivy
description: Trivy security scanning plugin for vulnerability detection in dependencies, code, and configuration using AWS CDK with CodeBuildStep
keywords:
  - trivy
  - security
  - vulnerability
  - sca
  - sast
  - iac
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: trivy-reports
dockerfile: Dockerfile
installCommands:
  # Trivy CLI version selection
  - |
    if [ -f /opt/trivy/versions/trivy-${TRIVY_VERSION} ]; then
      ln -sf /opt/trivy/versions/trivy-${TRIVY_VERSION} /usr/local/bin/trivy
    else
      echo "Trivy ${TRIVY_VERSION} not pre-installed, downloading..."
      curl -fsSL https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz \
        | tar -xz -C /tmp && mv /tmp/trivy /usr/local/bin/trivy
    fi
  - trivy --version
  # Language runtime activation based on LANGUAGE key
  - |
    case "${LANGUAGE}" in
      python)
        echo "Activating Python ${LANGUAGE_VERSION:-3.12}..."
        pyenv install -s ${LANGUAGE_VERSION:-3.12} && pyenv global ${LANGUAGE_VERSION:-3.12}
        python -m pip install --upgrade pip setuptools wheel
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f Pipfile.lock ]; then pip install pipenv && pipenv install --system; fi
        if [ -f poetry.lock ]; then pip install poetry && poetry install --no-interaction; fi
        ;;
      java)
        echo "Activating Java ${LANGUAGE_VERSION:-17.0.13-tem}..."
        source ${SDKMAN_DIR}/bin/sdkman-init.sh
        sdk use java ${LANGUAGE_VERSION:-17.0.13-tem}
        if [ -f pom.xml ]; then mvn dependency:resolve -q; fi
        if [ -f build.gradle ] || [ -f build.gradle.kts ]; then gradle dependencies --quiet; fi
        ;;
      go)
        echo "Activating Go ${LANGUAGE_VERSION:-1.22.10}..."
        goenv install -s ${LANGUAGE_VERSION:-1.22.10} && goenv global ${LANGUAGE_VERSION:-1.22.10}
        if [ -f go.mod ]; then go mod download; fi
        ;;
      dotnet)
        echo "Activating .NET ${LANGUAGE_VERSION:-8.0}..."
        if ! dotnet --list-sdks | grep -q "^${LANGUAGE_VERSION:-8.0}"; then
          /tmp/dotnet-install.sh --channel ${LANGUAGE_VERSION:-8.0} --install-dir /opt/dotnet 2>/dev/null || true
        fi
        dotnet --version
        if [ -f *.sln ] || [ -f *.csproj ]; then dotnet restore; fi
        ;;
      cpp)
        echo "Activating C++ build environment..."
        gcc --version | head -1
        cmake --version | head -1
        if [ -f CMakeLists.txt ]; then mkdir -p build && cd build && cmake .. && cd ..; fi
        if [ -f Makefile ]; then make -j$(nproc); fi
        if [ -f conanfile.txt ] || [ -f conanfile.py ]; then pip install conan && conan install .; fi
        ;;
      ruby)
        echo "Activating Ruby ${LANGUAGE_VERSION:-3.3.6}..."
        rbenv install -s ${LANGUAGE_VERSION:-3.3.6} && rbenv global ${LANGUAGE_VERSION:-3.3.6}
        gem install bundler
        if [ -f Gemfile.lock ]; then bundle install; fi
        ;;
      rust)
        echo "Activating Rust ${LANGUAGE_VERSION:-stable}..."
        rustup default ${LANGUAGE_VERSION:-stable}
        rustc --version
        if [ -f Cargo.toml ]; then cargo fetch; fi
        ;;
      nodejs|*)
        echo "Using Node.js (default)..."
        if [ -f package-lock.json ]; then npm ci; elif [ -f package.json ]; then npm install; fi
        if [ -f yarn.lock ]; then npm install -g yarn && yarn install --frozen-lockfile; fi
        if [ -f pnpm-lock.yaml ]; then npm install -g pnpm && pnpm install --frozen-lockfile; fi
        ;;
    esac
commands:
  - mkdir -p trivy-reports
  - trivy fs --severity ${TRIVY_SEVERITY} --format ${TRIVY_FORMAT} --output trivy-reports/trivy-fs-results.json .
  - trivy config --severity ${TRIVY_SEVERITY} --format ${TRIVY_FORMAT} --output trivy-reports/trivy-config-results.json . || true
  - "echo \"Trivy scan complete. Reports available in trivy-reports/\""
env:
  TRIVY_VERSION: "0.59.1"
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_FORMAT: json
  LANGUAGE: nodejs
  LANGUAGE_VERSION: ""
