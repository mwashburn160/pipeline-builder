name: cdk-synth
description: AWS CDK synthesis plugin for compiling CDK applications into CloudFormation templates with Docker-enabled self-mutation and parallel asset publishing using AWS CDK CodeBuildStep
keywords:
  - aws
  - cdk
  - cloudformation
  - synthesize
category: infrastructure
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 45
failureBehavior: fail
secrets: []
primaryOutputDirectory: cdk.out
metadata:
  aws:cdk:pipelines:codepipeline:selfmutation: true
  aws:cdk:pipelines:codepipeline:dockerenabledforselfmutation: true
  aws:cdk:pipelines:codepipeline:publishassetsinparallel: true
  aws:cdk:codebuild:buildenvironment:privileged: true
dockerfile: Dockerfile
installCommands:
  - test -d cdk.out || mkdir -p cdk.out
  # Self-heal: ensure pipeline-manager is on PATH. The plugin's Dockerfile
  # bakes it in, BUT pipeline-core currently doesn't always wire the
  # CodeBuild step to use the plugin's image — when CodeBuild falls back
  # to aws/codebuild/standard:7.0, pipeline-manager isn't there.
  # This idempotent install is a no-op when the plugin image IS used,
  # and rescues the build when the standard image is used instead.
  - command -v pipeline-manager >/dev/null 2>&1 || npm install -g @pipeline-builder/pipeline-manager
commands:
  - 'curl -sf ${PLATFORM_BASE_URL}/health > /dev/null || { echo "ERROR: Platform unreachable at ${PLATFORM_BASE_URL}"; exit 1; }'
  - pipeline-manager synth --id ${PIPELINE_ID} --store-tokens --quiet --no-notices --output cdk.out
env:
  CDK_DEFAULT_REGION: ${AWS_REGION}
  CDK_DEFAULT_ACCOUNT: ${AWS_ACCOUNT_ID}
  RESOLVED_SYNTH_PLUGIN: 'true'
