name: shell
description: Pure-OS pipeline step that runs user-supplied install and build commands. Use when no language/tool-specific plugin fits — sets up a clean Ubuntu 24.04 environment with git/curl/jq/wget/tar/zip/apt and lets you install whatever you need at runtime.
keywords:
  - shell
  - bash
  - custom
  - generic
  - script
category: infrastructure
version: 1.1.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: shell-output
dockerfile: Dockerfile

# Typed pipeline contracts.
#
# Both `shellInstall` and `shellCommand` accept EITHER:
#   - A single shell string: "npm install && npm test"
#   - A newline-separated multi-line string (YAML `|` block scalar):
#       shellCommand: |
#         npm install
#         npm test
#         npm run build
#
# At runtime the plugin splits on newlines and runs EACH non-empty line as a
# separate `bash -c` invocation under `set -e`. So a failure on any line
# stops the step. If a user needs a multi-line shell construct (if/case/loop)
# as a single command, they can wrap it on one line with `;`s or pass it as
# a single-string command.
metadataTypes:
  shellInstall: string         # install / setup commands (run during install phase)
  shellCommand: string         # main commands (run during build phase) — required
  shellOutputDir: string       # optional output dir override (default: shell-output)
requiredMetadata:
  - shellCommand

installCommands:
  - test -d "${SHELL_OUTPUT_DIR:-shell-output}" || mkdir -p "${SHELL_OUTPUT_DIR:-shell-output}"
  - |
    set -e
    if [ -z "${SHELL_INSTALL}" ]; then
      echo "No shellInstall provided — skipping install phase."
    else
      echo "==> shellInstall:"
      # Split on newlines; run each non-empty line as a separate bash -c.
      # Empty lines and `#`-prefixed comment lines are skipped.
      printf '%s\n' "${SHELL_INSTALL}" | while IFS= read -r _line; do
        case "$_line" in
          ''|'#'*) continue ;;
        esac
        echo "  $ ${_line}"
        bash -c "${_line}"
      done
    fi

commands:
  - |
    set -e
    if [ -z "${SHELL_COMMAND}" ]; then
      echo "ERROR: shellCommand is required (set pipeline metadata.shellCommand)" >&2
      exit 2
    fi
    echo "==> shellCommand:"
    # Same split pattern as installCommands above. Each non-empty line
    # runs as its own bash -c so an early failure stops the step.
    printf '%s\n' "${SHELL_COMMAND}" | while IFS= read -r _line; do
      case "$_line" in
        ''|'#'*) continue ;;
      esac
      echo "  $ ${_line}"
      bash -c "${_line}"
    done

env:
  SHELL_INSTALL: "${shellInstall}"
  SHELL_COMMAND: "${shellCommand}"
  SHELL_OUTPUT_DIR: "${shellOutputDir}"

# Smoke test — verifies the base image is usable; the plugin itself only
# runs user-supplied commands so there's no plugin-specific binary to check.
smokeTest: "bash --version && which git && which curl && which apt-retry-install"
