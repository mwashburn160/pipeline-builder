name: shell
description: Basic shell step on a clean Ubuntu 24.04 environment (git/curl/jq/wget/tar/zip/apt). Takes no metadata — the pipeline step supplies its own commands. Use when no language/tool-specific plugin fits.
keywords:
  - shell
  - bash
  - custom
  - generic
  - script
category: infrastructure
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: shell-output
dockerfile: Dockerfile

# Basic shell plugin: no typed metadata contract. The plugin only ensures the
# output directory exists; all build commands come from the pipeline step's own
# `commands` (plugin `commands` is intentionally empty).
installCommands:
  - mkdir -p shell-output

commands: []

# Smoke test — verifies the base image is usable; the plugin itself only
# runs user-supplied commands so there's no plugin-specific binary to check.
smokeTest: "bash --version && which git && which curl && which apt-retry-install"
