# Central version matrix for all plugin tool dependencies.
# The generate-plugins.sh script reads this file and produces Dockerfiles.
#
# To bump a version: edit the version here, run ./deploy/bin/generate-plugins.sh
# To add a new version: add it to the versions list, run generate.
# To remove a version: remove it from the list, run generate.
#
# install_type:
#   copy_from   — COPY --from=<docker_image> (most resilient, no URLs)
#   curl_tar    — curl | tar (GitHub release tarballs)
#   curl_bin    — curl -o (single binary download)
#   curl_zip    — curl + unzip (zip archives)
#   npm         — npm install -g
#   pip         — pip3 install
#   script      — vendor install script (least resilient, use as last resort)

# ═══════════════════════════════════════════════════════════════
# SECURITY PLUGINS
# ═══════════════════════════════════════════════════════════════

hadolint:
  plugin: security/docker-lint
  install_type: copy_from
  image: hadolint/hadolint
  tag_prefix: "v"
  binary_path: /bin/hadolint
  versions: ["2.10.0", "2.12.0"]
  default: "2.12.0"

dockle:
  plugin: security/docker-lint
  install_type: copy_from
  image: goodwithtech/dockle
  tag_prefix: "v"
  binary_path: /usr/local/bin/dockle
  versions: ["0.4.14", "0.4.15"]
  default: "0.4.15"

gitleaks:
  plugin: security/git-secrets
  install_type: copy_from
  image: zricethezav/gitleaks
  tag_prefix: "v"
  binary_path: /usr/bin/gitleaks
  versions: ["8.21.2", "8.22.0"]
  default: "8.22.0"

trufflehog:
  plugin: security/git-secrets
  install_type: copy_from
  image: trufflesecurity/trufflehog
  tag_prefix: ""
  binary_path: /usr/bin/trufflehog
  versions: ["3.84.1"]
  default: "3.84.1"

trivy:
  plugin: security/trivy
  install_type: copy_from
  image: aquasec/trivy
  tag_prefix: ""
  binary_path: /usr/local/bin/trivy
  versions: ["0.26.0", "0.69.3"]
  default: "0.69.3"

snyk:
  plugin: security/snyk
  install_type: npm
  package: snyk
  versions: ["latest"]
  default: "latest"

kics:
  plugin: security/checkmarx
  install_type: copy_from
  image: checkmarx/kics
  tag_prefix: "v"
  binary_path: /app/bin/kics
  extra_copy:
    - src: /app/bin/assets
      dst: /opt/kics/assets
  versions: ["2.1.3"]
  default: "2.1.3"

checkmarx_cli:
  plugin: security/checkmarx
  install_type: curl_tar
  url_template: "https://github.com/Checkmarx/ast-cli/releases/download/{version}/ast-cli_linux_x64.tar.gz"
  versions: ["2.3.46"]
  default: "2.3.46"

tflint:
  plugin: deploy/terraform
  install_type: copy_from
  image: ghcr.io/terraform-linters/tflint
  tag_prefix: "v"
  binary_path: /usr/local/bin/tflint
  versions: ["0.54.0"]
  default: "0.54.0"

tfsec:
  plugin: deploy/terraform
  install_type: copy_from
  image: aquasec/tfsec
  tag_prefix: "v"
  binary_path: /usr/bin/tfsec
  versions: ["1.28.11"]
  default: "1.28.11"

shellcheck:
  plugin: quality/shellcheck
  install_type: copy_from
  image: koalaman/shellcheck
  tag_prefix: "v"
  binary_path: /bin/shellcheck
  versions: ["0.9.0", "0.10.0"]
  default: "0.10.0"

# ═══════════════════════════════════════════════════════════════
# TESTING PLUGINS
# ═══════════════════════════════════════════════════════════════

k6:
  plugin: testing/k6
  install_type: copy_from
  image: grafana/k6
  tag_prefix: ""
  binary_path: /usr/bin/k6
  versions: ["0.55.0", "0.56.0"]
  default: "0.56.0"

newman:
  plugin: testing/postman
  install_type: npm
  package: "newman newman-reporter-htmlextra"
  versions: ["6.2.1"]
  default: "6.2.1"

# ═══════════════════════════════════════════════════════════════
# QUALITY PLUGINS
# ═══════════════════════════════════════════════════════════════

codacy:
  plugin: quality/codacy
  install_type: curl_bin
  url_template: "https://github.com/codacy/codacy-coverage-reporter/releases/download/{version}/codacy-coverage-reporter-linux"
  versions: ["14.1.2"]
  default: "14.1.2"

codeclimate:
  plugin: quality/codeclimate
  install_type: curl_tar
  url_template: "https://github.com/qltysh-archive/test-reporter/releases/download/v{version}/artifacts.tar.gz"
  note: "Repo transferred from codeclimate to qltysh-archive. Monitor for further moves."
  versions: ["0.11.1"]
  default: "0.11.1"

codecov:
  plugin: quality/codecov
  install_type: npm
  package: codecov
  versions: ["latest"]
  default: "latest"

checkstyle:
  plugin: quality/checkstyle
  install_type: curl_bin
  url_template: "https://github.com/checkstyle/checkstyle/releases/download/checkstyle-{version}/checkstyle-{version}-all.jar"
  install_path: /opt/checkstyle/versions
  versions: ["10.20.2", "10.21.1"]
  default: "10.21.1"

coveralls:
  plugin: quality/coveralls
  install_type: npm
  package: coveralls
  versions: ["3.1.1"]
  default: "3.1.1"

# ═══════════════════════════════════════════════════════════════
# DEPLOY PLUGINS
# ═══════════════════════════════════════════════════════════════

kubectl:
  plugin: deploy/kubectl-deploy
  install_type: curl_bin
  url_template: "https://dl.k8s.io/release/v{version}/bin/linux/amd64/kubectl"
  versions: ["1.31.4"]
  default: "1.31.4"

helm:
  plugin: deploy/helm-deploy
  install_type: curl_tar
  url_template: "https://get.helm.sh/helm-v{version}-linux-amd64.tar.gz"
  versions: ["3.16.4"]
  default: "3.16.4"

rain:
  plugin: deploy/cloudformation
  install_type: curl_zip
  url_template: "https://github.com/aws-cloudformation/rain/releases/download/v{version}/rain-v{version}_linux-amd64.zip"
  versions: ["1.18.0"]
  default: "1.18.0"

liquibase:
  plugin: deploy/liquibase
  install_type: curl_tar
  url_template: "https://github.com/liquibase/liquibase/releases/download/v{version}/liquibase-{version}.tar.gz"
  versions: ["4.30.0"]
  default: "4.30.0"

# ═══════════════════════════════════════════════════════════════
# SECURITY (vendor-specific — install scripts, least resilient)
# ═══════════════════════════════════════════════════════════════

fortify_fcli:
  plugin: security/fortify
  install_type: curl_tar
  url_template: "https://github.com/fortify/fcli/releases/download/v{version}/fcli-linux.tgz"
  versions: ["2.12.0"]
  default: "2.12.0"

veracode_cli:
  plugin: security/veracode
  install_type: script
  url: "https://tools.veracode.com/veracode-cli/install"
  note: "Vendor install script — no versioning available. Monitor for breakage."

sonar_scanner:
  plugin: security/sonarcloud
  install_type: curl_zip
  url_template: "https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-{version}-linux-x64.zip"
  versions: ["6.1.0.4477", "6.2.1.4610"]
  default: "6.2.1.4610"

dependency_check:
  plugin: security/dependency-check
  install_type: curl_zip
  url_template: "https://github.com/jeremylong/DependencyCheck/releases/download/v{version}/dependency-check-{version}-release.zip"
  versions: ["11.1.1", "12.0.0"]
  default: "12.0.0"

owasp_zap:
  plugin: security/owasp-zap
  install_type: curl_tar
  url_template: "https://github.com/zaproxy/zaproxy/releases/download/v{version}/ZAP_{version}_Linux.tar.gz"
  versions: ["2.16.0"]
  default: "2.16.0"

