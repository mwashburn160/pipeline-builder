# Central version matrix for all plugin tool dependencies.
# The generate-plugins.sh script reads this file and produces Dockerfiles.
#
# To bump a version: edit the version here, run ./deploy/bin/generate-plugins.sh
# To add a new version: add it to the versions list, run generate.
# To remove a version: remove it from the list, run generate.
#
# install_type:
#   copy_from   — COPY --from=<docker_image> (most resilient, no URLs)
#   curl_tar    — curl | tar (GitHub release tarballs)
#   curl_bin    — curl -o (single binary download)
#   curl_zip    — curl + unzip (zip archives)
#   npm         — npm install -g
#   pip         — pip3 install
#   apt         — apt-get install (from vendor repository)
#   sdkman      — SDKMAN version manager
#   nvm         — Node Version Manager
#   pyenv       — Python version manager
#   rbenv       — Ruby version manager
#   goenv       — Go version manager
#   rustup      — Rust toolchain installer
#   script      — vendor install script (least resilient, use as last resort)
#   none        — no versioned tools (curl/jq/wget only)

# ═══════════════════════════════════════════════════════════════
