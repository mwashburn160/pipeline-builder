name: java-corretto
description: Java and Kotlin plugin using Amazon Corretto JDK for building and testing JVM applications optimized for AWS workloads with AWS CDK CodeBuildStep
keywords:
  - java
  - kotlin
  - corretto
  - aws
category: language
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # Java version selection (switch Corretto version via alternatives)
  - |
    set -e
    export JAVA_HOME=/usr/lib/jvm/java-${JAVA_VERSION}-amazon-corretto
    if [ ! -d "${JAVA_HOME}" ]; then
      echo "ERROR: Corretto ${JAVA_VERSION} not installed. Available: 17, 21"
      exit 1
    fi
    export PATH="${JAVA_HOME}/bin:${PATH}"
  - java -version
  # Kotlin version selection. CodeBuild runs each command under /bin/sh (dash),
  # where SDKMAN's bash-only `sdk` function and `source` are unavailable (exit 127),
  # so put the requested version on PATH directly. The image installs kotlin under
  # ${SDKMAN_DIR}/candidates/kotlin/<version>/bin and already has the default's
  # `current` symlink on PATH, so an unknown override falls back.
  - export PATH="${SDKMAN_DIR}/candidates/kotlin/${KOTLIN_VERSION}/bin:${PATH}"; kotlin -version
  # Auto-detect or use explicit build tool, then install dependencies
  - |
    set -e
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then
        TOOL="maven"
      elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
        TOOL="gradle"
      else
        echo "ERROR: No pom.xml or build.gradle found. Set BUILD_TOOL=maven or BUILD_TOOL=gradle explicitly."
        exit 1
      fi
    fi
    echo "Build tool: ${TOOL}"
    case "${TOOL}" in
      maven)  if [ -f ./mvnw ]; then sh ./mvnw dependency:resolve -q; else mvn dependency:resolve -q; fi ;;
      gradle) if [ -f ./gradlew ]; then sh ./gradlew dependencies --quiet; else gradle dependencies --quiet; fi ;;
      *)
        echo "ERROR: Unknown BUILD_TOOL '${TOOL}'. Supported: auto, maven, gradle"
        exit 1
        ;;
    esac
commands:
  - |
    set -e
    export JAVA_HOME=/usr/lib/jvm/java-${JAVA_VERSION}-amazon-corretto
    export PATH="${JAVA_HOME}/bin:${SDKMAN_DIR}/candidates/kotlin/${KOTLIN_VERSION}/bin:${PATH}"
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then TOOL="maven"; else TOOL="gradle"; fi
    fi
    case "${TOOL}" in
      maven)  if [ -f ./mvnw ]; then sh ./mvnw clean verify -B; else mvn clean verify -B; fi ;;
      gradle) if [ -f ./gradlew ]; then sh ./gradlew clean build; else gradle clean build; fi ;;
    esac
env:
  JAVA_VERSION: "21"
  KOTLIN_VERSION: 2.1.0
  BUILD_TOOL: auto
