name: java-corretto
description: Java and Kotlin plugin using Amazon Corretto JDK for building and testing JVM applications optimized for AWS workloads with AWS CDK CodeBuildStep
keywords:
  - java
  - kotlin
  - corretto
  - aws
category: language
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # JDK/Maven/Gradle/Kotlin are baked into pipeline-jvm-base (single pinned
  # Corretto; java/mvn/gradle/kotlin on PATH, JAVA_HOME set).
  - java -version
  # Auto-detect or use explicit build tool, then install dependencies
  - |
    set -e
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then
        TOOL="maven"
      elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
        TOOL="gradle"
      else
        echo "ERROR: No pom.xml or build.gradle found. Set BUILD_TOOL=maven or BUILD_TOOL=gradle explicitly."
        exit 1
      fi
    fi
    echo "Build tool: ${TOOL}"
    case "${TOOL}" in
      maven)  if [ -f ./mvnw ]; then sh ./mvnw dependency:resolve -q; else mvn dependency:resolve -q; fi ;;
      gradle) if [ -f ./gradlew ]; then sh ./gradlew dependencies --quiet; else gradle dependencies --quiet; fi ;;
      *)
        echo "ERROR: Unknown BUILD_TOOL '${TOOL}'. Supported: auto, maven, gradle"
        exit 1
        ;;
    esac
commands:
  - |
    set -e
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then TOOL="maven"; else TOOL="gradle"; fi
    fi
    case "${TOOL}" in
      maven)  if [ -f ./mvnw ]; then run-logged build.log -- sh ./mvnw ${MAVEN_GOAL:-clean verify} -B; else run-logged build.log -- mvn ${MAVEN_GOAL:-clean verify} -B; fi ;;
      gradle) if [ -f ./gradlew ]; then run-logged build.log -- sh ./gradlew ${GRADLE_TASK:-clean build}; else run-logged build.log -- gradle ${GRADLE_TASK:-clean build}; fi ;;
    esac
env:
  # JDK + Kotlin are single-versioned in pipeline-jvm-base (bump the base to
  # change); the build-tool selection knobs remain plugin-level.
  BUILD_TOOL: auto
  MAVEN_GOAL: "clean verify"
  GRADLE_TASK: "clean build"
