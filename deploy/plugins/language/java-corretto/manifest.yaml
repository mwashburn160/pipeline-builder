name: java-corretto
description: Java and Kotlin plugin using Amazon Corretto JDK for building and testing JVM applications optimized for AWS workloads with AWS CDK CodeBuildStep
keywords:
  - java
  - kotlin
  - jvm
  - corretto
  - aws
  - maven
  - gradle
  - ktor
  - ci
  - pipeline
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # Java version selection (switch Corretto version via alternatives)
  - |
    export JAVA_HOME=/usr/lib/jvm/java-${JAVA_VERSION}-amazon-corretto
    if [ ! -d "${JAVA_HOME}" ]; then
      echo "ERROR: Corretto ${JAVA_VERSION} not installed. Available: 11, 17, 21"
      exit 1
    fi
    export PATH="${JAVA_HOME}/bin:${PATH}"
  - java -version
  # Kotlin version selection
  - source ${SDKMAN_DIR}/bin/sdkman-init.sh && sdk use kotlin ${KOTLIN_VERSION}
  - kotlin -version
  # Auto-detect or use explicit build tool, then install dependencies
  - |
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then
        TOOL="maven"
      elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
        TOOL="gradle"
      else
        echo "ERROR: No pom.xml or build.gradle found. Set BUILD_TOOL=maven or BUILD_TOOL=gradle explicitly."
        exit 1
      fi
    fi
    echo "Build tool: ${TOOL}"
    case "${TOOL}" in
      maven)  mvn dependency:resolve -q ;;
      gradle) gradle dependencies --quiet ;;
      *)
        echo "ERROR: Unknown BUILD_TOOL '${TOOL}'. Supported: auto, maven, gradle"
        exit 1
        ;;
    esac
commands:
  - |
    export JAVA_HOME=/usr/lib/jvm/java-${JAVA_VERSION}-amazon-corretto
    export PATH="${JAVA_HOME}/bin:${PATH}"
    source ${SDKMAN_DIR}/bin/sdkman-init.sh && sdk use kotlin ${KOTLIN_VERSION}
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then TOOL="maven"; else TOOL="gradle"; fi
    fi
    case "${TOOL}" in
      maven)  mvn clean verify -B ;;
      gradle) gradle clean build ;;
    esac
env:
  JAVA_VERSION: "21"
  KOTLIN_VERSION: 2.1.0
  BUILD_TOOL: auto
