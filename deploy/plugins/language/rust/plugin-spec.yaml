name: rust
description: Rust plugin for building and testing Rust applications using Cargo with AWS CDK CodeBuildStep
keywords:
  - rust
  - cargo
  - build
  - test
category: language
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # Rust (cargo/rustc/clippy/rustfmt) is baked into pipeline-rust-base.
  - test -d build-reports || mkdir -p build-reports
  - cargo --version
  - if [ -f Cargo.toml ]; then cargo fetch; fi
commands:
  - run-logged build-reports/build.log -- cargo build --release
  - run-logged build-reports/test.log -- cargo test --release
  - run-logged build-reports/clippy.log -- cargo clippy -- -D warnings
  - run-logged build-reports/fmt.log -- cargo fmt -- --check
