name: go
description: Go plugin for building and testing Go applications with AWS CDK CodeBuildStep
keywords:
  - go
  - golang
  - build
  - test
category: language
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # Go is baked into pipeline-go-base (single pinned version).
  - go version
  # Download project dependencies (not tool setup).
  - if [ -f go.mod ]; then go mod download; fi
commands:
  - run-logged go-build.log -- go build ./...
  - run-logged go-test.log -- go test -v -race -coverprofile=coverage.out ./...
  - run-logged go-vet.log -- go vet ./...
# env: GO_VERSION is baked into pipeline-go-base (single-version model); nothing
# reads it at runtime, so it is intentionally omitted.
