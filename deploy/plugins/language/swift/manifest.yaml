name: swift
description: Swift plugin for building and testing Swift applications using Swift Package Manager with AWS CDK CodeBuildStep
keywords:
  - swift
  - spm
  - ios
  - macos
  - server-side
  - apple
  - build
  - test
  - ci
  - pipeline
  - language
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # Swift version selection
  - |
    if [ -d "/opt/swift/versions/${SWIFT_VERSION}" ]; then
      ln -sf /opt/swift/versions/${SWIFT_VERSION} /opt/swift/current
    else
      echo "ERROR: Swift ${SWIFT_VERSION} not pre-installed. Available: 5.10, 6.1"
      exit 1
    fi
  - swift --version
  # Resolve dependencies
  - if [ -f Package.swift ]; then swift package resolve; fi
commands:
  - swift build
  - swift test
env:
  SWIFT_VERSION: "6.1"
