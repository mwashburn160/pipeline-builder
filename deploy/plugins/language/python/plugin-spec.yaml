name: python
description: Python plugin for building and testing Python applications using pip, Poetry, or Pipenv with AWS CDK CodeBuildStep
keywords:
  - python
  - pip
  - poetry
  - pipenv
category: language
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # Python + Poetry/Pipenv/pytest are baked into pipeline-python-base (single
  # pinned version). Sanity-check the interpreter is on PATH.
  - python3 --version
  # Auto-detect or use explicit package manager, then install user PROJECT deps.
  - |
    set -e
    PKG="${PACKAGE_MANAGER}"
    if [ "${PKG}" = "auto" ]; then
      if [ -f poetry.lock ] || ([ -f pyproject.toml ] && grep -q '\[tool.poetry\]' pyproject.toml 2>/dev/null); then
        PKG="poetry"
      elif [ -f Pipfile ] || [ -f Pipfile.lock ]; then
        PKG="pipenv"
      else
        PKG="pip"
      fi
    fi
    echo "Package manager: ${PKG}"
    python -m pip install --upgrade pip setuptools wheel
    case "${PKG}" in
      pip)
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        ;;
      poetry)
        poetry config virtualenvs.in-project true
        poetry install --no-interaction
        ;;
      pipenv)
        pipenv install --dev --system
        ;;
      *)
        echo "ERROR: Unknown PACKAGE_MANAGER '${PKG}'. Supported: auto, pip, poetry, pipenv"
        exit 1
        ;;
    esac
commands:
  - |
    set -e
    PKG="${PACKAGE_MANAGER}"
    if [ "${PKG}" = "auto" ]; then
      if [ -f poetry.lock ] || ([ -f pyproject.toml ] && grep -q '\[tool.poetry\]' pyproject.toml 2>/dev/null); then
        PKG="poetry"
      elif [ -f Pipfile ] || [ -f Pipfile.lock ]; then
        PKG="pipenv"
      else
        PKG="pip"
      fi
    fi
    case "${PKG}" in
      poetry)
        run-logged pytest.log -- poetry run pytest --junitxml=junit/test-results.xml --cov --cov-report=xml --cov-report=html
        ;;
      *)
        run-logged pytest.log -- pytest --junitxml=junit/test-results.xml --cov --cov-report=xml --cov-report=html
        ;;
    esac
env:
  # PYTHON_VERSION is baked into pipeline-python-base (single-version model).
  PACKAGE_MANAGER: auto
