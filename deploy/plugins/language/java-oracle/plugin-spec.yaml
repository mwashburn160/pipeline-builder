name: java-oracle
description: Java and Kotlin plugin using Oracle GraalVM JDK for building and testing JVM applications with optional native-image compilation using AWS CDK CodeBuildStep
keywords:
  - java
  - kotlin
  - graalvm
  - native-image
category: language
version: 1.0.0
pluginType: CodeBuildStep
computeType: LARGE
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # Single pinned GraalVM JDK + Kotlin are baked into the image (SDKMAN `current`
  # symlinks on PATH); nothing to switch at runtime.
  - java -version; kotlin -version
  - |
    set -e
    if [ "${NATIVE_BUILD}" = "true" ]; then
      echo "GraalVM native-image enabled"
      native-image --version
    fi
  # Auto-detect or use explicit build tool, then install dependencies
  - |
    set -e
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then
        TOOL="maven"
      elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
        TOOL="gradle"
      else
        echo "ERROR: No pom.xml or build.gradle found. Set BUILD_TOOL=maven or BUILD_TOOL=gradle explicitly."
        exit 1
      fi
    fi
    echo "Build tool: ${TOOL}"
    case "${TOOL}" in
      maven)  if [ -f ./mvnw ]; then sh ./mvnw dependency:resolve -q; else mvn dependency:resolve -q; fi ;;
      gradle) if [ -f ./gradlew ]; then sh ./gradlew dependencies --quiet; else gradle dependencies --quiet; fi ;;
      *)
        echo "ERROR: Unknown BUILD_TOOL '${TOOL}'. Supported: auto, maven, gradle"
        exit 1
        ;;
    esac
commands:
  - |
    set -e
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then TOOL="maven"; else TOOL="gradle"; fi
    fi
    if [ "${NATIVE_BUILD}" = "true" ]; then
      echo "Building native image..."
      case "${TOOL}" in
        maven)  if [ -f ./mvnw ]; then run-logged build.log -- sh ./mvnw clean package -Pnative -B; else run-logged build.log -- mvn clean package -Pnative -B; fi ;;
        gradle) if [ -f ./gradlew ]; then run-logged build.log -- sh ./gradlew nativeCompile; else run-logged build.log -- gradle nativeCompile; fi ;;
      esac
    else
      case "${TOOL}" in
        maven)  if [ -f ./mvnw ]; then run-logged build.log -- sh ./mvnw ${MAVEN_GOAL:-clean verify} -B; else run-logged build.log -- mvn ${MAVEN_GOAL:-clean verify} -B; fi ;;
        gradle) if [ -f ./gradlew ]; then run-logged build.log -- sh ./gradlew ${GRADLE_TASK:-clean build}; else run-logged build.log -- gradle ${GRADLE_TASK:-clean build}; fi ;;
      esac
    fi
env:
  # JDK + Kotlin are single-versioned in the image (bump the Dockerfile build-args
  # to change); the build/native selection knobs remain plugin-level.
  BUILD_TOOL: auto
  NATIVE_BUILD: "false"
  MAVEN_GOAL: "clean verify"
  GRADLE_TASK: "clean build"
