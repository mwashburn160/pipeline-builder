name: java-oracle
description: Java and Kotlin plugin using Oracle GraalVM JDK for building and testing JVM applications with optional native-image compilation using AWS CDK CodeBuildStep
keywords:
  - java
  - kotlin
  - graalvm
  - native-image
category: language
version: 1.0.0
pluginType: CodeBuildStep
computeType: LARGE
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # Java and Kotlin version selection. CodeBuild runs each command under /bin/sh
  # (dash), where SDKMAN's bash-only `sdk` function and `source` are unavailable
  # (exit 127), so put the requested versions on PATH directly. The image installs
  # each version under ${SDKMAN_DIR}/candidates/<tool>/<version>/bin and already has
  # the defaults' `current` symlink on PATH, so an unknown override falls back.
  - export PATH="${SDKMAN_DIR}/candidates/java/${JAVA_VERSION}/bin:${SDKMAN_DIR}/candidates/kotlin/${KOTLIN_VERSION}/bin:${PATH}"; java -version; kotlin -version
  - |
    set -e
    export PATH="${SDKMAN_DIR}/candidates/java/${JAVA_VERSION}/bin:${PATH}"
    if [ "${NATIVE_BUILD}" = "true" ]; then
      echo "GraalVM native-image enabled"
      native-image --version
    fi
  # Auto-detect or use explicit build tool, then install dependencies
  - |
    set -e
    export PATH="${SDKMAN_DIR}/candidates/java/${JAVA_VERSION}/bin:${SDKMAN_DIR}/candidates/kotlin/${KOTLIN_VERSION}/bin:${PATH}"
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then
        TOOL="maven"
      elif [ -f build.gradle ] || [ -f build.gradle.kts ]; then
        TOOL="gradle"
      else
        echo "ERROR: No pom.xml or build.gradle found. Set BUILD_TOOL=maven or BUILD_TOOL=gradle explicitly."
        exit 1
      fi
    fi
    echo "Build tool: ${TOOL}"
    case "${TOOL}" in
      maven)  if [ -f ./mvnw ]; then sh ./mvnw dependency:resolve -q; else mvn dependency:resolve -q; fi ;;
      gradle) if [ -f ./gradlew ]; then sh ./gradlew dependencies --quiet; else gradle dependencies --quiet; fi ;;
      *)
        echo "ERROR: Unknown BUILD_TOOL '${TOOL}'. Supported: auto, maven, gradle"
        exit 1
        ;;
    esac
commands:
  - |
    set -e
    export PATH="${SDKMAN_DIR}/candidates/java/${JAVA_VERSION}/bin:${SDKMAN_DIR}/candidates/kotlin/${KOTLIN_VERSION}/bin:${PATH}"
    TOOL="${BUILD_TOOL}"
    if [ "${TOOL}" = "auto" ]; then
      if [ -f pom.xml ]; then TOOL="maven"; else TOOL="gradle"; fi
    fi
    if [ "${NATIVE_BUILD}" = "true" ]; then
      echo "Building native image..."
      case "${TOOL}" in
        maven)  if [ -f ./mvnw ]; then sh ./mvnw clean package -Pnative -B; else mvn clean package -Pnative -B; fi ;;
        gradle) if [ -f ./gradlew ]; then sh ./gradlew nativeCompile; else gradle nativeCompile; fi ;;
      esac
    else
      case "${TOOL}" in
        maven)  if [ -f ./mvnw ]; then sh ./mvnw ${MAVEN_GOAL:-clean verify} -B; else mvn ${MAVEN_GOAL:-clean verify} -B; fi ;;
        gradle) if [ -f ./gradlew ]; then sh ./gradlew ${GRADLE_TASK:-clean build}; else gradle ${GRADLE_TASK:-clean build}; fi ;;
      esac
    fi
env:
  JAVA_VERSION: 21.0.10-graal
  KOTLIN_VERSION: 2.2.21
  BUILD_TOOL: auto
  NATIVE_BUILD: "false"
