name: dotnet
description: .NET plugin for building and testing C#/F# applications using dotnet CLI with AWS CDK CodeBuildStep
keywords:
  - dotnet
  - csharp
  - fsharp
  - build
category: language
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # .NET SDK is baked into pipeline-dotnet-base (single pinned version).
  - dotnet --version
  # Restore dependencies (build/test run with --no-restore).
  - dotnet restore
commands:
  - run-logged dotnet-build.log -- dotnet build --no-restore --configuration Release
  - run-logged dotnet-test.log -- dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
