name: php
description: PHP plugin for building and testing PHP applications using Composer with AWS CDK CodeBuildStep
keywords:
  - php
  - composer
  - build
  - test
category: language
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: '**/*'
dockerfile: Dockerfile
installCommands:
  # PHP + Composer are baked into pipeline-php-base (single pinned version).
  - php --version && composer --version
  # Install project dependencies.
  - |
    set -e
    if [ -f composer.json ]; then
      composer install ${COMPOSER_FLAGS}
    fi
commands:
  - |
    set -e
    if composer run-script --list 2>/dev/null | grep -q "build"; then
      run-logged build.log -- composer run-script build
    fi
  - |
    set -e
    if [ -f vendor/bin/phpunit ]; then
      run-logged test.log -- vendor/bin/phpunit
    elif composer run-script --list 2>/dev/null | grep -q "test"; then
      run-logged test.log -- composer run-script test
    fi
env:
  # PHP_VERSION is baked into pipeline-php-base (single-version model).
  COMPOSER_FLAGS: "--no-interaction --prefer-dist"
