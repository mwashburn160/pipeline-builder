name: cargo-test
description: Cargo test runner plugin for executing Rust unit and integration tests across workspace crates using AWS CDK CodeBuildStep
keywords:
  - rust
  - unit-test
  - integration-test
  - cargo
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: test-reports
dockerfile: Dockerfile
installCommands:
  - test -d test-reports || mkdir -p test-reports
  - rustup default ${RUST_VERSION}
  - rustc --version && cargo --version
  - if [ -f Cargo.toml ]; then cargo fetch; fi
commands:
  - |
    set -e
    echo "Running cargo test..."
    cargo test --all-features --workspace \
      > test-reports/cargo-test.log 2>&1 || _TEST_RC=$?
    cat test-reports/cargo-test.log
    # Gate the build on the test exit (POSIX /bin/sh has no pipefail).
    [ "${_TEST_RC:-0}" -eq 0 ]
  - "echo \"Cargo test complete. Reports available in test-reports/\""
env:
  RUST_VERSION: "stable"
