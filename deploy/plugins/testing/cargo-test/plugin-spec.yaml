name: cargo-test
description: Cargo test runner plugin for executing Rust unit and integration tests across workspace crates using AWS CDK CodeBuildStep
keywords:
  - rust
  - unit-test
  - integration-test
  - cargo
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: test-reports
dockerfile: Dockerfile
installCommands:
  # Rust (cargo/rustc) is baked into pipeline-rust-base (single pinned version).
  - test -d test-reports || mkdir -p test-reports
  - cargo --version
  - if [ -f Cargo.toml ]; then cargo fetch; fi
commands:
  - |
    set -e
    echo "Running cargo test..."
    run-logged test-reports/cargo-test.log -- cargo test --all-features --workspace
  - "echo \"Cargo test complete. Reports available in test-reports/\""
