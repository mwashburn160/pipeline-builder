name: coverage-py
description: coverage.py code coverage plugin for measuring and enforcing test coverage thresholds in Python projects using AWS CDK CodeBuildStep
keywords:
  - python
  - coverage
  - threshold
  - reporting
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 20
failureBehavior: fail
secrets: []
primaryOutputDirectory: coverage-reports
dockerfile: Dockerfile
installCommands:
  # Python + coverage/pytest are baked into pipeline-python-base (single pinned version).
  - test -d coverage-reports || mkdir -p coverage-reports
  - python3 --version && coverage --version
  # Install user PROJECT deps so the tests can run (not tool setup).
  - |
    set -e
    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    if [ -f pyproject.toml ]; then pip install -e '.[testing]' 2>/dev/null || pip install -e '.[test]' 2>/dev/null || true; fi
commands:
  - |
    set -e
    echo "Running coverage..."
    _TEST_RC=0; _COV_RC=0
    # run-logged streams to console + log and yields the tool's real exit; we
    # capture it (don't abort) so the report/xml/html still run before gating.
    run-logged coverage-reports/coverage-run.log -- coverage run -m pytest || _TEST_RC=$?
    run-logged coverage-reports/coverage-report.log -- coverage report --fail-under=${COVERAGE_THRESHOLD} || _COV_RC=$?
    coverage xml -o coverage-reports/coverage.xml || true
    coverage html -d coverage-reports/htmlcov || true
    # Gate on test failures AND coverage threshold (POSIX /bin/sh, no pipefail).
    [ "${_TEST_RC:-0}" -eq 0 ] && [ "${_COV_RC:-0}" -eq 0 ]
  - "echo \"Coverage complete. Reports available in coverage-reports/\""
env:
  # PYTHON_VERSION is baked into pipeline-python-base (single-version model).
  COVERAGE_THRESHOLD: "75"
