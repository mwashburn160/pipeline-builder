name: cypress
description: Cypress end-to-end testing plugin for running browser-based UI tests with video recording and screenshot capture using AWS CDK CodeBuildStep
keywords:
  - e2e
  - browser
  - ui-test
  - video
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: LARGE
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: cypress-reports
dockerfile: Dockerfile
installCommands:
  # Node + npm are baked into pipeline-node-base; Cypress is pinned + baked.
  - test -d cypress-reports || mkdir -p cypress-reports
  - node --version && cypress --version
  # Install project dependencies (a project-pinned Cypress wins via npx).
  - |
    set -e
    if [ -f pnpm-lock.yaml ]; then
      npm install -g pnpm && pnpm install --frozen-lockfile
    elif [ -f yarn.lock ]; then
      npm install -g yarn && yarn install --frozen-lockfile
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
  # Verify the Cypress browser binary is present and runnable.
  - npx cypress verify
commands:
  - |
    set -e
    SPEC_ARG=""
    if [ -n "${CYPRESS_SPEC}" ]; then
      SPEC_ARG="--spec ${CYPRESS_SPEC}"
    fi
    RECORD_ARG=""
    if [ -n "${CYPRESS_RECORD_KEY}" ]; then
      RECORD_ARG="--record --key ${CYPRESS_RECORD_KEY}"
    fi
    echo "Running Cypress E2E tests (browser: ${CYPRESS_BROWSER})..."
    set +e
    run-logged cypress-reports/cypress.log -- npx cypress run \
      --browser ${CYPRESS_BROWSER} \
      ${SPEC_ARG} \
      ${RECORD_ARG} \
      --reporter json \
      --reporter-options "output=cypress-reports/cypress-results.json"
    _TEST_RC=$?
    set -e
    # Copy videos and screenshots (also on failure, for debugging)
    cp -r cypress/videos cypress-reports/ 2>/dev/null || true
    cp -r cypress/screenshots cypress-reports/ 2>/dev/null || true
    [ "${_TEST_RC:-0}" -eq 0 ]
  - "echo \"Cypress tests complete. Reports available in cypress-reports/\""
env:
  CYPRESS_BROWSER: "electron"
  CYPRESS_SPEC: ""
  CYPRESS_RECORD_KEY: ""
