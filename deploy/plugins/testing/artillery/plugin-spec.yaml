name: artillery
description: Artillery load testing plugin for running HTTP and WebSocket performance tests with configurable scenarios and reporting using AWS CDK CodeBuildStep
keywords:
  - load-test
  - performance
  - http
  - websocket
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 60
failureBehavior: fail
secrets: []
primaryOutputDirectory: artillery-reports
dockerfile: Dockerfile
installCommands:
  - test -d artillery-reports || mkdir -p artillery-reports
  - |
    set -e
    export PATH="${NVM_DIR}/versions/node/v${NODE_VERSION}/bin:${PATH}"
  - artillery version
commands:
  - |
    set -e
    export PATH="${NVM_DIR}/versions/node/v${NODE_VERSION}/bin:${PATH}"
    if [ -z "${ARTILLERY_CONFIG}" ]; then
      ARTILLERY_CONFIG=$(find . -name "artillery*.yml" -o -name "artillery*.yaml" -o -name "load-test*.yml" 2>/dev/null | head -1)
    fi
    if [ -z "${ARTILLERY_CONFIG}" ]; then
      echo "ERROR: No Artillery config found. Set ARTILLERY_CONFIG=path/to/config.yml"
      exit 1
    fi
    TARGET_ARG=""
    if [ -n "${ARTILLERY_TARGET}" ]; then
      TARGET_ARG="--target ${ARTILLERY_TARGET}"
    fi
    echo "Running Artillery: ${ARTILLERY_CONFIG}"
    artillery run "${ARTILLERY_CONFIG}" \
      ${TARGET_ARG} \
      --output artillery-reports/artillery-results.json \
      > artillery-reports/artillery-output.txt 2>&1 || _TEST_RC=$?
    cat artillery-reports/artillery-output.txt
    artillery report artillery-reports/artillery-results.json \
      --output artillery-reports/artillery-report.html 2>/dev/null || true
    [ "${_TEST_RC:-0}" -eq 0 ]
  - "echo \"Artillery load test complete. Reports available in artillery-reports/\""
env:
  NODE_VERSION: "24"
  ARTILLERY_CONFIG: ""
  ARTILLERY_TARGET: ""
