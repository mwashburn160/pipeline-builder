name: jest
description: Jest testing framework plugin for running JavaScript and TypeScript unit tests with coverage reporting using AWS CDK CodeBuildStep
keywords:
  - javascript
  - typescript
  - unit-test
  - coverage
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 20
failureBehavior: fail
secrets: []
primaryOutputDirectory: test-reports
dockerfile: Dockerfile
installCommands:
  # Node + npm are baked into pipeline-node-base; Jest + jest-junit pinned + baked.
  - test -d test-reports || mkdir -p test-reports
  - node --version && jest --version
  # Install project dependencies (a project-pinned Jest wins via npx).
  - |
    set -e
    if [ -f pnpm-lock.yaml ]; then
      npm install -g pnpm && pnpm install --frozen-lockfile
    elif [ -f yarn.lock ]; then
      npm install -g yarn && yarn install --frozen-lockfile
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
commands:
  - |
    set -e
    CONFIG_ARG=""
    if [ -n "${JEST_CONFIG}" ] && [ -f "${JEST_CONFIG}" ]; then
      CONFIG_ARG="--config ${JEST_CONFIG}"
    fi
    echo "Running Jest..."
    run-logged test-reports/jest.log -- npx jest ${CONFIG_ARG} --ci --reporters=default --reporters=jest-junit
  - "echo \"Jest complete. Reports available in test-reports/\""
env:
  JEST_CONFIG: ""
  JEST_JUNIT_OUTPUT_DIR: "test-reports"
