name: python-pytest
description: pytest testing framework plugin for running Python unit and integration tests with JUnit reporting using AWS CDK CodeBuildStep
keywords:
  - python
  - pytest
  - unit-test
  - junit
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 20
failureBehavior: fail
secrets: []
primaryOutputDirectory: test-reports
dockerfile: Dockerfile
installCommands:
  # Python + pytest/pytest-cov are baked into pipeline-python-base (single pinned version).
  - test -d test-reports || mkdir -p test-reports
  - python3 --version && pytest --version
  # Install user PROJECT deps so the tests can run (not tool setup).
  - |
    set -e
    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    if [ -f pyproject.toml ]; then pip install -e '.[testing]' 2>/dev/null || pip install -e '.[test]' 2>/dev/null || true; fi
commands:
  - |
    set -e
    echo "Running pytest..."
    run-logged test-reports/pytest.log -- python -m pytest ${PYTEST_ARGS} --junitxml=test-reports/pytest-results.xml
  - "echo \"pytest complete. Reports available in test-reports/\""
env:
  # PYTHON_VERSION is baked into pipeline-python-base (single-version model).
  PYTEST_ARGS: "-x --tb=short"
