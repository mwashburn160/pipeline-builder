name: minitest-coverage
description: Minitest with SimpleCov coverage reporting plugin for measuring Ruby test coverage using AWS CDK CodeBuildStep
keywords:
  - ruby
  - minitest
  - coverage
  - simplecov
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 20
failureBehavior: fail
secrets: []
primaryOutputDirectory: coverage-reports
dockerfile: Dockerfile
installCommands:
  # Ruby + simplecov are baked into pipeline-ruby-base (single pinned version);
  # the test suite comes from the project's Gemfile via `bundle install`.
  - test -d coverage-reports || mkdir -p coverage-reports
  - ruby --version
  - if [ -f Gemfile ]; then bundle install; fi
commands:
  - |
    set -e
    echo "Running tests with coverage..."
    # run-logged streams to console + log AND surfaces the test suite's real
    # exit (POSIX /bin/sh has no pipefail), gating the build honestly.
    COVERAGE=true run-logged coverage-reports/coverage-run.log -- bundle exec rails test
  - |
    set -e
    if [ -d coverage ]; then
      cp -r coverage/* coverage-reports/ 2>/dev/null || true
    fi
  - "echo \"Coverage complete. Reports available in coverage-reports/\""
