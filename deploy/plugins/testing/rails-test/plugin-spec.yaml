name: rails-test
description: Rails test runner plugin for executing Minitest and RSpec test suites using AWS CDK CodeBuildStep
keywords:
  - ruby
  - rails
  - minitest
  - rspec
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: test-reports
dockerfile: Dockerfile
installCommands:
  # Ruby/gem/bundle are baked into pipeline-ruby-base (single pinned version);
  # the test framework comes from the project's Gemfile via `bundle install`.
  - test -d test-reports || mkdir -p test-reports
  - ruby --version
  - if [ -f Gemfile ]; then bundle install; fi
commands:
  - |
    set -e
    echo "Setting up database..."
    bundle exec rake db:create db:migrate 2>&1 || true
  - |
    set -e
    echo "Running Rails tests..."
    # run-logged streams to console + log AND surfaces the test suite's real
    # exit (POSIX /bin/sh has no pipefail), gating the build honestly.
    run-logged test-reports/rails-test.log -- bundle exec rails test
  - "echo \"Rails test complete. Reports available in test-reports/\""
env:
  # RUBY_VERSION is baked into pipeline-ruby-base (single-version model).
  RAILS_ENV: "test"
