name: dotnet-test
description: dotnet test runner plugin for executing .NET unit and integration tests with TRX reporting and code coverage using AWS CDK CodeBuildStep
keywords:
  - dotnet
  - unit-test
  - integration-test
  - trx
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: test-reports
dockerfile: Dockerfile
installCommands:
  - test -d test-reports || mkdir -p test-reports
  - dotnet --version
commands:
  - |
    set -e
    echo "Restoring packages..."
    dotnet restore
  - |
    set -e
    echo "Building project..."
    dotnet build --no-restore --configuration ${CONFIGURATION}
  - |
    set -e
    echo "Running tests..."
    dotnet test --no-build --configuration ${CONFIGURATION} \
      --logger trx --results-directory test-reports \
      --collect:"XPlat Code Coverage" \
      > test-reports/dotnet-test.log 2>&1 || _TEST_RC=$?
    cat test-reports/dotnet-test.log
    # Gate the build on the test exit (POSIX /bin/sh has no pipefail).
    [ "${_TEST_RC:-0}" -eq 0 ]
  - "echo \"dotnet test complete. Reports available in test-reports/\""
env:
  DOTNET_VERSION: "9.0"
  CONFIGURATION: "Release"
