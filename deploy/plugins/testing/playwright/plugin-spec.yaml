name: playwright
description: Playwright end-to-end testing plugin for cross-browser UI testing with Chromium, Firefox, and WebKit support using AWS CDK CodeBuildStep
keywords:
  - e2e
  - cross-browser
  - ui-test
  - chromium
category: testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: LARGE
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: playwright-reports
dockerfile: Dockerfile
installCommands:
  # Node.js version selection
  - test -d playwright-reports || mkdir -p playwright-reports
  - |
    set -e
    export PATH="${NVM_DIR}/versions/node/v${NODE_VERSION}/bin:${PATH}"
  - node --version
  # Install project dependencies
  - |
    set -e
    if [ -f pnpm-lock.yaml ]; then
      npm install -g pnpm && pnpm install --frozen-lockfile
    elif [ -f yarn.lock ]; then
      npm install -g yarn && yarn install --frozen-lockfile
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
  # Run apt-get update first so playwright's bundled apt-get install
  # (triggered by --with-deps) sees the current package index. Without
  # this, the cached cache from image build time can 404 on packages
  # that Ubuntu has since superseded (e.g. -1ubuntu1.X security rolls).
  - (command -v sudo >/dev/null 2>&1 && sudo apt-get update) || apt-get update || true
  - npx playwright install --with-deps
commands:
  - |
    set -e
    export PATH="${NVM_DIR}/versions/node/v${NODE_VERSION}/bin:${PATH}"
    PROJECT_ARG=""
    if [ -n "${PLAYWRIGHT_PROJECT}" ]; then
      PROJECT_ARG="--project=${PLAYWRIGHT_PROJECT}"
    fi
    echo "Running Playwright tests (workers: ${PLAYWRIGHT_WORKERS})..."
    npx playwright test \
      --reporter=${PLAYWRIGHT_REPORTER} \
      --workers=${PLAYWRIGHT_WORKERS} \
      ${PROJECT_ARG} \
      > playwright-reports/playwright-output.txt 2>&1 || _TEST_RC=$?
    cat playwright-reports/playwright-output.txt
    # Copy report artifacts (also on failure, for debugging)
    cp -r playwright-report/* playwright-reports/ 2>/dev/null || true
    cp -r test-results/* playwright-reports/ 2>/dev/null || true
    [ "${_TEST_RC:-0}" -eq 0 ]
  - "echo \"Playwright tests complete. Reports available in playwright-reports/\""
env:
  NODE_VERSION: "24"
  PLAYWRIGHT_PROJECT: ""
  PLAYWRIGHT_WORKERS: "auto"
  PLAYWRIGHT_REPORTER: "html"
