name: dockerfile-generator
description: AI-powered Dockerfile generator that analyzes project source code and produces an optimized, production-ready Dockerfile using a local Ollama model
keywords:
  - dockerfile
  - ai
  - ollama
  - generator
  - docker
  - codegen
  - ci
  - pipeline
version: 1.0.0
pluginType: CodeBuildStep
computeType: LARGE
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: generated
dockerfile: Dockerfile
installCommands:
  # Start Ollama server in background
  - ollama serve &
  - sleep 5
  # Pull the configured model
  - ollama pull ${OLLAMA_MODEL}
  - ollama list
commands:
  - mkdir -p generated
  # Scan project for language/framework indicators
  - |
    PROJECT_CONTEXT=""
    if [ -f package.json ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- package.json ---\n$(cat package.json)"
    fi
    if [ -f tsconfig.json ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- tsconfig.json ---\n$(cat tsconfig.json)"
    fi
    if [ -f requirements.txt ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- requirements.txt ---\n$(cat requirements.txt)"
    fi
    if [ -f pyproject.toml ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- pyproject.toml ---\n$(cat pyproject.toml)"
    fi
    if [ -f Pipfile ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- Pipfile ---\n$(cat Pipfile)"
    fi
    if [ -f pom.xml ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- pom.xml (first 100 lines) ---\n$(head -100 pom.xml)"
    fi
    if [ -f build.gradle ] || [ -f build.gradle.kts ]; then
      GRADLE_FILE=$(ls build.gradle build.gradle.kts 2>/dev/null | head -1)
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- ${GRADLE_FILE} ---\n$(cat ${GRADLE_FILE})"
    fi
    if [ -f go.mod ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- go.mod ---\n$(cat go.mod)"
    fi
    if [ -f Cargo.toml ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- Cargo.toml ---\n$(cat Cargo.toml)"
    fi
    if [ -f Gemfile ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- Gemfile ---\n$(cat Gemfile)"
    fi
    if [ -f *.csproj ] 2>/dev/null; then
      CSPROJ_FILE=$(ls *.csproj 2>/dev/null | head -1)
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- ${CSPROJ_FILE} ---\n$(cat ${CSPROJ_FILE})"
    fi
    if [ -f *.sln ] 2>/dev/null; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- $(ls *.sln | head -1) detected ---"
    fi
    if [ -f CMakeLists.txt ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- CMakeLists.txt ---\n$(cat CMakeLists.txt)"
    fi
    if [ -f Makefile ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- Makefile (first 50 lines) ---\n$(head -50 Makefile)"
    fi
    if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
      COMPOSE_FILE=$(ls docker-compose.yml docker-compose.yaml 2>/dev/null | head -1)
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- ${COMPOSE_FILE} ---\n$(cat ${COMPOSE_FILE})"
    fi
    if [ -f .nvmrc ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- .nvmrc ---\n$(cat .nvmrc)"
    fi
    if [ -f .python-version ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- .python-version ---\n$(cat .python-version)"
    fi
    if [ -f .tool-versions ]; then
      PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- .tool-versions ---\n$(cat .tool-versions)"
    fi
    # Directory listing for structure context
    PROJECT_CONTEXT="${PROJECT_CONTEXT}\n--- Directory listing ---\n$(ls -la)"
    # Escape for JSON
    ESCAPED_CONTEXT=$(echo -e "${PROJECT_CONTEXT}" | jq -Rs .)
    # Build the prompt
    SYSTEM_PROMPT="You are a Dockerfile generation expert. Analyze the project files provided and generate a single, production-ready, optimized Dockerfile. Follow these rules:
    1. Use official slim/alpine base images when possible
    2. Use multi-stage builds to minimize final image size
    3. Order layers from least to most frequently changed (OS deps -> lang deps -> app code)
    4. Combine RUN commands with && to minimize layers
    5. Clean up package manager caches (apt-get clean, rm -rf /var/lib/apt/lists/*)
    6. Set appropriate environment variables (NODE_ENV=production, PYTHONDONTWRITEBYTECODE=1, etc.)
    7. Use .dockerignore patterns in comments at the top
    8. Add HEALTHCHECK when appropriate for web services
    9. Use non-root USER for security
    10. Pin base image versions for reproducibility
    11. COPY dependency files first, then install, then copy source (for layer caching)
    Output ONLY the Dockerfile content. No explanations, no markdown fences, just the raw Dockerfile."
    USER_PROMPT="Generate an optimized, production-ready Dockerfile for this project:\n\n${ESCAPED_CONTEXT}"
    # Call Ollama API
    RESPONSE=$(curl -s ${OLLAMA_HOST}/api/generate \
      -d "$(jq -n \
        --arg model "${OLLAMA_MODEL}" \
        --arg system "${SYSTEM_PROMPT}" \
        --arg prompt "$(echo -e ${USER_PROMPT})" \
        --argjson num_ctx ${OLLAMA_NUM_CTX} \
        '{model: $model, system: $system, prompt: $prompt, stream: false, options: {num_ctx: $num_ctx}}')")
    # Extract and save the generated Dockerfile
    echo "${RESPONSE}" | jq -r '.response' > generated/Dockerfile
    echo "--- Generated Dockerfile ---"
    cat generated/Dockerfile
    echo "--- Generation complete ---"
  - "echo \"Dockerfile generated successfully. Output saved to generated/Dockerfile\""
env:
  OLLAMA_MODEL: codellama:7b
  OLLAMA_HOST: http://localhost:11434
  OLLAMA_NUM_CTX: "8192"
