name: rustfmt
description: rustfmt formatting check plugin for verifying consistent Rust code formatting using AWS CDK CodeBuildStep
keywords:
  - rust
  - formatting
  - code-style
  - consistency
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: fmt-reports
dockerfile: Dockerfile
installCommands:
  # Rust + rustfmt are baked into pipeline-rust-base (single pinned version).
  - test -d fmt-reports || mkdir -p fmt-reports
  - cargo --version
commands:
  - |
    set -e
    echo "Running rustfmt check..."
    run-logged fmt-reports/rustfmt.log -- cargo fmt --all -- --check
  - "echo \"rustfmt check complete. Reports available in fmt-reports/\""
