name: spotbugs
description: SpotBugs static analysis plugin for detecting bug patterns in Java bytecode using AWS CDK CodeBuildStep
keywords:
  - java
  - static-analysis
  - bug-detection
  - bytecode
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: spotbugs-reports
dockerfile: Dockerfile
installCommands:
  - test -d spotbugs-reports || mkdir -p spotbugs-reports
  - java -version
  - |
    set -e
    if [ -f gradlew ]; then chmod +x gradlew; fi
    if [ -f mvnw ]; then chmod +x mvnw; fi
commands:
  - |
    set -e
    echo "Running SpotBugs analysis..."
    # run-logged streams each branch's output to the log AND exits with the
    # tool's true status (no tee/pipe masking); the final test re-asserts it.
    if [ -f gradlew ]; then
      run-logged spotbugs-reports/spotbugs.log -- ./gradlew spotbugsMain --no-daemon || _rc=$?
    elif [ -f mvnw ]; then
      run-logged spotbugs-reports/spotbugs.log -- ./mvnw spotbugs:check || _rc=$?
    elif [ -f pom.xml ]; then
      run-logged spotbugs-reports/spotbugs.log -- mvn spotbugs:check || _rc=$?
    else
      run-logged spotbugs-reports/spotbugs.log -- gradle spotbugsMain --no-daemon || _rc=$?
    fi
    [ "${_rc:-0}" -eq 0 ]
  - "echo \"SpotBugs analysis complete. Reports available in spotbugs-reports/\""
