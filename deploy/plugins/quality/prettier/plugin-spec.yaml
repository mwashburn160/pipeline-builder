name: prettier
description: Prettier code formatting verification plugin for checking consistent formatting across JavaScript, TypeScript, CSS, HTML, JSON, YAML, and Markdown using AWS CDK CodeBuildStep
keywords:
  - javascript
  - typescript
  - formatting
  - code-style
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: format-reports
dockerfile: Dockerfile
installCommands:
  # Node + npm are baked into pipeline-node-base; Prettier is pinned + baked.
  - test -d format-reports || mkdir -p format-reports
  - node --version && prettier --version
  # Install project dependencies (a project-pinned Prettier wins via npx).
  - |
    set -e
    if [ -f pnpm-lock.yaml ]; then
      npm install -g pnpm && pnpm install --frozen-lockfile
    elif [ -f yarn.lock ]; then
      npm install -g yarn && yarn install --frozen-lockfile
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
commands:
  - |
    set -e
    echo "Checking code formatting with Prettier..."
    npx prettier --check "${PRETTIER_GLOB}" \
      --log-level warn \
      2>&1 | tee format-reports/prettier-results.txt || true
    # Generate list of unformatted files
    npx prettier --list-different "${PRETTIER_GLOB}" \
      > format-reports/unformatted-files.txt 2>/dev/null || true
    UNFORMATTED=$(wc -l < format-reports/unformatted-files.txt | tr -d ' ')
    if [ "${UNFORMATTED}" -gt 0 ]; then
      echo "WARNING: ${UNFORMATTED} file(s) need formatting"
    else
      echo "All files are properly formatted"
    fi
  - "echo \"Prettier check complete. Report available in format-reports/\""
env:
  PRETTIER_GLOB: "."
