name: dotnet-format
description: dotnet format plugin for verifying consistent C# and .NET code formatting using AWS CDK CodeBuildStep
keywords:
  - dotnet
  - csharp
  - formatting
  - code-style
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: format-reports
dockerfile: Dockerfile
installCommands:
  # .NET SDK (with `dotnet format`) is baked into pipeline-dotnet-base.
  - test -d format-reports || mkdir -p format-reports
  - dotnet --version
commands:
  - |
    set -e
    echo "Running dotnet format check..."
    run-logged format-reports/dotnet-format.log -- \
      dotnet format --verify-no-changes --verbosity diagnostic
  - "echo \"Format check complete. Reports available in format-reports/\""
