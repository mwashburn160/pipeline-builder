name: eslint
description: ESLint JavaScript and TypeScript linting plugin for enforcing code quality and style standards using AWS CDK CodeBuildStep
keywords:
  - javascript
  - typescript
  - linter
  - code-quality
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: lint-reports
dockerfile: Dockerfile
installCommands:
  # Node + npm are baked into pipeline-node-base; ESLint is pinned + baked.
  - test -d lint-reports || mkdir -p lint-reports
  - node --version && eslint --version
  # Install project dependencies (a project-pinned ESLint + its plugins/config
  # win via npx; the baked global is the fallback).
  - |
    set -e
    if [ -f pnpm-lock.yaml ]; then
      npm install -g pnpm && pnpm install --frozen-lockfile
    elif [ -f yarn.lock ]; then
      npm install -g yarn && yarn install --frozen-lockfile
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
commands:
  - |
    set -e
    WARN_ARG=""
    if [ "${ESLINT_MAX_WARNINGS}" != "-1" ]; then
      WARN_ARG="--max-warnings ${ESLINT_MAX_WARNINGS}"
    fi
    echo "Running ESLint..."
    npx eslint . \
      --format ${ESLINT_FORMAT} \
      --output-file lint-reports/eslint-results.json \
      ${WARN_ARG} || true
    run-logged lint-reports/eslint.log -- npx eslint . ${WARN_ARG}
  - "echo \"ESLint complete. Report available in lint-reports/\""
env:
  ESLINT_FORMAT: json
  ESLINT_MAX_WARNINGS: "-1"
