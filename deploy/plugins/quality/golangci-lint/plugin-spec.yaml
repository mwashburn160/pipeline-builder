name: golangci-lint
description: golangci-lint Go code quality plugin for running multiple Go linters in parallel with configurable rules using AWS CDK CodeBuildStep
keywords:
  - go
  - linter
  - multi-linter
  - code-quality
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: lint-reports
dockerfile: Dockerfile
installCommands:
  # Go + golangci-lint are baked into pipeline-go-base / this plugin's image.
  - test -d lint-reports || mkdir -p lint-reports
  - go version && golangci-lint --version
  # Download project dependencies (not tool setup).
  - if [ -f go.mod ]; then go mod download; fi
commands:
  - |
    set -e
    echo "Running golangci-lint..."
    # Report-only JSON (always written; never gates).
    golangci-lint run \
      --timeout ${GOLANGCI_LINT_TIMEOUT} \
      --out-format ${GOLANGCI_LINT_FORMAT} \
      > lint-reports/golangci-lint-results.json 2>/dev/null || true
    run-logged lint-reports/golangci-lint-summary.log -- golangci-lint run --timeout ${GOLANGCI_LINT_TIMEOUT}
  - "echo \"golangci-lint complete. Reports available in lint-reports/\""
env:
  # GO_VERSION is baked into pipeline-go-base (single-version model).
  GOLANGCI_LINT_TIMEOUT: 5m
  GOLANGCI_LINT_FORMAT: json
