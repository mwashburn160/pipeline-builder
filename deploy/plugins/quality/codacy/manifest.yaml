name: codacy
description: Codacy code quality and coverage reporting plugin for automated code review and coverage tracking using AWS CDK CodeBuildStep
keywords:
  - code-quality
  - coverage
  - multi-language
  - review
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets:
  - name: CODACY_PROJECT_TOKEN
    required: true
    description: "Codacy project API token"
primaryOutputDirectory: codacy-reports
dockerfile: Dockerfile
installCommands:
  - codacy-coverage-reporter version || echo "Codacy coverage reporter ready"
  - |
    if [ -z "${CODACY_PROJECT_TOKEN}" ]; then
      echo "WARNING: CODACY_PROJECT_TOKEN is not set. Coverage upload will fail."
      echo "Provide CODACY_PROJECT_TOKEN via CodeBuild secrets or environment variables."
    fi
commands:
  - mkdir -p codacy-reports
  # Auto-detect coverage files and upload to Codacy
  - |
    echo "Scanning for coverage files..."
    COVERAGE_FILE=""
    LANG_FLAG=""
    # Set language flag if specified
    if [ -n "${CODACY_LANGUAGE}" ]; then
      LANG_FLAG="--language ${CODACY_LANGUAGE}"
    fi
    # LCOV format (JavaScript/TypeScript)
    LCOV=$(find . -name "lcov.info" -not -path "*/node_modules/*" 2>/dev/null | head -1)
    if [ -n "${LCOV}" ]; then
      echo "Found LCOV coverage: ${LCOV}"
      COVERAGE_FILE="${LCOV}"
    fi
    # Cobertura XML format (Python/Java)
    if [ -z "${COVERAGE_FILE}" ]; then
      COBERTURA=$(find . -name "coverage.xml" -not -path "*/node_modules/*" 2>/dev/null | head -1)
      if [ -n "${COBERTURA}" ]; then
        echo "Found Cobertura coverage: ${COBERTURA}"
        COVERAGE_FILE="${COBERTURA}"
      fi
    fi
    # Python .coverage file
    if [ -z "${COVERAGE_FILE}" ]; then
      if [ -f .coverage ]; then
        echo "Found Python .coverage file"
        COVERAGE_FILE=".coverage"
      fi
    fi
    # JaCoCo XML format (Java)
    if [ -z "${COVERAGE_FILE}" ]; then
      JACOCO=$(find . -name "jacoco.xml" -not -path "*/node_modules/*" 2>/dev/null | head -1)
      if [ -n "${JACOCO}" ]; then
        echo "Found JaCoCo coverage: ${JACOCO}"
        COVERAGE_FILE="${JACOCO}"
      fi
    fi
    # Go coverage
    if [ -z "${COVERAGE_FILE}" ]; then
      GO_COV=$(find . -name "coverage.out" -o -name "cover.out" 2>/dev/null | head -1)
      if [ -n "${GO_COV}" ]; then
        echo "Found Go coverage: ${GO_COV}"
        COVERAGE_FILE="${GO_COV}"
      fi
    fi
    if [ -n "${COVERAGE_FILE}" ]; then
      codacy-coverage-reporter report \
        --project-token ${CODACY_PROJECT_TOKEN} \
        --coverage-reports "${COVERAGE_FILE}" \
        ${LANG_FLAG} \
        2>&1 | tee codacy-reports/codacy-upload.log || true
    else
      echo "No coverage files found. Run tests with coverage enabled first." | tee codacy-reports/codacy-upload.log
    fi
  - "echo \"Codacy coverage upload complete.\""
# CODACY_PROJECT_TOKEN must be provided at runtime via CodeBuild secrets or environment variables
# Do NOT define CODACY_PROJECT_TOKEN here or in the Dockerfile
env:
  CODACY_LANGUAGE: ""
