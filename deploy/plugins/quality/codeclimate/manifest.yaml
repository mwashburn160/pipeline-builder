name: codeclimate
description: Code Climate code quality and coverage reporting plugin for automated quality tracking and PR analysis using AWS CDK CodeBuildStep
keywords:
  - codeclimate
  - coverage
  - code-quality
  - reporting
  - code-review
  - ci
  - pipeline
  - quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets:
  - name: CC_TEST_REPORTER_ID
    required: true
    description: "Code Climate test reporter ID"
primaryOutputDirectory: codeclimate-reports
dockerfile: Dockerfile
installCommands:
  - cc-test-reporter version || echo "Code Climate test reporter ready"
  - |
    if [ -z "${CC_TEST_REPORTER_ID}" ]; then
      echo "WARNING: CC_TEST_REPORTER_ID is not set. Coverage upload will fail."
      echo "Provide CC_TEST_REPORTER_ID via CodeBuild secrets or environment variables."
    fi
commands:
  - mkdir -p codeclimate-reports
  # Notify Code Climate that a build is starting
  - cc-test-reporter before-build || true
  # Auto-detect coverage files and format for Code Climate
  - |
    echo "Scanning for coverage files..."
    COVERAGE_FILE=""
    INPUT_TYPE=""
    if [ -n "${CC_COVERAGE_FILE}" ]; then
      COVERAGE_FILE="${CC_COVERAGE_FILE}"
      echo "Using specified coverage file: ${COVERAGE_FILE}"
    else
      # LCOV format (JavaScript/TypeScript)
      LCOV=$(find . -name "lcov.info" -not -path "*/node_modules/*" 2>/dev/null | head -1)
      if [ -n "${LCOV}" ]; then
        echo "Found LCOV coverage: ${LCOV}"
        COVERAGE_FILE="${LCOV}"
        INPUT_TYPE="lcov"
      fi
      # Cobertura XML format (Python/Java)
      if [ -z "${COVERAGE_FILE}" ]; then
        COBERTURA=$(find . -name "coverage.xml" -not -path "*/node_modules/*" 2>/dev/null | head -1)
        if [ -n "${COBERTURA}" ]; then
          echo "Found Cobertura coverage: ${COBERTURA}"
          COVERAGE_FILE="${COBERTURA}"
          INPUT_TYPE="cobertura"
        fi
      fi
      # Python .coverage file
      if [ -z "${COVERAGE_FILE}" ]; then
        if [ -f .coverage ]; then
          echo "Found Python .coverage file"
          COVERAGE_FILE=".coverage"
          INPUT_TYPE="coverage.py"
        fi
      fi
      # JaCoCo XML format (Java)
      if [ -z "${COVERAGE_FILE}" ]; then
        JACOCO=$(find . -name "jacoco.xml" -not -path "*/node_modules/*" 2>/dev/null | head -1)
        if [ -n "${JACOCO}" ]; then
          echo "Found JaCoCo coverage: ${JACOCO}"
          COVERAGE_FILE="${JACOCO}"
          INPUT_TYPE="jacoco"
        fi
      fi
      # Go coverage
      if [ -z "${COVERAGE_FILE}" ]; then
        GO_COV=$(find . -name "coverage.out" -o -name "cover.out" 2>/dev/null | head -1)
        if [ -n "${GO_COV}" ]; then
          echo "Found Go coverage: ${GO_COV}"
          COVERAGE_FILE="${GO_COV}"
          INPUT_TYPE="gocov"
        fi
      fi
    fi
    if [ -n "${COVERAGE_FILE}" ]; then
      TYPE_FLAG=""
      if [ -n "${INPUT_TYPE}" ]; then
        TYPE_FLAG="--input-type ${INPUT_TYPE}"
      fi
      cc-test-reporter format-coverage \
        ${COVERAGE_FILE} \
        ${TYPE_FLAG} \
        --output codeclimate-reports/codeclimate.json \
        2>&1 | tee codeclimate-reports/codeclimate-format.log || true
    else
      echo "No coverage files found. Run tests with coverage enabled first." | tee codeclimate-reports/codeclimate-format.log
    fi
  # Submit coverage to Code Climate
  - cc-test-reporter after-build --exit-code 0 2>&1 | tee codeclimate-reports/codeclimate-upload.log || true
  - "echo \"Code Climate coverage upload complete.\""
# CC_TEST_REPORTER_ID must be provided at runtime via CodeBuild secrets or environment variables
# Do NOT define CC_TEST_REPORTER_ID here or in the Dockerfile
env:
  CC_COVERAGE_FILE: ""
