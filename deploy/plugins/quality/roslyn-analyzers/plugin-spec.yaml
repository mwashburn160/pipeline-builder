name: roslyn-analyzers
description: Roslyn analyzers plugin for enforcing code quality rules and treating warnings as errors in .NET builds using AWS CDK CodeBuildStep
keywords:
  - dotnet
  - csharp
  - static-analysis
  - code-quality
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: analysis-reports
dockerfile: Dockerfile
installCommands:
  # .NET SDK (Roslyn analyzers run inside `dotnet build`) is baked into
  # pipeline-dotnet-base.
  - test -d analysis-reports || mkdir -p analysis-reports
  - dotnet --version
commands:
  - |
    set -e
    echo "Running Roslyn analyzers..."
    run-logged analysis-reports/roslyn.log -- \
      dotnet build \
        /p:TreatWarningsAsErrors=${TREAT_WARNINGS_AS_ERRORS} \
        /p:EnforceCodeStyleInBuild=true
  - "echo \"Roslyn analysis complete. Reports available in analysis-reports/\""
env:
  TREAT_WARNINGS_AS_ERRORS: "true"
