name: coverage-report
description: Code coverage aggregation plugin for collecting and validating test coverage across JavaScript, Python, Java, and Go projects using AWS CDK CodeBuildStep
keywords:
  - coverage
  - istanbul
  - nyc
  - jacoco
  - lcov
  - code-quality
  - testing
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: fail
secrets: []
primaryOutputDirectory: coverage-reports
dockerfile: Dockerfile
installCommands:
  - node -v && npm -v
  - python3 --version
  - nyc --version
  - coverage --version
commands:
  - mkdir -p coverage-reports
  # Detect and aggregate coverage reports
  - |
    echo "Scanning for coverage reports..."
    FOUND=false
    # Istanbul/NYC (JavaScript/TypeScript)
    if [ -d coverage ] || [ -f .nyc_output ]; then
      FOUND=true
      echo "Found Istanbul/NYC coverage data"
      if [ -d .nyc_output ]; then
        nyc report --reporter=json-summary --report-dir=coverage-reports/js
        nyc report --reporter=text | tee coverage-reports/js-coverage-summary.txt
      elif [ -f coverage/coverage-summary.json ]; then
        cp coverage/coverage-summary.json coverage-reports/js-coverage-summary.json
      fi
      if [ -f coverage/lcov.info ]; then
        cp coverage/lcov.info coverage-reports/lcov.info
      fi
    fi
    # coverage.py (Python)
    if [ -f .coverage ] || [ -d htmlcov ]; then
      FOUND=true
      echo "Found Python coverage data"
      coverage json -o coverage-reports/python-coverage.json 2>/dev/null || true
      coverage report --format=text | tee coverage-reports/python-coverage-summary.txt 2>/dev/null || true
    fi
    # JaCoCo (Java)
    JACOCO=$(find . -name "jacoco.xml" -not -path "*/node_modules/*" 2>/dev/null | head -1)
    if [ -n "${JACOCO}" ]; then
      FOUND=true
      echo "Found JaCoCo coverage report: ${JACOCO}"
      cp "${JACOCO}" coverage-reports/jacoco.xml
    fi
    # Go coverage
    GO_COV=$(find . -name "coverage.out" -o -name "cover.out" 2>/dev/null | head -1)
    if [ -n "${GO_COV}" ]; then
      FOUND=true
      echo "Found Go coverage report: ${GO_COV}"
      cp "${GO_COV}" coverage-reports/go-coverage.out
    fi
    if [ "${FOUND}" = "false" ]; then
      echo "No coverage data found. Run tests with coverage enabled first."
    fi
  # Validate coverage threshold
  - |
    if [ -f coverage-reports/js-coverage-summary.txt ]; then
      echo "--- JavaScript/TypeScript Coverage ---"
      cat coverage-reports/js-coverage-summary.txt
    fi
    if [ -f coverage-reports/python-coverage-summary.txt ]; then
      echo "--- Python Coverage ---"
      cat coverage-reports/python-coverage-summary.txt
    fi
    echo "Coverage threshold: ${COVERAGE_THRESHOLD}%"
  - "echo \"Coverage report complete. Reports available in coverage-reports/\""
env:
  COVERAGE_THRESHOLD: "80"
  COVERAGE_FORMAT: text
