name: typescript-check
description: TypeScript type checking plugin for verifying type correctness without emitting output using AWS CDK CodeBuildStep
keywords:
  - typescript
  - type-checking
  - static-analysis
  - types
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: tsc-reports
dockerfile: Dockerfile
installCommands:
  # Node + npm are baked into pipeline-node-base; TypeScript (tsc) pinned + baked.
  - test -d tsc-reports || mkdir -p tsc-reports
  - node --version && tsc --version
  # Install project dependencies (a project-pinned TypeScript wins via npx).
  - |
    set -e
    if [ -f pnpm-lock.yaml ]; then
      npm install -g pnpm && pnpm install --frozen-lockfile
    elif [ -f yarn.lock ]; then
      npm install -g yarn && yarn install --frozen-lockfile
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
commands:
  - |
    set -e
    echo "Running TypeScript type check..."
    run-logged tsc-reports/tsc.log -- npx tsc ${TSC_FLAGS}
  - "echo \"TypeScript check complete. Reports available in tsc-reports/\""
env:
  TSC_FLAGS: "--noEmit"
