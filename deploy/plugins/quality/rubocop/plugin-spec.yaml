name: rubocop
description: RuboCop linting and formatting plugin for enforcing Ruby code style and best practices using AWS CDK CodeBuildStep
keywords:
  - ruby
  - linter
  - code-style
  - formatting
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: lint-reports
dockerfile: Dockerfile
installCommands:
  # Ruby + rubocop are baked into pipeline-ruby-base (single pinned version).
  - test -d lint-reports || mkdir -p lint-reports
  - ruby --version && rubocop --version
  - if [ -f Gemfile ]; then bundle install; fi
commands:
  - |
    set -e
    echo "Running RuboCop..."
    CONFIG_ARG=""
    if [ -n "${RUBOCOP_CONFIG}" ] && [ -f "${RUBOCOP_CONFIG}" ]; then
      CONFIG_ARG="--config ${RUBOCOP_CONFIG}"
    fi
    # Report-only JSON (always written; never gates).
    rubocop --parallel ${CONFIG_ARG} \
      --format json --out lint-reports/rubocop-results.json \
      2>&1 || true
    run-logged lint-reports/rubocop.log -- rubocop --parallel ${CONFIG_ARG}
  - "echo \"RuboCop complete. Reports available in lint-reports/\""
env:
  # RUBY_VERSION is baked into pipeline-ruby-base (single-version model).
  RUBOCOP_CONFIG: ".rubocop.yml"
