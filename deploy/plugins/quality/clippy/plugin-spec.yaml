name: clippy
description: Clippy linting plugin for catching common mistakes and enforcing idiomatic Rust patterns using AWS CDK CodeBuildStep
keywords:
  - rust
  - linter
  - static-analysis
  - idioms
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: lint-reports
dockerfile: Dockerfile
installCommands:
  # Rust + clippy are baked into pipeline-rust-base (single pinned version).
  - test -d lint-reports || mkdir -p lint-reports
  - cargo --version
  - if [ -f Cargo.toml ]; then cargo fetch; fi
commands:
  - |
    set -e
    echo "Running Clippy..."
    run-logged lint-reports/clippy.log -- cargo clippy --all-targets --all-features -- ${CLIPPY_FLAGS}
  - "echo \"Clippy complete. Reports available in lint-reports/\""
env:
  CLIPPY_FLAGS: "-D warnings"
