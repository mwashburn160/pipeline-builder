name: mypy
description: mypy static type checking plugin for verifying Python type annotations and detecting type errors using AWS CDK CodeBuildStep
keywords:
  - python
  - type-checking
  - static-analysis
  - types
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: warn
secrets: []
primaryOutputDirectory: mypy-reports
dockerfile: Dockerfile
installCommands:
  # Python + mypy are baked into pipeline-python-base (single pinned version).
  - test -d mypy-reports || mkdir -p mypy-reports
  - python3 --version && mypy --version
  # Install user PROJECT deps so mypy can resolve imports (not tool setup).
  - |
    set -e
    if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    if [ -f pyproject.toml ]; then pip install -e '.[dev]' 2>/dev/null || true; fi
commands:
  - |
    set -e
    echo "Running mypy type check..."
    CONFIG_ARG=""
    if [ -n "${MYPY_CONFIG}" ] && [ -f "${MYPY_CONFIG}" ]; then
      CONFIG_ARG="--config-file ${MYPY_CONFIG}"
    fi
    run-logged mypy-reports/mypy.log -- mypy . ${CONFIG_ARG} --junit-xml mypy-reports/mypy-results.xml
  - "echo \"mypy check complete. Reports available in mypy-reports/\""
env:
  # PYTHON_VERSION is baked into pipeline-python-base (single-version model).
  MYPY_CONFIG: ""
