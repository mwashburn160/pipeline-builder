name: checkstyle
description: Checkstyle Java code style enforcement plugin supporting Google, Sun, and custom rule sets using AWS CDK CodeBuildStep
keywords:
  - java
  - code-style
  - linter
  - formatting
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: checkstyle-reports
dockerfile: Dockerfile
installCommands:
  # JDK is baked into pipeline-jvm-base (java on PATH); Checkstyle is a single
  # pinned jar baked at /opt/checkstyle/checkstyle.jar.
  - test -d checkstyle-reports || mkdir -p checkstyle-reports
  - java -version
  - java -jar /opt/checkstyle/checkstyle.jar --version
commands:
  - |
    set -e
    # Resolve config file
    case "${CHECKSTYLE_CONFIG}" in
      google)  CONFIG_FILE="/opt/checkstyle/configs/google_checks.xml" ;;
      sun)     CONFIG_FILE="/opt/checkstyle/configs/sun_checks.xml" ;;
      *)
        if [ -f "${CHECKSTYLE_CONFIG}" ]; then
          CONFIG_FILE="${CHECKSTYLE_CONFIG}"
        else
          echo "ERROR: Config '${CHECKSTYLE_CONFIG}' not found. Supported: google, sun, or path to XML file"
          exit 1
        fi
        ;;
    esac
    echo "Running Checkstyle with config: ${CONFIG_FILE}"
    run-logged checkstyle-reports/checkstyle.log -- java -jar /opt/checkstyle/checkstyle.jar \
      -c "${CONFIG_FILE}" \
      -f xml \
      -o checkstyle-reports/checkstyle-results.xml \
      -r src/
  - "echo \"Checkstyle complete. Report available in checkstyle-reports/\""
env:
  # Checkstyle version + JDK are single-versioned in the image (bump the
  # Dockerfile ARG / jvm-base to change).
  CHECKSTYLE_CONFIG: google
