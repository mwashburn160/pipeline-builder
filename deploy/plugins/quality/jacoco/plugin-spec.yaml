name: jacoco
description: JaCoCo code coverage plugin for measuring and enforcing test coverage thresholds in Java projects using AWS CDK CodeBuildStep
keywords:
  - java
  - coverage
  - threshold
  - reporting
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 20
failureBehavior: warn
secrets: []
primaryOutputDirectory: coverage-reports
dockerfile: Dockerfile
installCommands:
  - test -d coverage-reports || mkdir -p coverage-reports
  - java -version
  - |
    set -e
    if [ -f gradlew ]; then chmod +x gradlew; fi
    if [ -f mvnw ]; then chmod +x mvnw; fi
commands:
  - |
    set -e
    echo "Running JaCoCo coverage report..."
    if [ -f gradlew ]; then
      ./gradlew jacocoTestReport --no-daemon 2>&1 | tee coverage-reports/jacoco.log || true
      # COVERAGE_THRESHOLD is surfaced as a Gradle project property; the project's
      # build.gradle jacocoTestCoverageVerification violationRules must read
      # project.coverageThreshold for it to take effect. This is the real gate —
      # run-logged streams to the log AND exits with Gradle's true status.
      run-logged coverage-reports/jacoco-verify.log -- ./gradlew jacocoTestCoverageVerification -PcoverageThreshold=${COVERAGE_THRESHOLD} --no-daemon || _rc=$?
    elif [ -f mvnw ]; then
      ./mvnw jacoco:report 2>&1 | tee coverage-reports/jacoco.log || true
    elif [ -f pom.xml ]; then
      mvn jacoco:report 2>&1 | tee coverage-reports/jacoco.log || true
    else
      gradle jacocoTestReport --no-daemon 2>&1 | tee coverage-reports/jacoco.log || true
    fi
    if [ "${_rc:-0}" -ne 0 ]; then
      echo "JaCoCo coverage verification failed:" >&2
      cat coverage-reports/jacoco-verify.log
      exit "${_rc}"
    fi
  - |
    set -e
    if [ -d build/reports/jacoco ]; then
      cp -r build/reports/jacoco/* coverage-reports/ 2>/dev/null || true
    fi
    if [ -d target/site/jacoco ]; then
      cp -r target/site/jacoco/* coverage-reports/ 2>/dev/null || true
    fi
  - "echo \"JaCoCo coverage complete. Reports available in coverage-reports/\""
env:
  # JDK is single-versioned in pipeline-jvm-base (bump the base to change).
  COVERAGE_THRESHOLD: "70"
