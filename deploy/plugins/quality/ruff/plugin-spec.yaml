name: ruff
description: Ruff Python linter and formatter plugin for enforcing code quality and consistent formatting using AWS CDK CodeBuildStep
keywords:
  - python
  - linter
  - formatter
  - code-quality
category: quality
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 10
failureBehavior: warn
secrets: []
primaryOutputDirectory: lint-reports
dockerfile: Dockerfile
installCommands:
  # Python + ruff are baked into pipeline-python-base (single pinned version).
  - test -d lint-reports || mkdir -p lint-reports
  - python3 --version && ruff --version
commands:
  - |
    set -e
    echo "Running Ruff linter..."
    RUFF_CFG=""
    if [ -n "${RUFF_CONFIG}" ]; then RUFF_CFG="--config ${RUFF_CONFIG}"; fi
    ruff check . ${RUFF_CFG} --output-format json > lint-reports/ruff-check.json 2>&1 || true
    run-logged lint-reports/ruff-check.log -- ruff check . ${RUFF_CFG}
  - |
    set -e
    echo "Running Ruff formatter check..."
    RUFF_CFG=""
    if [ -n "${RUFF_CONFIG}" ]; then RUFF_CFG="--config ${RUFF_CONFIG}"; fi
    run-logged lint-reports/ruff-format.log -- ruff format --check . ${RUFF_CFG}
  - "echo \"Ruff analysis complete. Reports available in lint-reports/\""
env:
  # PYTHON_VERSION is baked into pipeline-python-base (single-version model).
  RUFF_CONFIG: pyproject.toml
