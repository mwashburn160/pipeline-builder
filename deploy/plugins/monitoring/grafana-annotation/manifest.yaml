name: grafana-annotation
description: Grafana annotation plugin for marking deployments and pipeline events on Grafana dashboards via HTTP API using AWS CDK CodeBuildStep
keywords:
  - grafana
  - annotation
  - monitoring
  - dashboard
  - deploy
  - observability
  - ci
  - pipeline
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 5
failureBehavior: warn
secrets:
  - name: GRAFANA_API_KEY
    required: true
    description: "Grafana API key or service account token"
primaryOutputDirectory: grafana-output
dockerfile: Dockerfile
installCommands:
  - curl --version | head -1
  - jq --version
commands:
  - mkdir -p grafana-output
  - |
    if [ -z "${GRAFANA_URL}" ]; then
      echo "ERROR: GRAFANA_URL must be set"
      exit 1
    fi
    TIMESTAMP_MS=$(($(date +%s) * 1000))
    TAGS=$(echo "${GRAFANA_TAGS}" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$";""))')
    SERVICE="${SERVICE_NAME:-unknown}"
    VERSION="${SERVICE_VERSION:-unknown}"
    TEXT="Deployed ${SERVICE} v${VERSION} to ${ENVIRONMENT}"
    PAYLOAD=$(jq -n \
      --argjson time "${TIMESTAMP_MS}" \
      --argjson tags "${TAGS}" \
      --arg text "${TEXT}" \
      '{time: $time, tags: $tags, text: $text}')
    if [ -n "${GRAFANA_DASHBOARD_ID}" ]; then
      PAYLOAD=$(echo "${PAYLOAD}" | jq --argjson id "${GRAFANA_DASHBOARD_ID}" '. + {dashboardId: $id}')
    fi
    echo "Posting annotation to Grafana..."
    echo "${PAYLOAD}" | jq '.' | tee grafana-output/annotation-payload.json
    HTTP_STATUS=$(curl -s -o grafana-output/annotation-response.json -w "%{http_code}" \
      -X POST \
      -H "Authorization: Bearer ${GRAFANA_API_KEY}" \
      -H "Content-Type: application/json" \
      -d "${PAYLOAD}" \
      "${GRAFANA_URL}/api/annotations")
    if [ "${HTTP_STATUS}" = "200" ]; then
      echo "Annotation posted successfully"
    else
      echo "WARNING: Grafana returned HTTP ${HTTP_STATUS}"
      cat grafana-output/annotation-response.json
    fi
  - "echo \"Grafana annotation complete.\""
env:
  GRAFANA_URL: ""
  GRAFANA_DASHBOARD_ID: ""
  GRAFANA_TAGS: deploy
  SERVICE_NAME: ""
  SERVICE_VERSION: ""
  ENVIRONMENT: production
