name: prometheus-pushgateway
description: Prometheus Pushgateway plugin for pushing pipeline build metrics and deployment markers to Prometheus monitoring using AWS CDK CodeBuildStep
keywords:
  - prometheus
  - pushgateway
  - metrics
  - monitoring
  - observability
  - deploy
  - ci
  - pipeline
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 5
failureBehavior: warn
secrets: []
primaryOutputDirectory: metrics-output
dockerfile: Dockerfile
installCommands:
  - curl --version | head -1
commands:
  - mkdir -p metrics-output
  - |
    if [ -z "${PUSHGATEWAY_URL}" ]; then
      echo "ERROR: PUSHGATEWAY_URL must be set (e.g., http://pushgateway:9091)"
      exit 1
    fi
    TIMESTAMP=$(date +%s)
    SERVICE="${SERVICE_NAME:-unknown}"
    # Build Prometheus text format metrics
    METRICS="# HELP pipeline_deploy_timestamp Unix timestamp of the last deployment
# TYPE pipeline_deploy_timestamp gauge
pipeline_deploy_timestamp{service=\"${SERVICE}\",environment=\"${ENVIRONMENT}\"} ${TIMESTAMP}
# HELP pipeline_build_status Build status (1=success, 0=failure)
# TYPE pipeline_build_status gauge
pipeline_build_status{service=\"${SERVICE}\",environment=\"${ENVIRONMENT}\"} ${BUILD_STATUS}
# HELP pipeline_deploy_total Total number of deployments
# TYPE pipeline_deploy_total counter
pipeline_deploy_total{service=\"${SERVICE}\",environment=\"${ENVIRONMENT}\"} 1
"
    echo "${METRICS}" | tee metrics-output/metrics.txt
    echo "Pushing metrics to ${PUSHGATEWAY_URL}..."
    HTTP_STATUS=$(echo "${METRICS}" | curl -s -o metrics-output/push-response.txt -w "%{http_code}" \
      --data-binary @- \
      "${PUSHGATEWAY_URL}/metrics/job/${JOB_NAME}/instance/${SERVICE}")
    if [ "${HTTP_STATUS}" = "200" ] || [ "${HTTP_STATUS}" = "202" ]; then
      echo "Metrics pushed successfully"
    else
      echo "WARNING: Pushgateway returned HTTP ${HTTP_STATUS}"
      cat metrics-output/push-response.txt
    fi
  - "echo \"Prometheus metrics push complete.\""
env:
  PUSHGATEWAY_URL: ""
  JOB_NAME: pipeline
  SERVICE_NAME: ""
  ENVIRONMENT: production
  BUILD_STATUS: "1"
