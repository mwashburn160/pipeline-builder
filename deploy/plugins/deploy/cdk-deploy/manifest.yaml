name: cdk-deploy
description: AWS CDK single-region deployment plugin for synthesizing and deploying CDK stacks with rollback support, diff preview, and hotswap using AWS CDK CodeBuildStep
keywords:
  - aws
  - cdk
  - deploy
  - cloudformation
  - typescript
  - infrastructure
  - iac
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 45
failureBehavior: fail
secrets: []
primaryOutputDirectory: cdk-output
metadata:
  aws:cdk:pipelines:codepipeline:dockerenabledforselfmutation: true
  aws:cdk:codebuild:buildenvironment:privileged: true
dockerfile: Dockerfile
installCommands:
  - node -v && npm -v
  - cdk --version
  - aws --version
  # Install project dependencies
  - |
    if [ -f pnpm-lock.yaml ]; then
      npm install -g pnpm && pnpm install --frozen-lockfile
    elif [ -f yarn.lock ]; then
      npm install -g yarn && yarn install --frozen-lockfile
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
  # Build TypeScript if applicable
  - |
    if [ -f tsconfig.json ]; then
      echo "Building TypeScript..."
      npm run build 2>/dev/null || npx tsc 2>/dev/null || true
    fi
commands:
  - mkdir -p cdk-output
  # Bootstrap check
  - |
    echo "Target: account=${CDK_DEFAULT_ACCOUNT}, region=${CDK_DEFAULT_REGION}"
    STACK_ARG=""
    if [ -n "${CDK_STACK}" ]; then
      STACK_ARG="${CDK_STACK}"
      echo "Stack: ${CDK_STACK}"
    else
      echo "Deploying all stacks"
    fi
    CONTEXT_ARG=""
    if [ -n "${CDK_CONTEXT}" ]; then
      IFS=',' read -ra CONTEXTS <<< "${CDK_CONTEXT}"
      for ctx in "${CONTEXTS[@]}"; do
        CONTEXT_ARG="${CONTEXT_ARG} -c ${ctx}"
      done
    fi
  # Execute CDK action
  - |
    STACK_ARG=""
    if [ -n "${CDK_STACK}" ]; then STACK_ARG="${CDK_STACK}"; fi
    CONTEXT_ARG=""
    if [ -n "${CDK_CONTEXT}" ]; then
      IFS=',' read -ra CONTEXTS <<< "${CDK_CONTEXT}"
      for ctx in "${CONTEXTS[@]}"; do
        CONTEXT_ARG="${CONTEXT_ARG} -c ${ctx}"
      done
    fi
    case "${CDK_DEPLOY_ACTION}" in
      diff)
        echo "Running CDK diff..."
        cdk diff ${STACK_ARG} ${CONTEXT_ARG} --no-notices 2>&1 | tee cdk-output/cdk-diff.txt
        ;;
      deploy)
        echo "Running CDK deploy..."
        HOTSWAP_ARG=""
        if [ "${CDK_HOTSWAP}" = "true" ]; then
          HOTSWAP_ARG="--hotswap-fallback"
          echo "Hotswap mode enabled (with fallback to full deploy)"
        fi
        cdk deploy ${STACK_ARG} \
          --require-approval ${CDK_REQUIRE_APPROVAL} \
          --outputs-file cdk-output/${CDK_OUTPUTS_FILE} \
          ${HOTSWAP_ARG} \
          ${CONTEXT_ARG} \
          --no-notices \
          --ci \
          2>&1 | tee cdk-output/cdk-deploy.log
        echo "Stack outputs:"
        cat cdk-output/${CDK_OUTPUTS_FILE} 2>/dev/null || echo "No outputs"
        ;;
      destroy)
        echo "Running CDK destroy..."
        cdk destroy ${STACK_ARG} \
          --force \
          ${CONTEXT_ARG} \
          --no-notices \
          2>&1 | tee cdk-output/cdk-destroy.log
        ;;
      synth)
        echo "Running CDK synth..."
        cdk synth ${STACK_ARG} \
          ${CONTEXT_ARG} \
          --quiet \
          --no-notices
        cp -r cdk.out/* cdk-output/ 2>/dev/null || true
        ;;
      *)
        echo "ERROR: Unknown CDK_DEPLOY_ACTION '${CDK_DEPLOY_ACTION}'. Supported: diff, deploy, destroy, synth"
        exit 1
        ;;
    esac
  - "echo \"CDK ${CDK_DEPLOY_ACTION} complete. Output available in cdk-output/\""
env:
  CDK_DEFAULT_REGION: ${AWS_REGION}
  CDK_DEFAULT_ACCOUNT: ${AWS_ACCOUNT_ID}
  CDK_DEPLOY_ACTION: deploy
  CDK_STACK: ""
  CDK_CONTEXT: ""
  CDK_REQUIRE_APPROVAL: never
  CDK_HOTSWAP: "false"
  CDK_OUTPUTS_FILE: cdk-outputs.json
