name: fastlane
description: Fastlane mobile build and distribution plugin for Android builds and lane execution with Ruby 3.3, Android SDK, and Bundler support via AWS CDK CodeBuildStep
keywords:
  - fastlane
  - mobile
  - android
  - ios
  - deploy
  - build
  - ruby
version: 1.0.0
pluginType: CodeBuildStep
computeType: LARGE
timeout: 45
failureBehavior: fail
primaryOutputDirectory: fastlane-output
dockerfile: Dockerfile
secrets:
  - name: FASTLANE_SESSION
    required: false
    description: "Apple session cookie for iOS builds"
  - name: MATCH_PASSWORD
    required: false
    description: "Fastlane match encryption password for iOS code signing"
  - name: SUPPLY_JSON_KEY
    required: false
    description: "Google Play service account JSON for Android distribution"
installCommands:
  - ruby --version
  - fastlane --version
  - java --version
commands:
  - mkdir -p fastlane-output
  # Install bundle dependencies if Gemfile exists
  - |
    if [ "${BUNDLE_INSTALL}" = "true" ] && [ -f "Gemfile" ]; then
      echo "Installing bundle dependencies..."
      bundle install
    fi
  # Write Google Play service account key if provided
  - |
    if [ -n "${SUPPLY_JSON_KEY}" ]; then
      echo "Writing Google Play service account key..."
      echo "${SUPPLY_JSON_KEY}" > /tmp/play-store-key.json
      export SUPPLY_JSON_KEY_PATH=/tmp/play-store-key.json
    fi
  # Run Fastlane
  - |
    if [ -z "${FASTLANE_PLATFORM}" ]; then
      echo "Running: fastlane ${FASTLANE_LANE}"
      bundle exec fastlane ${FASTLANE_LANE} 2>&1 | tee fastlane-output/fastlane-result.txt
    else
      echo "Running: fastlane ${FASTLANE_PLATFORM} ${FASTLANE_LANE}"
      bundle exec fastlane ${FASTLANE_PLATFORM} ${FASTLANE_LANE} 2>&1 | tee fastlane-output/fastlane-result.txt
    fi
  - "echo \"Fastlane ${FASTLANE_LANE} complete. Output available in fastlane-output/\""
env:
  FASTLANE_LANE: build
  FASTLANE_PLATFORM: ""
  BUNDLE_INSTALL: "true"
  ANDROID_SDK_ROOT: /opt/android-sdk
