name: helm-deploy
description: Helm chart deployment plugin for Kubernetes with install, upgrade, uninstall, and template actions including EKS authentication support via AWS CDK CodeBuildStep
keywords:
  - kubernetes
  - helm
  - chart
  - deploy
category: deploy
version: 1.1.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
primaryOutputDirectory: helm-output
dockerfile: Dockerfile

# Pipeline contract — templates reference pipeline.metadata.* via `| default:` so
# existing pipelines keep working without changes.
requiredMetadata: []
requiredVars: []
metadataTypes:
  namespace: string
  helmRelease: string
  helmChart: string
  helmTimeoutSeconds: number

secrets:
  - name: KUBECONFIG_DATA
    required: false
    description: "Base64-encoded kubeconfig; not needed if running in EKS with IAM role"
installCommands:
  - test -d helm-output || mkdir -p helm-output
  - helm version --short
  - kubectl version --client --output=json
  - aws --version
commands:
  # Decode kubeconfig if provided
  - |
    set -e
    if [ -n "${KUBECONFIG_DATA}" ]; then
      echo "Decoding provided KUBECONFIG_DATA..."
      mkdir -p ~/.kube
      echo "${KUBECONFIG_DATA}" | base64 -d > ~/.kube/config
      chmod 600 ~/.kube/config
      export KUBECONFIG=~/.kube/config
    fi
  # Add Helm repo if HELM_REPO_URL is set
  - |
    set -e
    if [ -n "${HELM_REPO_URL}" ]; then
      REPO_NAME="${HELM_REPO_NAME:-helm-repo}"
      echo "Adding Helm repo: ${REPO_NAME} -> ${HELM_REPO_URL}"
      helm repo add "${REPO_NAME}" "${HELM_REPO_URL}"
      helm repo update
    fi
  # Execute Helm action
  - |
    set -e
    VALUES_ARGS=""
    if [ -n "${HELM_VALUES_FILE}" ]; then
      VALUES_ARGS="-f ${HELM_VALUES_FILE}"
    fi
    SET_ARGS=""
    if [ -n "${HELM_SET_VALUES}" ]; then
      SET_ARGS="--set ${HELM_SET_VALUES}"
    fi
    ATOMIC_ARG=""
    if [ "${HELM_ATOMIC}" = "true" ]; then
      ATOMIC_ARG="--atomic"
    fi

    case "${HELM_ACTION}" in
      install)
        echo "Installing Helm release: ${HELM_RELEASE} from chart: ${HELM_CHART}"
        helm install "${HELM_RELEASE}" "${HELM_CHART}" \
          --namespace "${HELM_NAMESPACE}" \
          --create-namespace \
          --timeout "${HELM_TIMEOUT}" \
          ${ATOMIC_ARG} \
          ${VALUES_ARGS} \
          ${SET_ARGS} \
          | tee helm-output/install-result.txt
        ;;
      upgrade)
        echo "Upgrading Helm release: ${HELM_RELEASE} from chart: ${HELM_CHART}"
        helm upgrade "${HELM_RELEASE}" "${HELM_CHART}" \
          --install \
          --namespace "${HELM_NAMESPACE}" \
          --create-namespace \
          --timeout "${HELM_TIMEOUT}" \
          ${ATOMIC_ARG} \
          ${VALUES_ARGS} \
          ${SET_ARGS} \
          | tee helm-output/upgrade-result.txt
        ;;
      uninstall)
        echo "Uninstalling Helm release: ${HELM_RELEASE}"
        helm uninstall "${HELM_RELEASE}" \
          --namespace "${HELM_NAMESPACE}" \
          --timeout "${HELM_TIMEOUT}" \
          | tee helm-output/uninstall-result.txt
        ;;
      template)
        echo "Rendering template for chart: ${HELM_CHART}"
        helm template "${HELM_RELEASE}" "${HELM_CHART}" \
          --namespace "${HELM_NAMESPACE}" \
          ${VALUES_ARGS} \
          ${SET_ARGS} \
          | tee helm-output/template-result.yaml
        ;;
      *)
        echo "ERROR: Unknown HELM_ACTION '${HELM_ACTION}'. Supported: install, upgrade, uninstall, template"
        exit 1
        ;;
    esac
  - "echo \"Helm ${HELM_ACTION} complete. Output available in helm-output/\""
env:
  # Template defaults pulled from pipeline.metadata — per-step overrides via env: customization.
  HELM_RELEASE: "{{ pipeline.metadata.helmRelease | default: '' }}"
  HELM_CHART: "{{ pipeline.metadata.helmChart | default: '' }}"
  HELM_NAMESPACE: "{{ pipeline.metadata.namespace | default: 'default' }}"
  HELM_ACTION: upgrade
  HELM_VALUES_FILE: ""
  HELM_SET_VALUES: ""
  HELM_TIMEOUT: "{{ pipeline.metadata.helmTimeoutSeconds | default: '300' }}s"
  HELM_ATOMIC: "true"
  HELM_REPO_URL: ""
  HELM_REPO_NAME: ""

# Smoke test — runs after `docker build` in test-plugins.sh --build.
# Asserts the tool is on PATH and produces a deterministic version output.
smokeTest: "helm version --short && kubectl version --client"
