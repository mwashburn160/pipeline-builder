name: flyway
description: Flyway database migration plugin supporting migrate, repair, info, validate, and clean actions via AWS CDK CodeBuildStep
keywords:
  - database
  - migration
  - flyway
  - schema
category: deploy
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 30
failureBehavior: fail
primaryOutputDirectory: flyway-output
dockerfile: Dockerfile
secrets:
  - name: FLYWAY_USER
    required: true
    description: "Database username for Flyway connection"
  - name: FLYWAY_PASSWORD
    required: true
    description: "Database password for Flyway connection"
installCommands:
  - test -d flyway-output || mkdir -p flyway-output
  - flyway --version
  - java --version
commands:
  # Validate required parameters
  - |
    set -e
    if [ -z "${FLYWAY_URL}" ]; then
      echo "ERROR: FLYWAY_URL must be set (e.g., jdbc:postgresql://host:5432/db)"
      exit 1
    fi
  # Build Flyway arguments
  - |
    set -e
    FLYWAY_ARGS="-url=${FLYWAY_URL} -user=${FLYWAY_USER} -password=${FLYWAY_PASSWORD}"
    if [ -n "${FLYWAY_SCHEMAS}" ]; then
      FLYWAY_ARGS="${FLYWAY_ARGS} -schemas=${FLYWAY_SCHEMAS}"
    fi
    FLYWAY_ARGS="${FLYWAY_ARGS} -locations=${FLYWAY_LOCATIONS}"
    FLYWAY_ARGS="${FLYWAY_ARGS} -baselineOnMigrate=${FLYWAY_BASELINE_ON_MIGRATE}"
    FLYWAY_ARGS="${FLYWAY_ARGS} -outOfOrder=${FLYWAY_OUT_OF_ORDER}"

    case "${FLYWAY_ACTION}" in
      migrate)
        echo "Running Flyway migrate..."
        # Capture flyway's real exit (POSIX has no PIPESTATUS): redirect, then cat.
        _rc=0
        flyway ${FLYWAY_ARGS} migrate > flyway-output/migrate-result.txt 2>&1 || _rc=$?
        cat flyway-output/migrate-result.txt
        [ "${_rc:-0}" -eq 0 ]
        ;;
      repair)
        echo "Running Flyway repair..."
        _rc=0
        flyway ${FLYWAY_ARGS} repair > flyway-output/repair-result.txt 2>&1 || _rc=$?
        cat flyway-output/repair-result.txt
        [ "${_rc:-0}" -eq 0 ]
        ;;
      info)
        echo "Running Flyway info..."
        flyway ${FLYWAY_ARGS} info | tee flyway-output/info-result.txt
        ;;
      validate)
        echo "Running Flyway validate..."
        _rc=0
        flyway ${FLYWAY_ARGS} validate > flyway-output/validate-result.txt 2>&1 || _rc=$?
        cat flyway-output/validate-result.txt
        [ "${_rc:-0}" -eq 0 ]
        ;;
      clean)
        echo "WARNING: Running Flyway clean — this will drop all objects in the schemas!"
        _rc=0
        flyway ${FLYWAY_ARGS} -cleanDisabled=false clean > flyway-output/clean-result.txt 2>&1 || _rc=$?
        cat flyway-output/clean-result.txt
        [ "${_rc:-0}" -eq 0 ]
        ;;
      *)
        echo "ERROR: Unknown FLYWAY_ACTION '${FLYWAY_ACTION}'. Supported: migrate, repair, info, validate, clean"
        exit 1
        ;;
    esac
  - "echo \"Flyway ${FLYWAY_ACTION} complete. Output available in flyway-output/\""
env:
  FLYWAY_URL: ""
  FLYWAY_SCHEMAS: ""
  FLYWAY_LOCATIONS: "filesystem:./sql"
  FLYWAY_ACTION: migrate
  FLYWAY_BASELINE_ON_MIGRATE: "false"
  FLYWAY_OUT_OF_ORDER: "false"

# Smoke test — runs after `docker build` in test-plugins.sh --build.
# Asserts the tool is on PATH and reports a version. Exit non-zero = test fail.
smokeTest: "flyway --version"
