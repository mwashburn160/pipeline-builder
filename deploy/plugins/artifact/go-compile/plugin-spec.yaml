name: go-compile
description: Go binary compile plugin for compiling static Go binaries with cross-compilation support using AWS CDK CodeBuildStep
keywords:
  - go
  - binary
  - cross-compilation
  - compile
category: artifact
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 20
failureBehavior: fail
secrets: []
primaryOutputDirectory: bin
dockerfile: Dockerfile
installCommands:
  # Go is baked into pipeline-go-base (single pinned version).
  - test -d bin || mkdir -p bin
  - go version
  # Download project dependencies (not tool setup).
  - if [ -f go.mod ]; then go mod download; fi
commands:
  - |
    set -e
    echo "Building Go binary..."
    # env passes the cross-compile knobs through run-logged to `go build`, which
    # streams to console + bin/build.log and preserves go build's real exit code.
    run-logged bin/build.log -- env CGO_ENABLED="${CGO_ENABLED}" GOOS="${GOOS}" GOARCH="${GOARCH}" go build -ldflags='-s -w' -o bin/ ./...
  - "echo \"Go build complete. Binaries available in bin/\""
env:
  # GO_VERSION is baked into pipeline-go-base (single-version model).
  CGO_ENABLED: "0"
  GOOS: linux
  GOARCH: amd64
