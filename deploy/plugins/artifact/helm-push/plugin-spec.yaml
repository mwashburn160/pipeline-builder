name: helm-push
description: Helm chart packaging and push plugin for deploying charts to OCI registries or ChartMuseum using AWS CDK CodeBuildStep
keywords:
  - helm
  - chart
  - oci
  - registry
category: artifact
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets: []
primaryOutputDirectory: helm-output
dockerfile: Dockerfile
installCommands:
  - test -d helm-output || mkdir -p helm-output
  - helm version
  - aws --version
commands:
  - |
    set -e
    if [ -z "${HELM_REGISTRY}" ]; then
      echo "ERROR: HELM_REGISTRY must be set (e.g., oci://123456789.dkr.ecr.us-east-1.amazonaws.com)"
      exit 1
    fi
    VERSION_ARG=""
    if [ -n "${CHART_VERSION}" ]; then
      VERSION_ARG="--version ${CHART_VERSION}"
    fi
    echo "Packaging Helm chart from ${HELM_CHART_PATH}..."
    helm package "${HELM_CHART_PATH}" ${VERSION_ARG} -d helm-output/
    CHART_FILE=$(ls helm-output/*.tgz | head -1)
    echo "Packaged: ${CHART_FILE}"
    case "${HELM_REGISTRY_TYPE}" in
      oci)
        echo "Pushing to OCI registry: ${HELM_REGISTRY}"
        OCI_HOST=$(echo "${HELM_REGISTRY}" | sed -e 's#^oci://##' -e 's#/.*$##')
        case "${OCI_HOST}" in
          *.dkr.ecr.*.amazonaws.com)
            echo "Authenticating with ECR OCI registry: ${OCI_HOST}"
            ECR_REGION=$(echo "${OCI_HOST}" | cut -d. -f4)
            aws ecr get-login-password --region "${ECR_REGION}" \
              | helm registry login --username AWS --password-stdin "${OCI_HOST}"
            ;;
        esac
        helm push "${CHART_FILE}" "${HELM_REGISTRY}"
        ;;
      chartmuseum)
        echo "Pushing to ChartMuseum: ${HELM_REGISTRY}"
        if ! helm cm-push --help >/dev/null 2>&1; then
          echo "ERROR: helm cm-push plugin is not installed (required for chartmuseum pushes)"
          exit 1
        fi
        helm cm-push "${CHART_FILE}" "${HELM_REGISTRY}"
        ;;
      *)
        echo "ERROR: Unknown HELM_REGISTRY_TYPE '${HELM_REGISTRY_TYPE}'. Supported: oci, chartmuseum"
        exit 1
        ;;
    esac
  - "echo \"Helm push complete. Package saved in helm-output/\""
env:
  HELM_CHART_PATH: "."
  HELM_REGISTRY: ""
  HELM_REGISTRY_TYPE: oci
  CHART_VERSION: ""
