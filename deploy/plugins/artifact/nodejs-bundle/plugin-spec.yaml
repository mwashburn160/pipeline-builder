name: nodejs-bundle
description: Node.js bundle and build plugin for compiling and bundling JavaScript and TypeScript projects using AWS CDK CodeBuildStep
keywords:
  - nodejs
  - javascript
  - typescript
  - bundle
category: artifact
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 20
failureBehavior: fail
secrets: []
primaryOutputDirectory: build-output
dockerfile: Dockerfile
installCommands:
  - test -d build-output || mkdir -p build-output
  - |
    set -e
    source ${NVM_DIR}/nvm.sh && nvm use ${NODE_VERSION}
  - node -v && npm -v
  - |
    set -e
    if [ -f pnpm-lock.yaml ]; then
      npm install -g pnpm && pnpm install --frozen-lockfile
    elif [ -f yarn.lock ]; then
      npm install -g yarn && yarn install --frozen-lockfile
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
commands:
  - |
    set -e
    source ${NVM_DIR}/nvm.sh && nvm use ${NODE_VERSION}
    echo "Running build script: ${BUILD_SCRIPT}"
    if [ -f pnpm-lock.yaml ]; then
      pnpm run ${BUILD_SCRIPT} 2>&1 | tee build-output/build.log
    elif [ -f yarn.lock ]; then
      yarn ${BUILD_SCRIPT} 2>&1 | tee build-output/build.log
    else
      npm run ${BUILD_SCRIPT} 2>&1 | tee build-output/build.log
    fi
  - "echo \"Build complete. Output available in build-output/\""
env:
  NODE_VERSION: "24"
  BUILD_SCRIPT: build
