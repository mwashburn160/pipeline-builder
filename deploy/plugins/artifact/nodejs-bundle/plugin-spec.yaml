name: nodejs-bundle
description: Node.js bundle and build plugin for compiling and bundling JavaScript and TypeScript projects using AWS CDK CodeBuildStep
keywords:
  - nodejs
  - javascript
  - typescript
  - bundle
category: artifact
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 20
failureBehavior: fail
secrets: []
primaryOutputDirectory: build-output
dockerfile: Dockerfile
installCommands:
  # Node + npm are baked into pipeline-node-base (single pinned version).
  - test -d build-output || mkdir -p build-output
  - node --version && npm --version
  - |
    set -e
    if [ -f pnpm-lock.yaml ]; then
      npm install -g pnpm && pnpm install --frozen-lockfile
    elif [ -f yarn.lock ]; then
      npm install -g yarn && yarn install --frozen-lockfile
    elif [ -f package-lock.json ]; then
      npm ci
    elif [ -f package.json ]; then
      npm install
    fi
commands:
  - |
    set -e
    echo "Running build script: ${BUILD_SCRIPT}"
    set +e
    if [ -f pnpm-lock.yaml ]; then
      run-logged build-output/build.log -- pnpm run ${BUILD_SCRIPT}
    elif [ -f yarn.lock ]; then
      run-logged build-output/build.log -- yarn ${BUILD_SCRIPT}
    else
      run-logged build-output/build.log -- npm run ${BUILD_SCRIPT}
    fi
    _rc=$?
    set -e
    [ "${_rc:-0}" -eq 0 ]
  - "echo \"Build complete. Output available in build-output/\""
env:
  BUILD_SCRIPT: build
