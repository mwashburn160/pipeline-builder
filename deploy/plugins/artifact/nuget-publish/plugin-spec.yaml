name: nuget-publish
description: NuGet package publish plugin for deploying .NET packages to NuGet Gallery or custom feeds using dotnet CLI with AWS CDK CodeBuildStep
keywords:
  - dotnet
  - nuget
  - package
  - publish
category: artifact
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets:
  - name: NUGET_API_KEY
    required: true
    description: "NuGet gallery API key"
primaryOutputDirectory: publish-output
dockerfile: Dockerfile
installCommands:
  # .NET SDK (with `dotnet pack` / `dotnet nuget push`) is baked into
  # pipeline-dotnet-base.
  - test -d publish-output || mkdir -p publish-output
  - dotnet --version
  - |
    set -e
    if [ -z "${NUGET_API_KEY}" ]; then
      echo "WARNING: NUGET_API_KEY not set. Inject via CodeBuild secrets at runtime."
    fi
commands:
  - |
    set -e
    echo "Packing .NET project..."
    run-logged publish-output/dotnet-pack.log -- \
      dotnet pack --configuration Release --output publish-output/
  - |
    set -e
    # Push all .nupkg files to NuGet source. Push every package (accumulate the
    # failure) rather than aborting on the first, then gate at the end. Each
    # push streams through run-logged so its real exit status surfaces the gate.
    echo "Publishing to ${NUGET_SOURCE}..."
    _push_rc=0
    for PACKAGE in publish-output/*.nupkg; do
      if [ -f "${PACKAGE}" ]; then
        echo "Pushing ${PACKAGE}..."
        run-logged "publish-output/nuget-push-$(basename "${PACKAGE}").log" -- \
          dotnet nuget push "${PACKAGE}" \
            --api-key "${NUGET_API_KEY}" \
            --source "${NUGET_SOURCE}" \
            --skip-duplicate || _push_rc=$?
      fi
    done
    [ "${_push_rc:-0}" -eq 0 ]
  - |
    set -e
    # Save publish metadata
    PACKAGE_COUNT=$(ls publish-output/*.nupkg 2>/dev/null | wc -l | tr -d ' ')
    PACKAGE_FILES=$(ls publish-output/*.nupkg 2>/dev/null | xargs -I{} basename {} | tr '\n' ', ')
    echo "{\"source\": \"${NUGET_SOURCE}\", \"packageCount\": ${PACKAGE_COUNT}, \"packages\": \"${PACKAGE_FILES}\"}" \
      | jq '.' > publish-output/publish-metadata.json
  - "echo \"NuGet publish complete.\""
env:
  NUGET_SOURCE: https://api.nuget.org/v3/index.json
