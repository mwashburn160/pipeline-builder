name: cargo-publish
description: Cargo crate publish plugin for deploying Rust packages to crates.io with dry-run support using AWS CDK CodeBuildStep
keywords:
  - cargo
  - publish
  - rust
  - crates
  - package
version: 1.0.0
pluginType: CodeBuildStep
computeType: SMALL
timeout: 15
failureBehavior: fail
secrets:
  - name: CARGO_REGISTRY_TOKEN
    required: true
    description: "Cargo registry authentication token"
primaryOutputDirectory: publish-output
dockerfile: Dockerfile
installCommands:
  - rustc --version
  - cargo --version
  - |
    if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
      echo "WARNING: CARGO_REGISTRY_TOKEN not set. Inject via CodeBuild secrets at runtime."
    fi
commands:
  - mkdir -p publish-output
  - |
    # Build dry-run flag
    DRY_RUN_FLAG=""
    if [ "${CARGO_DRY_RUN}" = "true" ]; then
      DRY_RUN_FLAG="--dry-run"
      echo "Dry-run mode enabled — crate will NOT be published"
    fi
    # Publish to crates.io
    echo "Publishing crate to crates.io..."
    cargo publish \
      ${DRY_RUN_FLAG} \
      2>&1 | tee publish-output/cargo-publish.log || true
  - |
    # Save publish metadata
    if [ -f Cargo.toml ]; then
      CRATE_NAME=$(grep -m1 '^name' Cargo.toml | sed 's/name *= *"\(.*\)"/\1/' || echo "unknown")
      CRATE_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/version *= *"\(.*\)"/\1/' || echo "unknown")
      echo "{\"crate\": \"${CRATE_NAME}\", \"version\": \"${CRATE_VERSION}\", \"dryRun\": ${CARGO_DRY_RUN}}" \
        | jq '.' > publish-output/publish-metadata.json
    fi
  - "echo \"Cargo publish complete.\""
env:
  CARGO_DRY_RUN: "false"
