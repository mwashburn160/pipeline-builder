name: cargo-release
description: Cargo release binary build plugin for compiling optimized Rust binaries with cross-compilation support using AWS CDK CodeBuildStep
keywords:
  - rust
  - binary
  - cross-compilation
  - release
category: artifact
version: 1.0.0
pluginType: CodeBuildStep
computeType: MEDIUM
timeout: 30
failureBehavior: fail
secrets: []
primaryOutputDirectory: target/release
dockerfile: Dockerfile
installCommands:
  # Rust (cargo/rustc) is baked into pipeline-rust-base (single pinned version).
  - test -d target/release || mkdir -p target/release
  - cargo --version
  - |
    set -e
    if [ -n "${TARGET}" ]; then
      rustup target add ${TARGET}
    fi
  - if [ -f Cargo.toml ]; then cargo fetch; fi
commands:
  - |
    set -e
    echo "Building Rust release binary..."
    TARGET_ARG=""
    if [ -n "${TARGET}" ]; then
      TARGET_ARG="--target ${TARGET}"
    fi
    run-logged target/release/cargo-build.log -- cargo build --profile ${CARGO_PROFILE} --all-features ${TARGET_ARG}
  - "echo \"Cargo build complete. Binaries available in target/release/\""
env:
  CARGO_PROFILE: release
  TARGET: x86_64-unknown-linux-gnu
