---
# =============================================================================
# Plugin Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: plugin

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugin
  labels:
    app: plugin
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: plugin
  template:
    metadata:
      labels:
        app: plugin
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: plugin
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-dependencies
          image: busybox
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "50m"
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres 5432; do sleep 3; done
              echo "Waiting for redis..."
              until nc -z redis 6379; do sleep 3; done
              echo "Dependencies ready"
      containers:
        - name: plugin
          image: ghcr.io/mwashburn160/plugin:1.42.5-podman
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: true
            capabilities:
              add: ["SYS_ADMIN", "SETUID", "SETGID"]
              drop: ["ALL"]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: app-env
            - secretRef:
                name: jwt-secret
            - secretRef:
                name: postgres-secret
            - secretRef:
                name: registry-secret
          env:
            - name: SERVICE_NAME
              value: "plugin"
            - name: IMAGE_REGISTRY_HOST
              value: "registry"
            - name: IMAGE_REGISTRY_PORT
              value: "5000"
            - name: DOCKER_BUILD_STRATEGY
              value: "podman"
            - name: DOCKER_REGISTRY_HTTP
              value: "true"
            - name: DOCKER_REGISTRY_INSECURE
              value: "true"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: COMPLIANCE_SERVICE_HOST
              value: "compliance"
            - name: COMPLIANCE_SERVICE_PORT
              value: "3000"
            - name: COMPLIANCE_BYPASS
              value: "false"
            - name: DIND_HOST
              value: "localhost"
            - name: TMPDIR
              value: "/tmp"
            # DOCKER_HOST and DOCKER_CERT_PATH set per-process by docker-build.ts
            # (avoids TLS validation at startup before dind generates certs)
          volumeMounts:
            - name: tmp
              mountPath: /app/tmp
            - name: uploads
              mountPath: /app/uploads
            # DOCKER_HOST and dind connection handled by docker-build.ts via DIND_HOST env var
          resources:
            limits:
              cpu: "1500m"
              memory: 2048Mi
            requests:
              cpu: "750m"
              memory: 1024Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
        # dind sidecar — provides Docker daemon for docker strategy (idle when using podman)
        - name: dind
          image: docker:27-dind
          args: ["--insecure-registry=registry:5000"]
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR  # disable TLS (plain TCP on port 2375)
              value: ''
            - name: TMPDIR
              value: "/tmp"
          volumeMounts:
            - name: tmp
              mountPath: /app/tmp
          resources:
            limits:
              cpu: "1000m"
              memory: 1024Mi
            requests:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["docker", "info"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command: ["docker", "info"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: uploads
          emptyDir:
            sizeLimit: 512Mi

---
# =============================================================================
# Plugin KEDA ScaledObject — scales on BullMQ queue depth + CPU
# (KEDA creates its own HPA — no standalone HPA needed)
# =============================================================================
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  scaleTargetRef:
    name: plugin
  minReplicaCount: 1
  maxReplicaCount: 3
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: redis
      metadata:
        address: redis.pipeline-builder.svc.cluster.local:6379
        listName: "bull:plugin-build:wait"
        listLength: "2"
        activationListLength: "1"

---
# =============================================================================
# Plugin PodDisruptionBudget
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: plugin
