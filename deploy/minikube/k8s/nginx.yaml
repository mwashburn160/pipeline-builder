---
# =============================================================================
# Nginx Service (NodePort  external entry point)
# =============================================================================
apiVersion: v1
kind: Service
metadata  name: nginx
  labels    app: nginx
spec  type: NodePort
  ports    - port: 8443
      targetPort: 8443
      nodePort: 30443
      protocol: TCP
      name: https
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
      name: http
  selector    app: nginx

---
# =============================================================================
# Nginx Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata  name: nginx
  labels    app: nginx
    app.kubernetes.io/component: gateway
spec  replicas: 1
  revisionHistoryLimit: 3
  selector    matchLabels      app: nginx
  template    metadata      labels        app: nginx
        app.kubernetes.io/component: gateway
      annotations        prometheus.io/scrape: "true"
        prometheus.io/port: "8443"
        prometheus.io/path: "/metrics"
        prometheus.io/scheme: "https"
    spec      # Stateless API server  no need for the default ServiceAccount token
      # mounted at /var/run/secrets/kubernetes.io/serviceaccount/. Reduces blast
      # radius if the container is compromised (no kubelet API access).
      automountServiceAccountToken: false
      initContainers        # See deploy/aws/ec2/k8s/nginx.yaml for full rationale.
        # Escape hatch: kubectl set env deployment/nginx SKIP_UPSTREAM_WAIT=true
        - name: wait-for-upstreams
          image: busybox:1.36
          env            - name: WAIT_TIMEOUT_SEC
              value: "60"
            - name: SKIP_UPSTREAM_WAIT
              value: "false"
          command            - sh
            - -c
            - |
              if [ "$SKIP_UPSTREAM_WAIT" = "true" ]; then
                echo "SKIP_UPSTREAM_WAIT=true  bypassing upstream-readiness gate"
                exit 0
              fi
              NS=$(awk '/^search/ { for (i=2;i<=NF;i++) if ($i ~ /\.svc\./) { sub(/\.svc\..*/, "", $i); print $i; exit } }' /etc/resolv.conf 2>/dev/null)
              SUFFIX=""
              if [ -n "$NS" ]; then
                CLUSTER_DOMAIN=$(awk '/^search/ { for (i=2;i<=NF;i++) if ($i ~ /\.svc\./) { sub(/^[^.]+\.svc\./, "", $i); print $i; exit } }' /etc/resolv.conf 2>/dev/null)
                CLUSTER_DOMAIN=${CLUSTER_DOMAIN:-cluster.local}
                SUFFIX=".${NS}.svc.${CLUSTER_DOMAIN}"
                echo "Resolving upstreams via FQDN suffix: ${SUFFIX}"
              else
                echo "Could not derive FQDN suffix  falling back to bare hostnames"
              fi

              UPSTREAMS="billing compliance frontend image-registry message pipeline platform plugin quota reporting"
              FAILED=""
              for s in $UPSTREAMS; do
                deadline=$(($(date +%s) + WAIT_TIMEOUT_SEC ))
                resolved=false
                while [ "$(date +%s)" -lt "$deadline" ]; do
                  if nslookup "${s}${SUFFIX}" >/dev/null 2>&1 || nslookup "$s" >/dev/null 2>&1; then
                    echo "resolved: $s"
                    resolved=true
                    break
                  fi
                  echo "waiting for $s..."
                  sleep 2
                done
                if [ "$resolved" = "false" ]; then
                  echo "TIMEOUT: $s (no Service after ${WAIT_TIMEOUT_SEC}s)"
                  FAILED="$FAILED $s"
                fi
              done
              if [ -n "$FAILED" ]; then
                echo "FAILED upstreams:$FAILED"
                echo "Hint: 'kubectl get svc -n <ns>'  these Service objects are missing."
                echo "Hint: 'kubectl set env deployment/nginx SKIP_UPSTREAM_WAIT=true' to bypass."
                exit 1
              fi
              echo "all upstreams resolvable"
      containers        - name: nginx
          # custom build of nginxinc/nginx-unprivileged:1.27 with
          # nginx-module-njs baked in (Dockerfile in deploy/nginx-njs/).
          # Same unprivileged base  master process runs as UID 101, listens
          # on 8080/8443, uses /tmp for the PID file  but the njs module
          # is preinstalled so `load_module modules/ngx_http_js_module.so;`
          # in nginx.conf actually resolves. Without this, the conf was
          # silently failing to load njs at startup (only Fargate had been
          # noticing because it did `apt-get install nginx-module-njs` at
          # runtime, which we removed in to enable ReadonlyRootFilesystem).
          image: ghcr.io/mwashburn160/nginx-njs:1.27
          securityContext            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile              type: RuntimeDefault
            capabilities              drop: ["ALL"]
          ports            - containerPort: 8443
              name: https
            - containerPort: 8080
              name: http
          env            - name: JWT_SECRET
              valueFrom                secretKeyRef                  name: jwt-secret
                  key: JWT_SECRET
          resources            limits              cpu: "300m"
              memory: 256Mi
            requests              cpu: "50m"
              memory: 128Mi
          readinessProbe            exec              command                - sh
                - -c
                - "curl -sfk https://localhost:8443/health || exit 1"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe            exec              command                - sh
                - -c
                - "curl -sfk https://localhost:8443/health || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-njs
              mountPath: /etc/nginx/njs
              readOnly: true
            - name: tls-certs
              mountPath: /etc/nginx/certs
              readOnly: true
            # readOnlyRootFilesystem: true means nginx can't write anywhere
            # under `/` unless we provide an emptyDir. Cache + temp dirs +
            # PID file all need write access; mount them as ephemeral RAM.
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-tmp
              mountPath: /tmp
      volumes        - name: nginx-config
          configMap            name: nginx-config
        - name: nginx-njs
          configMap            name: nginx-njs
        - name: tls-certs
          secret            secretName: nginx-tls-secret
            items              - key: tls.crt
                path: nginx.crt
              - key: tls.key
                path: nginx.key
        - name: nginx-cache
          emptyDir            sizeLimit: 256Mi
        - name: nginx-tmp
          emptyDir            sizeLimit: 64Mi

---
# =============================================================================
# Nginx HorizontalPodAutoscaler
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata  name: nginx
  labels    app: nginx
spec  scaleTargetRef    apiVersion: apps/v1
    kind: Deployment
    name: nginx
  minReplicas: 1
  maxReplicas: 3
  metrics    - type: Resource
      resource        name: cpu
        target          type: Utilization
          averageUtilization: 60
  behavior    scaleUp      stabilizationWindowSeconds: 120
    scaleDown      stabilizationWindowSeconds: 300

---
# =============================================================================
# Nginx PodDisruptionBudget
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata  name: nginx
  labels    app: nginx
spec  minAvailable: 1
  selector    matchLabels      app: nginx
