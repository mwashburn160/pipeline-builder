---
# =============================================================================
# Nginx Service (NodePort — external entry point)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  type: NodePort
  ports:
    - port: 8443
      targetPort: 8443
      nodePort: 30443
      protocol: TCP
      name: https
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app: nginx

---
# =============================================================================
# Nginx Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        app.kubernetes.io/component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8443"
        prometheus.io/path: "/metrics"
        prometheus.io/scheme: "https"
    spec:
      initContainers:
        # Wait for upstream Service DNS to resolve before starting nginx.
        # Bounded by WAIT_TIMEOUT_SEC (default 180s) per upstream so a
        # missing/typo'd service surfaces as a CrashLoopBackOff instead of
        # an infinite Init:0/1 hang. To diagnose:
        #   kubectl logs <nginx-pod> -c wait-for-upstreams
        - name: wait-for-upstreams
          image: busybox:1.36
          env:
            - name: WAIT_TIMEOUT_SEC
              value: "180"
          command:
            - sh
            - -c
            - |
              UPSTREAMS="billing compliance frontend grafana message pipeline platform plugin quota reporting"
              FAILED=""
              for s in $UPSTREAMS; do
                deadline=$(( $(date +%s) + WAIT_TIMEOUT_SEC ))
                while ! nslookup "$s" >/dev/null 2>&1; do
                  if [ "$(date +%s)" -ge "$deadline" ]; then
                    echo "TIMEOUT waiting for $s (no Service after ${WAIT_TIMEOUT_SEC}s)"
                    FAILED="$FAILED $s"
                    break
                  fi
                  echo "waiting for $s..."
                  sleep 2
                done
                [ -z "$FAILED" ] || [ "${FAILED##* }" != "$s" ] && echo "resolved: $s" || true
              done
              if [ -n "$FAILED" ]; then
                echo "FAILED upstreams:$FAILED"
                echo "Hint: check 'kubectl get svc' — these Service objects are missing."
                exit 1
              fi
              echo "all upstreams resolvable"
      containers:
        - name: nginx
          image: nginx:1.27
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE", "CHOWN", "SETGID", "SETUID"]
          ports:
            - containerPort: 8443
              name: https
            - containerPort: 8080
              name: http
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: JWT_SECRET
          resources:
            limits:
              cpu: "300m"
              memory: 256Mi
            requests:
              cpu: "50m"
              memory: 128Mi
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -sfk https://localhost:8443/health || exit 1"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -sfk https://localhost:8443/health || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-njs
              mountPath: /etc/nginx/njs
              readOnly: true
            - name: tls-certs
              mountPath: /etc/nginx/certs
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: nginx-njs
          configMap:
            name: nginx-njs
        - name: tls-certs
          secret:
            secretName: nginx-tls-secret
            items:
              - key: tls.crt
                path: nginx.crt
              - key: tls.key
                path: nginx.key

---
# =============================================================================
# Nginx HorizontalPodAutoscaler
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nginx
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 300

---
# =============================================================================
# Nginx PodDisruptionBudget
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: nginx
