apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Minikube — standalone manifests with local development overrides.
# Higher CPU allocations, smaller storage volumes.

namespace: pipeline-builder

resources:
  - namespace.yaml
  - networkpolicy.yaml
  - resource-limits.yaml
  - mongodb.yaml
  - postgres.yaml
  - pgbouncer.yaml
  - redis.yaml
  - nginx.yaml
  - platform.yaml
  - pipeline.yaml
  - plugin.yaml
  # buildkitd-per-tier provides the `buildkitd-config` ConfigMap that
  # plugin.yaml's in-pod buildkitd sidecar mounts, plus three optional
  # per-tier buildkitd Deployments. The ConfigMap is REQUIRED — without
  # it plugin pods stall in PodInitializing with "configmap buildkitd-
  # config not found". The per-tier Deployments are inert until the
  # plugin service sets PLUGIN_BUILDKIT_ADDR_* env vars to point at them.
  - buildkitd-per-tier.yaml
  - message.yaml
  - reporting.yaml
  - quota.yaml
  - billing.yaml
  - compliance.yaml
  - frontend.yaml
  - mongo-express.yaml
  - pgadmin.yaml
  - registry.yaml
  - image-registry.yaml
  - prometheus.yaml
  - alertmanager.yaml
  - loki.yaml
  - promtail.yaml

patches:
  # Resource (CPU) overrides for all deployments
  - path: patches/resources.yaml
  # Storage size overrides (smaller PVs for local dev)
  - path: patches/storage.yaml
  # Scaling and resource quota/limit overrides
  - path: patches/scaling.yaml
