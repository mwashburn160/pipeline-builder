apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Minikube — standalone manifests with local development overrides.
# Higher CPU allocations, smaller storage volumes.

namespace: pipeline-builder

resources:
  - namespace.yaml
  - networkpolicy.yaml
  - resource-limits.yaml
  - mongodb.yaml
  - postgres.yaml
  - redis.yaml
  - ollama.yaml
  - nginx.yaml
  - platform.yaml
  - pipeline.yaml
  - plugin.yaml
  - message.yaml
  - reporting.yaml
  - quota.yaml
  - billing.yaml
  - frontend.yaml
  - mongo-express.yaml
  - pgadmin.yaml
  - registry.yaml
  - registry-express.yaml
  - prometheus.yaml
  - loki.yaml
  - grafana.yaml
  - promtail.yaml

patches:
  # Resource (CPU) overrides for all deployments
  - path: patches/resources.yaml
  # Storage size overrides (smaller PVs for local dev)
  - path: patches/storage.yaml
  # Scaling and resource quota/limit overrides
  - path: patches/scaling.yaml
