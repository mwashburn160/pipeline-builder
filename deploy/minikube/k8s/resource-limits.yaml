---
# =============================================================================
# Namespace Resource Quota
# =============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pipeline-builder-quota
spec:
  hard:
    # Sized for laptop minikube — intentionally generous because devs
    # run on a wide range of hardware (8-32 vCPU, 16-64 GiB RAM). The
    # quota's job here is to admit the full stack + transient bootstrap
    # pods, not to enforce capacity; physical scheduling falls through
    # to the kubelet on whatever the laptop actually has.
    #
    # Full stack on this quota:
    #   - registry + 3 per-tier buildkitd Deployments
    #   - image-registry (HPA → 5 replicas)
    #   - plugin (HPA → 4 replicas, each with a buildkitd sidecar)
    #   - quota, platform, pipeline, message, compliance, billing,
    #     reporting, frontend, nginx, postgres, mongo, redis, pgbouncer,
    #     pgadmin, mongo-express, prometheus, loki, alertmanager, promtail
    #   - bootstrap-time crane-push pods (during init-platform.sh)
    #
    # If your laptop has <8 vCPU or <16 GiB RAM the full stack won't
    # fit; disable optional services (prometheus, loki, mongo-express,
    # pgadmin) first and/or drop both quota values proportionally.
    #
    # Was: requests.cpu: 8 — left no headroom for the crane-push pod
    # during init's base-image push, mirroring the same bug we hit on
    # the EC2 deploy. Bumped to 12 to keep bootstrap reliable.
    requests.cpu: "12"
    requests.memory: 24Gi
    limits.cpu: "24"
    limits.memory: 48Gi
    pods: "40"
    persistentvolumeclaims: "10"

---
# =============================================================================
# Default Resource Limits (for containers that don't specify them)
# =============================================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: pipeline-builder-limits
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
    - type: Pod
      max:
        cpu: "6"
        memory: 10Gi
