---
# =============================================================================
# Namespace Resource Quota
# =============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pipeline-builder-quota
spec:
  hard:
    # Sized for the full stack including registry + 3 per-tier buildkitd
    # Deployments + image-registry (HPA up to 5 replicas) + quota (HPA
    # up to N) + plugin (HPA up to 4). The previous 16-CPU cap was tight
    # enough that registry + buildkitd-unlimited got starved on first
    # boot. Drop to 16/20Gi only on a single-node minikube where the
    # host has < 8 CPU / 16Gi RAM available.
    requests.cpu: "12"
    requests.memory: 24Gi
    limits.cpu: "24"
    limits.memory: 48Gi
    pods: "40"
    persistentvolumeclaims: "10"

---
# =============================================================================
# Default Resource Limits (for containers that don't specify them)
# =============================================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: pipeline-builder-limits
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
    - type: Pod
      max:
        cpu: "6"
        memory: 10Gi
