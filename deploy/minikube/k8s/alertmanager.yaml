---
# =============================================================================
# Alertmanager Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 9093
      protocol: TCP
      name: http
  selector:
    app: alertmanager

---
# =============================================================================
# Alertmanager Deployment
# =============================================================================
# Receives alerts from Prometheus (prometheus.yml `alerting.alertmanagers`
# points here), routes them by `severity` label, and forwards to Slack.
# Webhook URLs come from the optional `alertmanager-slack` Secret — if the
# secret is absent the env vars are empty and Slack receivers no-op silently,
# but the firing alerts still show in Alertmanager's UI / API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  labels:
    app: alertmanager
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        app.kubernetes.io/component: observability
    spec:
      automountServiceAccountToken: false
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.28.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
              name: http
          env:
            - name: SLACK_WEBHOOK_URL_CRITICAL
              valueFrom:
                secretKeyRef:
                  name: alertmanager-slack
                  key: SLACK_WEBHOOK_URL_CRITICAL
                  optional: true
            - name: SLACK_WEBHOOK_URL_WARNING
              valueFrom:
                secretKeyRef:
                  name: alertmanager-slack
                  key: SLACK_WEBHOOK_URL_WARNING
                  optional: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: "200m"
              memory: 128Mi
            requests:
              cpu: "25m"
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: alertmanager-storage
              mountPath: /alertmanager
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
        # Ephemeral — silences and notification log are lost on pod restart.
        # Fine for an initial deployment; promote to a PVC if operators
        # start relying on long-lived silences across restarts.
        - name: alertmanager-storage
          emptyDir:
            sizeLimit: 128Mi
