# =============================================================================
# Minikube resource overrides
# Higher CPU allocations for single-node development cluster
# =============================================================================

# --- Databases ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  template:
    spec:
      containers:
        - name: mongodb
          resources:
            limits:
              cpu: "1.5"
            requests:
              cpu: "800m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
spec:
  template:
    spec:
      containers:
        - name: postgres
          resources:
            limits:
              cpu: "1.5"
            requests:
              cpu: "800m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  template:
    spec:
      containers:
        - name: redis
          resources:
            limits:
              cpu: "250m"
            requests:
              cpu: "100m"

# --- AI / LLM ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-model
          resources:
            requests:
              cpu: "500m"
      containers:
        - name: ollama
          resources:
            limits:
              cpu: "4000m"
            requests:
              cpu: "2000m"

