---
# =============================================================================
# Billing Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: billing
  labels:
    app: billing
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: billing

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  labels:
    app: billing
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-mongodb
          image: busybox
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "50m"
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              echo "Waiting for mongodb..."
              until nc -z mongodb.pipeline-builder 27017; do sleep 3; done
              echo "Waiting for quota..."
              until wget -qO- http://quota:3000/health > /dev/null 2>&1; do sleep 3; done
              echo "Dependencies ready"
      containers:
        - name: billing
          image: ghcr.io/mwashburn160/billing:1.23.7
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: app-env
            - secretRef:
                name: jwt-secret
            - secretRef:
                name: mongodb-secret
          env:
            - name: SERVICE_NAME
              value: "billing"
            - name: PORT
              value: "3000"
          resources:
            limits:
              cpu: "500m"
              memory: 768Mi
            requests:
              cpu: "75m"
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
---
# =============================================================================
# Billing HorizontalPodAutoscaler
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: billing
  labels:
    app: billing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: billing
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

---
# =============================================================================
# Billing PodDisruptionBudget
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: billing
  labels:
    app: billing
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: billing
