---
# =============================================================================
# MongoDB Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  type: ClusterIP
  publishNotReadyAddresses: true
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
      name: mongodb
  selector:
    app: mongodb

---
# =============================================================================
# MongoDB PersistentVolume (hostPath on minikube node)
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongodb-pv
  labels:
    app: mongodb
spec:
  storageClassName: ""
  capacity:
    storage: 1Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data/db-data/mongodb
    type: DirectoryOrCreate

---
# =============================================================================
# MongoDB PersistentVolumeClaim
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data
  labels:
    app: mongodb
spec:
  storageClassName: ""
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
  selector:
    matchLabels:
      app: mongodb

---
# =============================================================================
# MongoDB Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    app: mongodb
    app.kubernetes.io/component: database
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
        app.kubernetes.io/component: database
    spec:
      initContainers:
        # Fix keyfile permissions (MongoDB requires 400)
        - name: fix-keyfile-permissions
          image: busybox
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "50m"
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              cp /keyfile-readonly/mongodb-keyfile /keyfile/mongodb-keyfile
              chmod 400 /keyfile/mongodb-keyfile
              chown 999:999 /keyfile/mongodb-keyfile
          volumeMounts:
            - name: keyfile-readonly
              mountPath: /keyfile-readonly
            - name: keyfile
              mountPath: /keyfile
      containers:
        - name: mongodb
          image: mongo
          args:
            - "--bind_ip_all"
            - "--replSet"
            - rs0
            - "--keyFile"
            - /keyfile/mongodb-keyfile
          ports:
            - containerPort: 27017
              name: mongodb
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_INITDB_DATABASE
              value: "platform"
          resources:
            limits:
              cpu: "1.5"
              memory: 1536Mi
            requests:
              cpu: "800m"
              memory: 768Mi
          readinessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mongosh --quiet --host localhost:27017 \
                    --username "$MONGO_INITDB_ROOT_USERNAME" \
                    --password "$MONGO_INITDB_ROOT_PASSWORD" \
                    --authenticationDatabase admin \
                    --eval "db.getSiblingDB('admin').runCommand({ replSetGetStatus: 1 }).ok" || \
                  (mongosh --quiet --host localhost:27017 \
                    --username "$MONGO_INITDB_ROOT_USERNAME" \
                    --password "$MONGO_INITDB_ROOT_PASSWORD" \
                    --authenticationDatabase admin \
                    --eval "rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] })" && exit 1)
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - |
                  mongosh --quiet --host localhost:27017 \
                    --username "$MONGO_INITDB_ROOT_USERNAME" \
                    --password "$MONGO_INITDB_ROOT_PASSWORD" \
                    --authenticationDatabase admin \
                    --eval "db.adminCommand('ping')"
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: keyfile
              mountPath: /keyfile
              readOnly: true
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-data
        - name: keyfile-readonly
          secret:
            secretName: mongodb-keyfile
        - name: keyfile
          emptyDir: {}
        - name: init-script
          configMap:
            name: mongodb-init

---
# =============================================================================
# MongoDB PodDisruptionBudget
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mongodb
