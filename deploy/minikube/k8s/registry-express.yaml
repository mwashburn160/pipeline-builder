---
# =============================================================================
# Registry Express Service (Docker Registry UI)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: registry-express
  labels:
    app: registry-express
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30580
      protocol: TCP
      name: http
  selector:
    app: registry-express

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-express
  labels:
    app: registry-express
    app.kubernetes.io/component: admin
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: registry-express
  template:
    metadata:
      labels:
        app: registry-express
        app.kubernetes.io/component: admin
    spec:
      containers:
        - name: registry-express
          image: joxit/docker-registry-ui
          ports:
            - containerPort: 80
              name: http
          env:
            - name: REGISTRY_TITLE
              value: "Pipeline Builder Registry"
            - name: NGINX_PROXY_PASS_URL
              value: "https://registry:5000"
            - name: SINGLE_REGISTRY
              value: "true"
            - name: ENABLE_DELETE_IMAGES
              value: "true"
            - name: SHOW_CONTENT_DIGEST
              value: "true"
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: "250m"
              memory: 384Mi
            requests:
              cpu: "75m"
              memory: 192Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
