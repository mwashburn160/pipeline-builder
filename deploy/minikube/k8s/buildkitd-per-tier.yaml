---
# =============================================================================
#  buildkitd (unlimited tier — sole tier in this deploy)
# =============================================================================
#
# Minikube + EC2 single-node deploys ship a single `unlimited` tier for
# all plugin builds — quota-tier isolation isn't a dev/test requirement
# and the developer/pro tiers were dead weight on the namespace
# ResourceQuota. The plugin service routes every build here via
#   BUILDKIT_HOST=tcp://buildkitd-unlimited:1234
#
# If multi-tier isolation is ever needed (e.g. shared minikube hosting
# multiple orgs), restore the per-tier Deployments from git history
# and set PLUGIN_BUILDKIT_ADDR_DEVELOPER / _PRO / _UNLIMITED on the
# plugin service.

---
# buildkitd config: mirror docker.io → in-cluster registry so plugin
# Dockerfiles using bare `FROM pipeline-plugin-base:24.04` resolve at
# the in-cluster registry instead of Docker Hub.
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: pipeline-builder
data:
  buildkitd.toml: |
    [registry."docker.io"]
      mirrors = ["registry:5000"]

    [registry."registry:5000"]
      # Registry serves plain HTTP on the in-cluster ClusterIP service —
      # nginx fronts it on HTTPS for external clients. Plain HTTP here
      # avoids the buildkit-vs-crane scheme-mismatch deadlock on the
      # token realm (see registry.yaml for the full rationale).
      http = true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd-unlimited
  labels:
    app: buildkitd
    tier: unlimited
    app.kubernetes.io/component: build-isolation
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: buildkitd
      tier: unlimited
  template:
    metadata:
      labels:
        app: buildkitd
        tier: unlimited
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.16.0-rootless
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
            # Mirror docker.io → in-cluster registry so plugin Dockerfiles
            # using bare `FROM pipeline-plugin-base:24.04` resolve to images
            # that live in the cluster, not Docker Hub.
            - --config
            - /home/user/.config/buildkit/buildkitd.toml
          ports:
            - containerPort: 1234
              name: buildkitd
          volumeMounts:
            - name: buildkitd-config
              mountPath: /home/user/.config/buildkit
              readOnly: true
          securityContext:
            seccompProfile:
              type: Unconfined
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
              # newuidmap/newgidmap (the SETUID-helper binaries that
              # write /proc/<pid>/uid_map and gid_map for rootlesskit)
              # need these in the *bounding set* — otherwise their
              # file-caps can't be granted at exec time and rootlesskit
              # fails with "newuidmap … operation not permitted" at
              # startup. Same setting as the in-pod sidecar in plugin.yaml.
              add: ["SETUID", "SETGID"]
          resources:
            limits:
              # Capped at 2 CPU (down from 4) so the unlimited tier fits
              # inside the namespace ResourceQuota's limits.cpu budget on
              # single-node minikube. Bump if your cluster has spare CPU.
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://0.0.0.0:1234", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://0.0.0.0:1234", "debug", "workers"]
            initialDelaySeconds: 30
            periodSeconds: 60
      volumes:
        - name: buildkitd-config
          configMap:
            name: buildkitd-config

---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd-unlimited
spec:
  type: ClusterIP
  selector:
    app: buildkitd
    tier: unlimited
  ports:
    - port: 1234
      targetPort: 1234
      name: buildkitd

---
# =============================================================================
# Ingress gate — only the plugin pod may talk to buildkitd.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-buildkitd-from-plugin
spec:
  podSelector:
    matchLabels:
      app: buildkitd
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: plugin
      ports:
        - port: 1234
          protocol: TCP
