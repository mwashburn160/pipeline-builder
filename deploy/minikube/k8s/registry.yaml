---
# =============================================================================
# Docker Registry Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: registry
  labels:
    app: registry
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: registry
  selector:
    app: registry

---
# =============================================================================
# Registry PersistentVolume (hostPath on minikube node)
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: registry-pv
  labels:
    app: registry
spec:
  storageClassName: ""
  capacity:
    storage: 2Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data/registry-data
    type: DirectoryOrCreate

---
# =============================================================================
# Registry PersistentVolumeClaim
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  labels:
    app: registry
spec:
  storageClassName: ""
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
  selector:
    matchLabels:
      app: registry

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  labels:
    app: registry
    app.kubernetes.io/component: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
        app.kubernetes.io/component: registry
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /var/lib/registry"]
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
          securityContext:
            runAsUser: 0
      containers:
        - name: registry
          image: registry
          ports:
            - containerPort: 5000
              name: registry
          env:
            - name: REGISTRY_AUTH
              value: "htpasswd"
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
            - name: REGISTRY_HTTP_TLS_KEY
              value: "/etc/ssl/private/tls.key"
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: "/etc/ssl/certs/tls.crt"
            - name: REGISTRY_AUTH_HTPASSWD_REALM
              value: "registry realm"
            - name: REGISTRY_AUTH_HTPASSWD_PATH
              value: "/etc/auth/registry.passwd"
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          resources:
            limits:
              cpu: "600m"
              memory: 512Mi
            requests:
              cpu: "300m"
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
            - name: registry-tls
              mountPath: /etc/ssl/certs/tls.crt
              subPath: tls.crt
              readOnly: true
            - name: registry-tls
              mountPath: /etc/ssl/private/tls.key
              subPath: tls.key
              readOnly: true
            - name: registry-auth
              mountPath: /etc/auth
              readOnly: true
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: registry-data
        - name: registry-tls
          secret:
            secretName: registry-tls-secret
        - name: registry-auth
          secret:
            secretName: registry-auth-secret
