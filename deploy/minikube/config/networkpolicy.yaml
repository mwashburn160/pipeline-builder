---
# =============================================================================
# Loki — ingress from promtail, grafana
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loki-ingress
spec:
  podSelector:
    matchLabels:
      app: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [promtail, grafana]
      ports:
        - port: 3100

---
# =============================================================================
# Prometheus — ingress from grafana
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - port: 9090

---
# =============================================================================
# Grafana — ingress from nginx
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx
      ports:
        - port: 3000

---
# =============================================================================
# Admin UIs — ingress from nginx
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-admin-uis-ingress
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [pgadmin, mongo-express, registry-express]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx
      ports:
        - port: 80
        - port: 8081

---
# =============================================================================
# Prometheus Scraping — allow from prometheus to all pods on metrics ports
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [platform, pipeline, plugin, quota, frontend, nginx, grafana, loki]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 3000
        - port: 3100
        - port: 8443
        - port: 9090

---
# =============================================================================
# Allow All Egress (pods need DNS, external access for image pulls, etc.)
# In production, restrict this further.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - {}
