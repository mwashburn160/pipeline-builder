    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [platform, pipeline, plugin, pgadmin]
      ports:
        - port: 5432

---
# =============================================================================
# MongoDB — ingress from platform, quota, mongo-express
# =============================================================================
