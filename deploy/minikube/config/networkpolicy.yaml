---
# =============================================================================
# Default Deny All Ingress
# =============================================================================
# NOTE: Requires a CNI that supports NetworkPolicy (e.g., Calico).
# Without one, these policies are silently ignored (safe to apply).
# Enable with: minikube start --cni=calico
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# =============================================================================
# Nginx Gateway — ingress from anywhere (NodePort entry point)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-ingress
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8443
        - port: 8080

---
# =============================================================================
# API Services — ingress from nginx only
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-from-nginx
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [platform, pipeline, plugin, quota, frontend]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx
      ports:
        - port: 3000

---
# =============================================================================
# Quota — ingress from platform, pipeline, plugin
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-quota-from-services
spec:
  podSelector:
    matchLabels:
      app: quota
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [platform, pipeline, plugin]
      ports:
        - port: 3000

---
# =============================================================================
# Postgres — ingress from platform, pipeline, plugin, pgadmin
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
spec:
  podSelector:
    matchLabels:
