# =============================================================================
# Loki Configuration  Minikube (multi-tenant variant, )
# =============================================================================
# Drop-in replacement for `loki-config.yml`. Differences from the
# single-tenant default#
# - `auth_enabled: true`  every push and query must carry
# `X-Scope-OrgID`. Promtail sets it via the `tenant` stage; the
# platform log-service + observability dashboards send it on the
# query side.
#
# - `limits_config` adds an `overrides_period` so per-tenant limits in
# the `overrides:` block below take effect every 10s without a
# Loki restart. Cuts incident response time when an operator needs
# to slam a noisy tenant's rate cap.
#
# - Per-tier rate caps in `overrides:`  Developer 1 MB/s burst 2 MB,
# Pro 10 MB/s burst 20 MB, Unlimited matches the global default.
# Tweak via the `runtime_config` file (mounted from a configmap)
# for ops without a restart.
#
# - `system` tenant gets `cross_tenant_query_enabled` via the
# federation pseudo-tenant `__system_aggregator__`  required so
# the observability dashboards' "all orgs" drill-downs work.
#
# Migration: see docs/plans/f-2-6-loki-multitenant.md.
# Docs: https://grafana.com/docs/loki/latest/operations/multi-tenancy/
# =============================================================================

auth_enabled: true

server  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common  path_prefix: /loki
  storage    filesystem      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring    instance_addr: 127.0.0.1
    kvstore      store: inmemory

schema_config  configs    - from: '2024-01-01'
      store: tsdb
      object_store: filesystem
      schema: v13
      index        prefix: index_
        period: 24h

# Global limits  apply to any tenant whose `overrides:` block doesn't
# specify the same key. The numbers below match the single-tenant
# config's defaults; per-tenant tightening lives in `runtime_config`.
limits_config  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  # Default to letting the `system` tenant federate reads across all
  # tenants (the observability dashboards' "all orgs" view). Per-org
  # tenants can't see other orgs' streams because they aren't listed
  # in their own override block below.
  per_stream_rate_limit: 5MB
  per_stream_rate_limit_burst: 10MB
  retention_period: 168h

# Runtime overrides  hot-reloadable per-tenant limits. The file is
# baked into the configmap so deploy-time changes ship via kubectl
# apply; truly-runtime tweaks need the runtime_config feature
# (uncommented below + a separate configmap).
runtime_config  file: /etc/loki/runtime-config.yaml

storage_config  tsdb_shipper    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache

compactor  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

chunk_store_config  chunk_cache_config    embedded_cache      enabled: true
      max_size_mb: 100
