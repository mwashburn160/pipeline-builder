# =============================================================================
# Loki Runtime Overrides  Per-tenant rate caps
# =============================================================================
# Loki re-reads this file every 10s (or on SIGHUP) so per-tenant changes
# don't require a restart. Modify via kubectl edit configmap loki-runtime-config
# in prod  Loki picks the new values up within one scrape cycle.
#
# `system` tenant is the cross-org catch-all used by infrastructure logs
# and the observability dashboards. Sized large because it carries
# everything that doesn't have an `orgId` field.
#
# Per-org tenants are referenced by orgId (the org's UUID-ish identifier
# that promtail puts in `X-Scope-OrgID` via the `tenant` stage). Defaults
# below mirror the Developer / Pro / Unlimited tiers  operators copy a
# preset into the org's entry when promoting.
#
# Reference: https://grafana.com/docs/loki/latest/configure/#runtime-configuration-file
# =============================================================================

overrides  # ---- system tenant  infra + cross-org dashboards ----
  system    # Generous because every log line without an orgId lands here.
    # Adjust down once promtail catches up with most-services-emit-orgId
    # rollout.
    ingestion_rate_mb: 20
    ingestion_burst_size_mb: 40
    # Cross-tenant queries are how the observability dashboards drill
    # across orgs. Keep this scoped to system; per-org tenants don't
    # need it.
    # Note: this is a Loki Enterprise feature; in OSS Loki cross-tenant
    # query support is via the query frontend's `tenant_federation`
    # feature which is enabled at the cluster level (see loki-config-multitenant.yml).

  # ---- Developer tier  1 MB/s ingest, 2 MB burst ----
  # Sized for occasional debug traffic  a chatty Lambda would hit this
  # in seconds. Operators bump per-org when they hear "logs are being
  # dropped" reports.
  #
  # Per-tenant example  copy the block under each org's UUID  # 'developer-org-uuid'  # ingestion_rate_mb: 1
  # ingestion_burst_size_mb: 2

  # ---- Pro tier  10 MB/s ingest, 20 MB burst ----
  # 'pro-org-uuid'  # ingestion_rate_mb: 10
  # ingestion_burst_size_mb: 20

  # ---- Unlimited tier  inherit global defaults ----
  # No override needed; per-tenant entry can be omitted.
