# Promtail Configuration â€” Kubernetes Pod Log Collection
# Uses static_configs with file glob to discover pod logs directly
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki.pipeline-builder.svc.cluster.local:3100/loki/api/v1/push

scrape_configs:
  - job_name: pipeline-builder-pods
    static_configs:
      - targets:
          - localhost
        labels:
          job: pipeline-builder
          __path__: /var/log/pods/pipeline-builder_*/*/*.log
    pipeline_stages:
      # Parse CRI / Docker JSON log format
      - cri: {}
      # Extract pod name and container from the file path
      # Path: /var/log/pods/pipeline-builder_<pod>_<uid>/<container>/N.log
      - match:
          selector: '{job="pipeline-builder"}'
          stages:
            - regex:
                source: filename
                expression: '/var/log/pods/pipeline-builder_(?P<pod>[^_]+)-[^/]+/(?P<container>[^/]+)/'
            - labels:
                pod:
                container:
      # Extract app name from pod (e.g. "platform" from "platform-84dc786bd5-4jkvj")
      - match:
          selector: '{job="pipeline-builder"}'
          stages:
            - regex:
                source: filename
                expression: '/var/log/pods/pipeline-builder_(?P<service>[a-z][\-a-z]*[a-z])-[0-9a-f]'
            - labels:
                service:
      # Parse structured JSON logs from API services
      - json:
          expressions:
            level: level
            service_name: service
            msg: message
            ts: timestamp
            # Audit-event fields â€” extracted so they survive the
            # `output.source: msg` rewrite below and become queryable
            # in the native Observability dashboards via stream selectors.
            eventCategory: eventCategory
            event: event
            actor: actor
            # Plugin-build drill-down: pluginName is promoted only on lines
            # that have it (most logs don't), keeping cardinality bounded to
            # the count of distinct plugin names that have built recently.
            pluginName: pluginName
      # Promote parsed fields to Loki labels. `eventCategory` is low-cardinality
      # ('audit' or 'plugin-build' or absent); `event` is bounded (~tens of
      # distinct names like `registry.tag.copy`, `completed`, `failed`); `actor`
      # is O(100s) per org (users + service principals). `pluginName` is bounded
      # by # of plugins that have logged a build event. All stay below Loki's
      # recommended label-cardinality ceiling. Digest fields are intentionally
      # NOT promoted (per-event unique = unbounded cardinality).
      - labels:
          level:
          service_name:
          eventCategory:
          event:
          actor:
          pluginName:
      # Use the parsed message as the log line (falls back to raw if not present)
      - output:
          source: msg
