---
# =============================================================================
# pgAdmin Service (PostgreSQL Admin UI)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  labels:
    app: pgadmin
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30480
      protocol: TCP
      name: http
  selector:
    app: pgadmin

---
# =============================================================================
# pgAdmin PersistentVolume (hostPath on minikube node)
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pgadmin-pv
  labels:
    app: pgadmin
spec:
  capacity:
    storage: 500Mi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data/pgadmin
    type: DirectoryOrCreate

---
# =============================================================================
# pgAdmin PersistentVolumeClaim
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgadmin-data
  labels:
    app: pgadmin
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 500Mi
  selector:
    matchLabels:
      app: pgadmin

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  labels:
    app: pgadmin
    app.kubernetes.io/component: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
        app.kubernetes.io/component: admin
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "50m"
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres 5432; do sleep 3; done
              echo "Postgres ready"
      containers:
        - name: pgadmin
          image: dpage/pgadmin4
          securityContext:
            runAsNonRoot: true
            runAsUser: 5050
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 80
              name: http
          envFrom:
            - secretRef:
                name: pgadmin-secret
          resources:
            limits:
              cpu: "500m"
              memory: 512Mi
            requests:
              cpu: "200m"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /misc/ping
              port: 80
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: pgadmin-data
              mountPath: /var/lib/pgadmin
      volumes:
        - name: pgadmin-data
          persistentVolumeClaim:
            claimName: pgadmin-data
