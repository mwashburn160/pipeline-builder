AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pipeline Builder - internal (inside-AWS-only) deployment prerequisites.
  Shared by both the EC2 and Fargate deployments; deployed ONLY when
  DEPLOY_MODE=internal, AFTER the base network/gateway exists. Provisions the
  pieces internal mode needs but the base stacks don't create:
    1. VPC interface endpoints so VPC-attached CodeBuild reaches AWS APIs
       without internet egress (S3, Logs, Secrets Manager, KMS, STS, CodeBuild,
       and ECR for image pulls).
    2. A Route53 PRIVATE hosted zone resolving the domain to the gateway
       (ALB alias for Fargate, or the instance private IP for EC2) so in-VPC
       clients reach the private gateway.
    3. A 443 ingress rule on the gateway's security group from the VPC CIDR, so
       VPC-attached CodeBuild (in this VPC) can pull plugin images via /v2/.

Parameters:
  StackPrefix:
    Type: String
    Default: pb
    Description: Prefix for resource naming.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC the endpoints + private zone attach to (base stack's VPC).

  VpcCidr:
    Type: String
    Description: VPC CIDR — source for the endpoint + gateway 443 ingress rules.

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets to place the interface-endpoint ENIs in (the same
      subnets the VPC-attached CodeBuild projects run in).

  DomainName:
    Type: String
    Description: FQDN clients use to reach the gateway (e.g. pipeline-builder.io).

  GatewaySecurityGroupId:
    Type: String
    Description: The ALB (Fargate) or instance (EC2) security group to add a
      443 ingress rule to, allowing pulls from inside the VPC.

  GatewayType:
    Type: String
    AllowedValues: [alb, ip]
    Description: alb = Route53 alias to an ALB; ip = A record to a private IP.

  AlbDnsName:
    Type: String
    Default: ""
    Description: ALB DNS name (GatewayType=alb only).

  AlbCanonicalHostedZoneId:
    Type: String
    Default: ""
    Description: ALB canonical hosted zone ID for the alias (GatewayType=alb only).

  GatewayPrivateIp:
    Type: String
    Default: ""
    Description: Gateway private IP (GatewayType=ip only).

Conditions:
  IsAlb: !Equals [!Ref GatewayType, alb]

Resources:

  # ---------------------------------------------------------------------------
  # Security group for the interface endpoints (443 from the VPC).
  # ---------------------------------------------------------------------------
  EndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${StackPrefix} VPC interface endpoints"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref VpcCidr
          Description: HTTPS from within the VPC (CodeBuild → endpoints)
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-vpce-sg"

  # ---------------------------------------------------------------------------
  # Interface endpoints — let VPC-attached CodeBuild reach AWS without internet.
  # PrivateDnsEnabled routes the public service hostnames to these ENIs.
  # ---------------------------------------------------------------------------
  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.logs"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.secretsmanager"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  KmsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.kms"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  StsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.sts"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  CodeBuildEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.codebuild"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.api"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.dkr"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  # ---------------------------------------------------------------------------
  # Gateway ingress: allow 443 from inside the VPC so VPC-attached CodeBuild
  # (using CDK's auto-created, all-egress SG) can reach the gateway's /v2/.
  # ---------------------------------------------------------------------------
  GatewayHttpsIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref GatewaySecurityGroupId
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      CidrIp: !Ref VpcCidr
      Description: HTTPS from within the VPC (CodeBuild plugin-image pulls)

  # ---------------------------------------------------------------------------
  # Private hosted zone: resolve the domain to the gateway for in-VPC clients.
  # ---------------------------------------------------------------------------
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName
      VPCs:
        - VPCId: !Ref VpcId
          VPCRegion: !Ref "AWS::Region"
      HostedZoneConfig:
        Comment: !Sub "${StackPrefix} internal-mode private zone"

  DomainRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrivateHostedZone
      Name: !Ref DomainName
      Type: A
      # ALB → alias record; IP → plain A record.
      AliasTarget: !If
        - IsAlb
        - DNSName: !Ref AlbDnsName
          HostedZoneId: !Ref AlbCanonicalHostedZoneId
          EvaluateTargetHealth: false
        - !Ref "AWS::NoValue"
      TTL: !If [IsAlb, !Ref "AWS::NoValue", "60"]
      ResourceRecords: !If
        - IsAlb
        - !Ref "AWS::NoValue"
        - [!Ref GatewayPrivateIp]

Outputs:
  HostedZoneId:
    Description: Private hosted zone ID for the domain.
    Value: !Ref PrivateHostedZone
    Export:
      Name: !Sub "${StackPrefix}-InternalHostedZoneId"

  EndpointSecurityGroupId:
    Description: Security group fronting the VPC interface endpoints.
    Value: !Ref EndpointSecurityGroup
    Export:
      Name: !Sub "${StackPrefix}-InternalEndpointSgId"
