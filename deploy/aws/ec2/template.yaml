AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pipeline Builder - EC2 deployment with minikube, optional Let's Encrypt SSL,
  optional Route53 DNS, and hardened security.

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  DomainName:
    Type: String
    Default: ""
    Description: >
      Fully qualified domain name (e.g., pipeline.example.com).
      Leave empty to skip DNS and use Elastic IP with self-signed TLS.

  HostedZoneId:
    Type: String
    Default: ""
    Description: >
      Route53 Hosted Zone ID for the domain.
      Required only when DomainName is provided.

  InstanceType:
    Type: String
    Default: t3.2xlarge
    AllowedValues:
      - t3.xlarge
      - t3.2xlarge
      - m5.2xlarge
      - m5.4xlarge
    Description: >
      EC2 instance type. t3.2xlarge (8 vCPU / 32 GiB) is the recommended
      default — the full stack (registry + 3 buildkitd tiers +
      image-registry HPA + plugin HPA + observability) fits the
      namespace ResourceQuota declared in k8s/resource-limits.yaml.
      t3.xlarge (4 vCPU / 16 GiB) works only with optional services
      (prometheus, loki, mongo-express, pgadmin) disabled. m5.2xlarge /
      m5.4xlarge are non-burstable alternatives for steady high-CPU
      workloads.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair name for SSH access

  GhcrToken:
    Type: String
    NoEcho: true
    Description: GitHub Container Registry (ghcr.io) token for pulling private images

  GhcrUser:
    Type: String
    Default: mwashburn160
    Description: GitHub username for GHCR authentication

  SshCidr:
    Type: String
    Default: "0.0.0.0/0"
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    Description: CIDR range allowed for SSH access (recommend restricting to your IP/32)

  EbsVolumeSize:
    Type: Number
    Default: 60
    MinValue: 20
    MaxValue: 200
    Description: Root EBS volume size in GiB (gp3, encrypted). OS, Docker, and minikube only.

  DataVolumeSize:
    Type: Number
    Default: 200
    MinValue: 50
    MaxValue: 1000
    Description: >
      Dedicated data EBS volume size in GiB (gp3, encrypted).
      Stores databases, container registry, Docker build cache, and plugin artifacts.
      200 GiB recommended for 125+ plugins.

  GitRepo:
    Type: String
    Default: "https://github.com/mwashburn160/pipeline-builder.git"
    Description: Git repository URL to clone on the EC2 instance

  GitBranch:
    Type: String
    Default: main
    Description: Git branch to checkout

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasDomain: !Not [!Equals [!Ref DomainName, ""]]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # VPC & Networking
  # ---------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !If
            - HasDomain
            - !Sub "pipeline-builder-${DomainName}"
            - "pipeline-builder"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-public"

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  # ---------------------------------------------------------------------------
  # Security Group (Hardened)
  # ---------------------------------------------------------------------------
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Pipeline Builder EC2 - SSH, HTTP, HTTPS only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # SSH - restricted to SshCidr
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref SshCidr
          Description: SSH access
        # HTTP - required for Let's Encrypt ACME challenge
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: HTTP (LetsEncrypt + redirect)
        # HTTPS - public application access
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: HTTPS (application)
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-sg"

  # ---------------------------------------------------------------------------
  # Elastic IP
  # ---------------------------------------------------------------------------
  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-eip"

  EIPAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      InstanceId: !Ref EC2Instance

  # ---------------------------------------------------------------------------
  # IAM Role (for SSM Session Manager access)
  # ---------------------------------------------------------------------------
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-role"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # ---------------------------------------------------------------------------
  # EC2 Instance (Hardened)
  # ---------------------------------------------------------------------------
  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref EbsVolumeSize
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
        HttpPutResponseHopLimit: 2
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euo pipefail
            exec > >(tee /var/log/user-data.log) 2>&1
            echo "=== Pipeline Builder EC2 Bootstrap ==="
            echo "Domain: ${DomainName}"
            echo "Instance: ${InstanceType}"
            echo "Started: $(date -u)"

            # Export variables for bootstrap.sh
            export DOMAIN="${DomainName}"
            export GHCR_TOKEN="${GhcrToken}"
            export GHCR_USER="${GhcrUser}"
            export GIT_REPO="${GitRepo}"
            export GIT_BRANCH="${GitBranch}"

            # ---- Persistent storage ----
            # EBS mounts at /opt/pipeline (not /opt itself: AMIs may use /opt).
            # Inside: pipeline-builder/ = code (git checkout), pipeline-data/ =
            # runtime state. Falls back to root-volume dir if EBS is missing —
            # boot continues, .ephemeral sentinel surfaces the degraded state.
            PIPELINE_ROOT=/opt/pipeline
            mkdir -p "$PIPELINE_ROOT"

            EBS_OK=0
            echo "Waiting up to 60s for data volume /dev/xvdf..."
            if [ -b /dev/xvdf ] || timeout 60 bash -c 'until [ -b /dev/xvdf ]; do sleep 1; done'; then
              if ! blkid /dev/xvdf >/dev/null 2>&1; then
                echo "Formatting data volume as ext4..."
                mkfs.ext4 -m 1 -L pipeline-data /dev/xvdf
              fi
              if mount /dev/xvdf "$PIPELINE_ROOT"; then
                EBS_OK=1
                DATA_UUID=$(blkid -s UUID -o value /dev/xvdf)
                if ! grep -q "$DATA_UUID" /etc/fstab; then
                  echo "UUID=$DATA_UUID $PIPELINE_ROOT ext4 defaults,nofail 0 2" >> /etc/fstab
                fi
                rm -f "$PIPELINE_ROOT/.ephemeral"
                echo "EBS mounted at $PIPELINE_ROOT (persistent)"
              fi
            fi

            if [ "$EBS_OK" != "1" ]; then
              # Fallback: $PIPELINE_ROOT is a regular dir on the root volume.
              # Boot continues so services come up; sentinel surfaces the
              # degraded state to anything that checks it.
              touch "$PIPELINE_ROOT/.ephemeral"
              echo "WARNING: EBS unavailable — $PIPELINE_ROOT on root volume (ephemeral; lost on instance replace)" >&2
            fi

            # ---- Code ----
            # Install git, then clone or fast-forward. The checkout lives ON
            # the mount, so EBS-mounted runs persist code across instance
            # replacement; fallback runs re-clone from scratch each time.
            dnf install -y git
            INSTALL_DIR="$PIPELINE_ROOT/pipeline-builder"
            if [ -d "$INSTALL_DIR/.git" ]; then
              echo "Existing checkout found — fetching $GIT_BRANCH"
              git -C "$INSTALL_DIR" fetch --all --prune
              git -C "$INSTALL_DIR" checkout "$GIT_BRANCH"
              git -C "$INSTALL_DIR" reset --hard "origin/$GIT_BRANCH"
            else
              echo "Cloning $GIT_REPO ($GIT_BRANCH) to $INSTALL_DIR"
              git clone --branch "$GIT_BRANCH" "$GIT_REPO" "$INSTALL_DIR"
            fi

            # Run bootstrap
            chmod +x "$INSTALL_DIR/deploy/aws/ec2/bin/"*.sh
            export PIPELINE_ROOT
            bash "$INSTALL_DIR/deploy/aws/ec2/bin/bootstrap.sh"

            echo "=== Bootstrap complete: $(date -u) ==="
      Tags:
        - Key: Name
          Value: !If
            - HasDomain
            - !Sub "pipeline-builder-${DomainName}"
            - "pipeline-builder"

  # ---------------------------------------------------------------------------
  # Dedicated Data EBS Volume
  # ---------------------------------------------------------------------------
  DataVolume:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !If
            - HasDomain
            - !Sub "pipeline-builder-data-${DomainName}"
            - "pipeline-builder-data"

  DataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref EC2Instance
      VolumeId: !Ref DataVolume

  # ---------------------------------------------------------------------------
  # Route53 DNS Record (only when DomainName is provided)
  # ---------------------------------------------------------------------------
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      TTL: "300"
      ResourceRecords:
        - !Ref ElasticIP

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  PublicIP:
    Description: Elastic IP address of the EC2 instance
    Value: !Ref ElasticIP

  ApplicationURL:
    Description: Application URL
    Value: !If
      - HasDomain
      - !Sub "https://${DomainName}"
      - !Sub "https://${ElasticIP}"

  SSHCommand:
    Description: SSH command to connect to the instance
    Value: !Sub "ssh -i <your-key>.pem ec2-user@${ElasticIP}"

  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  DataVolumeId:
    Description: Dedicated data EBS volume ID
    Value: !Ref DataVolume

  BootstrapLog:
    Description: Command to check bootstrap progress
    Value: !Sub "ssh -i <your-key>.pem ec2-user@${ElasticIP} 'tail -f /var/log/user-data.log'"
