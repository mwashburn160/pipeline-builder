AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pipeline Builder - EC2 deployment: a private minikube instance fronted by an
  ALB that terminates TLS with an ACM cert (DNS-validated). Hardened security,
  SSM-only access. DeployMode flips the ALB scheme (public/private).

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  DomainName:
    Type: String
    Description: >
      Fully qualified domain name (e.g., pipeline.example.com). REQUIRED — the
      ALB terminates TLS with an ACM cert issued for this name, and the Route53
      alias / private zone resolve to the ALB.

  HostedZoneId:
    Type: String
    Description: >
      Route53 PUBLIC Hosted Zone ID authoritative for DomainName. REQUIRED —
      used for ACM DNS validation (auto-creates the CNAME) and, in public mode,
      the alias A-record to the ALB.

  DeployMode:
    Type: String
    Default: private
    AllowedValues: [public, private]
    Description: >
      Controls the ALB scheme only — the instance is ALWAYS private (no public
      IP) in both modes. public = internet-facing ALB in public subnets.
      private = inside-AWS-only, internal-scheme ALB in private subnets, and the
      template additionally creates the VPC interface endpoints + a Route53
      private zone aliasing the domain to the internal ALB (no separate stack).
      See docs/aws-deployment.md.

  InstanceType:
    Type: String
    Default: t3.2xlarge
    AllowedValues:
      - t3.xlarge
      - t3.2xlarge
      - m5.2xlarge
      - m5.4xlarge
    Description: >
      EC2 instance type. t3.2xlarge (8 vCPU / 32 GiB) is the recommended
      default — the full stack (registry + 3 buildkitd tiers +
      image-registry HPA + plugin HPA + observability) fits the
      namespace ResourceQuota declared in k8s/resource-limits.yaml.
      t3.xlarge (4 vCPU / 16 GiB) works only with optional services
      (prometheus, loki, mongo-express, pgadmin) disabled. m5.2xlarge /
      m5.4xlarge are non-burstable alternatives for steady high-CPU
      workloads.

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: >
      EC2 key pair — assigned for serial-console / break-glass only. There is
      no public SSH ingress; routine access is via SSM Session Manager.

  GhcrToken:
    Type: String
    NoEcho: true
    Description: GitHub Container Registry (ghcr.io) token for pulling private images

  EbsVolumeSize:
    Type: Number
    Default: 60
    MinValue: 20
    MaxValue: 200
    Description: Root EBS volume size in GiB (gp3, encrypted). OS, Docker, and minikube only.

  DataVolumeSize:
    Type: Number
    Default: 500
    MinValue: 50
    MaxValue: 1000
    Description: >
      Dedicated data EBS volume size in GiB (gp3, encrypted).
      Stores databases, container registry, Docker build cache, and plugin artifacts.
      500 GiB default comfortably fits 125+ plugins with prebuilt images; lower it
      (e.g. 200) for slimmer deploys.

  GitRepo:
    Type: String
    Default: "https://github.com/mwashburn160/pipeline-builder.git"
    Description: Git repository URL to clone on the EC2 instance

  GitBranch:
    Type: String
    Default: main
    Description: Git branch to checkout

  EmailEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      When true, provision an SES sending identity for DomainName (Easy DKIM) and
      grant the instance role ses:SendEmail, and set EMAIL_ENABLED in the app .env
      so the platform sends transactional email via SES.

  CreateSesIdentity:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      When true (and EmailEnabled), create the SES EmailIdentity + DKIM CNAMEs for
      DomainName. Set false if the domain is ALREADY a verified SES identity in
      this account/region — a fresh create would fail. IAM + env are still wired.

  EmailFrom:
    Type: String
    Default: ""
    Description: >
      From address the platform sends as (e.g. noreply@example.com). Scopes the
      ses:SendEmail grant via ses:FromAddress. Empty => the app defaults to
      noreply@DomainName.

  EmailFromName:
    Type: String
    Default: "pipeline-builder"
    Description: Display name on outbound platform email.

  AlertEmail:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    Description: >
      Optional address subscribed to the SES bounce/complaint SNS topic for early
      warning before SES throttles the account (you must confirm the subscription
      email AWS sends). Empty => the topic is created but no subscription is added.

  BastionSshCidr:
    Type: String
    Default: "0.0.0.0/0"
    AllowedPattern: "^$|^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    Description: >
      Public SSH jump box (bastion). When set to a CIDR (default 0.0.0.0/0 = SSH from
      ANYWHERE — RESTRICT to a /32 of your IP), a small t3.micro bastion is launched in a
      PUBLIC subnet with an Elastic IP, accepts SSH (22) from this CIDR, and is the ONLY
      source permitted to SSH into the otherwise-private app instance (the app instance
      stays in the private subnet with no public IP). SSH into the app box via the bastion
      (`ssh -J`). Set to EMPTY ("") to create NO bastion (app instance is SSM-only).
      Key-pair auth is required throughout.

  AutoInit:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >
      When true, the instance auto-runs init-platform on first boot (register admin +
      build/publish the bootstrap image + load ALL of plugins/compliance/sample-pipelines),
      so no manual on-box step is needed. Adds ~30-60 min to first boot (plugin image
      builds); progress is in /var/log/user-data.log. SECURITY: this registers the admin
      with the default password (SecurePassword123!) — change it after first login, and
      prefer leaving this false in public mode. Default false (run init-platform manually).

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasDomain: !Not [!Equals [!Ref DomainName, ""]]
  IsPrivate: !Equals [!Ref DeployMode, private]
  IsPublic: !Equals [!Ref DeployMode, public]
  # Bastion is created whenever a CIDR is supplied (default 0.0.0.0/0). Empty disables it.
  BastionEnabled: !Not [!Equals [!Ref BastionSshCidr, ""]]
  SesEnabled: !Equals [!Ref EmailEnabled, "true"]
  HasAlertEmail: !And
    - !Condition SesEnabled
    - !Not [!Equals [!Ref AlertEmail, ""]]
  HasEmailFrom: !Not [!Equals [!Ref EmailFrom, ""]]
  CreateSesIdentityCond: !And
    - !Condition SesEnabled
    - !Equals [!Ref CreateSesIdentity, "true"]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # VPC & Networking
  # ---------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !If
            - HasDomain
            - !Sub "pipeline-builder-${DomainName}"
            - "pipeline-builder"

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------------------------------------------------------------------
  # Subnets — 2 AZs (the ALB requires >=2 subnets in >=2 AZs). The instance +
  # DataVolume stay pinned to AZ0; the AZ1 subnets carry no instance and exist
  # only to satisfy the ALB. Cross-zone load balancing (default ON) sends all
  # traffic to the single AZ0 target.
  # ---------------------------------------------------------------------------
  # Public subnets host the internet-facing ALB (public mode) + the NAT gateway.
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-public-a"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-public-b"

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref RouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

  # ---------------------------------------------------------------------------
  # Private subnets + NAT (ALWAYS — the instance is private in BOTH modes; only
  # the ALB scheme/subnets change). The instance lives in PrivateSubnet (AZ0)
  # with NO public IP; the NAT gateway (PublicSubnet, AZ0) provides outbound for
  # GHCR pulls + OS packages. this template (private mode) creates the VPC interface
  # endpoints in these subnets. Access is via SSM Session Manager.
  # ---------------------------------------------------------------------------
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-private-a"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      MapPublicIpOnLaunch: false
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-private-b"

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-nat-eip"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-nat"

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-private-rt"

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ---------------------------------------------------------------------------
  # ALB security group — the only internet-facing surface. public: 80/443 from
  # the world; private: 80/443 from the VPC CIDR only.
  # ---------------------------------------------------------------------------
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Pipeline Builder ALB - 80/443 ingress
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !If [IsPrivate, !GetAtt VPC.CidrBlock, "0.0.0.0/0"]
          Description: HTTP (redirect to HTTPS)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !If [IsPrivate, !GetAtt VPC.CidrBlock, "0.0.0.0/0"]
          Description: HTTPS (application + registry /v2/)
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-alb-sg"

  # ---------------------------------------------------------------------------
  # Instance security group — NO public ingress. Only the ALB SG reaches the
  # nginx NodePort (30080); shell access is SSM-only (no SSH rule).
  # ---------------------------------------------------------------------------
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Pipeline Builder EC2 - ALB target + SSM only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 30080
          ToPort: 30080
          SourceSecurityGroupId: !Ref AlbSecurityGroup
          Description: nginx HTTP NodePort from the ALB only
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-sg"

  # ---------------------------------------------------------------------------
  # ACM certificate — DNS-validated against the supplied public hosted zone.
  # ACM auto-writes the CNAME and CloudFormation blocks until ISSUED (a few
  # minutes). Publicly trusted, so AWS CodeBuild trusts the gateway on plugin
  # pulls. Replaces the on-instance Let's Encrypt/certbot flow entirely.
  # ---------------------------------------------------------------------------
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-cert"

  # ---------------------------------------------------------------------------
  # Application Load Balancer — internet-facing (public) or internal-scheme
  # (private). Terminates TLS with the ACM cert; forwards plain HTTP to the
  # instance's nginx NodePort. The box never terminates TLS.
  # ---------------------------------------------------------------------------
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "pipeline-builder-alb"
      Scheme: !If [IsPrivate, internal, internet-facing]
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets: !If
        - IsPrivate
        - [!Ref PrivateSubnet, !Ref PrivateSubnet2]
        - [!Ref PublicSubnet, !Ref PublicSubnet2]
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-alb"

  # Targets the EC2 INSTANCE on the nginx HTTP NodePort (30080). startup.sh
  # bridges the instance's primary IP:30080 → the minikube node IP:30080 via a
  # single iptables DNAT, so the ALB health check (HTTP /health) and real
  # traffic traverse the identical path.
  NginxTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "pipeline-builder-tg"
      VpcId: !Ref VPC
      Port: 30080
      Protocol: HTTP
      TargetType: instance
      Targets:
        - Id: !Ref EC2Instance
          Port: 30080
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"

  # Port 80 → 301 redirect to 443 (the redirect lives on the ALB, not nginx).
  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref NginxTargetGroup

  # ---------------------------------------------------------------------------
  # Private mode (IsPrivate): inside-AWS-only prerequisites — folded in from the
  # former private-prereqs.yaml. The ALB's DNS is known in-stack, so the private
  # hosted zone + VPC interface endpoints live here directly (no separate stack).
  # No extra gateway-ingress rule: the ALB SG already allows 443 from the VPC
  # CIDR in private mode.
  # ---------------------------------------------------------------------------
  # SG fronting the interface endpoints (443 from the VPC).
  EndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsPrivate
    Properties:
      GroupDescription: Pipeline Builder VPC interface endpoints
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !GetAtt VPC.CidrBlock
          Description: HTTPS from within the VPC (CodeBuild to endpoints)
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-vpce-sg"

  # Interface endpoints — VPC-attached CodeBuild reaches AWS APIs over PrivateLink
  # instead of leaning on NAT. PrivateDnsEnabled routes the public hostnames here.
  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.logs"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.secretsmanager"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  KmsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.kms"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  StsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.sts"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  CodeBuildEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.codebuild"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.api"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.dkr"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  # S3 must be a GATEWAY endpoint, not Interface: an S3 *interface* endpoint with
  # PrivateDnsEnabled requires a co-existing S3 gateway endpoint (the API rejects it
  # otherwise — "must have a Gateway endpoint for the service"). The gateway endpoint
  # is route-table based (no subnets / SG / private-DNS) and is the path ECR image-layer
  # pulls actually traverse, which is what VPC-attached CodeBuild needs.
  S3Endpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds: [!Ref PrivateRouteTable]

  # Private hosted zone → the domain resolves to the internal ALB for in-VPC
  # clients (and VPC-attached CodeBuild pulling plugin images via /v2/).
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Condition: IsPrivate
    Properties:
      Name: !Ref DomainName
      VPCs:
        - VPCId: !Ref VPC
          VPCRegion: !Ref "AWS::Region"
      HostedZoneConfig:
        Comment: !Sub "pipeline-builder private-mode zone"

  PrivateDomainRecord:
    Type: AWS::Route53::RecordSet
    Condition: IsPrivate
    Properties:
      HostedZoneId: !Ref PrivateHostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ALB.DNSName
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID
        EvaluateTargetHealth: false

  # ---------------------------------------------------------------------------
  # SES sending identity (Easy DKIM) for DomainName — gated on EmailEnabled.
  # The 3 DKIM CNAMEs MUST go to the public HostedZoneId (SES verifies over
  # public DNS) — never the private-mode in-stack zone. Verification is async:
  # the stack reaches CREATE_COMPLETE before SES marks the identity verified.
  # The platform (in minikube) signs with the instance role via IMDS — the
  # instance metadata hop limit is 2 (see MetadataOptions), so pods can reach it.
  # ---------------------------------------------------------------------------
  SesEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Condition: CreateSesIdentityCond
    Properties:
      EmailIdentity: !Ref DomainName
      DkimAttributes:
        SigningEnabled: true

  SesDkimRecord1:
    Type: AWS::Route53::RecordSet
    Condition: CreateSesIdentityCond
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt SesEmailIdentity.DkimDNSTokenName1
      Type: CNAME
      TTL: "1800"
      ResourceRecords:
        - !GetAtt SesEmailIdentity.DkimDNSTokenValue1

  SesDkimRecord2:
    Type: AWS::Route53::RecordSet
    Condition: CreateSesIdentityCond
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt SesEmailIdentity.DkimDNSTokenName2
      Type: CNAME
      TTL: "1800"
      ResourceRecords:
        - !GetAtt SesEmailIdentity.DkimDNSTokenValue2

  SesDkimRecord3:
    Type: AWS::Route53::RecordSet
    Condition: CreateSesIdentityCond
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt SesEmailIdentity.DkimDNSTokenName3
      Type: CNAME
      TTL: "1800"
      ResourceRecords:
        - !GetAtt SesEmailIdentity.DkimDNSTokenValue3

  # ---------------------------------------------------------------------------
  # Bounce/complaint tracking. SES enforces reputation at the ACCOUNT level
  # regardless, so this exists for VISIBILITY: every send routes through this
  # configuration set (platform's SES_CONFIGURATION_SET env, set by bootstrap.sh),
  # whose event destination publishes bounces/complaints/rejects to an SNS topic.
  # Subscribe an address (AlertEmail) to get warned before SES throttles you.
  # ---------------------------------------------------------------------------
  EmailConfigSet:
    Type: AWS::SES::ConfigurationSet
    Condition: SesEnabled
    Properties:
      # Stack-scoped so a second stack in the same account/region doesn't
      # collide on the (globally-unique) config-set / topic names.
      Name: !Sub "${AWS::StackName}-email"
      ReputationOptions:
        ReputationMetricsEnabled: true

  EmailEventsTopic:
    Type: AWS::SNS::Topic
    Condition: SesEnabled
    Properties:
      TopicName: !Sub "${AWS::StackName}-email-events"
      DisplayName: Pipeline Builder SES bounces/complaints

  EmailEventsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Condition: SesEnabled
    Properties:
      Topics:
        - !Ref EmailEventsTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSesPublish
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: sns:Publish
            Resource: !Ref EmailEventsTopic
            Condition:
              StringEquals:
                "AWS:SourceAccount": !Ref "AWS::AccountId"

  EmailEventDestination:
    Type: AWS::SES::ConfigurationSetEventDestination
    Condition: SesEnabled
    # SES verifies it can publish to the topic when the destination is created,
    # so the topic policy granting ses:Publish must exist first.
    DependsOn: EmailEventsTopicPolicy
    Properties:
      ConfigurationSetName: !Ref EmailConfigSet
      EventDestination:
        Name: bounces-complaints
        Enabled: true
        MatchingEventTypes:
          - bounce
          - complaint
          - reject
        SnsDestination:
          TopicARN: !Ref EmailEventsTopic

  EmailAlertSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref EmailEventsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ---------------------------------------------------------------------------
  # IAM Role (for SSM Session Manager access)
  # ---------------------------------------------------------------------------
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      # ses:SendEmail only (the action SESv2 SendEmailCommand uses), scoped to
      # the DomainName identity + the configured From address. Gated on
      # EmailEnabled via a separate policy resource below.
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-role"

  InstanceRoleSesPolicy:
    Type: AWS::IAM::Policy
    Condition: SesEnabled
    Properties:
      PolicyName: pipeline-builder-ses
      Roles:
        - !Ref InstanceRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: SesSendEmail
            Effect: Allow
            Action: ses:SendEmail
            Resource: !Sub "arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}"
            Condition:
              StringEquals:
                # Match the address the platform actually sends from: EmailFrom
                # when set, else the noreply@<domain> default the app uses.
                "ses:FromAddress": !If [HasEmailFrom, !Ref EmailFrom, !Sub "noreply@${DomainName}"]

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  # ---------------------------------------------------------------------------
  # EC2 Instance (Hardened)
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Public SSH jump box (bastion) — created only when BastionSshCidr is set.
  # Lets you SSH into the PRIVATE app instance without giving that instance a
  # public IP: ssh to the bastion, then `ssh -J` through it to the app box.
  # ---------------------------------------------------------------------------
  BastionSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: BastionEnabled
    Properties:
      GroupDescription: Pipeline Builder bastion - public SSH jump box
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref BastionSshCidr
          Description: SSH to the jump box from the allowed CIDR
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: All outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-bastion-sg"

  # Open SSH (22) on the APP instance's SG to the bastion SG ONLY. A standalone
  # ingress resource (not inline on SecurityGroup) so it's purely additive and
  # conditional — the app SG is otherwise unchanged (ALB target + SSM only).
  BastionToInstanceSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: BastionEnabled
    Properties:
      GroupId: !Ref SecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      SourceSecurityGroupId: !Ref BastionSecurityGroup
      Description: SSH from the bastion jump box only

  BastionEip:
    Type: AWS::EC2::EIP
    Condition: BastionEnabled
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-bastion-eip"

  BastionEipAssociation:
    Type: AWS::EC2::EIPAssociation
    Condition: BastionEnabled
    Properties:
      AllocationId: !GetAtt BastionEip.AllocationId
      InstanceId: !Ref BastionInstance

  BastionInstance:
    Type: AWS::EC2::Instance
    Condition: BastionEnabled
    Properties:
      InstanceType: t3.micro
      KeyName: !Ref KeyPairName
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref BastionSecurityGroup
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
        HttpPutResponseHopLimit: 1
      Tags:
        - Key: Name
          Value: !Sub "pipeline-builder-bastion"

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      # Always private now — the ALB is the only entry point, in both modes.
      SubnetId: !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      IamInstanceProfile: !Ref InstanceProfile
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: !Ref EbsVolumeSize
            VolumeType: gp3
            Encrypted: true
            DeleteOnTermination: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
        HttpPutResponseHopLimit: 2
      UserData:
        Fn::Base64:
          Fn::Sub: |
            #!/bin/bash
            set -euo pipefail
            exec > >(tee /var/log/user-data.log) 2>&1
            echo "=== Pipeline Builder EC2 Bootstrap ==="
            echo "Domain: ${DomainName}"
            echo "Instance: ${InstanceType}"
            echo "Started: $(date -u)"

            # Export variables for bootstrap.sh
            export DOMAIN="${DomainName}"
            export GHCR_TOKEN="${GhcrToken}"
            # ghcr.io ignores the username for PAT auth; fixed to the image owner.
            export GHCR_USER="mwashburn160"
            export GIT_REPO="${GitRepo}"
            export GIT_BRANCH="${GitBranch}"
            # When "true", bootstrap.sh runs init-platform (all loads) after the cluster is up.
            export AUTO_INIT="${AutoInit}"
            # AWS_REGION is the ACTUAL deploy region (the SES identity is regional;
            # bootstrap.sh pins SES_REGION to it instead of the static .env default).
            export AWS_REGION="${AWS::Region}"
            export EMAIL_ENABLED="${EmailEnabled}"
            export EMAIL_FROM="${EmailFrom}"
            export EMAIL_FROM_NAME="${EmailFromName}"
            # Must match the EmailConfigSet resource name (stack-scoped).
            export SES_CONFIGURATION_SET="${AWS::StackName}-email"

            # ---- Persistent storage ----
            # EBS mounts at /opt/pipeline (not /opt itself: AMIs may use /opt).
            # Inside: pipeline-builder/ = code (git checkout), pipeline-data/ =
            # runtime state. Falls back to root-volume dir if EBS is missing —
            # boot continues, .ephemeral sentinel surfaces the degraded state.
            PIPELINE_ROOT=/opt/pipeline
            mkdir -p "$PIPELINE_ROOT"

            EBS_OK=0
            echo "Waiting up to 60s for data volume /dev/xvdf..."
            if [ -b /dev/xvdf ] || timeout 60 bash -c 'until [ -b /dev/xvdf ]; do sleep 1; done'; then
              if ! blkid /dev/xvdf >/dev/null 2>&1; then
                echo "Formatting data volume as ext4..."
                mkfs.ext4 -m 1 -L pipeline-data /dev/xvdf
              fi
              if mount /dev/xvdf "$PIPELINE_ROOT"; then
                EBS_OK=1
                DATA_UUID=$(blkid -s UUID -o value /dev/xvdf)
                if ! grep -q "$DATA_UUID" /etc/fstab; then
                  echo "UUID=$DATA_UUID $PIPELINE_ROOT ext4 defaults,nofail 0 2" >> /etc/fstab
                fi
                rm -f "$PIPELINE_ROOT/.ephemeral"
                echo "EBS mounted at $PIPELINE_ROOT (persistent)"
              fi
            fi

            if [ "$EBS_OK" != "1" ]; then
              # Fallback: $PIPELINE_ROOT is a regular dir on the root volume.
              # Boot continues so services come up; sentinel surfaces the
              # degraded state to anything that checks it.
              touch "$PIPELINE_ROOT/.ephemeral"
              echo "WARNING: EBS unavailable — $PIPELINE_ROOT on root volume (ephemeral; lost on instance replace)" >&2
            fi

            # ---- Code ----
            # Install git, then clone or fast-forward. The checkout lives ON
            # the mount, so EBS-mounted runs persist code across instance
            # replacement; fallback runs re-clone from scratch each time.
            dnf install -y git
            INSTALL_DIR="$PIPELINE_ROOT/pipeline-builder"
            if [ -d "$INSTALL_DIR/.git" ]; then
              echo "Existing checkout found — fetching $GIT_BRANCH"
              git -C "$INSTALL_DIR" fetch --all --prune
              git -C "$INSTALL_DIR" checkout "$GIT_BRANCH"
              git -C "$INSTALL_DIR" reset --hard "origin/$GIT_BRANCH"
            else
              echo "Cloning $GIT_REPO ($GIT_BRANCH) to $INSTALL_DIR"
              git clone --branch "$GIT_BRANCH" "$GIT_REPO" "$INSTALL_DIR"
            fi

            # Run bootstrap
            chmod +x "$INSTALL_DIR/deploy/aws/ec2/bin/"*.sh
            export PIPELINE_ROOT
            bash "$INSTALL_DIR/deploy/aws/ec2/bin/bootstrap.sh"

            echo "=== Bootstrap complete: $(date -u) ==="
      Tags:
        - Key: Name
          Value: !If
            - HasDomain
            - !Sub "pipeline-builder-${DomainName}"
            - "pipeline-builder"

  # ---------------------------------------------------------------------------
  # Dedicated Data EBS Volume
  # ---------------------------------------------------------------------------
  DataVolume:
    Type: AWS::EC2::Volume
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !If
            - HasDomain
            - !Sub "pipeline-builder-data-${DomainName}"
            - "pipeline-builder-data"

  DataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref EC2Instance
      VolumeId: !Ref DataVolume

  # ---------------------------------------------------------------------------
  # Route53 public A-record → ALB alias (public mode). In private mode the
  # gateway is resolved via the in-stack Route53 PRIVATE zone
  # (PrivateHostedZone/PrivateDomainRecord above), so no public record here.
  # ---------------------------------------------------------------------------
  DNSRecord:
    Type: AWS::Route53::RecordSet
    Condition: IsPublic
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ALB.DNSName
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID
        EvaluateTargetHealth: false

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  ApplicationURL:
    Description: Application URL
    Value: !Sub "https://${DomainName}"

  AlbDnsName:
    Description: ALB DNS name (the ALB endpoint)
    Value: !GetAtt ALB.DNSName

  AlbCanonicalHostedZoneId:
    Description: ALB canonical hosted zone ID (informational)
    Value: !GetAtt ALB.CanonicalHostedZoneID

  AlbSecurityGroupId:
    Description: ALB SG ID (the ALB security group)
    Value: !Ref AlbSecurityGroup

  SSHCommand:
    Description: Connect to the app instance via SSM (always available, no public IP)
    Value: !Sub "aws ssm start-session --target ${EC2Instance} --region ${AWS::Region}"

  BastionPublicIp:
    Condition: BastionEnabled
    Description: Public Elastic IP of the SSH jump box
    Value: !Ref BastionEip

  BastionSshCommand:
    Condition: BastionEnabled
    Description: SSH to the jump box
    Value: !Sub "ssh -i <path-to-${KeyPairName}.pem> ec2-user@${BastionEip}"

  InstanceSshViaBastion:
    Condition: BastionEnabled
    Description: SSH into the private app instance, hopping through the bastion
    Value: !Sub "ssh -i <path-to-${KeyPairName}.pem> -J ec2-user@${BastionEip} ec2-user@${EC2Instance.PrivateIp}"

  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref EC2Instance

  DataVolumeId:
    Description: Dedicated data EBS volume ID
    Value: !Ref DataVolume

  BootstrapLog:
    Description: How to watch bootstrap progress
    Value: !Sub "aws ssm start-session --target ${EC2Instance} --region ${AWS::Region}  # then: sudo tail -f /var/log/user-data.log"

  # Inputs for private mode: feed the instance .env
  # and the instance .env (PIPELINE_VPC_ID / PIPELINE_SUBNET_IDS).
  VpcId:
    Description: VPC ID (.env PIPELINE_VPC_ID)
    Value: !Ref VPC

  SubnetIds:
    Description: Private subnet IDs (.env PIPELINE_SUBNET_IDS)
    Value: !Join [",", [!Ref PrivateSubnet, !Ref PrivateSubnet2]]

  VpcCidr:
    Description: VPC CIDR (informational)
    Value: !GetAtt VPC.CidrBlock

  SecurityGroupId:
    Description: Instance SG ID
    Value: !Ref SecurityGroup

  InstancePrivateIp:
    Description: Instance private IP
    Value: !GetAtt EC2Instance.PrivateIp

  EmailEventsTopicArn:
    Condition: SesEnabled
    Description: SNS topic publishing SES bounces/complaints — subscribe to monitor reputation
    Value: !Ref EmailEventsTopic
