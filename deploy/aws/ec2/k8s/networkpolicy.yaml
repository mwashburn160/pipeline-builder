---
# =============================================================================
# Default Deny All Ingress
# =============================================================================
# NOTE: Requires a CNI that supports NetworkPolicy (e.g., Calico).
# Without one, these policies are silently ignored (safe to apply).
# Enable with: minikube start --cni=calico
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# =============================================================================
# Nginx Gateway — ingress from anywhere (NodePort entry point)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-ingress
spec:
  podSelector:
    matchLabels:
      app: nginx
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8443
        - port: 8080

---
# =============================================================================
# API Services — ingress from nginx only
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-from-nginx
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [platform, pipeline, plugin, message, quota, billing, frontend]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx
      ports:
        - port: 3000

---
# =============================================================================
# Quota — ingress from platform, pipeline, plugin, billing
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-quota-from-services
spec:
  podSelector:
    matchLabels:
      app: quota
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [platform, pipeline, plugin, message, billing]
      ports:
        - port: 3000

---
# =============================================================================
# Postgres — ingress from platform, pipeline, plugin, message, pgadmin
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [platform, pipeline, plugin, message, pgadmin]
      ports:
        - port: 5432

---
# =============================================================================
# MongoDB — ingress from platform, quota, billing, mongo-express
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mongodb-ingress
spec:
  podSelector:
    matchLabels:
      app: mongodb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [platform, quota, billing, mongo-express]
      ports:
        - port: 27017

---
# =============================================================================
# Redis — ingress from plugin
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: plugin
      ports:
        - port: 6379

---
# =============================================================================
# Registry — ingress from plugin, registry-express, nginx
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-registry-ingress
spec:
  podSelector:
    matchLabels:
      app: registry
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [plugin, registry-express, nginx]
      ports:
        - port: 5000

---
# =============================================================================
# Loki — ingress from promtail, grafana
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loki-ingress
spec:
  podSelector:
    matchLabels:
      app: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [promtail, grafana]
      ports:
        - port: 3100

---
# =============================================================================
# Prometheus — ingress from grafana
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - port: 9090

---
# =============================================================================
# Grafana — ingress from nginx
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana-ingress
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx
      ports:
        - port: 3000

---
# =============================================================================
# Admin UIs — ingress from nginx
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-admin-uis-ingress
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [pgadmin, mongo-express, registry-express]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: nginx
      ports:
        - port: 80
        - port: 8081

---
# =============================================================================
# Prometheus Scraping — allow from prometheus to all pods on metrics ports
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scraping
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [platform, pipeline, plugin, message, quota, billing, frontend, nginx, grafana, loki]
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 3000
        - port: 3100
        - port: 8443
        - port: 9090

---
# =============================================================================
# DNS Egress — all pods need DNS resolution
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# =============================================================================
# Internal Egress — allow pods to communicate within the namespace
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-egress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector: {}

---
# =============================================================================
# Plugin External Egress — plugin needs to pull images and push to registry
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-plugin-external-egress
spec:
  podSelector:
    matchLabels:
      app: plugin
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP

---
# =============================================================================
# Billing External Egress — billing may call external payment providers
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-billing-external-egress
spec:
  podSelector:
    matchLabels:
      app: billing
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP

---
# =============================================================================
# Promtail & Prometheus Kube API Egress — service discovery needs API access
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kube-api-egress
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [promtail, prometheus]
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
          protocol: TCP
        - port: 443
          protocol: TCP
        - port: 10250
          protocol: TCP

---
# =============================================================================
# Plugin Build Isolation — restrict plugin pod egress during builds
# =============================================================================
# Overrides the broad allow-internal-egress for plugin pods.
# Plugin pods can only reach registry, postgres, redis, DNS, and HTTPS/HTTP.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: plugin-build-isolation
  namespace: pipeline-builder
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: plugin
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow registry access
    - to:
        - podSelector:
            matchLabels:
              app: registry
      ports:
        - port: 5000
    # Allow PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    # Allow Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # Allow outbound HTTPS (package downloads)
    - to: []
      ports:
        - port: 443
        - port: 80
