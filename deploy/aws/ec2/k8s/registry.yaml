---
# =============================================================================
# Docker Registry Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: registry
  labels:
    app: registry
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: registry
  selector:
    app: registry

---
# =============================================================================
# Registry PersistentVolume (hostPath)
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: registry-pv
  labels:
    app: registry
spec:
  storageClassName: ""
  capacity:
    storage: 80Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data/registry-data
    type: DirectoryOrCreate

---
# =============================================================================
# Registry PersistentVolumeClaim
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  labels:
    app: registry
spec:
  storageClassName: ""
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 80Gi
  selector:
    matchLabels:
      app: registry

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  labels:
    app: registry
    app.kubernetes.io/component: registry
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
        app.kubernetes.io/component: registry
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /var/lib/registry"]
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
          securityContext:
            runAsUser: 0
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "50m"
              memory: 32Mi
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
              name: registry
          securityContext:
            allowPrivilegeEscalation: false
          env:
            # Token-based auth — registry delegates to pipeline-image-registry's
            # /token endpoint. Every pull/push requires a bearer JWT signed
            # with the keypair in registry-token-secret. Anonymous reads are
            # disabled; htpasswd has been removed.
            - name: REGISTRY_AUTH
              value: "token"
            - name: REGISTRY_AUTH_TOKEN_REALM
              value: "https://platform.local/image-registry/token"
            - name: REGISTRY_AUTH_TOKEN_SERVICE
              value: "pipeline-image-registry"
            - name: REGISTRY_AUTH_TOKEN_ISSUER
              value: "platform"
            - name: REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE
              value: "/etc/registry/jwt-public.pem"
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
            - name: REGISTRY_HTTP_TLS_KEY
              value: "/etc/ssl/private/tls.key"
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: "/etc/ssl/certs/tls.crt"
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          resources:
            limits:
              cpu: "400m"
              memory: 512Mi
            requests:
              cpu: "75m"
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/registry
            - name: registry-tls
              mountPath: /etc/ssl/certs/tls.crt
              subPath: tls.crt
              readOnly: true
            - name: registry-tls
              mountPath: /etc/ssl/private/tls.key
              subPath: tls.key
              readOnly: true
            - name: registry-token-cert
              mountPath: /etc/registry/jwt-public.pem
              subPath: jwt-public.pem
              readOnly: true
      volumes:
        - name: registry-data
          persistentVolumeClaim:
            claimName: registry-data
        - name: registry-tls
          secret:
            secretName: registry-tls-secret
        - name: registry-token-cert
          secret:
            # Same keypair pipeline-image-registry uses for signing.
            # Operator creates this secret from openssl-generated cert via:
            #   kubectl create secret generic registry-token-secret \
            #     --from-file=jwt-public.pem=registry-token.crt \
            #     --from-file=jwt-private.pem=registry-token.key \
            #     -n pipeline-builder
            secretName: registry-token-secret
            items:
              - key: jwt-public.pem
                path: jwt-public.pem
