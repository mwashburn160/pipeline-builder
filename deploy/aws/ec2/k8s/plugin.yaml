---
# =============================================================================
# Plugin Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: plugin

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugin
  labels:
    app: plugin
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: plugin
  template:
    metadata:
      labels:
        app: plugin
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: plugin
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-dependencies
          image: busybox
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "50m"
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres.pipeline-builder 5432; do sleep 3; done
              echo "Waiting for redis..."
              until nc -z redis.pipeline-builder 6379; do sleep 3; done
              echo "Waiting for quota..."
              until wget -qO- http://quota:3000/health > /dev/null 2>&1; do sleep 3; done
              echo "Dependencies ready"
      containers:
        - name: plugin
          image: ghcr.io/mwashburn160/plugin:1.41.5
          # Runs as root — Kaniko requires root to chown files during image builds
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: app-env
            - secretRef:
                name: jwt-secret
            - secretRef:
                name: postgres-secret
            - secretRef:
                name: registry-secret
          env:
            - name: SERVICE_NAME
              value: "plugin"
            - name: IMAGE_REGISTRY_HOST
              value: "registry"
            - name: IMAGE_REGISTRY_PORT
              value: "5000"
            - name: DOCKER_REGISTRY_HTTP
              value: "true"
            - name: DOCKER_REGISTRY_INSECURE
              value: "true"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          resources:
            limits:
              cpu: "1500m"
              memory: 2048Mi
            requests:
              cpu: "750m"
              memory: 1024Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
      volumes:
        - name: uploads
          emptyDir:
            sizeLimit: 512Mi

---
# =============================================================================
# Plugin HorizontalPodAutoscaler
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: plugin
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300

---
# =============================================================================
# Plugin KEDA ScaledObject — scales on BullMQ queue depth
# =============================================================================
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  scaleTargetRef:
    name: plugin
  minReplicaCount: 1
  maxReplicaCount: 4
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: redis
      metadata:
        address: redis.pipeline-builder.svc.cluster.local:6379
        listName: "bull:plugin-build:wait"
        listLength: "2"
        activationListLength: "1"

---
# =============================================================================
# Plugin PodDisruptionBudget
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: plugin
