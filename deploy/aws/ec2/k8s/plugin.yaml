---
# =============================================================================
# Plugin Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: plugin

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugin
  labels:
    app: plugin
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: plugin
  template:
    metadata:
      labels:
        app: plugin
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      # The plugin pod orchestrates user-supplied Dockerfile builds via the
      # rootless buildkitd sidecar. The plugin doesn't talk to the k8s API, so
      # don't mount a service-account token — keeps the build sandbox from
      # being able to enumerate cluster state if a malicious build escapes.
      automountServiceAccountToken: false
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: plugin
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "50m"
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres 5432; do sleep 3; done
              echo "Waiting for redis..."
              until nc -z redis 6379; do sleep 3; done
              echo "Dependencies ready"
        # Rootless buildkitd as a native sidecar (k8s 1.28+: restartPolicy: Always
        # in initContainers). Replaces the previous privileged dind container —
        # no SYS_ADMIN, no privileged mode, no CA-trust shell wrapper. buildkitd
        # uses the system CA bundle baked into moby/buildkit:rootless directly.
        - name: buildkitd
          image: moby/buildkit:v0.16.0-rootless
          restartPolicy: Always
          args:
            - --addr
            - unix:///run/user/1000/buildkit/buildkitd.sock
            # rootless workers spawn their own subprocess sandbox; in unprivileged
            # k8s this is disabled in favor of the outer pod-level isolation.
            - --oci-worker-no-process-sandbox
            # Mirror docker.io → in-cluster registry so plugin Dockerfiles
            # using bare `FROM pipeline-plugin-base:24.04` resolve there.
            - --config
            - /home/user/.config/buildkit/buildkitd.toml
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            # Rootless buildkit needs several things to start. Don't trim
            # any of these without testing the full plugin-build flow:
            #  - seccompProfile=Unconfined: rootlesskit's `unshare` and
            #    related syscalls aren't all in the RuntimeDefault profile.
            #  - capabilities.add=[SETUID,SETGID]: newuidmap/newgidmap
            #    (the SETUID-helper binaries that write /proc/<pid>/uid_map
            #    and gid_map) need these in the *bounding set*, otherwise
            #    their file-caps can't be granted at exec time. Dropping
            #    them with no add was the root cause of the prior
            #    `newuidmap … operation not permitted` startup failure.
            seccompProfile:
              type: Unconfined
            capabilities:
              drop: ["ALL"]
              add: ["SETUID", "SETGID"]
          volumeMounts:
            - name: buildkit-socket
              mountPath: /run/user/1000/buildkit
            - name: buildkit-cache
              mountPath: /home/user/.local/share/buildkit
            - name: buildkitd-config
              mountPath: /home/user/.config/buildkit
              readOnly: true
          resources:
            limits:
              cpu: "1500m"
              memory: 2048Mi
            requests:
              cpu: "500m"
              memory: 512Mi
          startupProbe:
            exec:
              command: ["buildctl", "--addr", "unix:///run/user/1000/buildkit/buildkitd.sock", "debug", "workers"]
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            exec:
              command: ["buildctl", "--addr", "unix:///run/user/1000/buildkit/buildkitd.sock", "debug", "workers"]
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
      containers:
        - name: plugin
          image: ghcr.io/mwashburn160/plugin:3.4.62
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: app-env
            - secretRef:
                name: jwt-secret
            - secretRef:
                name: postgres-secret
          env:
            - name: SERVICE_NAME
              value: "plugin"
            - name: IMAGE_REGISTRY_HOST
              value: "registry"
            - name: IMAGE_REGISTRY_PORT
              value: "5000"
            - name: IMAGE_REGISTRY_HTTP
              value: "true"
            # BUILDKIT_HOST is the *last-resort* fallback when no tier is
            # provided AND no PLUGIN_BUILDKIT_ADDR_* default matches the
            # billing-enabled state. Points at the in-pod sidecar so
            # builds never strand if every per-tier deployment is down.
            - name: BUILDKIT_HOST
              value: "unix:///run/buildkit/buildkitd.sock"
            # Per-tier buildkitd addresses. The plugin worker picks one
            # based on the build's tier; the *default* tier (used when no
            # tier is set) is selected via BILLING_ENABLED below:
            #   BILLING_ENABLED=true  → developer  (cheap default, prod)
            #   BILLING_ENABLED=false → unlimited  (no quota; self-hosted)
            - name: PLUGIN_BUILDKIT_ADDR_DEVELOPER
              value: "tcp://buildkitd-developer:1234"
            - name: PLUGIN_BUILDKIT_ADDR_PRO
              value: "tcp://buildkitd-pro:1234"
            - name: PLUGIN_BUILDKIT_ADDR_UNLIMITED
              value: "tcp://buildkitd-unlimited:1234"
            - name: BILLING_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: app-env
                  key: BILLING_ENABLED
                  optional: true
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: COMPLIANCE_SERVICE_HOST
              value: "compliance"
            - name: COMPLIANCE_SERVICE_PORT
              value: "3000"
            - name: COMPLIANCE_BYPASS
              value: "false"
            - name: PLUGIN_MAX_UPLOAD_MB
              value: "4096"
            - name: DOCKER_BUILD_TIMEOUT_MS
              value: "900000"
            - name: TMPDIR
              value: "/tmp"
          volumeMounts:
            - name: tmp
              mountPath: /app/tmp
            - name: uploads
              mountPath: /app/uploads
            - name: buildkit-socket
              mountPath: /run/buildkit
            # readOnlyRootFilesystem: true means the Node.js process can't
            # write anywhere under `/` — but it needs a tempdir (TMPDIR=/tmp
            # above) for plugin tarball staging.
            - name: scratch-tmp
              mountPath: /tmp
          resources:
            limits:
              cpu: "1500m"
              memory: 2048Mi
            requests:
              cpu: "750m"
              memory: 1024Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
      volumes:
        - name: tmp
          hostPath:
            path: /mnt/data/plugins-data/builds
            type: DirectoryOrCreate
        - name: uploads
          hostPath:
            path: /mnt/data/plugins-data/uploads
            type: DirectoryOrCreate
        # Shared socket between buildkitd sidecar and plugin container.
        - name: buildkit-socket
          emptyDir:
            medium: Memory
        # buildkitd's layer cache. emptyDir loses cache on pod restart —
        # acceptable for the EC2 single-node deploy. For multi-node, switch
        # to a PVC or the `--export-cache=type=registry` flag.
        - name: buildkit-cache
          emptyDir:
            sizeLimit: 20Gi
        - name: scratch-tmp
          emptyDir:
            sizeLimit: 1Gi
        - name: buildkitd-config
          configMap:
            name: buildkitd-config

---
# =============================================================================
# Plugin KEDA ScaledObject — scales on BullMQ queue depth + CPU
# (KEDA creates its own HPA — no standalone HPA needed)
# =============================================================================
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  scaleTargetRef:
    name: plugin
  minReplicaCount: 1
  maxReplicaCount: 4
  pollingInterval: 15
  cooldownPeriod: 120
  triggers:
    - type: redis
      metadata:
        address: redis.pipeline-builder.svc.cluster.local:6379
        listName: "bull:plugin-build:wait"
        listLength: "2"
        activationListLength: "1"

---
# =============================================================================
# Plugin PodDisruptionBudget
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: plugin
  labels:
    app: plugin
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: plugin
