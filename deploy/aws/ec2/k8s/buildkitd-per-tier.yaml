---
# =============================================================================
#  Per-tier buildkitd Deployments.
# =============================================================================
#
# Three independent rootless buildkitd pods, one per quota tier. Each gets
# its own pid + mount + network namespace, so a build from one tier cannot
# read or pollute another tier's filesystem cache, in-flight layers, or
# tmpfs scratch space.
#
# Activation: set on the plugin service
#   PLUGIN_BUILDKIT_ADDR_DEVELOPER=tcp://buildkitd-developer:1234
#   PLUGIN_BUILDKIT_ADDR_PRO=tcp://buildkitd-pro:1234
#   PLUGIN_BUILDKIT_ADDR_UNLIMITED=tcp://buildkitd-unlimited:1234
# and restart the plugin pod. Without these env vars the plugin worker
# falls through to the in-pod buildkitd sidecar — existing single-tier
# deploys keep working unchanged.
#
# Once operators verify the tiered path is healthy they can remove the
# sidecar from `plugin.yaml` to reclaim the per-pod buildkitd memory.
# See docs/plans/follow-ups.md for the cutover runbook.
#
# Resource sizing is per-tier — Developer gets the smallest budget because
# its builds are typically small (cookiecutter / pip install); Pro and
# Unlimited size up for larger images. Operators tune via the patches/
# overlay system.

---
# buildkitd config shared by all per-tier deployments. The docker.io
# mirror lets plugin Dockerfiles use bare base references (e.g.
# `FROM pipeline-plugin-base:24.04`) — buildkit redirects those lookups
# at the in-cluster registry instead of Docker Hub (which doesn't host
# our base images).
apiVersion: v1
kind: ConfigMap
metadata:
  name: buildkitd-config
  namespace: pipeline-builder
data:
  buildkitd.toml: |
    [registry."docker.io"]
      mirrors = ["registry:5000"]

    [registry."registry:5000"]
      # Registry serves plain HTTP on its in-cluster ClusterIP service —
      # nginx fronts it on HTTPS for external clients. Plain HTTP here
      # avoids the buildkit-vs-crane scheme-mismatch deadlock on the
      # token realm (see registry.yaml for the full rationale).
      http = true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd-developer
  labels:
    app: buildkitd
    tier: developer
    app.kubernetes.io/component: build-isolation
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: buildkitd
      tier: developer
  template:
    metadata:
      labels:
        app: buildkitd
        tier: developer
    spec:
      automountServiceAccountToken: false
      securityContext:
        # Rootless buildkitd runs as uid 1000 inside the container; map the
        # volume to that uid via fsGroup.
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.16.0-rootless
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
            # Mirror docker.io → in-cluster registry so plugin Dockerfiles
            # using bare `FROM pipeline-plugin-base:24.04` resolve to images
            # that live in the cluster, not Docker Hub.
            - --config
            - /home/user/.config/buildkit/buildkitd.toml
          ports:
            - containerPort: 1234
              name: buildkitd
          volumeMounts:
            - name: buildkitd-config
              mountPath: /home/user/.config/buildkit
              readOnly: true
          # Same rootless container settings as the in-pod sidecar — see
          # plugin.yaml's buildkitd container for the rationale on each.
          securityContext:
            seccompProfile:
              type: Unconfined
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
              # newuidmap/newgidmap (the SETUID-helper binaries that
              # write /proc/<pid>/uid_map and gid_map for rootlesskit)
              # need these in the *bounding set* — otherwise their
              # file-caps can't be granted at exec time and rootlesskit
              # fails with "newuidmap … operation not permitted" at
              # startup. Same setting as the in-pod sidecar in plugin.yaml.
              add: ["SETUID", "SETGID"]
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: "100m"
              memory: 128Mi
          readinessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://0.0.0.0:1234", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://0.0.0.0:1234", "debug", "workers"]
            initialDelaySeconds: 30
            periodSeconds: 60
      volumes:
        - name: buildkitd-config
          configMap:
            name: buildkitd-config

---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd-developer
spec:
  type: ClusterIP
  selector:
    app: buildkitd
    tier: developer
  ports:
    - port: 1234
      targetPort: 1234
      name: buildkitd

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd-pro
  labels:
    app: buildkitd
    tier: pro
    app.kubernetes.io/component: build-isolation
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: buildkitd
      tier: pro
  template:
    metadata:
      labels:
        app: buildkitd
        tier: pro
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.16.0-rootless
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
            # Mirror docker.io → in-cluster registry so plugin Dockerfiles
            # using bare `FROM pipeline-plugin-base:24.04` resolve to images
            # that live in the cluster, not Docker Hub.
            - --config
            - /home/user/.config/buildkit/buildkitd.toml
          ports:
            - containerPort: 1234
              name: buildkitd
          volumeMounts:
            - name: buildkitd-config
              mountPath: /home/user/.config/buildkit
              readOnly: true
          securityContext:
            seccompProfile:
              type: Unconfined
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
              # newuidmap/newgidmap (the SETUID-helper binaries that
              # write /proc/<pid>/uid_map and gid_map for rootlesskit)
              # need these in the *bounding set* — otherwise their
              # file-caps can't be granted at exec time and rootlesskit
              # fails with "newuidmap … operation not permitted" at
              # startup. Same setting as the in-pod sidecar in plugin.yaml.
              add: ["SETUID", "SETGID"]
          resources:
            limits:
              cpu: "2"
              memory: 1Gi
            requests:
              cpu: "200m"
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://0.0.0.0:1234", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://0.0.0.0:1234", "debug", "workers"]
            initialDelaySeconds: 30
            periodSeconds: 60
      volumes:
        - name: buildkitd-config
          configMap:
            name: buildkitd-config

---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd-pro
spec:
  type: ClusterIP
  selector:
    app: buildkitd
    tier: pro
  ports:
    - port: 1234
      targetPort: 1234
      name: buildkitd

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buildkitd-unlimited
  labels:
    app: buildkitd
    tier: unlimited
    app.kubernetes.io/component: build-isolation
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: buildkitd
      tier: unlimited
  template:
    metadata:
      labels:
        app: buildkitd
        tier: unlimited
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: buildkitd
          image: moby/buildkit:v0.16.0-rootless
          args:
            - --addr
            - tcp://0.0.0.0:1234
            - --oci-worker-no-process-sandbox
            # Mirror docker.io → in-cluster registry so plugin Dockerfiles
            # using bare `FROM pipeline-plugin-base:24.04` resolve to images
            # that live in the cluster, not Docker Hub.
            - --config
            - /home/user/.config/buildkit/buildkitd.toml
          ports:
            - containerPort: 1234
              name: buildkitd
          volumeMounts:
            - name: buildkitd-config
              mountPath: /home/user/.config/buildkit
              readOnly: true
          securityContext:
            seccompProfile:
              type: Unconfined
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
              # newuidmap/newgidmap (the SETUID-helper binaries that
              # write /proc/<pid>/uid_map and gid_map for rootlesskit)
              # need these in the *bounding set* — otherwise their
              # file-caps can't be granted at exec time and rootlesskit
              # fails with "newuidmap … operation not permitted" at
              # startup. Same setting as the in-pod sidecar in plugin.yaml.
              add: ["SETUID", "SETGID"]
          resources:
            limits:
              # Capped at 2 CPU (down from 4) so the unlimited tier fits
              # inside the namespace ResourceQuota's limits.cpu budget on
              # single-node minikube. Memory stays at 2Gi to keep
              # unlimited meaningfully larger than pro on at least one
              # axis. Bump back to 4 on a clusters with >16 CPU quota.
              cpu: "2"
              memory: 2Gi
            requests:
              cpu: "500m"
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://0.0.0.0:1234", "debug", "workers"]
            initialDelaySeconds: 5
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["buildctl", "--addr", "tcp://0.0.0.0:1234", "debug", "workers"]
            initialDelaySeconds: 30
            periodSeconds: 60
      volumes:
        - name: buildkitd-config
          configMap:
            name: buildkitd-config

---
apiVersion: v1
kind: Service
metadata:
  name: buildkitd-unlimited
spec:
  type: ClusterIP
  selector:
    app: buildkitd
    tier: unlimited
  ports:
    - port: 1234
      targetPort: 1234
      name: buildkitd

---
# =============================================================================
# Ingress gate — only the plugin pod may talk to any tier's buildkitd.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-buildkitd-from-plugin
spec:
  podSelector:
    matchLabels:
      app: buildkitd
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: plugin
      ports:
        - port: 1234
          protocol: TCP
