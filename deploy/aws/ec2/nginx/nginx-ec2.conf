# Load NJS Module
load_module modules/ngx_http_js_module.so;

# Environment Variables
env JWT_SECRET;

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    error_log /var/log/nginx/error.log info;

    # Custom Log Format for Tracing and Observability
    log_format proxy_custom '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'org_id:"$jwt_org_id" user_id:"$jwt_user_id" role:"$jwt_role" rid:"$request_id" '
                            'svc:"$service" upstream:"$upstream_addr" '
                            'urt:"$upstream_response_time" rt:"$request_time"';

    access_log /var/log/nginx/access.log proxy_custom;

    # NJS Integration
    js_path "/etc/nginx/njs/";
    js_import jwt from jwt.js;
    js_import metrics from metrics.js;
    js_import registry_auth from registry-auth.js;

    # These variables execute the logic in your jwt.js
    js_set $jwt_org_id jwt.get_org_id;
    js_set $jwt_user_id jwt.get_user_id;
    js_set $jwt_role jwt.get_role;
    js_set $jwt_username jwt.get_username;

    # Cache-Control: allow short browser caching on GET API responses
    # POST/PUT/DELETE responses are always no-store
    map $request_method $cache_control_header {
        GET     "private, max-age=10, stale-while-revalidate=30";
        default "no-store";
    }

    # General Settings
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Kubernetes DNS Resolver (kube-dns / CoreDNS)
    resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;

    # Global Proxy Settings (Inherited by all locations)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    # Trust the ALB's X-Forwarded-Proto (it terminates TLS; the ALB->nginx hop
    # is plain http, so $scheme would wrongly say "http").
    proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    proxy_set_header X-Request-ID      $request_id;
    proxy_set_header Authorization     $http_authorization;

    # Injecting the identity context extracted from JWT
    proxy_set_header x-org-id          $jwt_org_id;
    proxy_set_header x-user-id         $jwt_user_id;
    proxy_set_header x-user-role       $jwt_role;
    proxy_set_header x-request-id      $request_id;

    # Single gateway server, plain HTTP on :8080. The ALB terminates TLS (ACM)
    # and performs the 80->443 redirect; it forwards plain HTTP to this
    # instance's nginx NodePort (30080). The box no longer terminates TLS, so
    # there is no ssl_certificate / no :8443 server and no cert on disk.
    server {
        listen 8080;
        server_name _;

        # Response Compression
        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_min_length 256;
        gzip_comp_level 4;
        gzip_types
            text/plain
            text/css
            text/javascript
            application/json
            application/javascript
            application/xml
            application/xml+rss
            text/event-stream
            image/svg+xml;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Request-ID $request_id always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; frame-src 'self';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control $cache_control_header always;

        # ========================================
        # Pipeline Service API Routes
        # ========================================
        location = /api/pipeline {
            set $service "pipeline";
            if ($request_method = POST) {
                rewrite ^/api/pipeline$ /pipelines break;
                proxy_pass http://pipeline.pipeline-builder.svc.cluster.local:3000;
            }
            rewrite ^/api/pipeline$ /pipelines/find break;
            proxy_pass http://pipeline.pipeline-builder.svc.cluster.local:3000;
        }

        # Pipeline AI generation + providers (must precede /:id regex)
        location ~ ^/api/pipeline/(generate|providers) {
            set $service "pipeline";
            rewrite ^/api/pipeline/(.+)$ /pipelines/$1 break;
            proxy_pass http://pipeline.pipeline-builder.svc.cluster.local:3000;

            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 900s;
        }

        # Bulk pipeline operations (must precede exact /api/pipelines match)
        location ~ ^/api/pipelines/bulk/ {
            set $service "pipeline";
            rewrite ^/api(/pipelines/bulk/.*)$ $1 break;
            proxy_pass http://pipeline.pipeline-builder.svc.cluster.local:3000;
        }

        # Pipeline registry (GET list / POST upsert)
        location = /api/pipelines/registry {
            set $service "pipeline";
            rewrite ^/api/pipelines/registry$ /pipelines/registry break;
            proxy_pass http://pipeline.pipeline-builder.svc.cluster.local:3000;
        }

        # Pipeline registry DELETE by UUID
        location ~ ^/api/pipelines/registry/([^/]+)$ {
            set $service "pipeline";
            rewrite ^/api/pipelines/registry/(.+)$ /pipelines/registry/$1 break;
            proxy_pass http://pipeline.pipeline-builder.svc.cluster.local:3000;
        }

        location = /api/pipelines {
            set $service "pipeline";
            rewrite ^/api/pipelines$ /pipelines break;
            proxy_pass http://pipeline.pipeline-builder.svc.cluster.local:3000;
        }

        location ~ ^/api/pipeline/([^/]+)$ {
            set $service "pipeline";
            rewrite ^/api/pipeline/(.+)$ /pipelines/$1 break;
            proxy_pass http://pipeline.pipeline-builder.svc.cluster.local:3000;
        }

        # ========================================
        # Plugin Service API Routes
        # ========================================

        # Plugin build SSE logs (GET /api/plugin/logs/:requestId → plugin-service SSE)
        location ~ ^/api/plugin/logs/(.+)$ {
            set $service "plugin";
            rewrite ^/api/plugin/logs/(.+)$ /logs/$1 break;
            proxy_pass http://plugin.pipeline-builder.svc.cluster.local:3000;

            # SSE-specific settings
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 1800s;
        }

        location = /api/plugin/upload {
            set $service "plugin";
            client_max_body_size 4g;

            # Stream the upload directly to the backend without buffering
            proxy_request_buffering off;
            proxy_buffering off;

            # Increase timeouts for long-running upload/build operations (15 minutes)
            proxy_connect_timeout 60s;
            proxy_send_timeout 900s;
            proxy_read_timeout 900s;
            send_timeout 900s;
            rewrite ^/api/plugin/upload$ /plugins break;
            proxy_pass http://plugin.pipeline-builder.svc.cluster.local:3000;
        }

        location = /api/plugin {
            set $service "plugin";
            rewrite ^/api/plugin$ /plugins/find break;
            proxy_pass http://plugin.pipeline-builder.svc.cluster.local:3000;
        }

        # Plugin subpath operations (bulk, queue, etc. — must precede exact /api/plugins match)
        location ~ ^/api/plugins/(.+)$ {
            set $service "plugin";
            rewrite ^/api(/plugins/.+)$ $1 break;
            proxy_pass http://plugin.pipeline-builder.svc.cluster.local:3000;
        }

        location = /api/plugins {
            set $service "plugin";
            rewrite ^/api/plugins$ /plugins break;
            proxy_pass http://plugin.pipeline-builder.svc.cluster.local:3000;
        }

        location ~ ^/api/plugin/(.+)$ {
            set $service "plugin";
            rewrite ^/api/plugin/(.+)$ /plugins/$1 break;
            proxy_pass http://plugin.pipeline-builder.svc.cluster.local:3000;
        }

        # ========================================
        # Quota Service API Routes
        # ========================================
        location = /api/quota {
            set $service "quota";
            rewrite ^/api/quota$ /quotas break;
            proxy_pass http://quota.pipeline-builder.svc.cluster.local:3000;
        }

        location ~ ^/api/quota/([^/]+)/reset$ {
            set $service "quota";
            rewrite ^/api/quota/([^/]+)/reset$ /quotas/$1/reset break;
            proxy_pass http://quota.pipeline-builder.svc.cluster.local:3000;
        }

        location ~ ^/api/quota/([^/]+)/increment$ {
            set $service "quota";
            rewrite ^/api/quota/([^/]+)/increment$ /quotas/$1/increment break;
            proxy_pass http://quota.pipeline-builder.svc.cluster.local:3000;
        }

        location ~ ^/api/quota/([^/]+)/([^/]+)$ {
            set $service "quota";
            rewrite ^/api/quota/([^/]+)/([^/]+)$ /quotas/$1/$2 break;
            proxy_pass http://quota.pipeline-builder.svc.cluster.local:3000;
        }

        location ~ ^/api/quota/([^/]+)$ {
            set $service "quota";
            if ($request_method = PUT) {
                rewrite ^/api/quota/([^/]+)$ /quotas/$1 break;
                proxy_pass http://quota.pipeline-builder.svc.cluster.local:3000;
            }
            rewrite ^/api/quota/([^/]+)$ /quotas/$1 break;
            proxy_pass http://quota.pipeline-builder.svc.cluster.local:3000;
        }

        # ========================================
        # Message Service API Routes
        # ========================================
        location /api/messages {
            set $service "message";
            rewrite ^/api(/messages.*)$ $1 break;
            proxy_pass http://message.pipeline-builder.svc.cluster.local:3000;
        }

        # WebSocket endpoint for real-time notifications
        location /ws {
            proxy_pass http://message.pipeline-builder.svc.cluster.local:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ========================================
        # Compliance Service API Routes
        # ========================================
        location /api/compliance {
            set $service "compliance";
            rewrite ^/api(/compliance.*)$ $1 break;
            proxy_pass http://compliance.pipeline-builder.svc.cluster.local:3000;
        }

        # ========================================
        # Reporting Service API Routes
        # ========================================
        location /api/reports {
            set $service "reporting";
            rewrite ^/api(/reports.*)$ $1 break;
            proxy_pass http://reporting.pipeline-builder.svc.cluster.local:3000;
        }

        # ========================================
        # Image Registry Token + Management API
        # ========================================
        location = /token {
            set $service "image-registry-token";
            proxy_buffering off;
            proxy_pass http://image-registry.pipeline-builder.svc.cluster.local:3000/token;
        }
        location = /image-registry/token {
            set $service "image-registry-token";
            proxy_buffering off;
            rewrite ^/image-registry(/token)$ $1 break;
            proxy_pass http://image-registry.pipeline-builder.svc.cluster.local:3000/token;
        }
        location /api/images {
            set $service "image-registry";
            # No URI on proxy_pass — nginx decodes %-escaped chars
            # (notably %2F → /) when the URI is rewritten, breaking
            # Express route matching for repo names with slashes
            # (e.g. library/pipeline-trivy-base). Bare upstream
            # forwards the request URI verbatim.
            proxy_pass http://image-registry.pipeline-builder.svc.cluster.local:3000;
        }

        # ========================================
        # Docker Registry v2 data path (out-of-cluster image pulls)
        # ========================================
        # Exposes the in-cluster registry so clients that can't resolve the
        # `registry` ClusterIP — notably AWS CodeBuild in the VPC — can pull
        # plugin images at https://<gateway-host>/v2/...  The registry
        # challenges with a Bearer realm; set REGISTRY_AUTH_TOKEN_REALM to the
        # PUBLIC /image-registry/token URL (above) so the client can follow it.
        # Bare proxy_pass (no URI) preserves %2F in repo paths; buffering off +
        # body size 0 stream large image blobs without spooling to disk.
        location /v2/ {
            set $service "registry-v2";
            client_max_body_size 0;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 900s;
            # Rewrite the registry's in-cluster Bearer realm to this public
            # gateway so out-of-cluster clients (CodeBuild) can follow the 401
            # challenge to a reachable /image-registry/token endpoint.
            js_header_filter registry_auth.rewrite_realm;
            proxy_pass http://registry.pipeline-builder.svc.cluster.local:5000;
        }

        # ========================================
        # Audit API Routes (platform service)
        # ========================================
        location /api/audit {
            set $service "audit";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/audit;
        }

        # Admin API (sysadmin-only): summary, org-idp, kms-config, grants, impersonate.
        # Platform enforces sysadmin auth per-route.
        location /api/admin {
            set $service "admin";
            rewrite ^/api(/admin.*)$ $1 break;
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000;
        }

        # ========================================
        # Platform API Routes
        # ========================================
        location /api/auth/ {
            set $service "auth";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/auth/;
        }

        location /api/user/ {
            set $service "user";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/user/;
        }

        location /api/users {
            set $service "users";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/users;
        }

        location = /api/organizations {
            set $service "organizations";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/organizations;
        }

        location /api/organization/ {
            set $service "organization";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/organization/;
        }

        location /api/invitation/ {
            set $service "invitation";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/invitation/;
        }

        location = /api/invitation {
            set $service "invitation";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/invitation;
        }

        # Dashboards (CRUD; visibility-gated per-org + public)
        location /api/dashboards {
            set $service "dashboards";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/dashboards;
        }

        # Observability — alert rules, destinations, silences, materialized.yml
        location /api/observability {
            set $service "observability";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/observability;
        }

        location /api/logs {
            set $service "logs";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/logs;
        }

        # Config routes (public feature flags)
        location = /api/config {
            set $service "config";
            proxy_pass http://platform.pipeline-builder.svc.cluster.local:3000/config;
        }

        # ========================================
        # Billing Service API Routes
        # ========================================
        location /api/billing/ {
            set $service "billing";
            rewrite ^/api/billing(.*)$ /billing$1 break;
            proxy_pass http://billing.pipeline-builder.svc.cluster.local:3000;
        }

        # ========================================
        # Health & Metrics
        # ========================================
        location /health {
            set $service "health";
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","timestamp":"$time_iso8601"}';
        }

        location /metrics {
            set $service "metrics";
            access_log off;
            js_content metrics.get_metrics;
        }

        location /metrics/services {
            set $service "service-metrics";
            access_log off;
            js_content metrics.service_metrics;
        }

        # ========================================
        # Infrastructure Services
        # ========================================
        location /registry/ {
            set $service "registry";
            client_max_body_size 0;
            proxy_pass http://registry.pipeline-builder.svc.cluster.local:5000/;
        }

        location /pgadmin/ {
            set $service "pgadmin";
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;  # ALB-provided (TLS terminated at the ALB)
            proxy_set_header X-Script-Name /pgadmin;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass http://pgadmin.pipeline-builder.svc.cluster.local:80;
            proxy_redirect off;
            proxy_buffering off;
            proxy_hide_header X-Frame-Options;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Request-ID $request_id always;
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        }

        location /mongo-express/ {
            set $service "mongo-express";
            proxy_pass http://mongo-express.pipeline-builder.svc.cluster.local:8081;
        }

        # ========================================
        # Frontend (Next.js)
        # ========================================
        location /_next/ {
            set $service "frontend";
            proxy_pass http://frontend.pipeline-builder.svc.cluster.local:3000;
            proxy_cache_valid 200 60m;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /public/ {
            set $service "frontend";
            proxy_pass http://frontend.pipeline-builder.svc.cluster.local:3000;
            proxy_cache_valid 200 60m;
        }

        location / {
            set $service "frontend";
            proxy_pass http://frontend.pipeline-builder.svc.cluster.local:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ========================================
        # Error Handling
        # ========================================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
