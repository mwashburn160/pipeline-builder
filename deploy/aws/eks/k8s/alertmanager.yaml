---
# =============================================================================
# Alertmanager Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 9093
      protocol: TCP
      name: http
  selector:
    app: alertmanager

---
# =============================================================================
# Alertmanager PersistentVolumeClaim (pb-efs — shared EFS)
# =============================================================================
# Backs `/alertmanager` so silences and the notification log (nflog) survive
# pod restarts. Uses pb-efs: the EFS CSI provisions a dedicated access point on
# the SAME EFS filesystem as registry/loki (one EFS, per-PVC access points) —
# chosen over EBS so the pod isn't AZ-pinned. Alertmanager state is tiny +
# low-write, so NFS latency is a non-issue here (unlike the DBs/TSDB, which stay
# on pb-ebs for block-device durability/locking). Sized small — 256Mi is generous.
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-data
  labels:
    app: alertmanager
spec:
  storageClassName: pb-efs
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 256Mi
---
# =============================================================================
# Alertmanager Deployment
# =============================================================================
# Receives alerts from Prometheus (prometheus.yml `alerting.alertmanagers`
# points here), routes them by `severity` label, and forwards to Slack.
# Webhook URLs come from the optional `alertmanager-slack` Secret — if the
# secret is absent the env vars are empty and Slack receivers no-op silently,
# but the firing alerts still show in Alertmanager's UI / API.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  labels:
    app: alertmanager
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  revisionHistoryLimit: 3
  # Single writer: even though pb-efs is RWX, keep one alertmanager writing its
  # nflog/silences at a time — Recreate avoids a rolling-update overlap where two
  # pods write the same EFS directory.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
        app.kubernetes.io/component: observability
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 65534
        runAsUser: 65534
        runAsGroup: 65534
        runAsNonRoot: true
      initContainers:
        - name: fix-permissions
          image: busybox:1.38
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "25m"
              memory: 32Mi
          # pb-efs access point POSIX-overrides ownership to uid/gid 1000, so a chown
          # to any other id is DENIED (would crash this init, as it did for loki).
          # chown to 1000; alertmanager's writes are squashed to 1000 regardless of
          # its 65534 process uid.
          command: ["sh", "-c", "chown -R 1000:1000 /alertmanager"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: alertmanager-storage
              mountPath: /alertmanager
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.33.1
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
              name: http
          env:
            - name: SLACK_WEBHOOK_URL_CRITICAL
              valueFrom:
                secretKeyRef:
                  name: alertmanager-slack
                  key: SLACK_WEBHOOK_URL_CRITICAL
                  optional: true
            - name: SLACK_WEBHOOK_URL_WARNING
              valueFrom:
                secretKeyRef:
                  name: alertmanager-slack
                  key: SLACK_WEBHOOK_URL_WARNING
                  optional: true
            # Multi-tenant relay: alertmanager POSTs org-labeled alerts to
            # the platform service, which fans out per the org_alert_destinations
            # table.
            - name: PLATFORM_ALERT_WEBHOOK_URL
              value: "http://nginx:8080/api/observability/alert-webhook"
            - name: ALERT_WEBHOOK_INSTANCE_ID
              valueFrom:
                secretKeyRef:
                  name: alertmanager-relay
                  key: ALERT_WEBHOOK_INSTANCE_ID
                  optional: true
            - name: ALERT_WEBHOOK_INSTANCE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alertmanager-relay
                  key: ALERT_WEBHOOK_INSTANCE_TOKEN
                  optional: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: "200m"
              memory: 128Mi
            requests:
              cpu: "25m"
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: alertmanager-storage
              mountPath: /alertmanager
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
        - name: alertmanager-storage
          persistentVolumeClaim:
            claimName: alertmanager-data
