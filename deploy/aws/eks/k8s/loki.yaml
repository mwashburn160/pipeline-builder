---
# =============================================================================
# Loki Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http
  selector:
    app: loki

---
# =============================================================================
# Loki PersistentVolumeClaim
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  labels:
    app: loki
spec:
  storageClassName: pb-efs
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 1Gi
---
# =============================================================================
# Loki Deployment
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels:
    app: loki
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
        app.kubernetes.io/component: observability
    spec:
      securityContext:
        fsGroup: 10001
        runAsUser: 10001
        runAsNonRoot: true
      initContainers:
        - name: fix-permissions
          image: busybox:1.38
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "25m"
              memory: 32Mi
          # The loki-data PVC is an EFS access point that POSIX-overrides ALL access to
          # uid/gid 1000 (storageclasses.yaml). chown to ANY other id (the ec2 hostPath
          # value was 10001) is DENIED by the access point — even for root — so the init
          # crash-loops. chown to 1000 (the access-point id, as registry.yaml does) is a
          # no-op that succeeds; loki's writes are squashed to 1000 and work regardless of
          # its 10001 process uid.
          command: ["sh", "-c", "chown -R 1000:1000 /loki"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: loki-data
              mountPath: /loki
      containers:
        - name: loki
          image: grafana/loki:3.6.11
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          args:
            - "-config.file=/etc/loki/loki-config.yml"
          ports:
            - containerPort: 3100
              name: http
          resources:
            limits:
              cpu: "300m"
              memory: 512Mi
            requests:
              cpu: "50m"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: loki-config
              mountPath: /etc/loki
              readOnly: true
            - name: loki-data
              mountPath: /loki
      volumes:
        - name: loki-config
          configMap:
            name: loki-config
        - name: loki-data
          persistentVolumeClaim:
            claimName: loki-data
