---
# =============================================================================
# PriorityClass — lets the promtail DaemonSet schedule on every node
# =============================================================================
# promtail must run on each node to ship that node's logs to loki, but on a
# CPU-saturated node a default-priority (0) pod can't fit and stays Pending —
# and DaemonSet pods don't trigger Karpenter scale-up. A positive priority lets
# the scheduler preempt a lower-priority workload to make room. Value is well
# below the system classes (system-cluster-critical = 2000000000), so it never
# competes with control-plane/addon pods; it only outranks default-priority app
# pods (the scheduler picks the lowest-disruption victim, which reschedules onto
# other/new nodes).
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: pipeline-builder-node-logging
value: 1000000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Node-level logging (promtail) — preempts default-priority workloads so log shipping runs on every node."
---
# =============================================================================
# Promtail Service Account & RBAC
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: pipeline-builder
roleRef:
  kind: ClusterRole
  name: promtail
  apiGroup: rbac.authorization.k8s.io

---
# =============================================================================
# Promtail DaemonSet
# =============================================================================
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  labels:
    app: promtail
    app.kubernetes.io/component: observability
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
        app.kubernetes.io/component: observability
    spec:
      serviceAccountName: promtail
      priorityClassName: pipeline-builder-node-logging
      securityContext:
        runAsUser: 0
        fsGroup: 0
      containers:
        - name: promtail
          image: grafana/promtail:3.6.11
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          args:
            - "-config.file=/etc/promtail/promtail-config.yml"
          resources:
            limits:
              cpu: "200m"
              memory: 256Mi
            requests:
              cpu: "50m"
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 9080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /ready
              port: 9080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail
              readOnly: true
            - name: pods-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: positions
              mountPath: /tmp
      volumes:
        - name: promtail-config
          configMap:
            name: promtail-config
        # EKS Auto Mode nodes run containerd — pod logs live under /var/log/pods
        # (the old /var/lib/docker/containers Docker path does not exist here).
        - name: pods-logs
          hostPath:
            path: /var/log/pods
        - name: positions
          emptyDir: {}
