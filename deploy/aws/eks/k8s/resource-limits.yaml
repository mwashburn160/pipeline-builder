---
# =============================================================================
# Resource management on EKS Auto Mode
# =============================================================================
# Unlike the ec2/minikube copies, this EKS variant intentionally omits the
# namespace-wide ResourceQuota. On EKS Auto Mode capacity is elastic: Karpenter
# provisions and consolidates nodes on demand, and the HPAs scale
# image-registry → 5 and plugin → 4 (each with a buildkitd sidecar). A static
# per-namespace ResourceQuota sized for a single t3.2xlarge node would reject
# that scale-out (hitting requests.cpu / pods / persistentvolumeclaims caps)
# and defeat the autoscaler. Capacity is therefore governed by Karpenter
# NodePools + per-pod requests/limits, not a namespace quota.
#
# The LimitRange below is still applied so containers that omit
# requests/limits get sane per-pod defaults (which Karpenter uses for bin-
# packing / scale decisions).
# =============================================================================
# Default Resource Limits (for containers that don't specify them)
# =============================================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: pipeline-builder-limits
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: 512Mi
      defaultRequest:
        cpu: "100m"
        memory: 128Mi
      max:
        cpu: "2"
        # Tracks the buildkitd sidecar limit (the largest container in the
        # plugin pod) so raising BUILDKIT_MEMORY_LIMIT can't get the plugin pod
        # forbidden by this per-container cap. Substituted by the same envsubst
        # that sets the sidecar limit. Keep BUILDKIT_MEMORY_LIMIT >= 2Gi (the
        # plugin app container's limit).
        memory: ${BUILDKIT_MEMORY_LIMIT}
    - type: Pod
      max:
        cpu: "6"
        memory: 10Gi
