[SERVICE]
    Flush        5
    Log_Level    info
    Daemon       off
    Parsers_File parsers.conf

[INPUT]
    Name         forward
    Listen       0.0.0.0
    Port         24224
    Tag          ecs.*

[FILTER]
    Name         record_modifier
    Match        *
    Record       cluster fargate
    Record       namespace pipeline-builder

[OUTPUT]
    Name         loki
    Match        *
    Host         loki.pipeline-builder.local
    Port         3100
    Labels       job=fluent-bit
    Label_Keys   $container_name,$source
    Auto_Kubernetes_Labels off
    Line_Format  json
    # F-2.6: tenant routing for multi-tenant Loki. `Tenant_ID_Key` reads
    # the parsed `orgId` field out of the JSON log line (services log it
    # via `logger.info('...', { orgId, ... })`) and sends it as
    # X-Scope-OrgID. Lines without an orgId fall back to the literal
    # value below. In single-tenant Loki (auth_enabled: false) the header
    # is ignored, so this config is forward-compatible.
    Tenant_ID_Key orgId
    Tenant_ID     system
