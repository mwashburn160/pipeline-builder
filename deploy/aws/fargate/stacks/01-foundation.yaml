AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pipeline Builder Foundation Infrastructure - VPC, ALB, EFS, S3, and Service Discovery
  for Fargate-based deployment. Uses the ALB DNS name (CNAME) directly.

Parameters:
  StackPrefix:
    Type: String
    Default: pb
    Description: Prefix for resource naming and export references

  ServiceDiscoveryNamespace:
    Type: String
    Default: pipeline-builder.local
    Description: Private DNS namespace for Cloud Map service discovery

  DomainName:
    Type: String
    Description: >
      Fully qualified domain name (e.g., pipeline.example.com). REQUIRED — the
      ALB terminates TLS with an ACM cert issued for this name, and the Route53
      alias (public) / private zone (private) resolve it to the ALB.

  HostedZoneId:
    Type: String
    Description: >
      Route53 PUBLIC Hosted Zone ID authoritative for DomainName. REQUIRED —
      used for ACM DNS validation (auto-creates the CNAME) and, in public mode,
      the alias A-record to the ALB.

  DeployMode:
    Type: String
    Default: private
    AllowedValues: [public, private]
    Description: >
      public = internet-facing ALB in public subnets, resolved by a public
      Route53 alias. private = inside-AWS-only: an internal-scheme ALB in
      private subnets, resolved by an in-stack Route53 PRIVATE zone, with
      CodeBuild VPC-attached (see 04-services). TLS is an ACM cert this stack
      requests + DNS-validates either way, so CodeBuild trusts the gateway.

  EmailEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      When true, provision an SES sending identity for DomainName (Easy DKIM) so
      the platform can send transactional email. Pairs with the EMAIL_ENABLED env
      on the platform service (both set by setup.sh --email).

  CreateSesIdentity:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      When true (and EmailEnabled), create the SES EmailIdentity + DKIM CNAMEs for
      DomainName. Set false if the domain is ALREADY a verified SES identity in
      this account/region — a fresh create would fail and roll back the stack.
      IAM + env are still wired so sending works against the pre-existing identity.

  AlertEmail:
    Type: String
    Default: ""
    AllowedPattern: "^$|^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    Description: >
      Optional address subscribed to the SES bounce/complaint SNS topic for early
      warning before SES throttles the account (you must confirm the subscription
      email AWS sends). Empty => the topic is created but no subscription is added.

Conditions:
  IsPrivate: !Equals [!Ref DeployMode, private]
  IsPublic: !Equals [!Ref DeployMode, public]
  SesEnabled: !Equals [!Ref EmailEnabled, "true"]
  HasAlertEmail: !And
    - !Condition SesEnabled
    - !Not [!Equals [!Ref AlertEmail, ""]]
  CreateSesIdentityCond: !And
    - !Condition SesEnabled
    - !Equals [!Ref CreateSesIdentity, "true"]

Resources:

  # ---------------------------------------------------------------------------
  # Networking - VPC
  # ---------------------------------------------------------------------------

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-vpc"
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Networking - VPC Flow Logs
  # ---------------------------------------------------------------------------

  VPCFlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/pipeline-builder/${StackPrefix}-vpc-flow-logs"
      RetentionInDays: 30

  VPCFlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: !GetAtt VPCFlowLogGroup.Arn

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref VPCFlowLogGroup
      DeliverLogsPermissionArn: !GetAtt VPCFlowLogRole.Arn
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-vpc-flow-log"

  # ---------------------------------------------------------------------------
  # Networking - Subnets
  # ---------------------------------------------------------------------------

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-public-subnet-1"

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select
        - 1
        - !GetAZs ""
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-public-subnet-2"

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select
        - 0
        - !GetAZs ""
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-private-subnet-1"

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select
        - 1
        - !GetAZs ""
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-private-subnet-2"

  # ---------------------------------------------------------------------------
  # Networking - Internet Gateway
  # ---------------------------------------------------------------------------

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-igw"

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # ---------------------------------------------------------------------------
  # Networking - NAT Gateway
  # ---------------------------------------------------------------------------

  NATGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: VPCGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-nat-eip"

  NATGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NATGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-nat-gw"

  # ---------------------------------------------------------------------------
  # Networking - Public Route Table
  # ---------------------------------------------------------------------------

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-public-rt"

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  # ---------------------------------------------------------------------------
  # Networking - Private Route Table
  # ---------------------------------------------------------------------------

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-private-rt"

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NATGateway

  PrivateSubnet1RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2RouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ---------------------------------------------------------------------------
  # Load Balancer - Security Group
  # ---------------------------------------------------------------------------

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for the Application Load Balancer
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from anywhere (redirected to HTTPS)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from anywhere
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-alb-sg"

  # ---------------------------------------------------------------------------
  # Load Balancer - ALB
  # ---------------------------------------------------------------------------

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${StackPrefix}-alb"
      # private mode → private-subnet, internal-scheme ALB (no public ingress);
      # public mode → internet-facing in the public subnets.
      Scheme: !If [IsPrivate, internal, internet-facing]
      Type: application
      Subnets: !If
        - IsPrivate
        - [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
        - [!Ref PublicSubnet1, !Ref PublicSubnet2]
      SecurityGroups:
        - !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-alb"
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Load Balancer - Target Group
  # ---------------------------------------------------------------------------

  NginxTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${StackPrefix}-nginx-tg"
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: ip
      HealthCheckEnabled: true
      HealthCheckProtocol: HTTP
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-nginx-tg"

  # ---------------------------------------------------------------------------
  # Load Balancer - Listener
  # ---------------------------------------------------------------------------

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref NginxTargetGroup

  # ---------------------------------------------------------------------------
  # ACM certificate (DNS-validated) + Route53 records resolving DomainName to
  # the ALB. Public mode: a public alias A-record. Private mode: an in-stack
  # PRIVATE hosted zone alias (so VPC-attached CodeBuild resolves DomainName to
  # the internal ALB). The cert is publicly trusted either way, so CodeBuild's
  # plugin-image pulls over https://<domain>/v2/ verify successfully.
  # ---------------------------------------------------------------------------
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref HostedZoneId
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-cert"

  PublicDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: IsPublic
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ALB.DNSName
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID
        EvaluateTargetHealth: false

  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Condition: IsPrivate
    Properties:
      Name: !Ref DomainName
      VPCs:
        - VPCId: !Ref VPC
          VPCRegion: !Ref "AWS::Region"
      HostedZoneConfig:
        Comment: !Sub "${StackPrefix} private-mode zone"

  PrivateDnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: IsPrivate
    Properties:
      HostedZoneId: !Ref PrivateHostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ALB.DNSName
        HostedZoneId: !GetAtt ALB.CanonicalHostedZoneID
        EvaluateTargetHealth: false

  # ---------------------------------------------------------------------------
  # SES sending identity (Easy DKIM) for DomainName — gated on EmailEnabled.
  # SES verifies DKIM over PUBLIC DNS, so the 3 CNAMEs MUST go to the public
  # HostedZoneId — never the private-mode in-stack PrivateHostedZone (which is
  # VPC-internal and unreachable by SES). Verification is async: the stack
  # reaches CREATE_COMPLETE before SES marks the identity verified.
  # ---------------------------------------------------------------------------
  SesEmailIdentity:
    Type: AWS::SES::EmailIdentity
    Condition: CreateSesIdentityCond
    Properties:
      EmailIdentity: !Ref DomainName
      DkimAttributes:
        SigningEnabled: true

  SesDkimRecord1:
    Type: AWS::Route53::RecordSet
    Condition: CreateSesIdentityCond
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt SesEmailIdentity.DkimDNSTokenName1
      Type: CNAME
      TTL: "1800"
      ResourceRecords:
        - !GetAtt SesEmailIdentity.DkimDNSTokenValue1

  SesDkimRecord2:
    Type: AWS::Route53::RecordSet
    Condition: CreateSesIdentityCond
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt SesEmailIdentity.DkimDNSTokenName2
      Type: CNAME
      TTL: "1800"
      ResourceRecords:
        - !GetAtt SesEmailIdentity.DkimDNSTokenValue2

  SesDkimRecord3:
    Type: AWS::Route53::RecordSet
    Condition: CreateSesIdentityCond
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !GetAtt SesEmailIdentity.DkimDNSTokenName3
      Type: CNAME
      TTL: "1800"
      ResourceRecords:
        - !GetAtt SesEmailIdentity.DkimDNSTokenValue3

  # ---------------------------------------------------------------------------
  # Bounce/complaint tracking. SES enforces reputation at the ACCOUNT level
  # regardless, so this exists for VISIBILITY: every send routes through this
  # configuration set (platform's SES_CONFIGURATION_SET env), whose event
  # destination publishes bounces/complaints/rejects to an SNS topic. Subscribe
  # an address (AlertEmail) to get warned before SES throttles the account.
  # ---------------------------------------------------------------------------
  EmailConfigSet:
    Type: AWS::SES::ConfigurationSet
    Condition: SesEnabled
    Properties:
      Name: !Sub "${StackPrefix}-email"
      ReputationOptions:
        ReputationMetricsEnabled: true

  EmailEventsTopic:
    Type: AWS::SNS::Topic
    Condition: SesEnabled
    Properties:
      TopicName: !Sub "${StackPrefix}-email-events"
      DisplayName: !Sub "${StackPrefix} SES bounces/complaints"

  EmailEventsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Condition: SesEnabled
    Properties:
      Topics:
        - !Ref EmailEventsTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSesPublish
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: sns:Publish
            Resource: !Ref EmailEventsTopic
            Condition:
              StringEquals:
                "AWS:SourceAccount": !Ref "AWS::AccountId"

  EmailEventDestination:
    Type: AWS::SES::ConfigurationSetEventDestination
    Condition: SesEnabled
    # SES verifies it can publish to the topic when the destination is created,
    # so the topic policy granting ses:Publish must exist first.
    DependsOn: EmailEventsTopicPolicy
    Properties:
      ConfigurationSetName: !Ref EmailConfigSet
      EventDestination:
        Name: bounces-complaints
        Enabled: true
        MatchingEventTypes:
          - bounce
          - complaint
          - reject
        SnsDestination:
          TopicARN: !Ref EmailEventsTopic

  EmailAlertSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref EmailEventsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ---------------------------------------------------------------------------
  # Private mode (IsPrivate): VPC interface endpoints — folded in from the
  # former private-prereqs.yaml. They let VPC-attached CodeBuild reach AWS APIs
  # over PrivateLink instead of NAT. The private hosted zone + extra 443 ingress
  # the old stack also created are NOT needed here: Fargate uses the ALB's own
  # DNS name (an internal-scheme ALB resolves natively in-VPC), and the ALB SG
  # already admits 443.
  # ---------------------------------------------------------------------------
  EndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsPrivate
    Properties:
      GroupDescription: !Sub "${StackPrefix} VPC interface endpoints"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !GetAtt VPC.CidrBlock
          Description: HTTPS from within the VPC (CodeBuild to endpoints)
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-vpce-sg"

  LogsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.logs"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  SecretsManagerEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.secretsmanager"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  KmsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.kms"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  StsEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.sts"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  CodeBuildEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.codebuild"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  EcrApiEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.api"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  EcrDkrEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.ecr.dkr"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds: [!Ref PrivateSubnet1, !Ref PrivateSubnet2]
      SecurityGroupIds: [!Ref EndpointSecurityGroup]

  # S3 must be a GATEWAY endpoint, not Interface: an S3 *interface* endpoint with
  # PrivateDnsEnabled requires a co-existing S3 gateway endpoint (the API rejects it
  # otherwise — "must have a Gateway endpoint for the service"). The gateway endpoint
  # is route-table based (no subnets / SG / private-DNS) and is the path ECR image-layer
  # pulls actually traverse, which is what VPC-attached Fargate tasks / CodeBuild need.
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Condition: IsPrivate
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds: [!Ref PrivateRouteTable]

  # ---------------------------------------------------------------------------
  # Storage - EFS File System
  # ---------------------------------------------------------------------------

  EFSFileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub "${StackPrefix}-efs"
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Storage - EFS Security Group
  # ---------------------------------------------------------------------------

  EFSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for EFS mount targets
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          CidrIp: !GetAtt VPC.CidrBlock
          Description: Allow NFS from within VPC
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-efs-sg"

  # ---------------------------------------------------------------------------
  # Storage - EFS Mount Targets
  # ---------------------------------------------------------------------------

  EFSMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnet1
      SecurityGroups:
        - !Ref EFSSecurityGroup

  EFSMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EFSFileSystem
      SubnetId: !Ref PrivateSubnet2
      SecurityGroups:
        - !Ref EFSSecurityGroup

  # ---------------------------------------------------------------------------
  # Storage - EFS Access Points
  # ---------------------------------------------------------------------------

  PostgresAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: "999"
        Gid: "999"
      RootDirectory:
        Path: /data/postgres
        CreationInfo:
          OwnerUid: "999"
          OwnerGid: "999"
          Permissions: "0755"
      AccessPointTags:
        - Key: Name
          Value: !Sub "${StackPrefix}-efs-postgres"

  MongodbAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: "999"
        Gid: "999"
      RootDirectory:
        Path: /data/mongodb
        CreationInfo:
          OwnerUid: "999"
          OwnerGid: "999"
          Permissions: "0755"
      AccessPointTags:
        - Key: Name
          Value: !Sub "${StackPrefix}-efs-mongodb"

  RegistryAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: "1000"
        Gid: "1000"
      RootDirectory:
        Path: /data/registry
        CreationInfo:
          OwnerUid: "1000"
          OwnerGid: "1000"
          Permissions: "0755"
      AccessPointTags:
        - Key: Name
          Value: !Sub "${StackPrefix}-efs-registry"

  PrometheusAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: "65534"
        Gid: "65534"
      RootDirectory:
        Path: /data/prometheus
        CreationInfo:
          OwnerUid: "65534"
          OwnerGid: "65534"
          Permissions: "0755"
      AccessPointTags:
        - Key: Name
          Value: !Sub "${StackPrefix}-efs-prometheus"

  LokiAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: "10001"
        Gid: "10001"
      RootDirectory:
        Path: /data/loki
        CreationInfo:
          OwnerUid: "10001"
          OwnerGid: "10001"
          Permissions: "0755"
      AccessPointTags:
        - Key: Name
          Value: !Sub "${StackPrefix}-efs-loki"

  PgadminAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: "5050"
        Gid: "5050"
      RootDirectory:
        Path: /data/pgadmin
        CreationInfo:
          OwnerUid: "5050"
          OwnerGid: "5050"
          Permissions: "0755"
      AccessPointTags:
        - Key: Name
          Value: !Sub "${StackPrefix}-efs-pgadmin"

  # buildkitd's layer cache. UID/GID 1000 to match the rootless buildkitd
  # sidecar in 04-services.yaml.
  BuildkitCacheAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref EFSFileSystem
      PosixUser:
        Uid: "1000"
        Gid: "1000"
      RootDirectory:
        Path: /buildkit-cache
        CreationInfo:
          OwnerUid: "1000"
          OwnerGid: "1000"
          Permissions: "0755"
      AccessPointTags:
        - Key: Name
          Value: !Sub "${StackPrefix}-efs-buildkit-cache"

  # ---------------------------------------------------------------------------
  # Config Storage - S3 Bucket
  # ---------------------------------------------------------------------------

  ConfigBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-config"
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Service Discovery - Cloud Map
  # ---------------------------------------------------------------------------

  CloudMapNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: !Ref ServiceDiscoveryNamespace
      Vpc: !Ref VPC
      Description: Private DNS namespace for Pipeline Builder service discovery

# =============================================================================
# Outputs
# =============================================================================

Outputs:

  # Networking
  VpcId:
    Description: VPC ID
    Value: !Ref VPC
    Export:
      Name: !Sub "${StackPrefix}-VpcId"

  PublicSubnet1Id:
    Description: Public Subnet 1 ID
    Value: !Ref PublicSubnet1
    Export:
      Name: !Sub "${StackPrefix}-PublicSubnet1Id"

  PublicSubnet2Id:
    Description: Public Subnet 2 ID
    Value: !Ref PublicSubnet2
    Export:
      Name: !Sub "${StackPrefix}-PublicSubnet2Id"

  PrivateSubnet1Id:
    Description: Private Subnet 1 ID
    Value: !Ref PrivateSubnet1
    Export:
      Name: !Sub "${StackPrefix}-PrivateSubnet1Id"

  PrivateSubnet2Id:
    Description: Private Subnet 2 ID
    Value: !Ref PrivateSubnet2
    Export:
      Name: !Sub "${StackPrefix}-PrivateSubnet2Id"

  # Load Balancer
  ALBArn:
    Description: ALB ARN
    Value: !Ref ALB
    Export:
      Name: !Sub "${StackPrefix}-ALBArn"

  ALBDnsName:
    Description: ALB DNS Name
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub "${StackPrefix}-ALBDnsName"

  ALBListenerArn:
    Description: ALB HTTP Listener ARN
    Value: !Ref HTTPListener
    Export:
      Name: !Sub "${StackPrefix}-ALBListenerArn"

  NginxTargetGroupArn:
    Description: Nginx Target Group ARN
    Value: !Ref NginxTargetGroup
    Export:
      Name: !Sub "${StackPrefix}-NginxTargetGroupArn"

  # EFS
  EFSFileSystemId:
    Description: EFS File System ID
    Value: !Ref EFSFileSystem
    Export:
      Name: !Sub "${StackPrefix}-EFSFileSystemId"

  PostgresAccessPointArn:
    Description: EFS Access Point ARN for PostgreSQL
    Value: !GetAtt PostgresAccessPoint.Arn
    Export:
      Name: !Sub "${StackPrefix}-PostgresAccessPointArn"

  MongodbAccessPointArn:
    Description: EFS Access Point ARN for MongoDB
    Value: !GetAtt MongodbAccessPoint.Arn
    Export:
      Name: !Sub "${StackPrefix}-MongodbAccessPointArn"

  RegistryAccessPointArn:
    Description: EFS Access Point ARN for Registry
    Value: !GetAtt RegistryAccessPoint.Arn
    Export:
      Name: !Sub "${StackPrefix}-RegistryAccessPointArn"

  PrometheusAccessPointArn:
    Description: EFS Access Point ARN for Prometheus
    Value: !GetAtt PrometheusAccessPoint.Arn
    Export:
      Name: !Sub "${StackPrefix}-PrometheusAccessPointArn"

  LokiAccessPointArn:
    Description: EFS Access Point ARN for Loki
    Value: !GetAtt LokiAccessPoint.Arn
    Export:
      Name: !Sub "${StackPrefix}-LokiAccessPointArn"

  PgadminAccessPointArn:
    Description: EFS Access Point ARN for pgAdmin
    Value: !GetAtt PgadminAccessPoint.Arn
    Export:
      Name: !Sub "${StackPrefix}-PgadminAccessPointArn"

  BuildkitCacheAccessPointArn:
    Description: EFS Access Point ARN for the rootless buildkitd layer cache
    Value: !GetAtt BuildkitCacheAccessPoint.Arn
    Export:
      Name: !Sub "${StackPrefix}-BuildkitCacheAccessPointArn"

  # S3
  ConfigBucketName:
    Description: S3 Config Bucket Name
    Value: !Ref ConfigBucket
    Export:
      Name: !Sub "${StackPrefix}-ConfigBucketName"

  ConfigBucketArn:
    Description: S3 Config Bucket ARN
    Value: !GetAtt ConfigBucket.Arn
    Export:
      Name: !Sub "${StackPrefix}-ConfigBucketArn"

  # Service Discovery
  CloudMapNamespaceId:
    Description: Cloud Map Namespace ID
    Value: !GetAtt CloudMapNamespace.Id
    Export:
      Name: !Sub "${StackPrefix}-CloudMapNamespaceId"

  CloudMapNamespaceArn:
    Description: Cloud Map Namespace ARN
    Value: !GetAtt CloudMapNamespace.Arn
    Export:
      Name: !Sub "${StackPrefix}-CloudMapNamespaceArn"

  CloudMapNamespaceName:
    Description: Cloud Map Namespace Name
    Value: !Ref ServiceDiscoveryNamespace
    Export:
      Name: !Sub "${StackPrefix}-CloudMapNamespaceName"

  # Security Groups
  ALBSecurityGroupId:
    Description: ALB Security Group ID
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub "${StackPrefix}-ALBSecurityGroupId"

  # Inputs for the private-mode VPC endpoints (now in this stack)
  VpcCidr:
    Description: VPC CIDR (informational)
    Value: !GetAtt VPC.CidrBlock
    Export:
      Name: !Sub "${StackPrefix}-VpcCidr"

  AlbCanonicalHostedZoneId:
    Description: ALB canonical hosted zone ID (for the internal private-zone alias)
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export:
      Name: !Sub "${StackPrefix}-AlbCanonicalHostedZoneId"

  EFSSecurityGroupId:
    Description: EFS Security Group ID
    Value: !Ref EFSSecurityGroup
    Export:
      Name: !Sub "${StackPrefix}-EFSSecurityGroupId"

  # Base URL
  DomainName:
    Description: Application hostname (the registered domain; resolves to the ALB)
    Value: !Ref DomainName
    Export:
      Name: !Sub "${StackPrefix}-DomainName"

  # SES sending identity (present whenever email is enabled, whether this stack
  # created the identity or it pre-existed). Check verification in the SES
  # console — DKIM validation completes asynchronously after CREATE_COMPLETE.
  SesEmailIdentityArn:
    Condition: SesEnabled
    Description: SES sending identity ARN for DomainName (DKIM verifies asynchronously)
    Value: !Sub "arn:${AWS::Partition}:ses:${AWS::Region}:${AWS::AccountId}:identity/${DomainName}"
    Export:
      Name: !Sub "${StackPrefix}-SesEmailIdentityArn"

  EmailEventsTopicArn:
    Condition: SesEnabled
    Description: SNS topic publishing SES bounces/complaints — subscribe to monitor reputation
    Value: !Ref EmailEventsTopic
    Export:
      Name: !Sub "${StackPrefix}-EmailEventsTopicArn"
