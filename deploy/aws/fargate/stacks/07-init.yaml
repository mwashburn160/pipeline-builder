AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pipeline Builder - Fargate auto-init (07-init). A ONE-SHOT ECS RunTask that runs
  deploy/bin/init-platform.sh against the already-running platform (register admin +
  load plugins/compliance/sample-pipelines), fired post-deploy by a fire-and-forget
  Lambda custom resource. Completion/failure is reported via EventBridge -> Lambda ->
  SNS. BEST-EFFORT: an init failure alerts but never rolls back the stack.
  Prereqs (built in CI): the init image (InitImage) with the repo + tools baked in, and
  prebuilt pipeline-bootstrap + pipeline-plugin-base images in the registry (init runs
  with BUILD_BOOTSTRAP=n; Fargate has no Docker daemon to build them).

# =============================================================================
# Parameters
# =============================================================================
Parameters:
  StackPrefix:
    Type: String
    Default: pb
    Description: Prefix for resource naming and cross-stack imports.

  DomainName:
    Type: String
    Description: Platform hostname; PLATFORM_BASE_URL defaults to https://<DomainName>.

  PlatformBaseUrl:
    Type: String
    Default: ""
    Description: Full platform URL; falls back to https://<DomainName> when empty.

  AppSecretsName:
    Type: String
    Description: Secrets Manager secret holding JWT_SECRET (used by init to sign the registry push token).

  GhcrAuthSecretName:
    Type: String
    Default: pipeline-builder/ghcr-auth
    Description: Secrets Manager secret for private registry (ghcr.io) image pulls.

  InitImage:
    Type: String
    Description: >
      Prebuilt init image with the deploy scripts + tools baked in (jq, yq, openssl,
      python3, curl, aws-cli) — NO runtime git clone. e.g.
      ghcr.io/mwashburn160/pipeline-init:<version>. Built by CI (prerequisite).

  AdminEmail:
    Type: String
    Default: admin@internal
    Description: PLATFORM_IDENTIFIER init-platform registers/logs in with.

  AdminPassword:
    Type: String
    NoEcho: true
    Default: "SecurePassword123!"
    Description: >
      PLATFORM_PASSWORD init-platform registers. CHANGE from the default, especially in
      public mode. (Stronger: store it as an ADMIN_PASSWORD key in AppSecretsName and
      switch the env below to a Secrets valueFrom.)

  InitVersion:
    Type: String
    Default: "1"
    Description: Bump to force a re-run on the next stack update (custom resource re-fires).

  AlertEmail:
    Type: String
    Default: ""
    Description: Optional email subscribed to the init-failure SNS topic.

  InitCpu:
    Type: String
    Default: "1024"

  InitMemory:
    Type: String
    Default: "2048"

  LogRetentionDays:
    Type: Number
    Default: 30

# =============================================================================
# Conditions
# =============================================================================
Conditions:
  HasPlatformUrl: !Not [!Equals [!Ref PlatformBaseUrl, ""]]
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, ""]]

# =============================================================================
# Resources
# =============================================================================
Resources:

  # ---------------------------------------------------------------------------
  # The one-shot init task (runs init-platform.sh fargate). No Docker daemon:
  # BUILD_BOOTSTRAP=n (CodeBuild image prebuilt in CI), and the plugin base
  # images are built + pushed into the in-cluster registry by the rootless
  # buildkitd sidecar (BASE_BUILDER=buildkit). Per-plugin builds are still done
  # later by the plugin service's own buildkitd; this task registers + uploads.
  # ---------------------------------------------------------------------------
  InitLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${StackPrefix}-init"
      RetentionInDays: !Ref LogRetentionDays

  InitTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-init"
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: !Ref InitCpu
      Memory: !Ref InitMemory
      # Reuse the services' roles (already have Secrets Manager + registry/ECR access).
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: init
          Image: !Ref InitImage
          Essential: true
          # Wait for the buildkitd sidecar to be healthy before building base images.
          DependsOn:
            - ContainerName: buildkitd
              Condition: HEALTHY
          RepositoryCredentials:
            CredentialsParameter: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GhcrAuthSecretName}"
          # Share the buildkitd unix socket so buildctl can reach the sidecar.
          MountPoints:
            - SourceVolume: buildkit-socket
              ContainerPath: /run/buildkit
          # init-platform's prompts are env-gated, so this runs fully non-interactively.
          Command:
            - /bin/sh
            - -c
            - ./deploy/bin/init-platform.sh --continue-on-build-failure fargate
          Environment:
            - Name: PLATFORM_BASE_URL
              Value: !If [HasPlatformUrl, !Ref PlatformBaseUrl, !Sub "https://${DomainName}"]
            - Name: BUILD_BOOTSTRAP        # bootstrap image prebuilt in CI; never build here
              Value: "n"
            # Plugin base images are built + pushed into the in-cluster registry by the
            # buildkitd sidecar below (no Docker daemon). init-platform's --bases-only path
            # calls build-plugin-images.sh, which dispatches to buildctl when BASE_BUILDER=buildkit.
            - Name: BASE_BUILDER
              Value: "buildkit"
            - Name: PUBLISH_PLATFORM       # base images are amd64 (Fargate/CodeBuild are x86_64)
              Value: "linux/amd64"
            - Name: BUILDKIT_HOST          # the sidecar's socket (shared via the buildkit-socket volume)
              Value: "unix:///run/buildkit/buildkitd.sock"
            - Name: REGISTRY_HOST          # in-cluster registry the bases are pushed to (HTTP)
              Value: "registry.pipeline-builder.local:5000"
            - Name: REGISTRY_INSECURE      # registry is plain HTTP inside the VPC
              Value: "true"
            - Name: LOAD_PLUGINS
              Value: "y"
            - Name: LOAD_COMPLIANCE
              Value: "y"
            - Name: LOAD_PIPELINES
              Value: "y"
            - Name: PLATFORM_IDENTIFIER
              Value: !Ref AdminEmail
            - Name: PLATFORM_PASSWORD
              Value: !Ref AdminPassword
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: STACK_PREFIX
              Value: !Ref StackPrefix
            - Name: INIT_VERSION          # not used by the script; forces a new task-def revision on bump
              Value: !Ref InitVersion
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref InitLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: init

        # Rootless buildkitd — builds + pushes the plugin base images into the in-cluster
        # registry over HTTP (no Docker daemon, no privileged mode). Mirrors the plugin
        # task's sidecar (04-services.yaml PluginTaskDefinition). Not Essential: once the
        # init container exits, ECS stops the sidecar and the task ends.
        - Name: buildkitd
          Image: moby/buildkit:v0.30.0-rootless
          Essential: false
          User: "1000:1000"
          EntryPoint: ["/bin/sh", "-c"]
          Command:
            - |
              set -eu
              mkdir -p /home/user/.config/buildkit
              cat > /home/user/.config/buildkit/buildkitd.toml <<'TOML'
              [registry."docker.io"]
                mirrors = ["registry.pipeline-builder.local:5000"]
              [registry."registry.pipeline-builder.local:5000"]
                http = true
                insecure = true
              TOML
              # Must exec via rootlesskit (the image's default entrypoint) — bare buildkitd as
              # uid 1000 can't set up the user namespace and never goes healthy. Mirrors the
              # 04-services plugin sidecar fix.
              exec rootlesskit buildkitd \
                --addr unix:///run/buildkit/buildkitd.sock \
                --oci-worker-no-process-sandbox \
                --config /home/user/.config/buildkit/buildkitd.toml
          MountPoints:
            - SourceVolume: buildkit-socket
              ContainerPath: /run/buildkit
            - SourceVolume: buildkit-cache
              ContainerPath: /home/user/.local/share/buildkit
          HealthCheck:
            Command:
              - CMD-SHELL
              - buildctl --addr unix:///run/buildkit/buildkitd.sock debug workers || exit 1
            Interval: 10
            Timeout: 5
            Retries: 6
            StartPeriod: 20
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref InitLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: buildkitd
      Volumes:
        - Name: buildkit-socket   # shared unix socket between init (buildctl) and buildkitd
        - Name: buildkit-cache    # buildkitd's local build cache (ephemeral, task-scoped)

  # ---------------------------------------------------------------------------
  # Trigger: a custom resource that fires the task ONCE, fire-and-forget.
  # It must return immediately (Lambda's 15-min cap can't wait out a 30-60 min
  # init); completion is reported separately via EventBridge below.
  # ---------------------------------------------------------------------------
  StartInitFnRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: run-init
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [ ecs:RunTask, ecs:ListTasks ]
                Resource: "*"
                Condition:
                  ArnEquals:
                    ecs:cluster:
                      Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
                  - Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com

  StartInitFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      Role: !GetAtt StartInitFnRole.Arn
      Code:
        ZipFile: |
          import json, boto3, urllib3
          ecs = boto3.client('ecs')
          http = urllib3.PoolManager()

          def respond(event, context, status, data=None, reason=None):
              body = json.dumps({
                  'Status': status,
                  'Reason': reason or f"see CloudWatch log stream {context.log_stream_name}",
                  'PhysicalResourceId': event.get('PhysicalResourceId') or context.log_stream_name,
                  'StackId': event['StackId'], 'RequestId': event['RequestId'],
                  'LogicalResourceId': event['LogicalResourceId'], 'Data': data or {},
              }).encode('utf-8')
              http.request('PUT', event['ResponseURL'], body=body,
                           headers={'content-type': '', 'content-length': str(len(body))})

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      return respond(event, context, 'SUCCESS')
                  p = event['ResourceProperties']
                  cluster, taskdef = p['Cluster'], p['TaskDefinition']
                  family = taskdef.split('/')[-1].split(':')[0]
                  # Concurrency guard: don't fire a second init while one is RUNNING.
                  if ecs.list_tasks(cluster=cluster, family=family, desiredStatus='RUNNING').get('taskArns'):
                      return respond(event, context, 'SUCCESS', {'Skipped': 'an init task is already RUNNING'})
                  r = ecs.run_task(
                      cluster=cluster, taskDefinition=taskdef, launchType='FARGATE', count=1,
                      networkConfiguration={'awsvpcConfiguration': {
                          'subnets': p['Subnets'], 'securityGroups': p['SecurityGroups'],
                          'assignPublicIp': 'DISABLED'}})
                  failures = r.get('failures') or []
                  if failures:
                      return respond(event, context, 'FAILED', reason=json.dumps(failures))
                  # Fire-and-forget: return now; the task runs async (30-60 min).
                  respond(event, context, 'SUCCESS', {'TaskArn': r['tasks'][0]['taskArn']})
              except Exception as e:                       # ALWAYS respond, else the stack hangs ~1h
                  respond(event, context, 'FAILED', reason=str(e))

  RunInit:
    Type: AWS::CloudFormation::CustomResource
    Properties:
      ServiceToken: !GetAtt StartInitFn.Arn
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterName"
      TaskDefinition: !Ref InitTaskDefinition       # !Ref => new revision on InitVersion bump re-fires
      Subnets:
        - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
        - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
      SecurityGroups:
        - Fn::ImportValue: !Sub "${StackPrefix}-AppSecurityGroupId"
      InitVersion: !Ref InitVersion

  # ---------------------------------------------------------------------------
  # Completion reporting: EventBridge (init task STOPPED) -> Lambda -> SNS.
  # Decoupled from the trigger so we don't block on the long-running task.
  # ---------------------------------------------------------------------------
  InitAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${StackPrefix}-init-alerts"

  InitAlertSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref InitAlertTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  ReportInitFnRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: publish-alert
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref InitAlertTopic

  ReportInitFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt ReportInitFnRole.Arn
      Environment:
        Variables:
          TOPIC_ARN: !Ref InitAlertTopic
      Code:
        ZipFile: |
          import json, os, boto3
          sns = boto3.client('sns')
          TOPIC = os.environ['TOPIC_ARN']
          def handler(event, context):
              d = event.get('detail', {})
              init = next((c for c in d.get('containers', []) if c.get('name') == 'init'), None)
              code = init.get('exitCode') if init else None
              if code == 0:
                  return                                   # success — nothing to alert
              sns.publish(
                  TopicArn=TOPIC,
                  Subject='Pipeline Builder: init-platform FAILED',
                  Message=json.dumps({
                      'taskArn': d.get('taskArn'),
                      'exitCode': code,
                      'stoppedReason': d.get('stoppedReason'),
                      'hint': 'aws logs tail /ecs/<prefix>-init --follow',
                  }, indent=2))

  InitStateRule:
    Type: AWS::Events::Rule
    Properties:
      Description: !Sub "Report ${StackPrefix}-init task completion (STOPPED)"
      EventPattern:
        source: [ "aws.ecs" ]
        detail-type: [ "ECS Task State Change" ]
        detail:
          clusterArn:
            - Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
          group: [ !Sub "family:${StackPrefix}-init" ]
          lastStatus: [ "STOPPED" ]
      Targets:
        - Id: report
          Arn: !GetAtt ReportInitFn.Arn

  ReportInitPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReportInitFn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt InitStateRule.Arn

# =============================================================================
# Outputs
# =============================================================================
Outputs:
  InitLogGroupName:
    Description: Watch init progress — aws logs tail <this> --follow
    Value: !Ref InitLogGroup

  InitTaskDefinitionArn:
    Value: !Ref InitTaskDefinition

  InitAlertTopicArn:
    Description: Subscribe for init-failure alerts
    Value: !Ref InitAlertTopic
