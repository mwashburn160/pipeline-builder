AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pipeline Builder Observability Services - Prometheus, Loki and Alertmanager
  deployed on ECS Fargate with EFS persistent storage and Cloud Map discovery.
  Visualization is the native /dashboard/observability page (no Grafana).

Parameters:
  StackPrefix:
    Type: String
    Default: pb
    Description: Prefix for resource naming and export references

  DomainName:
    Type: String
    Default: ""
    Description: ALB DNS name used as application hostname

  AppSecretsName:
    Type: String
    Default: pipeline-builder/app-secrets
    Description: Secrets Manager secret name for application secrets
  PrometheusImage:
    Type: String
    Default: prom/prometheus:v3.2.1
  LokiImage:
    Type: String
    Default: grafana/loki:3.4.2
  AlertmanagerImage:
    Type: String
    Default: prom/alertmanager:v0.27.0
  JaegerImage:
    Type: String
    Default: jaegertracing/all-in-one:1.62.0
    Description: Docker image for the Jaeger all-in-one OTLP trace collector + UI
  AwsCliImage:
    Type: String
    Default: amazon/aws-cli:2.24.0
  DefaultDesiredCount:
    Type: Number
    Default: 1
  PrometheusRetentionDays:
    Type: Number
    Default: 7
    Description: Number of days to retain Prometheus metrics data

Resources:

  # ===========================================================================
  # Prometheus
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Prometheus - Task Definition
  # ---------------------------------------------------------------------------

  PrometheusTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-prometheus"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      Volumes:
        - Name: config-volume
        - Name: prometheus-data
          EFSVolumeConfiguration:
            FilesystemId:
              Fn::ImportValue: !Sub "${StackPrefix}-EFSFileSystemId"
            RootDirectory: /
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId:
                Fn::ImportValue: !Sub "${StackPrefix}-PrometheusAccessPointArn"
              IAM: ENABLED
      ContainerDefinitions:
        - Name: config-init
          Image: !Ref AwsCliImage
          Essential: false
          EntryPoint:
            - /bin/sh
            - "-c"
          Command:
            - !Sub
              - "aws s3 cp s3://${ConfigBucket}/prometheus/prometheus.yml /shared-config/prometheus.yml"
              - ConfigBucket:
                  Fn::ImportValue: !Sub "${StackPrefix}-ConfigBucketName"
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: config-volume
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PrometheusLogGroupName"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: config-init

        - Name: prometheus
          Image: !Ref PrometheusImage
          Essential: true
          DependsOn:
            - ContainerName: config-init
              Condition: SUCCESS
          PortMappings:
            - ContainerPort: 9090
              Protocol: tcp
          Command:
            - "--config.file=/shared-config/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - !Sub "--storage.tsdb.retention.time=${PrometheusRetentionDays}d"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: config-volume
              ReadOnly: true
            - ContainerPath: /prometheus
              SourceVolume: prometheus-data
              ReadOnly: false
          HealthCheck:
            Command:
              - CMD-SHELL
              - wget --spider http://localhost:9090/-/healthy || exit 1
            Interval: 15
            Timeout: 5
            Retries: 5
            StartPeriod: 30
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PrometheusLogGroupName"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: prometheus
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-prometheus-task"
        - Key: Domain
          Value: !Ref DomainName

  # ---------------------------------------------------------------------------
  # Prometheus - ECS Service
  # ---------------------------------------------------------------------------

  PrometheusService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-prometheus"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref PrometheusTaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DefaultDesiredCount
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-ObservabilitySecurityGroupId"
      ServiceRegistries:
        - RegistryArn: !GetAtt PrometheusDiscovery.Arn
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-prometheus-service"
        - Key: Domain
          Value: !Ref DomainName

  # ---------------------------------------------------------------------------
  # Prometheus - Service Discovery
  # ---------------------------------------------------------------------------

  PrometheusDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: prometheus
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ===========================================================================
  # Loki
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Loki - Task Definition
  # ---------------------------------------------------------------------------

  LokiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-loki"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      Volumes:
        - Name: config-volume
        - Name: loki-data
          EFSVolumeConfiguration:
            FilesystemId:
              Fn::ImportValue: !Sub "${StackPrefix}-EFSFileSystemId"
            RootDirectory: /
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId:
                Fn::ImportValue: !Sub "${StackPrefix}-LokiAccessPointArn"
              IAM: ENABLED
      ContainerDefinitions:
        - Name: config-init
          Image: !Ref AwsCliImage
          Essential: false
          EntryPoint:
            - /bin/sh
            - "-c"
          Command:
            - !Sub
              - "aws s3 cp s3://${ConfigBucket}/loki/loki-config.yml /shared-config/loki-config.yml"
              - ConfigBucket:
                  Fn::ImportValue: !Sub "${StackPrefix}-ConfigBucketName"
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: config-volume
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-LokiLogGroupName"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: config-init

        - Name: loki
          Image: !Ref LokiImage
          Essential: true
          DependsOn:
            - ContainerName: config-init
              Condition: SUCCESS
          PortMappings:
            - ContainerPort: 3100
              Protocol: tcp
          Command:
            - "-config.file=/shared-config/loki-config.yml"
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: config-volume
              ReadOnly: true
            - ContainerPath: /loki
              SourceVolume: loki-data
              ReadOnly: false
          HealthCheck:
            Command:
              - CMD-SHELL
              - wget --spider http://localhost:3100/ready || exit 1
            Interval: 15
            Timeout: 5
            Retries: 5
            StartPeriod: 30
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-LokiLogGroupName"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: loki
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-loki-task"
        - Key: Domain
          Value: !Ref DomainName

  # ---------------------------------------------------------------------------
  # Loki - ECS Service
  # ---------------------------------------------------------------------------

  LokiService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-loki"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref LokiTaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DefaultDesiredCount
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-ObservabilitySecurityGroupId"
      ServiceRegistries:
        - RegistryArn: !GetAtt LokiDiscovery.Arn
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-loki-service"
        - Key: Domain
          Value: !Ref DomainName

  # ---------------------------------------------------------------------------
  # Loki - Service Discovery
  # ---------------------------------------------------------------------------

  LokiDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: loki
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ===========================================================================
  # Jaeger (all-in-one) — OpenTelemetry trace collector + UI
  # ===========================================================================
  #
  # Single-container OTLP collector with an in-memory store. App services export
  # OTLP/HTTP to jaeger.pipeline-builder.local:4318 (set via OTEL_* env in
  # 04-services.yaml). No EFS/config-init needed — in-memory storage means
  # traces are lost on task restart, acceptable for a trace stream. The query UI
  # (16686) is reachable in-VPC only; front it via nginx or an SSM port-forward.
  # ---------------------------------------------------------------------------

  JaegerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${StackPrefix}-jaeger"
      RetentionInDays: 7

  JaegerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-jaeger"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: jaeger
          Image: !Ref JaegerImage
          Essential: true
          PortMappings:
            - ContainerPort: 4318
              Protocol: tcp
            - ContainerPort: 4317
              Protocol: tcp
            - ContainerPort: 16686
              Protocol: tcp
          Environment:
            - Name: COLLECTOR_OTLP_ENABLED
              Value: "true"
            - Name: MEMORY_MAX_TRACES
              Value: "50000"
          # No container HealthCheck: the all-in-one image is minimal and ships
          # no shell/wget, so a CMD-SHELL probe would fail and crashloop the
          # task. ECS treats a task without a container healthcheck as healthy
          # once running; nothing gates on it.
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref JaegerLogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: jaeger
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-jaeger-task"
        - Key: Domain
          Value: !Ref DomainName

  JaegerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-jaeger"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref JaegerTaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DefaultDesiredCount
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-ObservabilitySecurityGroupId"
      ServiceRegistries:
        - RegistryArn: !GetAtt JaegerDiscovery.Arn
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-jaeger-service"
        - Key: Domain
          Value: !Ref DomainName

  JaegerDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: jaeger
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ===========================================================================
  # Alertmanager
  # ===========================================================================
  #
  # Multi-tenant alert relay: receives Prometheus firing alerts (per-org
  # rules carry `org_id` labels), routes to the platform's webhook
  # endpoint, which fans out to each org's configured destination
  # (Slack/webhook/in-app). Per-instance bound via ALERT_WEBHOOK_INSTANCES
  # on the platform side; this task sends the bearer + instance id
  # configured here.
  #
  # Config is pulled from S3 at boot (same init-container pattern as
  # Prometheus + Loki) so operators can edit alertmanager.yml without
  # rebuilding the image. Auth-on-the-wire is HTTPS via the nginx ALB.

  AlertmanagerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-alertmanager"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      Volumes:
        - Name: config-volume
        - Name: alertmanager-data
      ContainerDefinitions:
        - Name: config-init
          Image: !Ref AwsCliImage
          Essential: false
          EntryPoint:
            - /bin/sh
            - "-c"
          Command:
            - !Sub
              - "aws s3 cp s3://${ConfigBucket}/alertmanager/alertmanager.yml /shared-config/alertmanager.yml"
              - ConfigBucket:
                  Fn::ImportValue: !Sub "${StackPrefix}-ConfigBucketName"
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: config-volume
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-AlertmanagerLogGroupName"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: config-init

        - Name: alertmanager
          Image: !Ref AlertmanagerImage
          Essential: true
          DependsOn:
            - ContainerName: config-init
              Condition: SUCCESS
          PortMappings:
            - ContainerPort: 9093
              Protocol: tcp
          Command:
            - "--config.file=/shared-config/alertmanager.yml"
            - "--storage.path=/alertmanager"
            - "--web.external-url=http://alertmanager.pipeline-builder.local:9093"
          Environment:
            # Per-instance binding for the platform webhook relay. Operators
            # set these on the platform side via ALERT_WEBHOOK_INSTANCES
            # (the matching `id` + `token`). alertmanager.yml is rendered
            # with envsubst so neither value lands in S3 in clear text.
            - Name: PLATFORM_ALERT_WEBHOOK_URL
              Value: !Sub "https://${DomainName}/api/observability/alert-webhook"
            - Name: ALERT_WEBHOOK_INSTANCE_ID
              Value: "fargate-am-0"
          # Secrets-Manager-injected values go in `Secrets` (NOT `Environment`,
          # which only accepts {Name,Value}).
          Secrets:
            - Name: ALERT_WEBHOOK_INSTANCE_TOKEN
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:ALERT_WEBHOOK_INSTANCE_TOKEN::"
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: config-volume
              ReadOnly: true
            - ContainerPath: /alertmanager
              SourceVolume: alertmanager-data
              ReadOnly: false
          HealthCheck:
            Command:
              - CMD-SHELL
              - wget --spider http://localhost:9093/-/healthy || exit 1
            Interval: 15
            Timeout: 5
            Retries: 5
            StartPeriod: 30
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-AlertmanagerLogGroupName"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: alertmanager
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-alertmanager-task"
        - Key: Domain
          Value: !Ref DomainName

  AlertmanagerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-alertmanager"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref AlertmanagerTaskDefinition
      LaunchType: FARGATE
      DesiredCount: !Ref DefaultDesiredCount
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-ObservabilitySecurityGroupId"
      ServiceRegistries:
        - RegistryArn: !GetAtt AlertmanagerDiscovery.Arn
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-alertmanager-service"
        - Key: Domain
          Value: !Ref DomainName

  AlertmanagerDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: alertmanager
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

# =============================================================================
# Outputs
# =============================================================================

Outputs:

  # Prometheus
  PrometheusServiceArn:
    Description: Prometheus ECS Service ARN
    Value: !Ref PrometheusService
    Export:
      Name: !Sub "${StackPrefix}-PrometheusServiceArn"

  PrometheusDiscoveryArn:
    Description: Prometheus Service Discovery ARN
    Value: !GetAtt PrometheusDiscovery.Arn
    Export:
      Name: !Sub "${StackPrefix}-PrometheusDiscoveryArn"

  # Loki
  LokiServiceArn:
    Description: Loki ECS Service ARN
    Value: !Ref LokiService
    Export:
      Name: !Sub "${StackPrefix}-LokiServiceArn"

  LokiDiscoveryArn:
    Description: Loki Service Discovery ARN
    Value: !GetAtt LokiDiscovery.Arn
    Export:
      Name: !Sub "${StackPrefix}-LokiDiscoveryArn"

  # Alertmanager
  AlertmanagerServiceArn:
    Description: Alertmanager ECS Service ARN
    Value: !Ref AlertmanagerService
    Export:
      Name: !Sub "${StackPrefix}-AlertmanagerServiceArn"

  AlertmanagerDiscoveryArn:
    Description: Alertmanager Service Discovery ARN
    Value: !GetAtt AlertmanagerDiscovery.Arn
    Export:
      Name: !Sub "${StackPrefix}-AlertmanagerDiscoveryArn"

