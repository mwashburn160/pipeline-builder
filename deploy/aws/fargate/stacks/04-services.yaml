          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          MountPoints:
            - ContainerPath: /app/.next/cache
              SourceVolume: next-cache
            - ContainerPath: /tmp
              SourceVolume: tmp
          Environment:
            - Name: NEXT_PUBLIC_API_URL
              Value: !Ref PlatformBaseUrl
            - Name: PLATFORM_BASE_URL
              Value: "http://nginx.pipeline-builder.local:8080"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 180
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=frontend
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-FrontendLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Frontend - Service
  # ---------------------------------------------------------------------------
  FrontendService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-frontend"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref FrontendTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-AppSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt FrontendDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Frontend - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  FrontendDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: frontend
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ---------------------------------------------------------------------------
  # Frontend - Auto Scaling
  # ---------------------------------------------------------------------------
  FrontendScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 4
      MinCapacity: 1
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName:
            Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterName"
          ServiceName: !GetAtt FrontendService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  FrontendScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-frontend-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref FrontendScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 70
        ScaleInCooldown: 300
        ScaleOutCooldown: 120

  # ===========================================================================
  # Pipeline Image Registry Service
  #
  # Hosts /token (Docker Distribution token-auth issuer) and /api/images/*.
  # Talks to the underlying registry container (06-admin.yaml) via Cloud Map
  # service discovery (registry.pipeline-builder.local:5000). Signs registry
  # tokens with the RS256 private key from REGISTRY_TOKEN_PRIVATE_KEY (in
  # AppSecrets); the matching public cert is mounted into the registry as
  # REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE.
  # ===========================================================================
  ImageRegistryTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-image-registry"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      Volumes:
        - Name: tmp
      ContainerDefinitions:
        - Name: image-registry
          Image: !Ref ImageRegistryImage
          Essential: true
          ReadonlyRootFilesystem: true
          MountPoints:
            - ContainerPath: /tmp
              SourceVolume: tmp
          RepositoryCredentials:
            CredentialsParameter: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GhcrAuthSecretName}"
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: OTEL_TRACING_ENABLED
              Value: !Ref OtelTracingEnabled
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: http://jaeger.pipeline-builder.local:4318/v1/traces
            - Name: SERVICE_NAME
              Value: image-registry
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: IMAGE_REGISTRY_HOST
              Value: registry.pipeline-builder.local
            - Name: IMAGE_REGISTRY_PORT
              Value: "5000"
            - Name: IMAGE_REGISTRY_HTTP
              Value: "true"
            - Name: REGISTRY_TOKEN_ISSUER
              Value: platform
            - Name: REGISTRY_TOKEN_SERVICE
              Value: pipeline-image-registry
            - Name: REGISTRY_TOKEN_EXPIRES_IN
              Value: "300"
            - Name: PLATFORM_BASE_URL
              Value: !Ref PlatformBaseUrl
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: IMAGE_REGISTRY_USERNAME
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:IMAGE_REGISTRY_USER::"
            - Name: IMAGE_REGISTRY_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:IMAGE_REGISTRY_TOKEN::"
            - Name: REGISTRY_TOKEN_PRIVATE_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REGISTRY_TOKEN_PRIVATE_KEY::"
            - Name: REGISTRY_TOKEN_CERTIFICATE
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REGISTRY_TOKEN_CERTIFICATE::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=image-registry
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-ImageRegistryLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  ImageRegistryService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-image-registry"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref ImageRegistryTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-AppSecurityGroupId"
      ServiceRegistries:
        - RegistryArn: !GetAtt ImageRegistryDiscovery.Arn
      Tags:
        - Key: Name
          Value: !Sub "${StackPrefix}-image-registry-service"

  ImageRegistryDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: image-registry
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  ImageRegistryScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MinCapacity: !Ref DefaultDesiredCount
      MaxCapacity: 5
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName:
            Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterName"
          ServiceName: !GetAtt ImageRegistryService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  ImageRegistryScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-image-registry-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ImageRegistryScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # Memory target-tracking — attached to the same scalable target as the
  # CPU policy. App Auto Scaling scales up whenever EITHER policy demands
  # it (memory >= 85% OR CPU >= existing threshold). 85% leaves headroom
  # for spikes; memory typically climbs slower than CPU, so a tighter
  # threshold would scale prematurely.
  ImageRegistryMemoryScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-image-registry-memory-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref ImageRegistryScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        TargetValue: 85
        ScaleInCooldown: 300
        ScaleOutCooldown: 60


