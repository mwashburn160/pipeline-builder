AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pipeline Builder - Application Services.
  Deploys all Fargate services: Nginx reverse proxy, Platform, Pipeline, Plugin,
  Quota, Billing, Message, Reporting, Compliance, and Frontend on ECS with Cloud Map service discovery.

Parameters:
  StackPrefix:
    Type: String
    Default: pb
    Description: Prefix used for cross-stack exports and resource naming.

  DomainName:
    Type: String
    Description: Fully qualified domain name for the application (e.g. app.example.com)
    AllowedPattern: ^[a-zA-Z0-9][a-zA-Z0-9\-]*(\.[a-zA-Z0-9][a-zA-Z0-9\-]*)+$
    ConstraintDescription: Must be a valid fully qualified domain name

  PlatformImage:
    Type: String
    Default: ghcr.io/mwashburn160/platform:1.39.6
    Description: Docker image for the Platform service

  PipelineImage:
    Type: String
    Default: ghcr.io/mwashburn160/pipeline:1.38.6
    Description: Docker image for the Pipeline service

  PluginImage:
    Type: String
    Default: ghcr.io/mwashburn160/plugin:1.39.21
    Description: Docker image for the Plugin service

  QuotaImage:
    Type: String
    Default: ghcr.io/mwashburn160/quota:1.37.7
    Description: Docker image for the Quota service

  BillingImage:
    Type: String
    Default: ghcr.io/mwashburn160/billing:1.23.7
    Description: Docker image for the Billing service

  MessageImage:
    Type: String
    Default: ghcr.io/mwashburn160/message:1.21.6
    Description: Docker image for the Message service

  ReportingImage:
    Type: String
    Default: ghcr.io/mwashburn160/reporting:1.2.6
    Description: Docker image for the Reporting service

  ComplianceImage:
    Type: String
    Default: ghcr.io/mwashburn160/compliance:1.5.6
    Description: Docker image for the Compliance service

  FrontendImage:
    Type: String
    Default: ghcr.io/mwashburn160/frontend:1.44.12
    Description: Docker image for the Frontend service

  OllamaImage:
    Type: String
    Default: ollama/ollama:latest
    Description: Docker image for the Ollama LLM service

  AppSecretsName:
    Type: String
    Default: pipeline-builder/app-secrets
    Description: Secrets Manager secret name for application secrets

  GhcrAuthSecretName:
    Type: String
    Default: pipeline-builder/ghcr-auth
    Description: Secrets Manager secret name for GHCR authentication

  NginxImage:
    Type: String
    Default: nginx:1.27

  FluentBitImage:
    Type: String
    Default: amazon/aws-for-fluent-bit:2.32.2

  DefaultDesiredCount:
    Type: Number
    Default: 1

Resources:

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Nginx - Task Definition
  # ---------------------------------------------------------------------------
  NginxTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-nginx"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: nginx
          Image: !Ref NginxImage
          Essential: true
          EntryPoint:
            - /bin/sh
            - -c
          Command:
            - !Sub
              - |
                apt-get update && apt-get install -y awscli nginx-module-njs &&
                aws s3 cp s3://${ConfigBucket}/nginx/nginx.conf /etc/nginx/nginx.conf &&
                mkdir -p /etc/nginx/njs &&
                aws s3 cp s3://${ConfigBucket}/nginx/jwt.js /etc/nginx/njs/jwt.js &&
                aws s3 cp s3://${ConfigBucket}/nginx/metrics.js /etc/nginx/njs/metrics.js &&
                nginx -g 'daemon off;'
              - ConfigBucket:
                  Fn::ImportValue: !Sub "${StackPrefix}-ConfigBucketName"
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Environment:
            - Name: CONFIG_BUCKET
              Value:
                Fn::ImportValue: !Sub "${StackPrefix}-ConfigBucketName"
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8080/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=nginx
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-NginxLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Nginx - Service
  # ---------------------------------------------------------------------------
  NginxService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-nginx"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref NginxTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-NginxSecurityGroupId"
          AssignPublicIp: DISABLED
      LoadBalancers:
        - TargetGroupArn:
            Fn::ImportValue: !Sub "${StackPrefix}-NginxTargetGroupArn"
          ContainerName: nginx
          ContainerPort: 8080
      ServiceRegistries:
        - RegistryArn: !GetAtt NginxDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Nginx - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  NginxDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: nginx
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ===========================================================================
  # Platform Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Platform - Task Definition
  # ---------------------------------------------------------------------------
  PlatformTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-platform"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: platform
          Image: !Ref PlatformImage
          Essential: true
          RepositoryCredentials:
            CredentialsParameter: !Ref GhcrAuthSecretName
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: postgres.pipeline-builder.local
            - Name: DB_PORT
              Value: "5432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            - Name: PLATFORM_BASE_URL
              Value: !Sub "https://${DomainName}"
            - Name: PLATFORM_FRONTEND_URL
              Value: !Sub "https://${DomainName}"
            - Name: SERVICE_NAME
              Value: platform
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_PASSWORD::"
            - Name: MONGODB_URI
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:MONGODB_URI::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=platform
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PlatformLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Platform - Service
  # ---------------------------------------------------------------------------
  PlatformService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-platform"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref PlatformTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-AppSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt PlatformDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Platform - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  PlatformDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: platform
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ===========================================================================
  # Pipeline Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Pipeline - Task Definition
  # ---------------------------------------------------------------------------
  PipelineTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-pipeline"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: pipeline
          Image: !Ref PipelineImage
          Essential: true
          RepositoryCredentials:
            CredentialsParameter: !Ref GhcrAuthSecretName
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: postgres.pipeline-builder.local
            - Name: DB_PORT
              Value: "5432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            - Name: PLATFORM_BASE_URL
              Value: !Sub "https://${DomainName}"
            - Name: PLATFORM_FRONTEND_URL
              Value: !Sub "https://${DomainName}"
            - Name: SERVICE_NAME
              Value: pipeline
            - Name: OLLAMA_BASE_URL
              Value: http://ollama.pipeline-builder.local:11434/v1
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_PASSWORD::"
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:ANTHROPIC_API_KEY::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:OPENAI_API_KEY::"
            - Name: GOOGLE_GENERATIVE_AI_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:GOOGLE_GENERATIVE_AI_API_KEY::"
            - Name: XAI_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:XAI_API_KEY::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=pipeline
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PipelineLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Pipeline - Service
  # ---------------------------------------------------------------------------
  PipelineService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-pipeline"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref PipelineTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-AppSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt PipelineDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Pipeline - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  PipelineDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: pipeline
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ===========================================================================
  # Plugin Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Plugin - Task Definition
  # ---------------------------------------------------------------------------
  PluginTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-plugin"
      Cpu: "2048"
      Memory: "4096"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Volumes:
        - Name: kaniko-cache
          EFSVolumeConfiguration:
            FilesystemId:
              Fn::ImportValue: !Sub "${StackPrefix}-EFSFileSystemId"
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId:
                Fn::ImportValue: !Sub "${StackPrefix}-KanikoCacheAccessPointArn"
              IAM: ENABLED
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: plugin
          Image: !Ref PluginImage
          Essential: true
          RepositoryCredentials:
            CredentialsParameter: !Ref GhcrAuthSecretName
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: postgres.pipeline-builder.local
            - Name: DB_PORT
              Value: "5432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            - Name: PLATFORM_BASE_URL
              Value: !Sub "https://${DomainName}"
            - Name: PLATFORM_FRONTEND_URL
              Value: !Sub "https://${DomainName}"
            - Name: SERVICE_NAME
              Value: plugin
            - Name: IMAGE_REGISTRY_HOST
              Value: registry.pipeline-builder.local
            - Name: IMAGE_REGISTRY_PORT
              Value: "5000"
            - Name: PLUGIN_BUILD_CONCURRENCY
              Value: "2"
            - Name: DOCKER_BUILD_TIMEOUT_MS
              Value: "1800000"
            - Name: OLLAMA_BASE_URL
              Value: http://ollama.pipeline-builder.local:11434/v1
            - Name: DOCKER_REGISTRY_HTTP
              Value: "true"
            - Name: DOCKER_REGISTRY_INSECURE
              Value: "true"
          MountPoints:
            - ContainerPath: /kaniko/cache
              SourceVolume: kaniko-cache
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_PASSWORD::"
            - Name: IMAGE_REGISTRY_USER
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:IMAGE_REGISTRY_USER::"
            - Name: IMAGE_REGISTRY_TOKEN
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:IMAGE_REGISTRY_TOKEN::"
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:ANTHROPIC_API_KEY::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:OPENAI_API_KEY::"
            - Name: GOOGLE_GENERATIVE_AI_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:GOOGLE_GENERATIVE_AI_API_KEY::"
            - Name: XAI_API_KEY
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:XAI_API_KEY::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=plugin
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PluginLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Plugin - Service
  # ---------------------------------------------------------------------------
  PluginService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-plugin"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref PluginTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-AppSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt PluginDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Plugin - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  PluginDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: plugin
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ---------------------------------------------------------------------------
  # Plugin - Auto Scaling
  # ---------------------------------------------------------------------------
  PluginScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 3
      MinCapacity: 1
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName:
            Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterName"
          ServiceName: !GetAtt PluginService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  PluginScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-plugin-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PluginScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 300
        ScaleOutCooldown: 120

  # ===========================================================================
  # Quota Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Quota - Task Definition
  # ---------------------------------------------------------------------------
  QuotaTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-quota"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: quota
          Image: !Ref QuotaImage
          Essential: true
          RepositoryCredentials:
            CredentialsParameter: !Ref GhcrAuthSecretName
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
