AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pipeline Builder - Application Services.
  Deploys all Fargate services: Nginx reverse proxy, Platform, Pipeline, Plugin,
  Quota, Billing, Message, Reporting, Compliance, and Frontend on ECS with Cloud Map service discovery.

Parameters:
  StackPrefix:
    Type: String
    Default: pb
    Description: Prefix used for cross-stack exports and resource naming.

  DomainName:
    Type: String
    Default: ""
    Description: ALB DNS name used as application hostname

  PlatformBaseUrl:
    Type: String
    Default: ""
    Description: >
      Public base URL clients use to reach the platform (e.g.
      "https://example.com"). Single source of truth for PLATFORM_BASE_URL,
      PLATFORM_FRONTEND_URL, and NEXT_PUBLIC_API_URL across services.
      Computed by setup.sh as scheme + DomainName.

  DeployMode:
    Type: String
    Default: private
    AllowedValues: [public, private]
    Description: >
      private = inside-AWS-only: the pipeline service synthesizes CodeBuild
      projects attached to this VPC's private subnets so they reach the internal
      ALB. public = CodeBuild runs in the AWS-managed network and reaches the
      public ALB over the internet.

  BillingEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      When true, plugin builds default to the `developer` tier
      (PLUGIN_BUILDKIT_ADDR_DEVELOPER) when no explicit tier is
      supplied — customers pay-and-upgrade for higher tiers. When false
      (self-hosted), builds default to `unlimited`. Must agree with the
      billing service's own BILLING_ENABLED setting.

  OtelTracingEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      When true, services export OpenTelemetry traces to the in-cluster Jaeger
      collector (jaeger.pipeline-builder.local:4318, defined in
      05-observability.yaml) and audit events + logs carry a trace id. Set to
      false to disable without redeploying the collector.

  EmailEnabled:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >
      When true, the platform sends transactional email via SES (EMAIL_ENABLED).
      Requires the SES identity (01-foundation) and task-role grant (02-cluster),
      all driven by setup.sh --email.

  EmailFrom:
    Type: String
    Default: ""
    Description: >
      From address for platform email (e.g. noreply@example.com). Must be covered
      by the SES identity and match the ses:FromAddress grant in 02-cluster.

  EmailFromName:
    Type: String
    Default: "pipeline-builder"
    Description: Display name on outbound platform email.

  PlatformImage:
    Type: String
    Default: ghcr.io/mwashburn160/platform:3.4.82
    Description: Docker image for the Platform service

  PipelineImage:
    Type: String
    Default: ghcr.io/mwashburn160/pipeline:3.4.72
    Description: Docker image for the Pipeline service

  PluginImage:
    Type: String
    Default: ghcr.io/mwashburn160/plugin:3.4.77
    Description: Docker image for the Plugin service

  QuotaImage:
    Type: String
    Default: ghcr.io/mwashburn160/quota:3.4.72
    Description: Docker image for the Quota service

  BillingImage:
    Type: String
    Default: ghcr.io/mwashburn160/billing:3.4.72
    Description: Docker image for the Billing service

  MessageImage:
    Type: String
    Default: ghcr.io/mwashburn160/message:3.4.73
    Description: Docker image for the Message service

  ReportingImage:
    Type: String
    Default: ghcr.io/mwashburn160/reporting:3.4.72
    Description: Docker image for the Reporting service

  ComplianceImage:
    Type: String
    Default: ghcr.io/mwashburn160/compliance:3.4.74
    Description: Docker image for the Compliance service

  ImageRegistryImage:
    Type: String
    Default: ghcr.io/mwashburn160/image-registry:3.4.76
    Description: Docker image for the pipeline-image-registry service

  FrontendImage:
    Type: String
    Default: ghcr.io/mwashburn160/frontend:3.4.87
    Description: Docker image for the Frontend service

  AppSecretsName:
    Type: String
    Default: pipeline-builder/app-secrets
    Description: Secrets Manager secret name for application secrets

  GhcrAuthSecretName:
    Type: String
    Default: pipeline-builder/ghcr-auth
    Description: Secrets Manager secret name for GHCR authentication

  NginxImage:
    Type: String
    Default: nginx:1.27

  AwsCliImage:
    Type: String
    Default: amazon/aws-cli:2.24.0

  FluentBitImage:
    Type: String
    Default: amazon/aws-for-fluent-bit:2.32.2

  DefaultDesiredCount:
    Type: Number
    Default: 1

Conditions:
  IsPrivate: !Equals [!Ref DeployMode, private]
  HasEmailFrom: !Not [!Equals [!Ref EmailFrom, ""]]

Resources:

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Nginx - Task Definition
  # ---------------------------------------------------------------------------
  NginxTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-nginx"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      Volumes:
        - Name: nginx-config
      ContainerDefinitions:
        - Name: config-init
          Image: !Ref AwsCliImage
          Essential: false
          EntryPoint:
            - /bin/sh
            - "-c"
          Command:
            - !Sub
              - >-
                mkdir -p /shared-config/njs &&
                aws s3 cp s3://${ConfigBucket}/nginx/nginx.conf /shared-config/nginx.conf &&
                aws s3 cp s3://${ConfigBucket}/nginx/jwt.js /shared-config/njs/jwt.js &&
                aws s3 cp s3://${ConfigBucket}/nginx/metrics.js /shared-config/njs/metrics.js &&
                aws s3 cp s3://${ConfigBucket}/nginx/registry-auth.js /shared-config/njs/registry-auth.js
              - ConfigBucket:
                  Fn::ImportValue: !Sub "${StackPrefix}-ConfigBucketName"
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: nginx-config
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-NginxLogGroupName"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: config-init
        # NOTE: This container is intentionally NOT yet `ReadonlyRootFilesystem: true` —
        # the Command below `apt-get install`s nginx-module-njs at startup, which
        # writes to /var/cache/apt and /var/lib/dpkg. Hardening requires baking a
        # custom nginx image with njs preinstalled (and switching the runtime image
        # to nginxinc/nginx-unprivileged:1.27). Tracked as a follow-up in
        # docs/plans/k8s-fargate-hardening.md.
        - Name: nginx
          Image: !Ref NginxImage
          Essential: true
          DependsOn:
            - ContainerName: config-init
              Condition: SUCCESS
          EntryPoint:
            - /bin/sh
            - -c
          Command:
            - >-
              apt-get update -qq && apt-get install -y -qq nginx-module-njs >/dev/null 2>&1 &&
              cp /shared-config/nginx.conf /etc/nginx/nginx.conf &&
              mkdir -p /etc/nginx/njs &&
              cp /shared-config/njs/* /etc/nginx/njs/ &&
              nginx -g 'daemon off;'
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: nginx-config
              ReadOnly: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8080/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=nginx
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-NginxLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Nginx - Service
  # ---------------------------------------------------------------------------
  NginxService:
    Type: AWS::ECS::Service
    DependsOn:
      - BillingService
      - ComplianceService
      - FrontendService
      - MessageService
      - PipelineService
      - PlatformService
      - PluginService
      - QuotaService
      - ReportingService
    Properties:
      ServiceName: !Sub "${StackPrefix}-nginx"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref NginxTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-NginxSecurityGroupId"
          AssignPublicIp: DISABLED
      LoadBalancers:
        - TargetGroupArn:
            Fn::ImportValue: !Sub "${StackPrefix}-NginxTargetGroupArn"
          ContainerName: nginx
          ContainerPort: 8080
      ServiceRegistries:
        - RegistryArn: !GetAtt NginxDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Nginx - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  NginxDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: nginx
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ---------------------------------------------------------------------------
  # Nginx - Auto Scaling
  # ---------------------------------------------------------------------------
  NginxScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 3
      MinCapacity: 1
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName:
            Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterName"
          ServiceName: !GetAtt NginxService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  NginxScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-nginx-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref NginxScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 300
        ScaleOutCooldown: 120

  # ===========================================================================
  # Platform Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Platform - Task Definition
  # ---------------------------------------------------------------------------
  PlatformTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-platform"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      # Ephemeral writable scratch for the Node.js process. Volumes without
      # a Host attribute are backed by the Fargate task's ephemeral storage
      # and reset on task replacement — the right scope for /tmp.
      Volumes:
        - Name: tmp
      ContainerDefinitions:
        - Name: platform
          Image: !Ref PlatformImage
          Essential: true
          ReadonlyRootFilesystem: true
          MountPoints:
            - ContainerPath: /tmp
              SourceVolume: tmp
          RepositoryCredentials:
            CredentialsParameter: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GhcrAuthSecretName}"
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: pgbouncer.pipeline-builder.local
            - Name: DB_PORT
              Value: "6432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            # OpenTelemetry — export traces to the in-cluster Jaeger collector
            # (05-observability.yaml). Stamps audit events + logs with a trace id.
            - Name: OTEL_TRACING_ENABLED
              Value: !Ref OtelTracingEnabled
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: http://jaeger.pipeline-builder.local:4318/v1/traces
            - Name: PLATFORM_BASE_URL
              Value: !Ref PlatformBaseUrl
            - Name: PLATFORM_FRONTEND_URL
              Value: !Ref PlatformBaseUrl
            - Name: SERVICE_NAME
              Value: platform
            # Auto-promote these accounts to isSuperAdmin=true on every platform
            # boot (idempotent). Required for fresh installs so a sysadmin can
            # be granted before the admin API (which needs sysadmin authority).
            - Name: BOOTSTRAP_SUPERADMIN_EMAILS
              Value: admin@internal
            # Transactional email via SES. The SES identity (01-foundation) and
            # ses:SendEmail task-role grant (02-cluster) are provisioned when
            # --email is passed; credentials come from the task role (no keys).
            # SES_REGION is pinned to the stack region — the identity is regional.
            - Name: EMAIL_ENABLED
              Value: !Ref EmailEnabled
            - Name: EMAIL_PROVIDER
              Value: ses
            - Name: SES_REGION
              Value: !Ref "AWS::Region"
            - Name: EMAIL_FROM
              # Default to noreply@<domain> when unset, matching the IAM grant in 02-cluster.
              Value: !If [HasEmailFrom, !Ref EmailFrom, !Sub "noreply@${DomainName}"]
            - Name: EMAIL_FROM_NAME
              Value: !Ref EmailFromName
            # Route every send through the configuration set (01-foundation) so
            # bounces/complaints publish to the SNS topic. When email is enabled
            # (the default) this matches the set created in 01-foundation; when
            # disabled (--no-email) it is unused, so the static name is safe either way.
            - Name: SES_CONFIGURATION_SET
              Value: !Sub "${StackPrefix}-email"
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_PASSWORD::"
            - Name: MONGODB_URI
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:MONGODB_URI::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 180
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=platform
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PlatformLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Platform - Service
  # ---------------------------------------------------------------------------
  PlatformService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-platform"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref PlatformTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-AppSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt PlatformDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Platform - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  PlatformDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: platform
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ---------------------------------------------------------------------------
  # Platform - Auto Scaling
  # ---------------------------------------------------------------------------
  PlatformScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 5
      MinCapacity: 1
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName:
            Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterName"
          ServiceName: !GetAtt PlatformService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  PlatformScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-platform-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PlatformScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 300
        ScaleOutCooldown: 120

  # Memory target-tracking — attached to the same scalable target as the
  # CPU policy. App Auto Scaling scales up whenever EITHER policy demands
  # it (memory >= 85% OR CPU >= existing threshold). 85% leaves headroom
  # for spikes; memory typically climbs slower than CPU, so a tighter
  # threshold would scale prematurely.
  PlatformMemoryScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-platform-memory-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PlatformScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageMemoryUtilization
        TargetValue: 85
        ScaleInCooldown: 300
        ScaleOutCooldown: 120

  # ===========================================================================
  # Pipeline Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Pipeline - Task Definition
  # ---------------------------------------------------------------------------
  PipelineTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-pipeline"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      Volumes:
        - Name: tmp
      ContainerDefinitions:
        - Name: pipeline
          Image: !Ref PipelineImage
          Essential: true
          ReadonlyRootFilesystem: true
          MountPoints:
            - ContainerPath: /tmp
              SourceVolume: tmp
          RepositoryCredentials:
            CredentialsParameter: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GhcrAuthSecretName}"
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: pgbouncer.pipeline-builder.local
            - Name: DB_PORT
              Value: "6432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            - Name: PLATFORM_BASE_URL
              Value: !Ref PlatformBaseUrl
            - Name: PLATFORM_FRONTEND_URL
              Value: !Ref PlatformBaseUrl
            # Out-of-cluster pull host for the synthesized CodeBuild plugin
            # image URI. CodeBuild can't resolve the registry.pipeline-builder
            # .local Cloud Map name, so the URI points at the public ALB/gateway
            # and pulls flow through nginx's /v2/ route. In-cluster push/build
            # still uses registry.pipeline-builder.local:5000 (unaffected).
            - Name: IMAGE_REGISTRY_PULL_HOST
              Value: !Ref DomainName
            - Name: IMAGE_REGISTRY_PULL_PORT
              Value: "443"
            # private mode: attach the synthesized CodeBuild projects to this
            # VPC's private subnets so they can reach the internal ALB. Read by
            # pipeline-core's networkConfigFromEnv(). Empty in public mode →
            # CodeBuild runs in the AWS-managed network (reaches the public ALB).
            # SG left empty → CDK creates an all-egress SG per project; the ALB
            # SG must allow inbound 443 from the VPC CIDR (infra prerequisite).
            - Name: PIPELINE_VPC_ID
              Value: !If
                - IsPrivate
                - Fn::ImportValue: !Sub "${StackPrefix}-VpcId"
                - ""
            - Name: PIPELINE_SUBNET_IDS
              Value: !If
                - IsPrivate
                - !Sub
                  - "${S1},${S2}"
                  - S1:
                      Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
                    S2:
                      Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
                - ""
            - Name: PIPELINE_SECURITY_GROUP_IDS
              Value: ""
            - Name: OTEL_TRACING_ENABLED
              Value: !Ref OtelTracingEnabled
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: http://jaeger.pipeline-builder.local:4318/v1/traces
            - Name: SERVICE_NAME
              Value: pipeline
            - Name: COMPLIANCE_SERVICE_HOST
              Value: compliance.pipeline-builder.local
            - Name: COMPLIANCE_SERVICE_PORT
              Value: "3000"
            - Name: COMPLIANCE_BYPASS
              Value: "false"
            - Name: PLUGIN_SERVICE_HOST
              Value: plugin.pipeline-builder.local
            - Name: PLUGIN_SERVICE_PORT
              Value: "3000"
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_PASSWORD::"
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:ANTHROPIC_API_KEY::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:OPENAI_API_KEY::"
            - Name: GOOGLE_GENERATIVE_AI_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:GOOGLE_GENERATIVE_AI_API_KEY::"
            - Name: XAI_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:XAI_API_KEY::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 180
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
