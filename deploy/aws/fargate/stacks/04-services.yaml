        ScaleInCooldown: 300
        ScaleOutCooldown: 120

  # ===========================================================================
  # Plugin Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Plugin - Task Definition
  # ---------------------------------------------------------------------------
  PluginTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-plugin"
      Cpu: "2048"
      Memory: "4096"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      EphemeralStorage:
        SizeInGiB: 30
      Volumes:
        - Name: plugins-builds
        - Name: plugins-uploads
        # Shared between the plugin container (writes buildctl auth config,
        # spawns buildctl) and the buildkitd sidecar (serves the build).
        - Name: buildkit-socket
        - Name: buildkit-cache
          EFSVolumeConfiguration:
            FilesystemId:
              Fn::ImportValue: !Sub "${StackPrefix}-EFSFileSystemId"
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId:
                Fn::ImportValue: !Sub "${StackPrefix}-BuildkitCacheAccessPointArn"
              IAM: ENABLED
        # Ephemeral writable scratch for the Node.js process (plugin tarball
        # staging, buildctl temp files). Sized small; reset on task replace.
        - Name: tmp
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: plugin
          Image: !Ref PluginImage
          Essential: true
          ReadonlyRootFilesystem: true
          # Soft reservations within the task budget (2048 CPU / 4096 MB total).
          # plugin runs node + queue worker; buildkitd does the actual builds.
          # Containers can burst above these values if the sibling is idle.
          Cpu: 1024
          Memory: 2048
          # Wait for the buildkitd sidecar to be HEALTHY before launching node,
          # so the build worker doesn't race the buildkitd startup.
          DependsOn:
            - ContainerName: buildkitd
              Condition: HEALTHY
          RepositoryCredentials:
            CredentialsParameter: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GhcrAuthSecretName}"
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: pgbouncer.pipeline-builder.local
            - Name: DB_PORT
              Value: "6432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            - Name: PLATFORM_BASE_URL
              Value: !Ref PlatformBaseUrl
            - Name: PLATFORM_FRONTEND_URL
              Value: !Ref PlatformBaseUrl
            - Name: OTEL_TRACING_ENABLED
              Value: !Ref OtelTracingEnabled
            - Name: OTEL_EXPORTER_OTLP_ENDPOINT
              Value: http://jaeger.pipeline-builder.local:4318/v1/traces
            - Name: SERVICE_NAME
              Value: plugin
            - Name: IMAGE_REGISTRY_HOST
              Value: registry.pipeline-builder.local
            - Name: IMAGE_REGISTRY_PORT
              Value: "5000"
            - Name: PLUGIN_BUILD_CONCURRENCY
              Value: "2"
            - Name: DOCKER_BUILD_TIMEOUT_MS
              Value: "900000"
            - Name: PLUGIN_MAX_UPLOAD_MB
              Value: "4096"
            # Canonical build-temp + upload paths — same as k8s deploys. The
            # EFS access points mount at these same ContainerPaths above so
            # the plugin code finds them at the paths buildkit / multer
            # also see. PLUGIN_UPLOAD_DIR must be a writable absolute path
            # because the container runs with ReadonlyRootFilesystem=true.
            - Name: DOCKER_BUILD_TEMP_ROOT
              Value: /opt/pipeline/pipeline-data/plugins-data/builds
            - Name: PLUGIN_UPLOAD_DIR
              Value: /opt/pipeline/pipeline-data/plugins-data/uploads
            - Name: IMAGE_REGISTRY_HTTP
              Value: "true"
            # Builds run on the co-located buildkitd container in the
            # plugin task via the shared unix socket. Tier partitioning
            # lives at the BullMQ queue level inside the plugin service
            # (developer / pro / unlimited queues); every tier's worker
            # dispatches to the same buildkitd — no standalone per-tier
            # ECS services.
            - Name: BUILDKIT_HOST
              Value: "unix:///run/buildkit/buildkitd.sock"
            - Name: BILLING_ENABLED
              Value: !Ref BillingEnabled
            - Name: COMPLIANCE_SERVICE_HOST
              Value: compliance.pipeline-builder.local
            - Name: COMPLIANCE_SERVICE_PORT
              Value: "3000"
            - Name: COMPLIANCE_BYPASS
              Value: "false"
          MountPoints:
            # Align ContainerPath with the host/EFS path so DOCKER_BUILD_TEMP_ROOT
            # resolves identically on both sides — buildkit bind mounts won't
            # work otherwise. Same convention as the k8s deploys.
            - ContainerPath: /opt/pipeline/pipeline-data/plugins-data/builds
              SourceVolume: plugins-builds
            - ContainerPath: /opt/pipeline/pipeline-data/plugins-data/uploads
              SourceVolume: plugins-uploads
            - ContainerPath: /run/buildkit
              SourceVolume: buildkit-socket
            - ContainerPath: /tmp
              SourceVolume: tmp
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_PASSWORD::"
            - Name: IMAGE_REGISTRY_USER
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:IMAGE_REGISTRY_USER::"
            - Name: IMAGE_REGISTRY_TOKEN
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:IMAGE_REGISTRY_TOKEN::"
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:ANTHROPIC_API_KEY::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:OPENAI_API_KEY::"
            - Name: GOOGLE_GENERATIVE_AI_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:GOOGLE_GENERATIVE_AI_API_KEY::"
            - Name: XAI_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:XAI_API_KEY::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 180
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=plugin
              Line_Format: json
        # Rootless buildkitd sidecar. Replaces in-process kaniko. No privileged
        # mode, no CA-trust workarounds (buildkitd carries the system CA bundle
        # and honors a real public cert end-to-end).
        - Name: buildkitd
          # v0.30.0 (was v0.16.0): newer runc reaper avoids the hot
          # "container not running" retry loop that wedged buildkitd when a
          # build container was killed mid-flight.
          Image: moby/buildkit:v0.30.0-rootless
          Essential: true
          User: "1000:1000"
          # Soft reservations — see plugin container above. buildkitd does the
          # heavy lifting during a build (compile/snapshot/push), so it gets
          # the larger CPU share when the task is fully utilized.
          Cpu: 1024
          Memory: 1536
          # Fargate has no ConfigMap equivalent, so we materialize the
          # buildkitd.toml inline before exec'ing buildkitd. The mirror lets
          # plugin Dockerfiles using bare `FROM pipeline-plugin-base:24.04`
          # resolve at the in-cluster registry instead of Docker Hub. The
          # registry serves plain HTTP on the service-discovery endpoint
          # (no TLS in-cluster); nginx fronts it on HTTPS for any external
          # clients. HTTP here avoids the buildkit-vs-crane scheme-
          # mismatch deadlock on the token realm.
          EntryPoint: ["/bin/sh", "-c"]
          Command:
            - |
              mkdir -p /home/user/.config/buildkit && \
              cat > /home/user/.config/buildkit/buildkitd.toml <<'TOML'
              [registry."docker.io"]
                mirrors = ["registry.pipeline-builder.local:5000"]
              [registry."registry.pipeline-builder.local:5000"]
                http = true
              TOML
              exec buildkitd \
                --addr unix:///run/buildkit/buildkitd.sock \
                --oci-worker-no-process-sandbox \
                --config /home/user/.config/buildkit/buildkitd.toml
          MountPoints:
            - ContainerPath: /run/buildkit
              SourceVolume: buildkit-socket
            - ContainerPath: /home/user/.local/share/buildkit
              SourceVolume: buildkit-cache
          HealthCheck:
            Command:
              - CMD-SHELL
              - buildctl --addr unix:///run/buildkit/buildkitd.sock debug workers || exit 1
            Interval: 15
            Timeout: 5
            Retries: 5
            StartPeriod: 30
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=buildkitd
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PluginLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

