          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-BillingLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Billing - Service
  # ---------------------------------------------------------------------------
  BillingService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-billing"
