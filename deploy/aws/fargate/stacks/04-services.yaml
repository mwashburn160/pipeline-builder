AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Pipeline Builder - Application Services.
  Deploys all Fargate services: Nginx reverse proxy, Platform, Pipeline, Plugin,
  Quota, Billing, Message, Reporting, Compliance, and Frontend on ECS with Cloud Map service discovery.

Parameters:
  StackPrefix:
    Type: String
    Default: pb
    Description: Prefix used for cross-stack exports and resource naming.

  DomainName:
    Type: String
    Default: ""
    Description: ALB DNS name used as application hostname

  PlatformImage:
    Type: String
    Default: ghcr.io/mwashburn160/platform:1.3.0
    Description: Docker image for the Platform service

  PipelineImage:
    Type: String
    Default: ghcr.io/mwashburn160/pipeline:1.3.0
    Description: Docker image for the Pipeline service

  PluginImage:
    Type: String
    Default: ghcr.io/mwashburn160/plugin:1.3.0-kaniko
    Description: Docker image for the Plugin service

  QuotaImage:
    Type: String
    Default: ghcr.io/mwashburn160/quota:1.3.0
    Description: Docker image for the Quota service

  BillingImage:
    Type: String
    Default: ghcr.io/mwashburn160/billing:1.3.0
    Description: Docker image for the Billing service

  MessageImage:
    Type: String
    Default: ghcr.io/mwashburn160/message:1.3.0
    Description: Docker image for the Message service

  ReportingImage:
    Type: String
    Default: ghcr.io/mwashburn160/reporting:1.3.0
    Description: Docker image for the Reporting service

  ComplianceImage:
    Type: String
    Default: ghcr.io/mwashburn160/compliance:1.3.0
    Description: Docker image for the Compliance service

  FrontendImage:
    Type: String
    Default: ghcr.io/mwashburn160/frontend:1.3.0
    Description: Docker image for the Frontend service

  AppSecretsName:
    Type: String
    Default: pipeline-builder/app-secrets
    Description: Secrets Manager secret name for application secrets

  GhcrAuthSecretName:
    Type: String
    Default: pipeline-builder/ghcr-auth
    Description: Secrets Manager secret name for GHCR authentication

  NginxImage:
    Type: String
    Default: nginx:1.27

  AwsCliImage:
    Type: String
    Default: amazon/aws-cli:2.24.0

  FluentBitImage:
    Type: String
    Default: amazon/aws-for-fluent-bit:2.32.2

  DefaultDesiredCount:
    Type: Number
    Default: 1

Resources:

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Nginx - Task Definition
  # ---------------------------------------------------------------------------
  NginxTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-nginx"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      Volumes:
        - Name: nginx-config
      ContainerDefinitions:
        - Name: config-init
          Image: !Ref AwsCliImage
          Essential: false
          EntryPoint:
            - /bin/sh
            - "-c"
          Command:
            - !Sub
              - >-
                mkdir -p /shared-config/njs &&
                aws s3 cp s3://${ConfigBucket}/nginx/nginx.conf /shared-config/nginx.conf &&
                aws s3 cp s3://${ConfigBucket}/nginx/jwt.js /shared-config/njs/jwt.js &&
                aws s3 cp s3://${ConfigBucket}/nginx/metrics.js /shared-config/njs/metrics.js
              - ConfigBucket:
                  Fn::ImportValue: !Sub "${StackPrefix}-ConfigBucketName"
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: nginx-config
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-NginxLogGroupName"
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: config-init
        - Name: nginx
          Image: !Ref NginxImage
          Essential: true
          DependsOn:
            - ContainerName: config-init
              Condition: SUCCESS
          EntryPoint:
            - /bin/sh
            - -c
          Command:
            - >-
              apt-get update -qq && apt-get install -y -qq nginx-module-njs >/dev/null 2>&1 &&
              cp /shared-config/nginx.conf /etc/nginx/nginx.conf &&
              mkdir -p /etc/nginx/njs &&
              cp /shared-config/njs/* /etc/nginx/njs/ &&
              nginx -g 'daemon off;'
          MountPoints:
            - ContainerPath: /shared-config
              SourceVolume: nginx-config
              ReadOnly: true
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8080/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=nginx
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-NginxLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Nginx - Service
  # ---------------------------------------------------------------------------
  NginxService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-nginx"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref NginxTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-NginxSecurityGroupId"
          AssignPublicIp: DISABLED
      LoadBalancers:
        - TargetGroupArn:
            Fn::ImportValue: !Sub "${StackPrefix}-NginxTargetGroupArn"
          ContainerName: nginx
          ContainerPort: 8080
      ServiceRegistries:
        - RegistryArn: !GetAtt NginxDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Nginx - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  NginxDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: nginx
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ---------------------------------------------------------------------------
  # Nginx - Auto Scaling
  # ---------------------------------------------------------------------------
  NginxScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 3
      MinCapacity: 1
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName:
            Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterName"
          ServiceName: !GetAtt NginxService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  NginxScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-nginx-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref NginxScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 300
        ScaleOutCooldown: 120

  # ===========================================================================
  # Platform Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Platform - Task Definition
  # ---------------------------------------------------------------------------
  PlatformTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-platform"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: platform
          Image: !Ref PlatformImage
          Essential: true
          RepositoryCredentials:
            CredentialsParameter: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GhcrAuthSecretName}"
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: postgres.pipeline-builder.local
            - Name: DB_PORT
              Value: "5432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            - Name: PLATFORM_BASE_URL
              Value: !Sub "http://${DomainName}"
            - Name: PLATFORM_FRONTEND_URL
              Value: !Sub "http://${DomainName}"
            - Name: SERVICE_NAME
              Value: platform
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_PASSWORD::"
            - Name: MONGODB_URI
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:MONGODB_URI::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 180
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=platform
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PlatformLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Platform - Service
  # ---------------------------------------------------------------------------
  PlatformService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-platform"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref PlatformTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-AppSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt PlatformDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Platform - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  PlatformDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: platform
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ---------------------------------------------------------------------------
  # Platform - Auto Scaling
  # ---------------------------------------------------------------------------
  PlatformScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 3
      MinCapacity: 1
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName:
            Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterName"
          ServiceName: !GetAtt PlatformService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  PlatformScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-platform-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PlatformScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 300
        ScaleOutCooldown: 120

  # ===========================================================================
  # Pipeline Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Pipeline - Task Definition
  # ---------------------------------------------------------------------------
  PipelineTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-pipeline"
      Cpu: "512"
      Memory: "1024"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: pipeline
          Image: !Ref PipelineImage
          Essential: true
          RepositoryCredentials:
            CredentialsParameter: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GhcrAuthSecretName}"
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: postgres.pipeline-builder.local
            - Name: DB_PORT
              Value: "5432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            - Name: PLATFORM_BASE_URL
              Value: !Sub "http://${DomainName}"
            - Name: PLATFORM_FRONTEND_URL
              Value: !Sub "http://${DomainName}"
            - Name: SERVICE_NAME
              Value: pipeline
            - Name: COMPLIANCE_SERVICE_HOST
              Value: compliance.pipeline-builder.local
            - Name: COMPLIANCE_SERVICE_PORT
              Value: "3000"
            - Name: COMPLIANCE_BYPASS
              Value: "false"
            - Name: PLUGIN_SERVICE_HOST
              Value: plugin.pipeline-builder.local
            - Name: PLUGIN_SERVICE_PORT
              Value: "3000"
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_PASSWORD::"
            - Name: ANTHROPIC_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:ANTHROPIC_API_KEY::"
            - Name: OPENAI_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:OPENAI_API_KEY::"
            - Name: GOOGLE_GENERATIVE_AI_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:GOOGLE_GENERATIVE_AI_API_KEY::"
            - Name: XAI_API_KEY
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:XAI_API_KEY::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 180
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=pipeline
              Line_Format: json
        - Name: log-router
          Image: !Ref FluentBitImage
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PipelineLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Pipeline - Service
  # ---------------------------------------------------------------------------
  PipelineService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-pipeline"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
      TaskDefinition: !Ref PipelineTaskDefinition
      DesiredCount: !Ref DefaultDesiredCount
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet1Id"
            - Fn::ImportValue: !Sub "${StackPrefix}-PrivateSubnet2Id"
          SecurityGroups:
            - Fn::ImportValue: !Sub "${StackPrefix}-AppSecurityGroupId"
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt PipelineDiscovery.Arn
      Tags:
        - Key: Project
          Value: pipeline-builder

  # ---------------------------------------------------------------------------
  # Pipeline - Cloud Map Discovery
  # ---------------------------------------------------------------------------
  PipelineDiscovery:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: pipeline
      NamespaceId:
        Fn::ImportValue: !Sub "${StackPrefix}-CloudMapNamespaceId"
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ---------------------------------------------------------------------------
  # Pipeline - Auto Scaling
  # ---------------------------------------------------------------------------
  PipelineScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Properties:
      MaxCapacity: 3
      MinCapacity: 1
      ResourceId: !Sub
        - "service/${ClusterName}/${ServiceName}"
        - ClusterName:
            Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterName"
          ServiceName: !GetAtt PipelineService.Name
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  PipelineScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Properties:
      PolicyName: !Sub "${StackPrefix}-pipeline-cpu-scaling"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref PipelineScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        TargetValue: 60
        ScaleInCooldown: 300
        ScaleOutCooldown: 120

  # ===========================================================================
  # Plugin Service
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Plugin - Task Definition
  # ---------------------------------------------------------------------------
  PluginTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-plugin"
      Cpu: "2048"
      Memory: "4096"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      EphemeralStorage:
        SizeInGiB: 30
      Volumes:
        - Name: plugins-builds
        - Name: plugins-uploads
        - Name: kaniko-cache
          EFSVolumeConfiguration:
            FilesystemId:
              Fn::ImportValue: !Sub "${StackPrefix}-EFSFileSystemId"
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId:
                Fn::ImportValue: !Sub "${StackPrefix}-KanikoCacheAccessPointArn"
              IAM: ENABLED
      ExecutionRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskExecutionRoleArn"
      TaskRoleArn:
        Fn::ImportValue: !Sub "${StackPrefix}-TaskRoleArn"
      ContainerDefinitions:
        - Name: plugin
          Image: !Ref PluginImage
          Essential: true
          RepositoryCredentials:
            CredentialsParameter: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${GhcrAuthSecretName}"
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: postgres.pipeline-builder.local
            - Name: DB_PORT
              Value: "5432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            - Name: PLATFORM_BASE_URL
              Value: !Sub "http://${DomainName}"
            - Name: PLATFORM_FRONTEND_URL
              Value: !Sub "http://${DomainName}"
            - Name: SERVICE_NAME
              Value: plugin
            - Name: IMAGE_REGISTRY_HOST
              Value: registry.pipeline-builder.local
            - Name: IMAGE_REGISTRY_PORT
              Value: "5000"
            - Name: PLUGIN_BUILD_CONCURRENCY
              Value: "2"
            - Name: DOCKER_BUILD_STRATEGY
              Value: "kaniko"
            - Name: DOCKER_BUILD_TIMEOUT_MS
              Value: "900000"
            - Name: PLUGIN_MAX_UPLOAD_MB
              Value: "4096"
            - Name: DOCKER_REGISTRY_HTTP
              Value: "true"
            - Name: DOCKER_REGISTRY_INSECURE
              Value: "true"
            - Name: COMPLIANCE_SERVICE_HOST
              Value: compliance.pipeline-builder.local
            - Name: COMPLIANCE_SERVICE_PORT
              Value: "3000"
            - Name: COMPLIANCE_BYPASS
              Value: "false"
          MountPoints:
            - ContainerPath: /kaniko/cache
              SourceVolume: kaniko-cache
            - ContainerPath: /app/tmp
              SourceVolume: plugins-builds
            - ContainerPath: /app/uploads
              SourceVolume: plugins-uploads
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:DB_PASSWORD::"
            - Name: IMAGE_REGISTRY_USER
              ValueFrom: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AppSecretsName}:IMAGE_REGISTRY_USER::"
