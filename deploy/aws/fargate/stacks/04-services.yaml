          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: TRUST_PROXY
              Value: "1"
            - Name: LOG_LEVEL
              Value: info
            - Name: LOG_FORMAT
              Value: json
            - Name: DB_HOST
              Value: postgres.pipeline-builder.local
            - Name: DB_PORT
              Value: "5432"
            - Name: DATABASE
              Value: pipeline_builder
            - Name: REDIS_HOST
              Value: redis.pipeline-builder.local
            - Name: REDIS_PORT
              Value: "6379"
            - Name: QUOTA_SERVICE_HOST
              Value: quota.pipeline-builder.local
            - Name: QUOTA_SERVICE_PORT
              Value: "3000"
            - Name: BILLING_SERVICE_HOST
              Value: billing.pipeline-builder.local
            - Name: BILLING_SERVICE_PORT
              Value: "3000"
            - Name: LOKI_URL
              Value: http://loki.pipeline-builder.local:3100
            - Name: PLATFORM_BASE_URL
              Value: !Sub "https://${DomainName}"
            - Name: PLATFORM_FRONTEND_URL
              Value: !Sub "https://${DomainName}"
            - Name: SERVICE_NAME
              Value: platform
          Secrets:
            - Name: JWT_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pipeline-builder/app-secrets:JWT_SECRET::"
            - Name: REFRESH_TOKEN_SECRET
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pipeline-builder/app-secrets:REFRESH_TOKEN_SECRET::"
            - Name: DB_USER
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pipeline-builder/app-secrets:DB_USER::"
            - Name: DB_PASSWORD
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pipeline-builder/app-secrets:DB_PASSWORD::"
            - Name: MONGODB_URI
              ValueFrom: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:pipeline-builder/app-secrets:MONGODB_URI::"
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:3000/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awsfirelens
            Options:
              Name: loki
              Host: loki.pipeline-builder.local
              Port: "3100"
              Labels: job=fluent-bit, service=platform
              Line_Format: json
        - Name: log-router
          Image: amazon/aws-for-fluent-bit:latest
          Essential: true
          FirelensConfiguration:
            Type: fluentbit
            Options:
              enable-ecs-log-metadata: "true"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group:
                Fn::ImportValue: !Sub "${StackPrefix}-PlatformLogGroupName"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: firelens

  # ---------------------------------------------------------------------------
  # Platform - Service
  # ---------------------------------------------------------------------------
  PlatformService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${StackPrefix}-platform"
      Cluster:
        Fn::ImportValue: !Sub "${StackPrefix}-ECSClusterArn"
