# Load NJS Module
load_module modules/ngx_http_js_module.so;

# Environment Variables
env JWT_SECRET;

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    error_log /var/log/nginx/error.log info;

    # Custom Log Format for Tracing and Observability
    log_format proxy_custom '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'org_id:"$jwt_org_id" user_id:"$jwt_user_id" rid:"$request_id" '
                            'svc:"$service" upstream:"$upstream_addr" '
                            'urt:"$upstream_response_time" rt:"$request_time"';

    access_log /var/log/nginx/access.log proxy_custom;

    # NJS Integration
    js_path "/etc/nginx/njs/";
    js_import jwt from jwt.js;
    js_import metrics from metrics.js;
    
    # These variables execute the logic in your jwt.js
    js_set $jwt_org_id jwt.get_org_id;
    js_set $jwt_user_id jwt.get_user_id;

    # General Settings
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    # Docker DNS Resolver
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Global Proxy Settings (Inherited by all locations)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Request ID handling: use client-provided x-request-id if present, otherwise use nginx's $request_id
    # This allows clients to provide their own request ID for distributed tracing
    map $http_x_request_id $final_request_id {
        default $http_x_request_id;
        "" $request_id;
    }
    
    proxy_set_header X-Request-ID      $final_request_id;
    proxy_set_header Authorization     $http_authorization;
    
    # Injecting the identity context extracted from JWT
    proxy_set_header x-org-id          $jwt_org_id;
    proxy_set_header x-user-id         $jwt_user_id;
    proxy_set_header x-request-id      $final_request_id;

    # 1. HTTP to HTTPS Redirect
    server {
        listen 8080;
        server_name localhost;
        return 301 https://$host:8443$request_uri;
    }

    # 2. Main HTTPS Gateway
    server {
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate      /etc/nginx/certs/nginx.crt;
        ssl_certificate_key  /etc/nginx/certs/nginx.key;

        # SSL Security Hardening
        ssl_protocols               TLSv1.3 TLSv1.2;
        ssl_ciphers                 ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers   off;

        # Security Headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Request-ID $final_request_id always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ========================================
        # Pipeline Manager API Routes
        # ========================================

        # Get pipeline by ID
        location ~ ^/api/pipeline/([^/]+)$ {
            set $service "get-pipeline";
            proxy_pass http://get-pipeline:3000;
        }

        # List pipelines
        location = /api/pipelines {
            set $service "list-pipelines";
            proxy_pass http://list-pipelines:3000;
        }

        # Create pipeline
        location ~ ^/api/pipeline/?$ {
            set $service "create-pipeline";
            proxy_pass http://create-pipeline:3000;
        }

        # ========================================
        # Plugin Manager API Routes
        # ========================================

        location = /api/plugin {
            set $service "get-plugin";
            proxy_pass http://get-plugin:3000;
        }

        location = /api/plugins {
            set $service "list-plugins";
            proxy_pass http://list-plugins:3000;
        }

        location = /api/plugin/upload {
            set $service "upload-plugin";
            client_max_body_size 100m;
            proxy_pass http://upload-plugin:3000;
        }

        # ========================================
        # Platform API Routes
        # ========================================
        
        location /api/auth/ {
            set $service "auth";
            proxy_pass http://platform:3000/auth/;
        }

        location /api/user/ {
            set $service "user";
            proxy_pass http://platform:3000/user/;
        }

        location /api/organization/ {
            set $service "organization";
            proxy_pass http://platform:3000/organization/;
        }

        # ========================================
        # Health & Metrics
        # ========================================

        location /health {
            set $service "health";
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"ok","timestamp":"$time_iso8601"}';
        }

        location /metrics {
            set $service "metrics";
            access_log off;
            js_content metrics.get_metrics;
        }

        location /metrics/services {
            set $service "service-metrics";
            access_log off;
            js_content metrics.service_metrics;
        }

        # ========================================
        # Infrastructure Services
        # ========================================
        
        location /registry/ {
            set $service "registry";
            client_max_body_size 0;
            proxy_pass http://registry:5000/;
        }
        
        location /pgadmin/ {
            set $service "pgadmin";
            proxy_set_header X-Script-Name /pgadmin/;            
            proxy_pass http://pgadmin:80/;
        }

        location /mongo-express/ {
            set $service "mongo-express";
            proxy_pass http://mongo-express:8081;
        }

        location /registry-express/ {
            set $service "registry-express";
            proxy_pass http://registry-express:80/;
        }

        # ========================================
        # Error Handling
        # ========================================
        
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}