env JWT_SECRET;

load_module modules/ngx_http_js_module.so;

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    error_log /var/log/nginx/error.log info;

    log_format proxy_custom '$remote_addr - $remote_user [$time_local] '
                            '"$request" $status $body_bytes_sent '
                            'org_id:"$jwt_org_id" rid:"$request_id" '
                            'svc:"$service" upstream:"$upstream_addr"';

    access_log /var/log/nginx/access.log proxy_custom;

    js_path "/etc/nginx/njs/";
    js_import jwt from jwt.js;
    js_set $jwt_org_id jwt.get_org_id;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;

    resolver 127.0.0.11 valid=30s ipv6=off;

    ssl_protocols               TLSv1.3 TLSv1.2;
    ssl_ciphers                 ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers   off;

    # HTTP to HTTPS redirect
    server {
        listen 8080;
        server_name localhost;
        return 301 https://$host:8443$request_uri;
    }

    # Main HTTPS server
    server {
        listen 8443 ssl;
        server_name localhost;

        ssl_certificate      /etc/nginx/certs/nginx.crt;
        ssl_certificate_key  /etc/nginx/certs/nginx.key;

        # Security headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Request-ID $request_id always;

        # Proxy headers
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_set_header Authorization     $http_authorization;
        proxy_set_header x-org-id          $jwt_org_id;

        # ========================================
        # Pipeline Manager API Routes
        # CLI Endpoint Mapping:
        #   cli get-pipeline    → GET  /pipeline/:id
        #   cli list-pipelines  → GET  /pipelines
        #   cli create-pipeline → POST /pipeline
        #   cli get-plugin      → GET  /plugin
        #   cli list-plugins    → GET  /plugins
        #   cli upload-plugin   → POST /plugin/upload
        # ========================================

        # Get single pipeline by ID
        # CLI: cli get-pipeline --id pipeline-123
        location ~ ^/pipeline/([^/]+)$ {
            set $service "get-pipeline";
            proxy_pass http://get-pipeline:3000;
        }

        # List pipelines with filters
        # CLI: cli list-pipelines --project my-app --is-active true
        location = /pipelines {
            set $service "list-pipelines";
            proxy_pass http://list-pipelines:3000;
        }

        # Create pipeline
        # CLI: cli create-pipeline -p my-app -o acme -f config.json
        location = /pipeline {
            if ($request_method = POST) {
                set $service "create-pipeline";
                proxy_pass http://create-pipeline:3000;
            }
        }

        # Get single plugin by name (with optional version)
        # CLI: cli get-plugin --name nodejs-build --version 1.0.0
        location = /plugin {
            if ($request_method = GET) {
                set $service "get-plugin";
                proxy_pass http://get-plugin:3000;
            }
        }

        # List plugins with filters
        # CLI: cli list-plugins --name nodejs --is-active true
        location = /plugins {
            set $service "list-plugins";
            proxy_pass http://list-plugins:3000;
        }

        # Upload plugin
        # CLI: cli upload-plugin -f plugin.zip
        location = /plugin/upload {
            set $service "upload-plugin";
            client_max_body_size 100m;
            proxy_pass http://upload-plugin:3000;
        }

        # ========================================
        # Platform API Routes
        # ========================================
        
        # Authentication
        # Generate PLATFORM_TOKEN
        location /api/auth/ {
            set $service "auth";
            proxy_pass http://platform:3000/auth/;
        }

        # User management
        location /api/user/ {
            set $service "user";
            proxy_pass http://platform:3000/user/;
        }

        # Organization management
        location /api/organization/ {
            set $service "organization";
            proxy_pass http://platform:3000/organization/;
        }

        # Health check endpoint
        location /health {
            set $service "health";
            access_log off;
            return 200 '{"status":"ok","timestamp":"$time_iso8601"}';
            add_header Content-Type application/json;
        }

        # ========================================
        # Infrastructure Services
        # ========================================
        
        # Docker Registry
        location /registry/ {
            set $service "registry";
            client_max_body_size 0;
            proxy_pass http://registry:5000/;
        }
        
        # PgAdmin
        location /pgadmin/ {
            set $service "pgadmin";
            proxy_set_header Host $http_host;
            proxy_set_header X-Script-Name /pgadmin/;            
            proxy_pass http://pgadmin:80/;
        }

        # Mongo Express
        location /mongo-express/ {
            set $service "mongo-express";
            proxy_set_header Host $http_host;       
            proxy_pass http://mongo-express:8081;
        }

        # Registry UI
        location /registry-express/ {
            set $service "registry-express";
            proxy_set_header Host $http_host;         
            proxy_pass http://registry-express:80/;
        }

        # ========================================
        # Error Pages
        # ========================================
        
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}