      QUOTA_DEFAULT_PLUGINS: ${QUOTA_DEFAULT_PLUGINS:-100}
      QUOTA_DEFAULT_PIPELINES: ${QUOTA_DEFAULT_PIPELINES:-10}
      QUOTA_DEFAULT_API_CALLS: ${QUOTA_DEFAULT_API_CALLS:--1}
      QUOTA_RESET_DAYS: ${QUOTA_RESET_DAYS:-3}
      # Quota tier overrides (empty → code default in quota-tiers.ts; -1 = unlimited)
      DEFAULT_QUOTA_TIER: ${DEFAULT_QUOTA_TIER:-}
      QUOTA_TIER_DEVELOPER_PLUGINS: ${QUOTA_TIER_DEVELOPER_PLUGINS:-}
      QUOTA_TIER_DEVELOPER_PIPELINES: ${QUOTA_TIER_DEVELOPER_PIPELINES:-}
      QUOTA_TIER_DEVELOPER_API_CALLS: ${QUOTA_TIER_DEVELOPER_API_CALLS:-}
