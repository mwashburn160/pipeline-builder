      BILLING_METERING_ENABLED: ${BILLING_METERING_ENABLED:-false}
      BILLING_METERING_INTERVAL_MS: ${BILLING_METERING_INTERVAL_MS:-3600000}
      # Plan pricing
      BILLING_PLAN_DEVELOPER_MONTHLY: ${BILLING_PLAN_DEVELOPER_MONTHLY:-0}
