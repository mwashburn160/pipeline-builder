# =============================================================================
# Shared YAML Anchors
# =============================================================================

# -- Healthcheck for API containers --
# Probes /ready (readiness), not /health (liveness): a container is only
# "healthy" once its datastore deps are connected, so `depends_on:
# condition: service_healthy` actually waits for a service that can serve —
# closing the startup races (e.g. a load hitting a still-connecting compliance).
# Safe under plain compose: an unhealthy container is NOT restarted (`restart:`
# fires only on exit); this just gates ordering. With the listen-first servers,
# the port opens immediately and the container reports "starting" until ready.
x-api-healthcheck: &api-healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:3000/ready"]
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 180s

# -- Deploy defaults for API containers --
x-api-deploy: &api-deploy
  resources:
    limits:
      cpus: '0.75'
      memory: 768M
    reservations:
      cpus: '0.4'
      memory: 384M

# -- Deploy defaults for database containers --
x-db-deploy: &db-deploy
  resources:
    limits:
      cpus: '1.5'
      memory: 1.5G
    reservations:
      cpus: '0.8'
      memory: 768M

# -- Env shared by ALL API services --
x-common-env: &common-env
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  JWT_SECRET: ${JWT_SECRET}
  REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
  PLATFORM_BASE_URL: ${PLATFORM_BASE_URL:-https://localhost:8443}
  # OpenTelemetry. On by default — exports to the bundled `jaeger` all-in-one
  # collector (OTLP/HTTP on 4318; UI on http://localhost:16686). Set
  # OTEL_TRACING_ENABLED=false to opt out. Lives in common-env (not server-env)
  # so EVERY service — including quota/billing/image-registry — emits traces.
  OTEL_TRACING_ENABLED: ${OTEL_TRACING_ENABLED:-true}
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318/v1/traces}

# -- Env shared by Postgres-backed services (platform, plugin, pipeline) --
x-postgres-env: &postgres-env
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DATABASE: ${DATABASE}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DRIZZLE_MAX_POOL_SIZE: ${DRIZZLE_MAX_POOL_SIZE:-20}
  DRIZZLE_IDLE_TIMEOUT_MILLIS: ${DRIZZLE_IDLE_TIMEOUT_MILLIS:-30000}
  DRIZZLE_CONNECTION_TIMEOUT_MILLIS: ${DRIZZLE_CONNECTION_TIMEOUT_MILLIS:-30000}
  # Multi-tenant context mode for withTenantTx (see api/.../tenancy.ts).
  # warn (default) logs missing-context calls; strict throws. Every
  # Postgres-backed service inherits this via x-postgres-env so the
  # setting is uniform across the fleet.
  RLS_CONTEXT_MODE: ${RLS_CONTEXT_MODE:-warn}

# -- Env shared by Express server services --
x-server-env: &server-env
  CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
  CORS_ORIGIN: ${CORS_ORIGIN}
  LIMITER_MAX: ${LIMITER_MAX:-2000}
  LIMITER_WINDOWMS: ${LIMITER_WINDOWMS:-900000}

# -- Env for services that call the quota service --
x-quota-client-env: &quota-client-env
  QUOTA_SERVICE_HOST: ${QUOTA_SERVICE_HOST:-quota}
  QUOTA_SERVICE_PORT: ${QUOTA_SERVICE_PORT:-3000}

# -- Env for services that use AI generation --
x-ai-env: &ai-env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
  XAI_API_KEY: ${XAI_API_KEY:-}

# =============================================================================
# Services
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  nginx:
    # Unprivileged (UID 101) nginx, matching the k8s gateways. The njs module is
    # bundled in the official 1.30 image; nginx.conf sets `pid /tmp/nginx.pid` so
    # the non-root master can write its PID file.
    image: 'nginxinc/nginx-unprivileged:1.30'
    container_name: nginx
    restart: always
    stop_grace_period: 5s
    ports:
      - '8080:8080'
      - '8443:8443'
    environment:
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - './certs/nginx-tls.crt:/etc/nginx/certs/nginx.crt:ro'
      - './certs/nginx-tls.key:/etc/nginx/certs/nginx.key:ro'
      - './nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './nginx/jwt.js:/etc/nginx/njs/jwt.js:ro'
      - './nginx/metrics.js:/etc/nginx/njs/metrics.js:ro'
    networks:
      - proxy-network
      - backend-network
    depends_on:
      billing:        { condition: service_started }
      compliance:     { condition: service_started }
      frontend:       { condition: service_started }
      image-registry: { condition: service_started }
      message:        { condition: service_started }
      pipeline:       { condition: service_started }
      platform:       { condition: service_started }
      plugin:         { condition: service_started }
      quota:          { condition: service_started }
      reporting:      { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:8443/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M

  # ---------------------------------------------------------------------------
  # Databases
  # ---------------------------------------------------------------------------
  mongodb:
    image: 'mongo:8.3.4'
    container_name: mongodb
    restart: always
    stop_grace_period: 15s
    command: ['mongod', '--bind_ip_all', '--replSet', 'rs0', '--keyFile', '/etc/mongodb-keyfile']
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: platform
    volumes:
      - './data/db-data/mongodb/:/data/db/:rw'
      - './mongodb-keyfile:/etc/mongodb-keyfile:ro'
      - './mongodb-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro'
    networks:
      - backend-network
    healthcheck:
      # Single idempotent self-init probe — the one shared pattern across all targets:
      # initiate rs0 if not yet initialized, then report healthy only once this node is
      # the writable primary (so `healthy` ⇒ apps can connect via ?replicaSet=rs0). One
      # mongosh call, runs on localhost (no service chicken-and-egg). mongosh is a heavy
      # Node process, hence the generous 30s timeout.
      test:
        - CMD
        - mongosh
        - --quiet
        - --host
        - localhost:27017
        - --username
        - ${MONGO_INITDB_ROOT_USERNAME}
        - --password
        - ${MONGO_INITDB_ROOT_PASSWORD}
        - --authenticationDatabase
        - admin
        - --eval
        - 'try { rs.status() } catch (e) { if (e.codeName === "NotYetInitialized") { rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }] }) } else { throw e } } quit(db.hello().isWritablePrimary ? 0 : 1)'
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 90s
    deploy: *db-deploy

  postgres:
    image: 'postgres:18'
    container_name: postgres
    restart: always
    stop_grace_period: 15s
    command: postgres -c listen_addresses=*
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - './data/db-data/postgres/:/var/lib/postgresql:rw'
      - './postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy: *db-deploy

  # ---------------------------------------------------------------------------
  # pgBouncer connection pooler
  # ---------------------------------------------------------------------------
  # All app services connect through pgbouncer (DB_HOST=pgbouncer / DB_PORT=6432).
  # See `deploy/local/docker/config/pgbouncer/pgbouncer.ini` for per-tier pool layout.
  pgbouncer:
    image: 'edoburu/pgbouncer:v1.25.2-p0'
    container_name: pgbouncer
    restart: always
    environment:
      # edoburu uses DB_*; userlist.txt is generated from these at startup.
      # Our mounted pgbouncer.ini overrides the auto-generated config.
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      LISTEN_PORT: '6432'
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      ADMIN_USERS: postgres
    volumes:
      - './config/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: 'redis:8-alpine'
    container_name: redis
    restart: always
    stop_grace_period: 10s
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - './data/db-data/redis/:/data:rw'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  frontend:
    image: 'ghcr.io/mwashburn160/frontend:3.4.134'
    container_name: frontend
    restart: always
    stop_grace_period: 10s
    environment:
      PLATFORM_BASE_URL: ${PLATFORM_BASE_URL}
    volumes:
      - './data/cache:/app/.next/cache:rw'
      - './data/tmp:/tmp:rw'
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  platform:
    image: 'ghcr.io/mwashburn160/platform:3.4.123'
    container_name: platform
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env]
      SERVICE_NAME: platform
      # Billing
      BILLING_ENABLED: ${BILLING_ENABLED:-true}
      BILLING_SERVICE_HOST: ${BILLING_SERVICE_HOST:-billing}
      BILLING_SERVICE_PORT: ${BILLING_SERVICE_PORT:-3000}
      # Security
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      # Platform-only multi-tenant knobs. RLS_CONTEXT_MODE is set via
      # x-postgres-env so every postgres-backed service inherits it.
      BOOTSTRAP_SUPERADMIN_EMAILS: ${BOOTSTRAP_SUPERADMIN_EMAILS:-}
      SECRET_ENCRYPTION_PER_ORG_KMS: ${SECRET_ENCRYPTION_PER_ORG_KMS:-false}
      # JWT
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      # bcrypt password-hash cost. Empty :- default so compose doesn't warn when
      # unset — the app owns the default (BCRYPT_SALT_ROUNDS || 12).
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      # Platform
      PLATFORM_FRONTEND_URL: ${PLATFORM_FRONTEND_URL:-https://localhost:8443}
      TRUST_PROXY: ${TRUST_PROXY}
      # MongoDB
      MONGODB_URI: ${MONGODB_URI}
      # Email
      EMAIL_ENABLED: ${EMAIL_ENABLED}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SES_REGION: ${SES_REGION:-us-east-1}
      SES_ACCESS_KEY_ID: ${SES_ACCESS_KEY_ID}
      SES_SECRET_ACCESS_KEY: ${SES_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Invitations
      INVITATION_EXPIRATION_DAYS: ${INVITATION_EXPIRATION_DAYS}
      INVITATION_MAX_PENDING_PER_ORG: ${INVITATION_MAX_PENDING_PER_ORG}
      # Per-tier rate-limit multipliers (effective budget = LIMITER_MAX x mult)
      LIMITER_MULT_DEVELOPER: ${LIMITER_MULT_DEVELOPER:-}
      LIMITER_MULT_PRO: ${LIMITER_MULT_PRO:-}
      LIMITER_MULT_TEAM: ${LIMITER_MULT_TEAM:-}
      LIMITER_MULT_ENTERPRISE: ${LIMITER_MULT_ENTERPRISE:-}
      # Per-tier quota reset period (seeds Organization model defaults)
      QUOTA_TIER_DEVELOPER_RESET_PERIOD: ${QUOTA_TIER_DEVELOPER_RESET_PERIOD:-}
      QUOTA_TIER_PRO_RESET_PERIOD: ${QUOTA_TIER_PRO_RESET_PERIOD:-}
      QUOTA_TIER_TEAM_RESET_PERIOD: ${QUOTA_TIER_TEAM_RESET_PERIOD:-}
      QUOTA_TIER_ENTERPRISE_RESET_PERIOD: ${QUOTA_TIER_ENTERPRISE_RESET_PERIOD:-}
      # Developer-tier limit overrides — platform seeds new-org quota defaults
      # from QUOTA_TIERS.developer.limits, so it must receive these to honor
      # operator overrides (the quota service receives the full tier matrix).
      QUOTA_TIER_DEVELOPER_PLUGINS: ${QUOTA_TIER_DEVELOPER_PLUGINS:-}
      QUOTA_TIER_DEVELOPER_PIPELINES: ${QUOTA_TIER_DEVELOPER_PIPELINES:-}
      QUOTA_TIER_DEVELOPER_API_CALLS: ${QUOTA_TIER_DEVELOPER_API_CALLS:-}
      QUOTA_TIER_DEVELOPER_AI_CALLS: ${QUOTA_TIER_DEVELOPER_AI_CALLS:-}
      QUOTA_TIER_DEVELOPER_STORAGE_BYTES: ${QUOTA_TIER_DEVELOPER_STORAGE_BYTES:-}
      QUOTA_TIER_DEVELOPER_DASHBOARDS: ${QUOTA_TIER_DEVELOPER_DASHBOARDS:-}
      QUOTA_TIER_DEVELOPER_ALERT_RULES: ${QUOTA_TIER_DEVELOPER_ALERT_RULES:-}
      QUOTA_TIER_DEVELOPER_ALERT_DESTINATIONS: ${QUOTA_TIER_DEVELOPER_ALERT_DESTINATIONS:-}
      QUOTA_TIER_DEVELOPER_IDP_CONFIGS: ${QUOTA_TIER_DEVELOPER_IDP_CONFIGS:-}
      QUOTA_TIER_DEVELOPER_SEATS: ${QUOTA_TIER_DEVELOPER_SEATS:-}
      # Default tier for new orgs + per-tier access-token TTLs (platform reads these)
      DEFAULT_QUOTA_TIER: ${DEFAULT_QUOTA_TIER:-}
      JWT_EXPIRES_IN_DEVELOPER: ${JWT_EXPIRES_IN_DEVELOPER:-}
      JWT_EXPIRES_IN_PRO: ${JWT_EXPIRES_IN_PRO:-}
      JWT_EXPIRES_IN_TEAM: ${JWT_EXPIRES_IN_TEAM:-}
      JWT_EXPIRES_IN_ENTERPRISE: ${JWT_EXPIRES_IN_ENTERPRISE:-}
      # OAuth
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-https://localhost:8443}
      SERVICE_TIMEOUT: ${SERVICE_TIMEOUT:-30000}
      # Loki
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
    networks:
      - backend-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy: *api-deploy

  plugin:
    image: 'ghcr.io/mwashburn160/plugin:3.4.115'
    container_name: plugin
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env, *ai-env]
      SERVICE_NAME: plugin
      COMPLIANCE_SERVICE_HOST: ${COMPLIANCE_SERVICE_HOST:-compliance}
      COMPLIANCE_SERVICE_PORT: ${COMPLIANCE_SERVICE_PORT:-3000}
      COMPLIANCE_BYPASS: ${COMPLIANCE_BYPASS:-false}
      IMAGE_REGISTRY_HOST: ${IMAGE_REGISTRY_HOST:-registry}
      IMAGE_REGISTRY_PORT: ${IMAGE_REGISTRY_PORT:-5000}
      IMAGE_REGISTRY_USER: ${IMAGE_REGISTRY_USER:-admin}
      IMAGE_REGISTRY_TOKEN: ${IMAGE_REGISTRY_TOKEN}
      IMAGE_REGISTRY_HTTP: ${IMAGE_REGISTRY_HTTP:-true}
      # Must match the registry's REGISTRY_AUTH_TOKEN_REALM so the plugin's
      # writeAuthConfig writes credentials keyed by the same host the
      # docker client will be redirected to during a push/pull challenge.
      # In-cluster clients hit image-registry directly on plain HTTP.
      # Override in .env when external docker clients need to pull.
      IMAGE_REGISTRY_TOKEN_REALM: ${IMAGE_REGISTRY_TOKEN_REALM:-http://image-registry:3000/token}
      # Talk to buildkitd over TCP on the backend-network. Unix-socket sharing
      # via a named volume fails under the rootless image because the volume
      # mounts at `/run/buildkit/` owned by root inside the container and the
      # rootless daemon (UID 1000) can't bind a socket there.
      BUILDKIT_HOST: tcp://buildkitd:1234
      # Platform buildkit publishes plugin images for. Default linux/amd64 (the
      # CodeBuild runtime). Set PUBLISH_PLATFORM=linux/arm64 to build native on an
      # Apple-Silicon dev box (faster — local plugin images aren't run on AWS).
      PUBLISH_PLATFORM: ${PUBLISH_PLATFORM:-linux/amd64}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      # Per-tier Redis DB index for the plugin build queues (plugin reads these)
      REDIS_DB_DEVELOPER: ${REDIS_DB_DEVELOPER:-}
      REDIS_DB_PRO: ${REDIS_DB_PRO:-}
      REDIS_DB_TEAM: ${REDIS_DB_TEAM:-}
      REDIS_DB_ENTERPRISE: ${REDIS_DB_ENTERPRISE:-}
      DOCKER_BUILD_TIMEOUT_MS: ${DOCKER_BUILD_TIMEOUT_MS:-900000}
      DOCKER_PUSH_TIMEOUT_MS: ${DOCKER_PUSH_TIMEOUT_MS:-300000}
      PLUGIN_BUILD_CONCURRENCY: ${PLUGIN_BUILD_CONCURRENCY:-1}
      # Plugin code (read-only rootfs) writes uploads + build artifacts here.
      # MUST match the container-side bind targets in `volumes:` below. Local
      # uses a laptop-style /data/* container path that mirrors the host
      # ./data/ checkout layout; the ec2 deploy uses the canonical
      # /opt/pipeline/pipeline-data/* paths instead. Either way, the env
      # vars + mount target must agree so multer/buildkit can write.
      DOCKER_BUILD_TEMP_ROOT: ${DOCKER_BUILD_TEMP_ROOT:-/data/plugins-data/builds}
      PLUGIN_UPLOAD_DIR: ${PLUGIN_UPLOAD_DIR:-/data/plugins-data/uploads}
      TMPDIR: /tmp
    volumes:
      # Host ./data/plugins-data → container /data/plugins-data. Symmetric
      # naming makes "what's in the laptop dir" obvious from inside the
      # container too.
      - './data/plugins-data/builds:/data/plugins-data/builds:rw'
      - './data/plugins-data/uploads:/data/plugins-data/uploads:rw'
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      buildkitd:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
        reservations:
          cpus: '0.75'
          memory: 1024M

  # ---------------------------------------------------------------------------
  # Rootless BuildKit daemon — replaces dind, no privileged mode, no
  # CA-trust workaround (buildkitd carries the system CA bundle). Single
  # shared instance for all plugin builds — tier partitioning lives at
  # the BullMQ queue level inside the plugin service, not at the
  # buildkitd layer.
  # ---------------------------------------------------------------------------
  buildkitd:
    # v0.30.0 (was v0.16.0): newer runc reaper avoids the hot
    # "container not running" retry loop on killed build containers.
    image: 'moby/buildkit:v0.31.1-rootless'
    container_name: buildkitd
    restart: always
    stop_grace_period: 5s
    user: "1000:1000"
    # Required for rootless newuidmap/newgidmap and `unshare` setup.
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    command:
      # TEMP DIAGNOSTIC: buildkitd execs then exits 1 on the v0.30 bump.
      # --debug surfaces its full init trace (config parse / cache-dir perms /
      # cgroup) in `docker logs buildkitd`. Remove once resolved.
      - --debug
      - --addr
      - tcp://0.0.0.0:1234
      - --oci-worker-no-process-sandbox
      # buildkitd.toml mirrors docker.io → registry:5000 so plugin
      # Dockerfiles can use bare `FROM pipeline-plugin-base:24.04` and
      # buildkit transparently resolves to the in-cluster registry.
      - --config
      - /home/user/.config/buildkit/buildkitd.toml
    expose:
      - "1234"
    volumes:
      # Named volume (not a host bind mount) on purpose: buildkit's
      # overlay snapshotter relies on filesystem features (xattrs,
      # workdir cleanup semantics, idmapped chown) that macOS Docker
      # Desktop's virtiofs-backed bind mounts don't fully support. A
      # named volume lives on the Linux VM's native ext4 and behaves
      # correctly. Cost: cache survives `rm -rf ./data` and needs an
      # explicit `docker volume rm pipeline-builder_buildkit-cache`
      # to wipe.
      - 'buildkit-cache:/home/user/.local/share/buildkit:rw'
      - './config/buildkitd/buildkitd.toml:/home/user/.config/buildkit/buildkitd.toml:ro'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "buildctl", "--addr", "tcp://127.0.0.1:1234", "debug", "workers"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          # Rootless buildkit runs the plugin's RUN steps in this container; too
          # low OOM-kills heavy builds → "buildkit-runc … container not running".
          # Tunable via BUILDKIT_MEMORY_LIMIT in .env (compose expands it; default
          # 3072M — same 3Gi tier as minikube). Use M/G, NOT Mi (so the value is
          # also valid if minikube falls back to this .env).
          memory: ${BUILDKIT_MEMORY_LIMIT:-3072M}
        reservations:
          cpus: '0.5'
          memory: 512M

  pipeline:
    image: 'ghcr.io/mwashburn160/pipeline:3.4.110'
    container_name: pipeline
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env, *ai-env]
      SERVICE_NAME: pipeline
      COMPLIANCE_SERVICE_HOST: ${COMPLIANCE_SERVICE_HOST:-compliance}
      COMPLIANCE_SERVICE_PORT: ${COMPLIANCE_SERVICE_PORT:-3000}
      COMPLIANCE_BYPASS: ${COMPLIANCE_BYPASS:-false}
      PLUGIN_SERVICE_HOST: ${PLUGIN_SERVICE_HOST:-plugin}
      PLUGIN_SERVICE_PORT: ${PLUGIN_SERVICE_PORT:-3000}
      HANDLER_TIMEOUT_MS: ${HANDLER_TIMEOUT_MS:-30000}
    networks:
      - backend-network
    depends_on:
      postgres:
