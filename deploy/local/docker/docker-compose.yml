      BILLING_PLAN_PRO_DESCRIPTION: ${BILLING_PLAN_PRO_DESCRIPTION:-}
      BILLING_PLAN_TEAM_DESCRIPTION: ${BILLING_PLAN_TEAM_DESCRIPTION:-}
      BILLING_PLAN_ENTERPRISE_DESCRIPTION: ${BILLING_PLAN_ENTERPRISE_DESCRIPTION:-}
