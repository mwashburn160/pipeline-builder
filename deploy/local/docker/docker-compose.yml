      BILLING_PLAN_TEAM_FEATURES: ${BILLING_PLAN_TEAM_FEATURES:-}
      BILLING_PLAN_ENTERPRISE_FEATURES: ${BILLING_PLAN_ENTERPRISE_FEATURES:-}
      # Add-on bundles (docs/billing-bundles.md) — off by default
      BILLING_BUNDLES_ENABLED: ${BILLING_BUNDLES_ENABLED:-false}
      # Per-bundle price (cents) + single-dimension grant overrides. Defaults
      # live in packages/pipeline-core billing-config; unset = default.
      BILLING_BUNDLE_SEAT_PACK_MONTHLY: ${BILLING_BUNDLE_SEAT_PACK_MONTHLY:-}
      BILLING_BUNDLE_SEAT_PACK_ANNUAL: ${BILLING_BUNDLE_SEAT_PACK_ANNUAL:-}
      BILLING_BUNDLE_SEAT_PACK_GRANT: ${BILLING_BUNDLE_SEAT_PACK_GRANT:-}
      BILLING_BUNDLE_PIPELINE_PACK_MONTHLY: ${BILLING_BUNDLE_PIPELINE_PACK_MONTHLY:-}
      BILLING_BUNDLE_PIPELINE_PACK_ANNUAL: ${BILLING_BUNDLE_PIPELINE_PACK_ANNUAL:-}
      BILLING_BUNDLE_PIPELINE_PACK_GRANT: ${BILLING_BUNDLE_PIPELINE_PACK_GRANT:-}
      BILLING_BUNDLE_PLUGIN_PACK_MONTHLY: ${BILLING_BUNDLE_PLUGIN_PACK_MONTHLY:-}
      BILLING_BUNDLE_PLUGIN_PACK_ANNUAL: ${BILLING_BUNDLE_PLUGIN_PACK_ANNUAL:-}
      BILLING_BUNDLE_PLUGIN_PACK_GRANT: ${BILLING_BUNDLE_PLUGIN_PACK_GRANT:-}
      BILLING_BUNDLE_API_PACK_MONTHLY: ${BILLING_BUNDLE_API_PACK_MONTHLY:-}
      BILLING_BUNDLE_API_PACK_ANNUAL: ${BILLING_BUNDLE_API_PACK_ANNUAL:-}
      BILLING_BUNDLE_API_PACK_GRANT: ${BILLING_BUNDLE_API_PACK_GRANT:-}
      BILLING_BUNDLE_AI_PACK_MONTHLY: ${BILLING_BUNDLE_AI_PACK_MONTHLY:-}
      BILLING_BUNDLE_AI_PACK_ANNUAL: ${BILLING_BUNDLE_AI_PACK_ANNUAL:-}
      BILLING_BUNDLE_AI_PACK_GRANT: ${BILLING_BUNDLE_AI_PACK_GRANT:-}
      BILLING_BUNDLE_STORAGE_PACK_MONTHLY: ${BILLING_BUNDLE_STORAGE_PACK_MONTHLY:-}
