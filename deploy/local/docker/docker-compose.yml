      QUOTA_TIER_TEAM_API_CALLS: ${QUOTA_TIER_TEAM_API_CALLS:-}
      QUOTA_TIER_TEAM_AI_CALLS: ${QUOTA_TIER_TEAM_AI_CALLS:-}
      QUOTA_TIER_TEAM_STORAGE_BYTES: ${QUOTA_TIER_TEAM_STORAGE_BYTES:-}
      QUOTA_TIER_TEAM_DASHBOARDS: ${QUOTA_TIER_TEAM_DASHBOARDS:-}
      QUOTA_TIER_TEAM_ALERT_RULES: ${QUOTA_TIER_TEAM_ALERT_RULES:-}
      QUOTA_TIER_TEAM_ALERT_DESTINATIONS: ${QUOTA_TIER_TEAM_ALERT_DESTINATIONS:-}
