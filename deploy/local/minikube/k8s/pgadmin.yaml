---
# =============================================================================
# pgAdmin Service (PostgreSQL Admin UI)
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  labels:
    app: pgadmin
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30480
      protocol: TCP
      name: http
  selector:
    app: pgadmin

---
# =============================================================================
# pgAdmin PersistentVolume (hostPath)
# =============================================================================
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pgadmin-pv
  labels:
    app: pgadmin
spec:
  storageClassName: ""
  capacity:
    storage: 500Mi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/pgadmin-data
    type: DirectoryOrCreate

---
# =============================================================================
# pgAdmin PersistentVolumeClaim
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pgadmin-data
  labels:
    app: pgadmin
spec:
  storageClassName: ""
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 500Mi
  selector:
    matchLabels:
      app: pgadmin

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  labels:
    app: pgadmin
    app.kubernetes.io/component: admin
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
        app.kubernetes.io/component: admin
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.38
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "50m"
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres 5432; do sleep 3; done
              echo "Postgres ready"
        - name: fix-permissions
          image: busybox:1.38
          resources:
            limits:
              cpu: "100m"
              memory: 64Mi
            requests:
              cpu: "25m"
              memory: 32Mi
          command: ["sh", "-c", "chown -R 5050:5050 /var/lib/pgadmin"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          volumeMounts:
            - name: pgadmin-data
              mountPath: /var/lib/pgadmin
      securityContext:
        fsGroup: 5050
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:9
          ports:
            - containerPort: 8080
              name: http
          env:
            # The image auto-switches to 8080 under a restricted (non-root,
            # no-new-privileges) security context; set it explicitly so the
            # listen port, containerPort, Service targetPort, and probes agree.
            - name: PGADMIN_LISTEN_PORT
              value: "8080"
          envFrom:
            - secretRef:
                name: pgadmin-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 5050
            allowPrivilegeEscalation: false
          resources:
            limits:
              cpu: "300m"
              memory: 512Mi
            requests:
              cpu: "75m"
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /misc/ping
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          volumeMounts:
            - name: pgadmin-data
              mountPath: /var/lib/pgadmin
      volumes:
        - name: pgadmin-data
          persistentVolumeClaim:
            claimName: pgadmin-data
