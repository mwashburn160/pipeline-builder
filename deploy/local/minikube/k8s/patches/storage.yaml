# =============================================================================
# Minikube storage overrides — smaller volumes for local development
# =============================================================================

# --- Registry PV (80Gi → 2Gi) ---
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: registry-pv
spec:
  capacity:
    storage: 2Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
spec:
  resources:
    requests:
      storage: 2Gi
