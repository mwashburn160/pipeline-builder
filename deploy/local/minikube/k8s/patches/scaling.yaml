# =============================================================================
# Minikube scaling overrides
# =============================================================================

# --- Plugin KEDA ScaledObject (align with EC2/EKS) ---
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: plugin
spec:
  maxReplicaCount: 4

# --- ResourceQuota (adjusted for minikube cluster) ---
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: pipeline-builder-quota
spec:
  hard:
    requests.cpu: "10"
    limits.cpu: "16"

# --- LimitRange (adjusted for minikube cluster) ---
---
apiVersion: v1
kind: LimitRange
metadata:
  name: pipeline-builder-limits
spec:
  limits:
    - type: Pod
      max:
        cpu: "4"
        # Plugin pod = buildkitd sidecar (BUILDKIT_MEMORY_LIMIT, 3Gi default) +
        # plugin app (2Gi) ≈ 5Gi, so a 4Gi pod cap forbids it. Keep >= that sum.
        memory: 10Gi
