# Alertmanager configuration for Pipeline Builder.
#
# Routes alerts from Prometheus by `severity` label:
#   - critical → critical-slack receiver (paging channel)
#   - warning  → warning-slack receiver (non-paging channel)
#
# Webhook URLs are templated from environment variables — the deploy startup
# script substitutes them via envsubst before Alertmanager loads the file. If
# SLACK_WEBHOOK_URL is unset, alerts go to the `null` receiver (silently
# dropped) so the container stays healthy in environments without Slack wired up.
#
# Tunables:
#   group_wait      — batch alerts that fire within this window into one
#                     notification (avoid one-Slack-message-per-alert storms).
#   group_interval  — minimum time between batches for the same group.
#   repeat_interval — how often to re-fire a persistent alert. 4h matches the
#                     Alertmanager default; bump if the team is muting them.

global:
  resolve_timeout: 5m

route:
  receiver: 'default'
  group_by: ['alertname', 'severity', 'org_id']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # tenancy=org → relay to platform, which fans out to each org's configured
    # destinations (Slack webhook, generic HTTPS webhook, in-app message). The
    # `org_id` label on the alert drives the per-org lookup inside the relay.
    # `continue: false` because the relay is the terminal hop for org alerts —
    # we don't also send them to the ops-team Slack.
    - matchers:
        - tenancy = "org"
      receiver: 'platform-relay'
      group_by: ['org_id', 'alertname']
      continue: false

    # Platform-wide alerts (tenancy=platform or unlabeled) keep going to the
    # ops-team Slack receivers, routed by severity.
    - matchers:
        - severity = "critical"
      receiver: 'critical-slack'
      continue: false
    - matchers:
        - severity = "warning"
      receiver: 'warning-slack'
      continue: false

receivers:
  - name: 'default'
    # Catch-all for un-routed alerts. Logged-only by default so an
    # unrouted alert doesn't get silently dropped.

  # Multi-tenant relay: posts the Alertmanager v2 webhook payload to the
  # platform service, which looks up the alert's `org_id` label in the
  # `org_alert_destinations` table and fans out to each enabled destination.
  #
  # Per-instance binding (the only supported configuration):
  #   ALERT_WEBHOOK_INSTANCE_ID    — matches an `id` in ALERT_WEBHOOK_INSTANCES on platform
  #   ALERT_WEBHOOK_INSTANCE_TOKEN — bearer for that instance (matches the entry's `token`)
  # The platform service resolves via DNS in every deploy target (docker
  # compose service name, k8s Service) so the URL
  # below is the same regardless of environment. Operators that want HTTPS
  # via the cluster's nginx point this at the public ingress instead.
  #
  # Defaults here are dev-safe placeholders; real deployments override the
  # token/instance-id via the platform's `ALERT_WEBHOOK_INSTANCES` config and
  # update this file (or run envsubst over it) before deploy. If we wire
  # envsubst into startup later, swap each literal back to `${VAR}`.
  - name: 'platform-relay'
    webhook_configs:
      - url: 'http://platform:3000/api/observability/alert-webhook'
        http_config:
          authorization:
            type: Bearer
            credentials: 'local-dev-token'
          tls_config:
            insecure_skip_verify: true
        send_resolved: true
        max_alerts: 64
        # NOTE: an earlier design here sent `X-Alertmanager-Instance` as
        # a custom HTTP header so the platform-relay could disambiguate
        # multiple Alertmanager instances. Alertmanager 0.28's webhook
        # config supports neither a top-level `http_headers:` field nor
        # `http_config.headers:` (both raise "field not found"); custom
        # webhook headers landed in newer Alertmanager releases. For now
        # the relay authenticates on the Bearer token alone — if/when
        # we upgrade Alertmanager, restore the header under
        # `http_config.headers:` and have the relay enforce it.

  # Slack receivers below carry placeholder webhook URLs so alertmanager
  # parses the config successfully. Slack rejects requests to these IDs
  # with 404 — alertmanager logs the rejection and keeps running.
  # Replace with real `https://hooks.slack.com/services/...` URLs (or wire
  # envsubst into startup) to actually deliver to Slack.
  - name: 'critical-slack'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/T00000000/B00000000/CHANGE_ME_CRITICAL'
        channel: '#ops-pager'
        send_resolved: true
        title: '[CRITICAL] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Detail:*  {{ .Annotations.description }}
          *Labels:*  {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }}, {{ end }}
          {{ end }}

  - name: 'warning-slack'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/T00000000/B00000000/CHANGE_ME_WARNING'
        channel: '#ops-warnings'
        send_resolved: true
        title: '[WARN] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Detail:*  {{ .Annotations.description }}
          {{ end }}

# Inhibition rules: a higher-severity alert silences related lower-severity ones
# (e.g. when something is `critical`, the matching `warning` is noise).
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ['alertname', 'component']
