# =============================================================================
# Shared YAML Anchors
# =============================================================================

# -- Healthcheck for API containers --
x-api-healthcheck: &api-healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 180s

# -- Deploy defaults for API containers --
x-api-deploy: &api-deploy
  resources:
    limits:
      cpus: '0.75'
      memory: 768M
    reservations:
      cpus: '0.4'
      memory: 384M

# -- Deploy defaults for database containers --
x-db-deploy: &db-deploy
  resources:
    limits:
      cpus: '1.5'
      memory: 1.5G
    reservations:
      cpus: '0.8'
      memory: 768M

# -- Env shared by ALL API services --
x-common-env: &common-env
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  JWT_SECRET: ${JWT_SECRET}
  REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
  PLATFORM_BASE_URL: ${PLATFORM_BASE_URL:-https://localhost:8443}

# -- Env shared by Postgres-backed services (platform, plugin, pipeline) --
x-postgres-env: &postgres-env
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DATABASE: ${DATABASE}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DRIZZLE_MAX_POOL_SIZE: ${DRIZZLE_MAX_POOL_SIZE:-20}
  DRIZZLE_IDLE_TIMEOUT_MILLIS: ${DRIZZLE_IDLE_TIMEOUT_MILLIS:-30000}
  DRIZZLE_CONNECTION_TIMEOUT_MILLIS: ${DRIZZLE_CONNECTION_TIMEOUT_MILLIS:-10000}

# -- Env shared by Express server services --
x-server-env: &server-env
  CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
  CORS_ORIGIN: ${CORS_ORIGIN}
  LIMITER_MAX: ${LIMITER_MAX:-500}
  LIMITER_WINDOWMS: ${LIMITER_WINDOWMS:-900000}

# -- Env for services that call the quota service --
x-quota-client-env: &quota-client-env
  QUOTA_SERVICE_HOST: ${QUOTA_SERVICE_HOST:-quota}
  QUOTA_SERVICE_PORT: ${QUOTA_SERVICE_PORT:-3000}

# -- Env for services that use AI generation --
x-ai-env: &ai-env
  OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434/v1}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
  XAI_API_KEY: ${XAI_API_KEY:-}

# =============================================================================
# Services
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  nginx:
    image: 'nginx:1.27'
    container_name: nginx
    restart: always
    ports:
      - '8080:8080'
      - '8443:8443'
    environment:
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - './certs/nginx.crt:/etc/nginx/certs/nginx.crt:ro'
      - './certs/nginx.key:/etc/nginx/certs/nginx.key:ro'
      - './nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './nginx/jwt.js:/etc/nginx/njs/jwt.js:ro'
      - './nginx/metrics.js:/etc/nginx/njs/metrics.js:ro'
    networks:
      - proxy-network
      - backend-network
    depends_on:
      platform:
        condition: service_healthy
      frontend:
        condition: service_healthy
      plugin:
        condition: service_healthy
      pipeline:
        condition: service_healthy
      message:
        condition: service_healthy
      reporting:
        condition: service_healthy
      quota:
        condition: service_healthy
      billing:
        condition: service_healthy
      compliance:
        condition: service_healthy
      grafana:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:8443/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M

  # ---------------------------------------------------------------------------
  # Databases
  # ---------------------------------------------------------------------------
  mongodb:
    image: 'mongo:7.0'
    container_name: mongodb
    restart: always
    command: ['mongod', '--bind_ip_all', '--replSet', 'rs0', '--keyFile', '/etc/mongodb-keyfile']
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: platform
    volumes:
      - './data/db-data/mongodb/:/data/db/:rw'
      - './mongodb-keyfile:/etc/mongodb-keyfile:ro'
      - './mongodb-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro'
    networks:
      - backend-network
    healthcheck:
      test: >
        bash -c 'mongosh --quiet --host localhost:27017 --username
        ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD}
        --authenticationDatabase admin --eval
        "db.getSiblingDB(\"admin\").runCommand({ replSetGetStatus: 1 }).ok" ||
        (mongosh --quiet --host localhost:27017 --username
        ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD}
        --authenticationDatabase admin --eval "rs.initiate({ _id: \"rs0\",
        members: [{ _id: 0, host: \"mongodb:27017\" }] })" && exit 1)'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy: *db-deploy

  postgres:
    image: 'postgres:18'
    container_name: postgres
    restart: always
    command: postgres -c listen_addresses=*
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - './data/db-data/postgres/:/var/lib/postgresql:rw'
      - './postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy: *db-deploy

  redis:
    image: 'redis:7-alpine'
    container_name: redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - './data/db-data/redis/:/data:rw'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ---------------------------------------------------------------------------
  # AI / LLM
  # ---------------------------------------------------------------------------
  ollama:
    image: 'ollama/ollama:latest'
    container_name: ollama
    restart: always
    ports:
      - '11434:11434'
    volumes:
      - './data/ollama-data/:/root/.ollama:rw'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 320s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # One-time init container that pulls the default Ollama model.
  ollama-pull:
    image: 'ollama/ollama:latest'
    container_name: ollama-pull
    restart: 'no'
    entrypoint: ['sh', '-c', 'ollama pull ${OLLAMA_DEFAULT_MODEL:-llama3}']
    environment:
      OLLAMA_HOST: ollama:11434
    networks:
      - backend-network
    depends_on:
      ollama:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  frontend:
    image: 'ghcr.io/mwashburn160/frontend:1.46.7'
    container_name: frontend
    restart: always
    environment:
      PLATFORM_BASE_URL: ${PLATFORM_BASE_URL}
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  platform:
    image: 'ghcr.io/mwashburn160/platform:1.40.7'
    container_name: platform
    restart: always
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env]
      SERVICE_NAME: platform
      # Billing
      BILLING_ENABLED: ${BILLING_ENABLED:-true}
      BILLING_SERVICE_HOST: ${BILLING_SERVICE_HOST:-billing}
      BILLING_SERVICE_PORT: ${BILLING_SERVICE_PORT:-3000}
      # Security
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      # JWT
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SALT_ROUNDS: ${JWT_SALT_ROUNDS}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      # Platform
      PLATFORM_FRONTEND_URL: ${PLATFORM_FRONTEND_URL:-https://localhost:8443}
      TRUST_PROXY: ${TRUST_PROXY}
      # MongoDB
      MONGODB_URI: ${MONGODB_URI}
      # Email
      EMAIL_ENABLED: ${EMAIL_ENABLED}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SES_REGION: ${SES_REGION:-us-east-1}
      SES_ACCESS_KEY_ID: ${SES_ACCESS_KEY_ID}
      SES_SECRET_ACCESS_KEY: ${SES_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Invitations
      INVITATION_EXPIRATION_DAYS: ${INVITATION_EXPIRATION_DAYS}
      INVITATION_MAX_PENDING_PER_ORG: ${INVITATION_MAX_PENDING_PER_ORG}
      # OAuth
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-https://localhost:8443}
      # Service URLs
      LIST_PLUGINS_URL: ${LIST_PLUGINS_URL:-https://localhost:8443}
      GET_PLUGIN_URL: ${GET_PLUGIN_URL:-https://localhost:8443}
      UPLOAD_PLUGIN_URL: ${UPLOAD_PLUGIN_URL:-https://localhost:8443}
      LIST_PIPELINES_URL: ${LIST_PIPELINES_URL:-https://localhost:8443}
      GET_PIPELINE_URL: ${GET_PIPELINE_URL:-https://localhost:8443}
      CREATE_PIPELINE_URL: ${CREATE_PIPELINE_URL:-https://localhost:8443}
      SERVICE_TIMEOUT: ${SERVICE_TIMEOUT:-30000}
      # Loki
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
      # Quotas
      QUOTA_BYPASS_ORG_ID: ${QUOTA_BYPASS_ORG_ID:-system}
      QUOTA_DEFAULT_WINDOW_MS: ${QUOTA_DEFAULT_WINDOW_MS:-60000}
      QUOTA_CREATE_PLUGIN_LIMIT: ${QUOTA_CREATE_PLUGIN_LIMIT:-unlimited}
      QUOTA_CREATE_PLUGIN_WINDOW_MS: ${QUOTA_CREATE_PLUGIN_WINDOW_MS:-60000}
      QUOTA_GET_PLUGIN_LIMIT: ${QUOTA_GET_PLUGIN_LIMIT:-10}
      QUOTA_GET_PLUGIN_WINDOW_MS: ${QUOTA_GET_PLUGIN_WINDOW_MS:-60000}
      QUOTA_CREATE_PIPELINE_LIMIT: ${QUOTA_CREATE_PIPELINE_LIMIT:-unlimited}
      QUOTA_CREATE_PIPELINE_WINDOW_MS: ${QUOTA_CREATE_PIPELINE_WINDOW_MS:-60000}
      QUOTA_GET_PIPELINE_LIMIT: ${QUOTA_GET_PIPELINE_LIMIT:-10}
      QUOTA_GET_PIPELINE_WINDOW_MS: ${QUOTA_GET_PIPELINE_WINDOW_MS:-60000}
    networks:
      - backend-network
    depends_on:
      mongodb:
        condition: service_healthy
      plugin:
        condition: service_healthy
      pipeline:
        condition: service_healthy
      quota:
        condition: service_healthy
      billing:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy: *api-deploy

  plugin:
    image: 'ghcr.io/mwashburn160/plugin:1.41.7-docker'
    container_name: plugin
    restart: always
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env, *ai-env]
      SERVICE_NAME: plugin
      COMPLIANCE_SERVICE_HOST: ${COMPLIANCE_SERVICE_HOST:-compliance}
      COMPLIANCE_SERVICE_PORT: ${COMPLIANCE_SERVICE_PORT:-3000}
      COMPLIANCE_BYPASS: ${COMPLIANCE_BYPASS:-false}
      IMAGE_REGISTRY_HOST: ${IMAGE_REGISTRY_HOST:-registry}
      IMAGE_REGISTRY_PORT: ${IMAGE_REGISTRY_PORT:-5000}
      IMAGE_REGISTRY_USER: ${IMAGE_REGISTRY_USER:-admin}
      IMAGE_REGISTRY_TOKEN: ${IMAGE_REGISTRY_TOKEN}
      DOCKER_REGISTRY_HTTP: ${DOCKER_REGISTRY_HTTP:-false}
      DOCKER_REGISTRY_INSECURE: ${DOCKER_REGISTRY_INSECURE:-true}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      DOCKER_BUILD_STRATEGY: ${DOCKER_BUILD_STRATEGY:-podman}
      DOCKER_BUILD_TIMEOUT_MS: ${DOCKER_BUILD_TIMEOUT_MS:-1800000}
      DOCKER_PUSH_TIMEOUT_MS: ${DOCKER_PUSH_TIMEOUT_MS:-300000}
      PLUGIN_BUILD_CONCURRENCY: ${PLUGIN_BUILD_CONCURRENCY:-1}
      DOCKER_HOST: ${DOCKER_HOST:-tcp://plugin-dind:2376}
      DOCKER_CERT_PATH: ${DOCKER_CERT_PATH:-/certs/client}
    volumes:
      - './data/tmp:/app/tmp:rw'
      - './data/uploads:/app/uploads:rw'
      - './certs/dind:/certs:ro'
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
      quota:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      plugin-dind:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
        reservations:
          cpus: '0.75'
          memory: 1024M

  # ---------------------------------------------------------------------------
  # Docker-in-Docker sidecar for isolated plugin builds
  # ---------------------------------------------------------------------------
  plugin-dind:
    image: 'docker:27-dind'
    container_name: plugin-dind
    restart: always
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: /certs
    volumes:
      - './certs/dind:/certs'
      - './data/tmp:/app/tmp:rw'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  pipeline:
    image: 'ghcr.io/mwashburn160/pipeline:1.40.7'
    container_name: pipeline
    restart: always
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env, *ai-env]
      SERVICE_NAME: pipeline
      COMPLIANCE_SERVICE_HOST: ${COMPLIANCE_SERVICE_HOST:-compliance}
      COMPLIANCE_SERVICE_PORT: ${COMPLIANCE_SERVICE_PORT:-3000}
      COMPLIANCE_BYPASS: ${COMPLIANCE_BYPASS:-false}
      PLUGIN_SERVICE_HOST: ${PLUGIN_SERVICE_HOST:-plugin}
      PLUGIN_SERVICE_PORT: ${PLUGIN_SERVICE_PORT:-3000}
      HANDLER_TIMEOUT_MS: ${HANDLER_TIMEOUT_MS:-30000}
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
      quota:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 512M

  message:
    image: 'ghcr.io/mwashburn160/message:1.22.7'
    container_name: message
    restart: always
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env]
      SERVICE_NAME: message
      SUPPORT_ALIASES: ${SUPPORT_ALIASES:-support@pipeline-builder,help@pipeline-builder}
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
      quota:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  reporting:
    image: 'ghcr.io/mwashburn160/reporting:1.3.7'
    container_name: reporting
    restart: always
    environment:
      <<: [*common-env, *postgres-env, *server-env]
      SERVICE_NAME: reporting
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  compliance:
    image: 'ghcr.io/mwashburn160/compliance:1.6.7'
    container_name: compliance
    restart: always
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env]
      SERVICE_NAME: compliance
      MESSAGE_SERVICE_HOST: message
      MESSAGE_SERVICE_PORT: '3000'
      PLUGIN_SERVICE_HOST: plugin
      PLUGIN_SERVICE_PORT: '3000'
      PIPELINE_SERVICE_HOST: pipeline
      PIPELINE_SERVICE_PORT: '3000'
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
      quota:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy: *api-deploy

  quota:
    image: 'ghcr.io/mwashburn160/quota:1.38.7'
    container_name: quota
    restart: always
    environment:
      <<: *common-env
      SERVICE_NAME: quota
      PORT: ${PORT:-3000}
      MONGODB_URI: ${MONGODB_URI}
      LIMITER_MAX: ${LIMITER_MAX:-2000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-2000}
      QUOTA_DEFAULT_PLUGINS: ${QUOTA_DEFAULT_PLUGINS:-100}
      QUOTA_DEFAULT_PIPELINES: ${QUOTA_DEFAULT_PIPELINES:-10}
      QUOTA_DEFAULT_API_CALLS: ${QUOTA_DEFAULT_API_CALLS:--1}
      QUOTA_RESET_DAYS: ${QUOTA_RESET_DAYS:-3}
    networks:
      - backend-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.4'
          memory: 256M

  billing:
    image: 'ghcr.io/mwashburn160/billing:1.24.7'
    container_name: billing
    restart: always
    environment:
      <<: [*common-env, *postgres-env, *quota-client-env]
      SERVICE_NAME: billing
      BILLING_ENABLED: ${BILLING_ENABLED:-true}
      PORT: ${PORT:-3000}
      MONGODB_URI: ${MONGODB_URI}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      # Billing provider (stub | aws-marketplace)
      BILLING_PROVIDER: ${BILLING_PROVIDER:-stub}
      # AWS Marketplace (only when BILLING_PROVIDER=aws-marketplace)
      AWS_MARKETPLACE_PRODUCT_CODE: ${AWS_MARKETPLACE_PRODUCT_CODE:-}
      AWS_MARKETPLACE_REGION: ${AWS_MARKETPLACE_REGION:-us-east-1}
      AWS_MARKETPLACE_SNS_TOPIC_ARN: ${AWS_MARKETPLACE_SNS_TOPIC_ARN:-}
      AWS_MARKETPLACE_DIMENSION_MAP: ${AWS_MARKETPLACE_DIMENSION_MAP:-}
      # Plan pricing
      BILLING_PLAN_DEVELOPER_MONTHLY: ${BILLING_PLAN_DEVELOPER_MONTHLY:-0}
      BILLING_PLAN_DEVELOPER_ANNUAL: ${BILLING_PLAN_DEVELOPER_ANNUAL:-0}
      BILLING_PLAN_PRO_MONTHLY: ${BILLING_PLAN_PRO_MONTHLY:-799}
      BILLING_PLAN_PRO_ANNUAL: ${BILLING_PLAN_PRO_ANNUAL:-7990}
      BILLING_PLAN_UNLIMITED_MONTHLY: ${BILLING_PLAN_UNLIMITED_MONTHLY:-1199}
      BILLING_PLAN_UNLIMITED_ANNUAL: ${BILLING_PLAN_UNLIMITED_ANNUAL:-11990}
      # Message service (for notifications)
      MESSAGE_SERVICE_HOST: ${MESSAGE_SERVICE_HOST:-message}
      MESSAGE_SERVICE_PORT: ${MESSAGE_SERVICE_PORT:-3000}
    networks:
      - backend-network
    depends_on:
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      quota:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Admin UIs
  # ---------------------------------------------------------------------------
  mongo-express:
    image: 'mongo-express:1.0'
    container_name: mongo-express
    restart: always
    ports:
      - '27081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: ${ME_CONFIG_MONGODB_URL}
      ME_CONFIG_SITE_BASEURL: ${ME_CONFIG_SITE_BASEURL}
      ME_CONFIG_MONGODB_ENABLE_ADMIN: ${ME_CONFIG_MONGODB_ENABLE_ADMIN}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${ME_CONFIG_MONGODB_ADMINUSERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${ME_CONFIG_MONGODB_ADMINPASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
    networks:
      - backend-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/mongo-express/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 192M

  pgadmin:
    image: 'dpage/pgadmin4:9'
    container_name: pgadmin
    restart: always
    ports:
      - '5480:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - './data/pgadmin-data/:/var/lib/pgadmin/:rw'
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Docker Registry
  # ---------------------------------------------------------------------------
  registry:
    image: 'registry:2'
    container_name: registry
    restart: always
    ports:
      - '5000:5000'
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_HTTP_ADDR: '0.0.0.0:5000'
      REGISTRY_HTTP_TLS_KEY: /etc/ssl/private/registry.key
      REGISTRY_HTTP_TLS_CERTIFICATE: /etc/ssl/certs/registry.crt
      REGISTRY_AUTH_HTPASSWD_REALM: registry realm
      REGISTRY_AUTH_HTPASSWD_PATH: /etc/auth/registry.passwd
      REGISTRY_STORAGE_DELETE_ENABLED: 'true'
    volumes:
      - './auth/registry.passwd:/etc/auth/registry.passwd:ro'
      - './certs/registry.crt:/etc/ssl/certs/registry.crt:ro'
      - './certs/registry.key:/etc/ssl/private/registry.key:ro'
      - './data/registry-data/:/var/lib/registry/:rw'
    networks:
      - proxy-network
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO /dev/null -S https://localhost:5000/v2/ 2>&1 | grep -q 'HTTP/' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 512M
        reservations:
          cpus: '0.3'
          memory: 256M

  registry-express:
    image: 'joxit/docker-registry-ui:2'
    container_name: registry-express
    restart: always
    ports:
      - '5080:80'
    environment:
      REGISTRY_TITLE: ${JOXIT_REGISTRY_TITLE}
      NGINX_PROXY_PASS_URL: ${JOXIT_NGINX_PROXY_PASS_URL}
      SINGLE_REGISTRY: ${JOXIT_SINGLE_REGISTRY}
      ENABLE_DELETE_IMAGES: ${JOXIT_ENABLE_DELETE_IMAGES}
      SHOW_CONTENT_DIGEST: ${JOXIT_SHOW_CONTENT_DIGEST}
    networks:
      - backend-network
    depends_on:
      registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 192M

  # ---------------------------------------------------------------------------
  # Observability (Prometheus + Loki + Grafana + Promtail)
  # ---------------------------------------------------------------------------
  prometheus:
    image: 'prom/prometheus:v3.2.1'
    container_name: prometheus
    restart: always
    command: ['--config.file=/etc/prometheus/prometheus.yml', '--storage.tsdb.retention.time=7d']
    volumes:
      - './config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro'
      - './data/db-data/prometheus/:/prometheus:rw'
    networks:
      - backend-network
    depends_on:
      platform:
        condition: service_healthy
      plugin:
        condition: service_healthy
      pipeline:
        condition: service_healthy
      message:
        condition: service_healthy
      quota:
        condition: service_healthy
      billing:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  loki:
    image: 'grafana/loki:3.4.2'
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - './data/db-data/loki/:/loki:rw'
      - './config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  grafana:
    image: 'grafana/grafana:11.5.2'
    container_name: grafana
    restart: always
    ports:
      - '3200:3000'
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      GF_AUTH_PROXY_ENABLED: 'true'
      GF_AUTH_PROXY_HEADER_NAME: X-WEBAUTH-USER
      GF_AUTH_PROXY_HEADER_PROPERTY: username
      GF_AUTH_PROXY_AUTO_SIGN_UP: 'true'
      GF_USERS_DEFAULT_THEME: dark
      GF_SECURITY_ALLOW_EMBEDDING: 'true'
      GF_SERVER_ROOT_URL: '%(protocol)s://%(domain)s:%(http_port)s/grafana/'
      GF_SERVER_SERVE_FROM_SUB_PATH: 'true'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: '/etc/grafana/dashboards/service-logs.json'
    volumes:
      - './data/db-data/grafana/:/var/lib/grafana:rw'
      - './config/grafana/loki.yml:/etc/grafana/provisioning/datasources/loki.yml:ro'
      - './config/grafana/prometheus.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro'
      - './config/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro'
      - './config/grafana/service-logs.json:/etc/grafana/dashboards/service-logs.json:ro'
      - './config/grafana/api-metrics.json:/etc/grafana/dashboards/api-metrics.json:ro'
    networks:
      - backend-network
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  promtail:
    image: 'grafana/promtail:3.4.2'
    container_name: promtail
    restart: always
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - './config/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro'
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    networks:
      - backend-network
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

# =============================================================================
# Networks
# =============================================================================
networks:
  proxy-network:
    name: proxy-network
  backend-network:
    name: backend-network
    driver: bridge
