# =============================================================================
# Shared YAML Anchors
# =============================================================================

# -- Healthcheck for API containers --
x-api-healthcheck: &api-healthcheck
  test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
  interval: 30s
  timeout: 10s
  retries: 5
  start_period: 180s

# -- Deploy defaults for API containers --
x-api-deploy: &api-deploy
  resources:
    limits:
      cpus: '0.75'
      memory: 768M
    reservations:
      cpus: '0.4'
      memory: 384M

# -- Deploy defaults for database containers --
x-db-deploy: &db-deploy
  resources:
    limits:
      cpus: '1.5'
      memory: 1.5G
    reservations:
      cpus: '0.8'
      memory: 768M

# -- Env shared by ALL API services --
x-common-env: &common-env
  LOG_LEVEL: ${LOG_LEVEL:-info}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  JWT_SECRET: ${JWT_SECRET}
  REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
  PLATFORM_BASE_URL: ${PLATFORM_BASE_URL:-https://localhost:8443}

# -- Env shared by Postgres-backed services (platform, plugin, pipeline) --
x-postgres-env: &postgres-env
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DATABASE: ${DATABASE}
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  DRIZZLE_MAX_POOL_SIZE: ${DRIZZLE_MAX_POOL_SIZE:-20}
  DRIZZLE_IDLE_TIMEOUT_MILLIS: ${DRIZZLE_IDLE_TIMEOUT_MILLIS:-30000}
  DRIZZLE_CONNECTION_TIMEOUT_MILLIS: ${DRIZZLE_CONNECTION_TIMEOUT_MILLIS:-10000}
  # Multi-tenant context mode for withTenantTx (see api/.../tenancy.ts).
  # warn (default) logs missing-context calls; strict throws. Every
  # Postgres-backed service inherits this via x-postgres-env so the
  # setting is uniform across the fleet.
  RLS_CONTEXT_MODE: ${RLS_CONTEXT_MODE:-warn}

# -- Env shared by Express server services --
x-server-env: &server-env
  CORS_CREDENTIALS: ${CORS_CREDENTIALS:-true}
  CORS_ORIGIN: ${CORS_ORIGIN}
  LIMITER_MAX: ${LIMITER_MAX:-500}
  LIMITER_WINDOWMS: ${LIMITER_WINDOWMS:-900000}

# -- Env for services that call the quota service --
x-quota-client-env: &quota-client-env
  QUOTA_SERVICE_HOST: ${QUOTA_SERVICE_HOST:-quota}
  QUOTA_SERVICE_PORT: ${QUOTA_SERVICE_PORT:-3000}

# -- Env for services that use AI generation --
x-ai-env: &ai-env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
  XAI_API_KEY: ${XAI_API_KEY:-}

# =============================================================================
# Services
# =============================================================================
services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  nginx:
    image: 'nginx:1.27'
    container_name: nginx
    restart: always
    stop_grace_period: 5s
    ports:
      - '8080:8080'
      - '8443:8443'
    environment:
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - './certs/nginx-tls.crt:/etc/nginx/certs/nginx.crt:ro'
      - './certs/nginx-tls.key:/etc/nginx/certs/nginx.key:ro'
      - './nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './nginx/jwt.js:/etc/nginx/njs/jwt.js:ro'
      - './nginx/metrics.js:/etc/nginx/njs/metrics.js:ro'
    networks:
      - proxy-network
      - backend-network
    depends_on:
      billing:        { condition: service_started }
      compliance:     { condition: service_started }
      frontend:       { condition: service_started }
      image-registry: { condition: service_started }
      message:        { condition: service_started }
      pipeline:       { condition: service_started }
      platform:       { condition: service_started }
      plugin:         { condition: service_started }
      quota:          { condition: service_started }
      reporting:      { condition: service_started }
    healthcheck:
      test: ["CMD-SHELL", "curl -sfk https://localhost:8443/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M

  # ---------------------------------------------------------------------------
  # Databases
  # ---------------------------------------------------------------------------
  mongodb:
    image: 'mongo:7.0'
    container_name: mongodb
    restart: always
    stop_grace_period: 15s
    command: ['mongod', '--bind_ip_all', '--replSet', 'rs0', '--keyFile', '/etc/mongodb-keyfile']
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: platform
    volumes:
      - './data/db-data/mongodb/:/data/db/:rw'
      - './mongodb-keyfile:/etc/mongodb-keyfile:ro'
      - './mongodb-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro'
    networks:
      - backend-network
    healthcheck:
      test: >
        bash -c 'mongosh --quiet --host localhost:27017 --username
        ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD}
        --authenticationDatabase admin --eval
        "db.getSiblingDB(\"admin\").runCommand({ replSetGetStatus: 1 }).ok" ||
        (mongosh --quiet --host localhost:27017 --username
        ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD}
        --authenticationDatabase admin --eval "rs.initiate({ _id: \"rs0\",
        members: [{ _id: 0, host: \"mongodb:27017\" }] })" && exit 1)'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy: *db-deploy

  postgres:
    image: 'postgres:18'
    container_name: postgres
    restart: always
    stop_grace_period: 15s
    command: postgres -c listen_addresses=*
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - './data/db-data/postgres/:/var/lib/postgresql:rw'
      - './postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy: *db-deploy

  # ---------------------------------------------------------------------------
  # pgBouncer connection pooler
  # ---------------------------------------------------------------------------
  # All app services connect through pgbouncer (DB_HOST=pgbouncer / DB_PORT=6432).
  # See `deploy/local/config/pgbouncer/pgbouncer.ini` for per-tier pool layout.
  pgbouncer:
    image: 'edoburu/pgbouncer:v1.23.1-p3'
    container_name: pgbouncer
    restart: always
    environment:
      # edoburu uses DB_*; userlist.txt is generated from these at startup.
      # Our mounted pgbouncer.ini overrides the auto-generated config.
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      LISTEN_PORT: '6432'
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      ADMIN_USERS: postgres
    volumes:
      - './config/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: 'redis:7-alpine'
    container_name: redis
    restart: always
    stop_grace_period: 10s
    command: redis-server --maxmemory 128mb --maxmemory-policy noeviction
    volumes:
      - './data/db-data/redis/:/data:rw'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ---------------------------------------------------------------------------
  # Application Services
  # ---------------------------------------------------------------------------
  frontend:
    image: 'ghcr.io/mwashburn160/frontend:3.4.77'
    container_name: frontend
    restart: always
    stop_grace_period: 10s
    environment:
      PLATFORM_BASE_URL: ${PLATFORM_BASE_URL}
    volumes:
      - './data/cache:/app/.next/cache:rw'
      - './data/tmp:/tmp:rw'
    networks:
      - proxy-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  platform:
    image: 'ghcr.io/mwashburn160/platform:3.4.74'
    container_name: platform
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env]
      SERVICE_NAME: platform
      # Billing
      BILLING_ENABLED: ${BILLING_ENABLED:-true}
      BILLING_SERVICE_HOST: ${BILLING_SERVICE_HOST:-billing}
      BILLING_SERVICE_PORT: ${BILLING_SERVICE_PORT:-3000}
      # Security
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      MAX_LOGIN_ATTEMPTS: ${MAX_LOGIN_ATTEMPTS:-5}
      # Platform-only multi-tenant knobs. RLS_CONTEXT_MODE is set via
      # x-postgres-env so every postgres-backed service inherits it.
      BOOTSTRAP_SUPERADMIN_EMAILS: ${BOOTSTRAP_SUPERADMIN_EMAILS:-}
      SECRET_ENCRYPTION_PER_ORG_KMS: ${SECRET_ENCRYPTION_PER_ORG_KMS:-false}
      # JWT
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_SALT_ROUNDS: ${JWT_SALT_ROUNDS}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN}
      # Platform
      PLATFORM_FRONTEND_URL: ${PLATFORM_FRONTEND_URL:-https://localhost:8443}
      TRUST_PROXY: ${TRUST_PROXY}
      # MongoDB
      MONGODB_URI: ${MONGODB_URI}
      # Email
      EMAIL_ENABLED: ${EMAIL_ENABLED}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SES_REGION: ${SES_REGION:-us-east-1}
      SES_ACCESS_KEY_ID: ${SES_ACCESS_KEY_ID}
      SES_SECRET_ACCESS_KEY: ${SES_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Invitations
      INVITATION_EXPIRATION_DAYS: ${INVITATION_EXPIRATION_DAYS}
      INVITATION_MAX_PENDING_PER_ORG: ${INVITATION_MAX_PENDING_PER_ORG}
      # OAuth
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-https://localhost:8443}
      SERVICE_TIMEOUT: ${SERVICE_TIMEOUT:-30000}
      # Loki
      LOKI_URL: ${LOKI_URL:-http://loki:3100}
    networks:
      - backend-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy: *api-deploy

  plugin:
    image: 'ghcr.io/mwashburn160/plugin:3.4.71'
    container_name: plugin
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env, *ai-env]
      SERVICE_NAME: plugin
      COMPLIANCE_SERVICE_HOST: ${COMPLIANCE_SERVICE_HOST:-compliance}
      COMPLIANCE_SERVICE_PORT: ${COMPLIANCE_SERVICE_PORT:-3000}
      COMPLIANCE_BYPASS: ${COMPLIANCE_BYPASS:-false}
      IMAGE_REGISTRY_HOST: ${IMAGE_REGISTRY_HOST:-registry}
      IMAGE_REGISTRY_PORT: ${IMAGE_REGISTRY_PORT:-5000}
      IMAGE_REGISTRY_USER: ${IMAGE_REGISTRY_USER:-admin}
      IMAGE_REGISTRY_TOKEN: ${IMAGE_REGISTRY_TOKEN}
      IMAGE_REGISTRY_HTTP: ${IMAGE_REGISTRY_HTTP:-true}
      # Must match the registry's REGISTRY_AUTH_TOKEN_REALM so the plugin's
      # writeAuthConfig writes credentials keyed by the same host the
      # docker client will be redirected to during a push/pull challenge.
      # In-cluster clients hit image-registry directly on plain HTTP.
      # Override in .env when external docker clients need to pull.
      IMAGE_REGISTRY_TOKEN_REALM: ${IMAGE_REGISTRY_TOKEN_REALM:-http://image-registry:3000/token}
      # Talk to buildkitd over TCP on the backend-network. Unix-socket sharing
      # via a named volume fails under the rootless image because the volume
      # mounts at `/run/buildkit/` owned by root inside the container and the
      # rootless daemon (UID 1000) can't bind a socket there.
      BUILDKIT_HOST: tcp://buildkitd:1234
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      DOCKER_BUILD_TIMEOUT_MS: ${DOCKER_BUILD_TIMEOUT_MS:-900000}
      DOCKER_PUSH_TIMEOUT_MS: ${DOCKER_PUSH_TIMEOUT_MS:-300000}
      PLUGIN_BUILD_CONCURRENCY: ${PLUGIN_BUILD_CONCURRENCY:-1}
      # Plugin code (read-only rootfs) writes uploads + build artifacts here.
      # MUST match the container-side bind targets in `volumes:` below. Local
      # uses a laptop-style /data/* container path that mirrors the host
      # ./data/ checkout layout; k8s/fargate use the canonical
      # /opt/pipeline/pipeline-data/* paths instead. Either way, the env
      # vars + mount target must agree so multer/buildkit can write.
      DOCKER_BUILD_TEMP_ROOT: ${DOCKER_BUILD_TEMP_ROOT:-/data/plugins-data/builds}
      PLUGIN_UPLOAD_DIR: ${PLUGIN_UPLOAD_DIR:-/data/plugins-data/uploads}
      TMPDIR: /tmp
    volumes:
      # Host ./data/plugins-data → container /data/plugins-data. Symmetric
      # naming makes "what's in the laptop dir" obvious from inside the
      # container too.
      - './data/plugins-data/builds:/data/plugins-data/builds:rw'
      - './data/plugins-data/uploads:/data/plugins-data/uploads:rw'
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      buildkitd:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
        reservations:
          cpus: '0.75'
          memory: 1024M

  # ---------------------------------------------------------------------------
  # Rootless BuildKit daemon — replaces dind, no privileged mode, no
  # CA-trust workaround (buildkitd carries the system CA bundle). Single
  # shared instance for all plugin builds — tier partitioning lives at
  # the BullMQ queue level inside the plugin service, not at the
  # buildkitd layer.
  # ---------------------------------------------------------------------------
  buildkitd:
    # v0.30.0 (was v0.16.0): newer runc reaper avoids the hot
    # "container not running" retry loop on killed build containers.
    image: 'moby/buildkit:v0.30.0-rootless'
    container_name: buildkitd
    restart: always
    stop_grace_period: 5s
    user: "1000:1000"
    # Required for rootless newuidmap/newgidmap and `unshare` setup.
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    command:
      - --addr
      - tcp://0.0.0.0:1234
      - --oci-worker-no-process-sandbox
      # buildkitd.toml mirrors docker.io → registry:5000 so plugin
      # Dockerfiles can use bare `FROM pipeline-plugin-base:24.04` and
      # buildkit transparently resolves to the in-cluster registry.
      - --config
      - /home/user/.config/buildkit/buildkitd.toml
    expose:
      - "1234"
    volumes:
      # Named volume (not a host bind mount) on purpose: buildkit's
      # overlay snapshotter relies on filesystem features (xattrs,
      # workdir cleanup semantics, idmapped chown) that macOS Docker
      # Desktop's virtiofs-backed bind mounts don't fully support. A
      # named volume lives on the Linux VM's native ext4 and behaves
      # correctly. Cost: cache survives `rm -rf ./data` and needs an
      # explicit `docker volume rm pipeline-builder_buildkit-cache`
      # to wipe.
      - 'buildkit-cache:/home/user/.local/share/buildkit:rw'
      - './config/buildkitd/buildkitd.toml:/home/user/.config/buildkit/buildkitd.toml:ro'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "buildctl", "--addr", "tcp://127.0.0.1:1234", "debug", "workers"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M

  pipeline:
    image: 'ghcr.io/mwashburn160/pipeline:3.4.66'
    container_name: pipeline
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env, *ai-env]
      SERVICE_NAME: pipeline
      COMPLIANCE_SERVICE_HOST: ${COMPLIANCE_SERVICE_HOST:-compliance}
      COMPLIANCE_SERVICE_PORT: ${COMPLIANCE_SERVICE_PORT:-3000}
      COMPLIANCE_BYPASS: ${COMPLIANCE_BYPASS:-false}
      PLUGIN_SERVICE_HOST: ${PLUGIN_SERVICE_HOST:-plugin}
      PLUGIN_SERVICE_PORT: ${PLUGIN_SERVICE_PORT:-3000}
      HANDLER_TIMEOUT_MS: ${HANDLER_TIMEOUT_MS:-30000}
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy: *api-deploy

  message:
    image: 'ghcr.io/mwashburn160/message:3.4.67'
    container_name: message
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env]
      SERVICE_NAME: message
      SUPPORT_ALIASES: ${SUPPORT_ALIASES:-support@pipeline-builder,help@pipeline-builder}
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 384M
        reservations:
          cpus: '0.15'
          memory: 192M

  reporting:
    image: 'ghcr.io/mwashburn160/reporting:3.4.66'
    container_name: reporting
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *server-env]
      SERVICE_NAME: reporting
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 384M
        reservations:
          cpus: '0.15'
          memory: 192M

  compliance:
    image: 'ghcr.io/mwashburn160/compliance:3.4.68'
    container_name: compliance
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *server-env, *quota-client-env]
      SERVICE_NAME: compliance
      MESSAGE_SERVICE_HOST: message
      MESSAGE_SERVICE_PORT: '3000'
      PLUGIN_SERVICE_HOST: plugin
      PLUGIN_SERVICE_PORT: '3000'
      PIPELINE_SERVICE_HOST: pipeline
      PIPELINE_SERVICE_PORT: '3000'
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  quota:
    image: 'ghcr.io/mwashburn160/quota:3.4.66'
    container_name: quota
    restart: always
    stop_grace_period: 10s
    environment:
      <<: *common-env
      SERVICE_NAME: quota
      PORT: ${PORT:-3000}
      MONGODB_URI: ${MONGODB_URI}
      LIMITER_MAX: ${LIMITER_MAX:-2000}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-2000}
      QUOTA_DEFAULT_PLUGINS: ${QUOTA_DEFAULT_PLUGINS:-100}
      QUOTA_DEFAULT_PIPELINES: ${QUOTA_DEFAULT_PIPELINES:-10}
      QUOTA_DEFAULT_API_CALLS: ${QUOTA_DEFAULT_API_CALLS:--1}
      QUOTA_RESET_DAYS: ${QUOTA_RESET_DAYS:-3}
    networks:
      - backend-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.25'
          memory: 192M

  # pipeline-image-registry — Docker registry token-auth issuer +
  # /api/images/* management API. Customer CodeBuild pulls go through
  # the underlying registry (which delegates token issuance here);
  # api/plugin pushes mint a short-lived platform JWT and present it as
  # the Basic-auth password — image-registry verifies the JWT and issues
  # a registry-scoped Bearer token.
  image-registry:
    image: 'ghcr.io/mwashburn160/image-registry:3.4.70'
    container_name: image-registry
    restart: always
    stop_grace_period: 10s
    environment:
      <<: *common-env
      SERVICE_NAME: image-registry
      PORT: ${PORT:-3000}
      # Underlying registry the proxy + management API talks to.
      IMAGE_REGISTRY_HOST: ${IMAGE_REGISTRY_HOST:-registry}
      IMAGE_REGISTRY_PORT: ${IMAGE_REGISTRY_PORT:-5000}
      IMAGE_REGISTRY_HTTP: ${IMAGE_REGISTRY_HTTP:-true}
      IMAGE_REGISTRY_INSECURE: ${IMAGE_REGISTRY_INSECURE:-true}
      IMAGE_REGISTRY_USERNAME: ${IMAGE_REGISTRY_USERNAME:-admin}
      IMAGE_REGISTRY_PASSWORD: ${IMAGE_REGISTRY_PASSWORD:-password}
      # JWT signing keypair — generated by `bin/gen-image-registry-jwt-keys.sh`.
      # This service signs registry-auth JWTs with the private key; the cert
      # is also mounted into the registry container so it can verify those
      # JWTs (`REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE`).
      REGISTRY_TOKEN_PRIVATE_KEY_FILE: /etc/registry/jwt-private.pem
      REGISTRY_TOKEN_CERTIFICATE_FILE: /etc/registry/jwt-public.pem
      REGISTRY_TOKEN_ISSUER: ${REGISTRY_TOKEN_ISSUER:-platform}
      REGISTRY_TOKEN_SERVICE: ${REGISTRY_TOKEN_SERVICE:-pipeline-image-registry}
      REGISTRY_TOKEN_EXPIRES_IN: ${REGISTRY_TOKEN_EXPIRES_IN:-300}
      # JWT_SECRET is the platform's signing key — used here to verify
      # incoming Basic-auth-where-password-is-a-platform-JWT.
    volumes:
      - './certs/image-registry-jwt.key:/etc/registry/jwt-private.pem:ro'
      - './certs/image-registry-jwt.crt:/etc/registry/jwt-public.pem:ro'
    networks:
      - backend-network
      - proxy-network
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 384M
        reservations:
          cpus: '0.15'
          memory: 192M

  billing:
    image: 'ghcr.io/mwashburn160/billing:3.4.66'
    container_name: billing
    restart: always
    stop_grace_period: 10s
    environment:
      <<: [*common-env, *postgres-env, *quota-client-env]
      SERVICE_NAME: billing
      BILLING_ENABLED: ${BILLING_ENABLED:-true}
      PORT: ${PORT:-3000}
      MONGODB_URI: ${MONGODB_URI}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      # Billing provider (stub | aws-marketplace)
      BILLING_PROVIDER: ${BILLING_PROVIDER:-stub}
      # AWS Marketplace (only when BILLING_PROVIDER=aws-marketplace)
      AWS_MARKETPLACE_PRODUCT_CODE: ${AWS_MARKETPLACE_PRODUCT_CODE:-}
      AWS_MARKETPLACE_REGION: ${AWS_MARKETPLACE_REGION:-us-east-1}
      AWS_MARKETPLACE_SNS_TOPIC_ARN: ${AWS_MARKETPLACE_SNS_TOPIC_ARN:-}
      AWS_MARKETPLACE_DIMENSION_MAP: ${AWS_MARKETPLACE_DIMENSION_MAP:-}
      # Plan pricing
      BILLING_PLAN_DEVELOPER_MONTHLY: ${BILLING_PLAN_DEVELOPER_MONTHLY:-0}
      BILLING_PLAN_DEVELOPER_ANNUAL: ${BILLING_PLAN_DEVELOPER_ANNUAL:-0}
      BILLING_PLAN_PRO_MONTHLY: ${BILLING_PLAN_PRO_MONTHLY:-799}
      BILLING_PLAN_PRO_ANNUAL: ${BILLING_PLAN_PRO_ANNUAL:-7990}
      BILLING_PLAN_UNLIMITED_MONTHLY: ${BILLING_PLAN_UNLIMITED_MONTHLY:-1199}
      BILLING_PLAN_UNLIMITED_ANNUAL: ${BILLING_PLAN_UNLIMITED_ANNUAL:-11990}
      # Message service (for notifications)
      MESSAGE_SERVICE_HOST: ${MESSAGE_SERVICE_HOST:-message}
      MESSAGE_SERVICE_PORT: ${MESSAGE_SERVICE_PORT:-3000}
    networks:
      - backend-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck: *api-healthcheck
    deploy:
      resources:
        limits:
          cpus: '0.35'
          memory: 384M
        reservations:
          cpus: '0.15'
          memory: 192M

  # ---------------------------------------------------------------------------
  # Admin UIs
  # ---------------------------------------------------------------------------
  mongo-express:
    image: 'mongo-express:1.0'
    container_name: mongo-express
    restart: always
    ports:
      - '27081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: ${ME_CONFIG_MONGODB_URL}
      ME_CONFIG_SITE_BASEURL: ${ME_CONFIG_SITE_BASEURL}
      ME_CONFIG_MONGODB_ENABLE_ADMIN: ${ME_CONFIG_MONGODB_ENABLE_ADMIN}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${ME_CONFIG_MONGODB_ADMINUSERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${ME_CONFIG_MONGODB_ADMINPASSWORD}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_CONFIG_BASICAUTH_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_CONFIG_BASICAUTH_PASSWORD}
    networks:
      - backend-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/mongo-express/status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 192M

  pgadmin:
    image: 'dpage/pgadmin4:9'
    container_name: pgadmin
    restart: always
    ports:
      - '5480:80'
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - './data/pgadmin-data/:/var/lib/pgadmin/:rw'
    networks:
      - backend-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Docker Registry
  # ---------------------------------------------------------------------------
  registry:
    image: 'registry:2'
    container_name: registry
    restart: always
    ports:
      - '5000:5000'
    environment:
      # Token-based auth — registry delegates to pipeline-image-registry's
      # /token endpoint. Every pull/push requires a valid bearer JWT signed
      # with the keypair generated by `bin/gen-image-registry-jwt-keys.sh`.
      # Anonymous reads are NOT allowed; deletion of htpasswd is intentional.
      REGISTRY_AUTH: token
      # The bearer realm URL is sent verbatim to clients in the
      # WWW-Authenticate response, so it MUST be resolvable by every
      # Docker client that pulls from this registry. Defaults to the
      # in-cluster plain-HTTP endpoint on image-registry — bypasses
      # nginx so clients (buildkit, crane sidecars) avoid the self-
      # signed-cert TLS dance. Override via .env to a public HTTPS URL
      # when external Docker clients (developer machines, ec2/fargate)
      # need to pull from this registry.
      REGISTRY_AUTH_TOKEN_REALM: ${IMAGE_REGISTRY_TOKEN_REALM:-http://image-registry:3000/token}
      REGISTRY_AUTH_TOKEN_SERVICE: pipeline-image-registry
      REGISTRY_AUTH_TOKEN_ISSUER: platform
      REGISTRY_AUTH_TOKEN_ROOTCERTBUNDLE: /etc/registry/jwt-public.pem
      REGISTRY_HTTP_ADDR: '0.0.0.0:5000'
      # TLS deliberately disabled — registry serves plain HTTP on the
      # internal backend-network. External clients still hit it via nginx
      # (which terminates TLS at 8443). Plain HTTP here resolves a
      # scheme-mismatch deadlock between buildkit and crane: buildkit
      # can't bypass TLS verify on a self-signed token-realm host, and
      # crane refuses to follow an HTTP realm from an HTTPS registry.
      # Both clients are happy when realm + registry are both HTTP.
      REGISTRY_STORAGE_DELETE_ENABLED: 'true'
      REGISTRY_HTTP_DEBUG_ADDR: '0.0.0.0:5001'
    volumes:
      - './certs/image-registry-jwt.crt:/etc/registry/jwt-public.pem:ro'
      - './data/registry-data/:/var/lib/registry/:rw'
    networks:
      - proxy-network
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:5001/debug/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 512M
        reservations:
          cpus: '0.3'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Observability (Prometheus + Loki + Promtail). Grafana removed in favor of
  # the native /dashboard/observability page.
  # ---------------------------------------------------------------------------
  prometheus:
    image: 'prom/prometheus:v3.2.1'
    container_name: prometheus
    restart: always
    command: ['--config.file=/etc/prometheus/prometheus.yml', '--storage.tsdb.retention.time=7d']
    volumes:
      - './config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro'
      - './config/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro'
      - './data/db-data/prometheus/:/prometheus:rw'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Alertmanager: routes Prometheus alerts to Slack (or `null` if Slack
  # webhooks aren't configured). The alertmanager.yml template references
  # SLACK_WEBHOOK_URL_CRITICAL / _WARNING which are substituted at deploy
  # time. Defaults are unset → the YAML literally renders `${VAR}` which
  # Alertmanager treats as an invalid URL — both Slack receivers no-op
  # silently. That's the intended degraded behavior; the alerts still
  # land in Alertmanager's UI / API.
  alertmanager:
    image: 'prom/alertmanager:v0.28.0'
    container_name: alertmanager
    restart: always
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    environment:
      - SLACK_WEBHOOK_URL_CRITICAL=${SLACK_WEBHOOK_URL_CRITICAL:-}
      - SLACK_WEBHOOK_URL_WARNING=${SLACK_WEBHOOK_URL_WARNING:-}
      # Multi-tenant relay: posts org-labeled alerts to the platform service,
      # which fans out per the org_alert_destinations table. The platform's
      # ALERT_WEBHOOK_INSTANCES env names the valid instance ids; pick one
      # here and supply its matching bearer token.
      - PLATFORM_ALERT_WEBHOOK_URL=${PLATFORM_ALERT_WEBHOOK_URL:-https://nginx:8443/api/observability/alert-webhook}
      - ALERT_WEBHOOK_INSTANCE_ID=${ALERT_WEBHOOK_INSTANCE_ID:-}
      - ALERT_WEBHOOK_INSTANCE_TOKEN=${ALERT_WEBHOOK_INSTANCE_TOKEN:-}
    volumes:
      - './config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro'
      - './data/db-data/alertmanager/:/alertmanager:rw'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  loki:
    image: 'grafana/loki:3.4.2'
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - './data/db-data/loki/:/loki:rw'
      - './config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro'
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  promtail:
    image: 'grafana/promtail:3.4.2'
    container_name: promtail
    restart: always
    # Wrap promtail to auto-clean corrupted positions file on startup.
    # The named volume preserves read positions across restarts for log dedup,
    # but unclean shutdowns can corrupt the YAML — purge it before launching.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -f /tmp/positions.yaml ] && ! grep -q '^positions:' /tmp/positions.yaml 2>/dev/null; then
          echo "Removing corrupted positions file"
          rm -f /tmp/positions.yaml
        fi
        exec /usr/bin/promtail -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - './config/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro'
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - './data/promtail-positions/:/tmp'
    networks:
      - backend-network
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

# =============================================================================
# Networks
# =============================================================================
# All persistent data lives under ./data/ (bind mounts) so `rm -rf data/`
# is the single command for a clean slate. Postgres/Mongo data dirs were
# previously named volumes for I/O perf — the trade-off is acceptable on
# dev laptops where reproducibility matters more than raw throughput.

networks:
  proxy-network:
    name: proxy-network
  backend-network:
    name: backend-network
    driver: bridge

volumes:
  # buildkit-cache is the *only* named volume in this compose — see the
  # rationale on the buildkitd service. Everything else uses bind mounts
  # under ./data/ for one-command wipeability.
  buildkit-cache:
