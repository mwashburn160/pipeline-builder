; ---------------------------------------------------------------------------
; pgBouncer pool partitioning for Pipeline Builder
; ---------------------------------------------------------------------------
;
; Why a connection pooler: when the platform fleet scales beyond ~10
; replicas, the raw connection ceiling on Postgres (default max_connections
; = 100) becomes the throttle. pgBouncer lets every service pin a
; "pool"-class connection (cheap, ephemeral) while pgBouncer fans out to a
; bounded pool of real Postgres connections.
;
; Why per-tier pools: a noisy Developer-tier org running long-running
; queries can chew through the shared pool and starve Pro/Unlimited
; customers. The three logical databases below all point at the SAME
; underlying physical database (pipeline_builder) but pgBouncer maintains
; SEPARATE pool budgets per logical DB. Services that route by tier (e.g.
; plugin build worker) connect with DB_NAME=pipeline_builder_<tier>; the
; default service connection (`pipeline_builder`) is for tier-agnostic
; traffic (login, admin endpoints, observability scrapers).
;
; This is OPT-IN: when PGBOUNCER_ENABLED=true the deploy stack adds
; pgbouncer between services and postgres. The default (false) keeps
; the direct service→postgres connection so dev/local deploys don't have
; to think about pool partitioning.

[databases]
; Default pool — used by services without a tier-specific routing decision.
pipeline_builder = host=postgres port=5432 dbname=pipeline_builder

; Per-tier pools. Same physical DB; pgBouncer enforces separate pool
; budgets so cross-tier saturation can't happen at the pool level.
pipeline_builder_developer = host=postgres port=5432 dbname=pipeline_builder pool_size=20
pipeline_builder_pro       = host=postgres port=5432 dbname=pipeline_builder pool_size=40
pipeline_builder_unlimited = host=postgres port=5432 dbname=pipeline_builder pool_size=80

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Transaction-mode pooling: pgBouncer hands a backend connection to a
; client for the duration of a transaction, then returns it to the pool.
; Compatible with every drizzle / pg driver call this app makes — no
; cursor / prepared-statement state crosses transaction boundaries.
pool_mode = transaction

; Auth file is generated by the postgres container's init scripts; format
; is `"<user>" "<md5-or-scram-encoded-password>"` per line. The example
; deploy uses scram-sha-256 (Postgres 14+ default).
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Sane defaults for a fleet of ~10 platform replicas.
max_client_conn = 1000
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 5

; Drop idle backends after 10 minutes — keeps pgBouncer's footprint small
; during quiet periods (test envs, off-hours).
server_idle_timeout = 600

; Bind the admin/stats console to the postgres superuser so operators can
; `psql -p 6432 pgbouncer -U postgres` for live stats.
admin_users = postgres
stats_users = postgres

logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
