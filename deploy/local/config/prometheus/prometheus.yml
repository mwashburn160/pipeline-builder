# Prometheus scrape configuration for Pipeline Builder services
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'platform'
    static_configs:
      - targets: ['platform:3000']

  - job_name: 'plugin'
    static_configs:
      - targets: ['plugin:3000']

  - job_name: 'pipeline'
    static_configs:
      - targets: ['pipeline:3000']

  - job_name: 'quota'
    static_configs:
      - targets: ['quota:3000']

  - job_name: 'billing'
    static_configs:
      - targets: ['billing:3000']

  - job_name: 'message'
    static_configs:
      - targets: ['message:3000']

  - job_name: 'reporting'
    static_configs:
      - targets: ['reporting:3000']

  - job_name: 'compliance'
    static_configs:
      - targets: ['compliance:3000']

  - job_name: 'nginx'
    scheme: https
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ['nginx:8443']
