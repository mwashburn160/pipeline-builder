x-api-defaults:
  restart: always
  networks: &ref_0
    - backend-network
  healthcheck: &ref_1
    test:
      - CMD
      - curl
      - '-f'
      - 'http://localhost:3000/health'
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 60s
  deploy: &ref_2
    resources:
      limits:
        cpus: '0.75'
        memory: 768M
      reservations:
        cpus: '0.4'
        memory: 384M

x-common-api-env: &common-api-env
  DB_HOST: '${DB_HOST:-postgres}'
  DB_PORT: '${DB_PORT:-5432}'
  DATABASE: '${DATABASE:-platform}'
  DB_USER: '${DB_USER}'
  DB_PASSWORD: '${DB_PASSWORD}'
  JWT_SECRET: '${JWT_SECRET}'
  REFRESH_TOKEN_SECRET: '${REFRESH_TOKEN_SECRET}' 
  PLATFORM_BASE_URL: '${PLATFORM_BASE_URL:-https://localhost:8443}'

services:
  nginx:
    image: 'nginx:latest'
    container_name: nginx
    ports:
      - '8080:8080'
      - '8443:8443'
    restart: always
    environment:
      JWT_SECRET: '${JWT_SECRET}'
    volumes:
      - './certs/nginx.crt:/etc/nginx/certs/nginx.crt:ro'
      - './certs/nginx.key:/etc/nginx/certs/nginx.key:ro'
      - './nginx/nginx.conf:/etc/nginx/nginx.conf:ro'
      - './nginx/jwt.js:/etc/nginx/njs/jwt.js:ro'
      - './nginx/metrics.js:/etc/nginx/njs/metrics.js:ro'
    networks:
      - proxy-network
      - backend-network
    depends_on:
      platform:
        condition: service_healthy
      frontend:
        condition: service_healthy
      list-plugins:
        condition: service_healthy
      get-plugin:
        condition: service_healthy
      upload-plugin:
        condition: service_healthy
      list-pipelines:
        condition: service_healthy
      get-pipeline:
        condition: service_healthy
      create-pipeline:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M

  mongodb:
    image: 'mongo:latest'
    container_name: mongodb
    command:
      - mongod
      - '--bind_ip_all'
      - '--replSet'
      - rs0
      - '--keyFile'
      - /etc/mongo-keyfile
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: '${MONGO_INITDB_ROOT_USERNAME}'
      MONGO_INITDB_ROOT_PASSWORD: '${MONGO_INITDB_ROOT_PASSWORD}'
      MONGO_INITDB_DATABASE: platform
    healthcheck:
      test: >
        bash -c 'mongosh --quiet --host localhost:27017 --username
        ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD}
        --authenticationDatabase admin --eval
        "db.getSiblingDB(\"admin\").runCommand({ replSetGetStatus: 1 }).ok" ||
        (mongosh --quiet --host localhost:27017 --username
        ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD}
        --authenticationDatabase admin --eval "rs.initiate({ _id: \"rs0\",
        members: [{ _id: 0, host: \"mongodb:27017\" }] })" && exit 1)'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - './db-data/mongodb/:/data/db/:rw'
      - './mongo-keyfile:/etc/mongo-keyfile:ro'
      - './mongodb-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro'
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.8'
          memory: 768M

  postgres:
    image: 'postgres:latest'
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: '${POSTGRES_USER}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
      POSTGRES_DB: '${POSTGRES_DB}'
    command: postgres -c listen_addresses=*
    healthcheck:
      test:
        - CMD
        - pg_isready
        - '-U'
        - '${POSTGRES_USER}'
        - '-d'
        - '${POSTGRES_DB}'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - './db-data/postgres/:/var/lib/postgresql/:rw'
      - './postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro'
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.8'
          memory: 768M

  mongo-express:
    image: 'mongo-express:latest'
    container_name: mongo-express
    restart: always
    ports:
      - '27081:8081'
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_URL: '${ME_CONFIG_MONGODB_URL}'
      ME_CONFIG_SITE_BASEURL: '${ME_CONFIG_SITE_BASEURL}'
      ME_CONFIG_MONGODB_ENABLE_ADMIN: '${ME_CONFIG_MONGODB_ENABLE_ADMIN}'
      ME_CONFIG_MONGODB_ADMINUSERNAME: '${ME_CONFIG_MONGODB_ADMINUSERNAME}'
      ME_CONFIG_MONGODB_ADMINPASSWORD: '${ME_CONFIG_MONGODB_ADMINPASSWORD}'
      ME_CONFIG_BASICAUTH_USERNAME: '${ME_CONFIG_BASICAUTH_USERNAME}'
      ME_CONFIG_BASICAUTH_PASSWORD: '${ME_CONFIG_BASICAUTH_PASSWORD}'
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 192M

  pgadmin:
    image: 'dpage/pgadmin4:latest'
    container_name: pgadmin
    restart: always
    ports:
      - '5480:80'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: '${PGADMIN_DEFAULT_EMAIL}'
      PGADMIN_DEFAULT_PASSWORD: '${PGADMIN_DEFAULT_PASSWORD}'
    volumes:
      - './pgadmin-data/:/var/lib/pgadmin/:rw'
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M

  registry:
    image: 'registry:latest'
    container_name: registry
    restart: always
    ports:
      - '5000:5000'
    environment:
      REGISTRY_AUTH: htpasswd
      REGISTRY_HTTP_ADDR: '0.0.0.0:5000'
      REGISTRY_HTTP_TLS_KEY: /etc/ssl/private/registry.key
      REGISTRY_HTTP_TLS_CERTIFICATE: /etc/ssl/certs/registry.crt
      REGISTRY_AUTH_HTPASSWD_REALM: registry realm
      REGISTRY_AUTH_HTPASSWD_PATH: /etc/auth/registry.passwd
      REGISTRY_STORAGE_DELETE_ENABLED: 'true'
    volumes:
      - './auth/registry.passwd:/etc/auth/registry.passwd:ro'
      - './certs/registry.crt:/etc/ssl/certs/registry.crt:ro'
      - './certs/registry.key:/etc/ssl/private/registry.key:ro'
      - './registry-data/:/var/lib/registry/:rw'
    networks:
      - proxy-network
      - backend-network
    deploy:
      resources:
        limits:
          cpus: '0.6'
          memory: 512M
        reservations:
          cpus: '0.3'
          memory: 256M

  registry-express:
    image: 'joxit/docker-registry-ui:latest'
    container_name: registry-express
    restart: always
    ports:
      - '5080:80'
    environment:
      REGISTRY_TITLE: ${JOXIT_REGISTRY_TITLE}
      NGINX_PROXY_PASS_URL: ${JOXIT_NGINX_PROXY_PASS_URL}
      SINGLE_REGISTRY: ${JOXIT_SINGLE_REGISTRY}
      ENABLE_DELETE_IMAGES: ${JOXIT_ENABLE_DELETE_IMAGES}
      SHOW_CONTENT_DIGEST: ${JOXIT_SHOW_CONTENT_DIGEST}
    depends_on:
      - registry
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 384M
        reservations:
          cpus: '0.2'
          memory: 192M

  frontend:
    image: 'ghcr.io/mwashburn160/frontend:0.1.22'
    container_name: frontend
    restart: always
    networks:
      - proxy-network
    environment:
      PLATFORM_BASE_URL: '${PLATFORM_BASE_URL}'
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  platform: 
    restart: always
    networks: *ref_0
    healthcheck: *ref_1
    deploy: *ref_2
    image: 'ghcr.io/mwashburn160/platform:0.1.33'
    container_name: platform
    depends_on:
      mongodb:
        condition: service_healthy
      list-plugins:
        condition: service_healthy
      get-plugin:
        condition: service_healthy
      upload-plugin:
        condition: service_healthy
      list-pipelines:
        condition: service_healthy
      get-pipeline:
        condition: service_healthy
      create-pipeline:
        condition: service_healthy
    environment:
      <<: *common-api-env
      # MongoDB
      MONGODB_URI: '${MONGODB_URI}'
      # Auth
      REFRESH_TOKEN_SECRET: '${REFRESH_TOKEN_SECRET}'
      JWT_EXPIRES_IN: '${JWT_EXPIRES_IN}'
      JWT_SALT_ROUNDS: '${JWT_SALT_ROUNDS}'
      REFRESH_TOKEN_EXPIRES_IN: '${REFRESH_TOKEN_EXPIRES_IN}'
      # Server
      TRUST_PROXY: '${TRUST_PROXY}'
      PLATFORM_FRONTEND_URL: '${PLATFORM_FRONTEND_URL:-https://localhost:8443}'
      # Email (SMTP)
      EMAIL_ENABLED: '${EMAIL_ENABLED}'
      EMAIL_FROM: '${EMAIL_FROM}'
      EMAIL_FROM_NAME: '${EMAIL_FROM_NAME}'
      SMTP_HOST: '${SMTP_HOST}'
      SMTP_PORT: '${SMTP_PORT}'
      SMTP_SECURE: '${SMTP_SECURE}'
      SMTP_USER: '${SMTP_USER}'
      SMTP_PASS: '${SMTP_PASS}'
      # Invitation
      INVITATION_EXPIRATION_DAYS: '${INVITATION_EXPIRATION_DAYS}'
      INVITATION_MAX_PENDING_PER_ORG: '${INVITATION_MAX_PENDING_PER_ORG}'

  upload-plugin:
    restart: always
    networks: *ref_0
    healthcheck: *ref_1
    deploy: *ref_2
    image: 'ghcr.io/mwashburn160/upload-plugin:0.1.32'
    container_name: upload-plugin
    privileged: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-api-env
      IMAGE_REGISTRY_HOST: '${IMAGE_REGISTRY_HOST:-registry}'
      IMAGE_REGISTRY_PORT: '${IMAGE_REGISTRY_PORT:-5000}'
      IMAGE_REGISTRY_TOKEN: '${IMAGE_REGISTRY_TOKEN}'

  get-plugin:
    restart: always
    networks: *ref_0
    healthcheck: *ref_1
    deploy: *ref_2
    image: 'ghcr.io/mwashburn160/get-plugin:0.1.31'
    container_name: get-plugin
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-api-env

  list-plugins:
    restart: always
    networks: *ref_0
    healthcheck: *ref_1
    deploy: *ref_2
    image: 'ghcr.io/mwashburn160/list-plugins:0.1.33'
    container_name: list-plugins
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-api-env

  create-pipeline:
    restart: always
    networks: *ref_0
    healthcheck: *ref_1
    deploy: *ref_2
    image: 'ghcr.io/mwashburn160/create-pipeline:0.1.32'
    container_name: create-pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-api-env

  get-pipeline:
    restart: always
    networks: *ref_0
    healthcheck: *ref_1
    deploy: *ref_2
    image: 'ghcr.io/mwashburn160/get-pipeline:0.1.31'
    container_name: get-pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-api-env

  list-pipelines:
    restart: always
    networks: *ref_0
    healthcheck: *ref_1
    deploy: *ref_2
    image: 'ghcr.io/mwashburn160/list-pipelines:0.1.33'
    container_name: list-pipelines
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-api-env

networks:
  proxy-network:
    name: proxy-network
  backend-network:
    name: backend-network
    driver: bridge